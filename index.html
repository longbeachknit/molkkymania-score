<div class="app" id="app"></div>

<script>
const C=['#1D9E75','#E24B4A'];
const LB=['#E1F5EE','#FCEBEB'];
const LBR=['#9FE1CB','#F7C1C1'];
const LT=['#085041','#A32D2D'];
const MAX=50,RST=25,MM=3,TURN_LIMIT=12;

// ===== アプリのバージョン表記 =====
// ファイル名（例: molkky_final_7_10.html）から自動でバージョン番号を取り出します。
// 「7_10」や「7-10」→「7_10」と表示。読み取れないときは下の値を使います。
const APP_VERSION_FALLBACK='7_11';
const APP_VERSION=(function(){
  try{
    const m=(location.pathname||'').match(/molkky_final_(\d+)[_-](\d+)/i);
    if(m)return m[1]+'_'+m[2];
  }catch(e){}
  return APP_VERSION_FALLBACK;
})();

// ===== sessionStorage 試合状態の保存・復元 =====
const SS_KEY='molkky_match_state';
const IN_GAME_PHASES=['matchConfirm','firstChoice','orderSetup','game','setOver'];

function saveMatchState(){
  if(!IN_GAME_PHASES.includes(S.phase))return;
  try{
    // throwStartTimeはDate.nowの値なので保存しない
    const toSave={...S,throwStartTime:null};
    sessionStorage.setItem(SS_KEY,JSON.stringify(toSave));
  }catch(e){console.warn('sessionStorage保存失敗:',e);}
}

function loadMatchState(){
  try{
    const raw=sessionStorage.getItem(SS_KEY);
    if(!raw)return null;
    const saved=JSON.parse(raw);
    // setsのSetオブジェクトを復元（JSON.parseでSetは配列になるため）
    return saved;
  }catch(e){
    console.warn('sessionStorage読み込み失敗:',e);
    return null;
  }
}

function clearMatchState(){
  try{sessionStorage.removeItem(SS_KEY);}catch(e){}
}

let S={
  phase:'setup',fmt:'best2',turnLimit:false,
  playerMin:2,playerMax:4,
  teams:[{id:0,name:'チームA',members:[]},{id:1,name:'チームB',members:[]}],
  matchIdData:null, // 試合ID読み込み後の確認データ
  sets:[],cur:0,fid:0,showHist:false,
  pFirst:null,pIdx:null,pOrders:[[],[]],
  pExclude:[[],[]],
  iP:'',iM:'single',iA:'',useAimed:false,rule37Pending:false,_tiView:null,_tiLoading:false,_tiError:null,_tiSchedule:[],_tiRegulation:'',_tiSections:null,_tiPrelim:[],_tiPrelimQuery:'',_tiPrelimSelected:null,_tiBracket:null,_tiBracketSide:'left',
  prev:null,ssIdx:0,
  endPending:false,tieExtend:false,tlTieExtend:false,earlyEnd:false,
  molkoutWinner:null,
  editSetIdx:null,editTi:null,editThIdx:null,afterEdit:null,_ucFrom:null,_ssSaveDest:null,
  throwStartTime:null,lastThrowSec:null,
  _matchConfirmMode:null, // 'resultOnly' のとき結果のみ送信フロー
  _roScores:null,         // 結果のみ：各セットの[teamA点,teamB点]配列
  _roEarly:false,         // 結果のみ：時間切れで途中終了
  _roMolkoutWinner:null,  // 結果のみ：時間切れ同点時のモルックアウト勝者(0/1)
  _roSubmitting:false,_roSubmitError:''
};
function fmtSec(sec){if(sec===null||sec===undefined)return'--';const m=Math.floor(sec/60),s=sec%60;return m>0?m+'分'+s+'秒':s+'秒';}
let _timerInterval=null;
function startTimer(){
  S.throwStartTime=Date.now();
  if(_timerInterval)clearInterval(_timerInterval);
  _timerInterval=setInterval(()=>{
    const el=document.getElementById('throw-timer-display');
    if(!el){clearInterval(_timerInterval);_timerInterval=null;return;}
    const sec=Math.round((Date.now()-S.throwStartTime)/1000);
    const m=Math.floor(sec/60),s=sec%60;
    el.textContent='⏱ '+(m>0?m+'分'+s+'秒':s+'秒');
  },1000);
}
function stopTimer(){
  if(_timerInterval){clearInterval(_timerInterval);_timerInterval=null;}
  if(!S.throwStartTime)return null;
  const sec=Math.round((Date.now()-S.throwStartTime)/1000);
  S.throwStartTime=null;
  return sec;
}

const fl=()=>S.fmt==='best2'?'2先':S.fmt==='best3'?'3先':'表裏';
const nfc=(i)=>(S.fmt==='best2')?(i===0||i===2):(S.fmt==='best3')?(i===0||i===4):i===0;
// ===== 戻るボタン用グローバル関数 =====
function goBackFromFirst(){
  var si=S.pIdx!=null?S.pIdx:S.sets.length;
  S.pIdx=null;S.pFirst=null;S.pOrders=[[],[]];S.pExclude=[[],[]];
  if(si===0){
    // matchConfirmに戻る：退避していたデータを復元
    if(S._savedMatchIdData)S.matchIdData=JSON.parse(JSON.stringify(S._savedMatchIdData));
    S.phase='matchConfirm';
  } else {
    S.phase='setOver';
  }
  render();
}
function goBackFromOrder(){
  var si=S.pIdx!=null?S.pIdx:S.sets.length;
  var fb=S._orderFromBack;
  var hasNfc=(S.fmt==='best2')?(si===0||si===2):(S.fmt==='best3')?(si===0||si===4):(si===0);
  S.pIdx=null;S.pFirst=null;S.pOrders=[[],[]];S.pExclude=[[],[]];S._orderFromBack=false;
  if(fb){
    // game戻りの場合は常にsetOver
    S.phase='setOver';
  } else if(hasNfc){
    // 先攻選択が必要なセット → firstChoiceへ（pIdxを復元）
    S.pIdx=si;
    S.pFirst=S.fid;
    var _g=gIO(si,S.fid);S.pOrders=_g.orders;S.pExclude=_g.excludes;
    S.phase='firstChoice';
  } else if(si===0){
    // 第1セット・自動入れ替えの場合 → matchConfirmへ
    if(S._savedMatchIdData)S.matchIdData=JSON.parse(JSON.stringify(S._savedMatchIdData));
    S.phase='matchConfirm';
  } else {
    S.phase='setOver';
  }
  render();
}


const isFin=(i)=>(S.fmt==='best2'&&i===2)||(S.fmt==='best3'&&i===4);
function aF(ni){
  const f=S.fid;
  if(S.fmt==='best2')return ni===1?1-f:f;
  if(S.fmt==='best3'){
    if(ni===2){const w=[0,0];S.sets.slice(0,2).forEach(s=>{if(s.wid!=null)w[s.wid]++;});if(w[0]===2)return 1;if(w[1]===2)return 0;return 1-S.sets[1].ftid;}
    if(ni===3)return 1-S.sets[2].ftid;
    return 1-f;
  }
  return 1-f;
}
function gIO(ni,fid){
  const o=[[],[]];
  const excls=[[],[]];
  [0,1].forEach(ti=>{
    const isF=ti===fid;let fd=null,fdExcl=[];
    // 同じ先/後攻ロールの直前セットのorderとexcludedを引き継ぐ
    for(let i=S.sets.length-1;i>=0;i--){
      const s=S.sets[i];
      if((s.ftid===ti)===isF){const x=s.teams[ti].order;if(x&&x.length){fd=x;fdExcl=s.teams[ti].excluded||[];break;}}
    }
    if(!fd&&S.sets.length>0){
      const pv=S.sets[S.sets.length-1];const x=pv.teams[ti].order;
      if(x&&x.length){fd=x;fdExcl=pv.teams[ti].excluded||[];}
    }
    if(!fd)fd=S.teams[ti].members.slice();
    // orderに含まれていないexcludedメンバーを末尾に追加（全員含める）
    const base=[...fd];
    fdExcl.forEach(m=>{if(!base.includes(m))base.push(m);});
    // チームメンバー全員をリストに含める
    S.teams[ti].members.forEach(m=>{if(!base.includes(m))base.push(m);});
    o[ti]=base;
    excls[ti]=[...fdExcl];
  });
  return{orders:o,excludes:excls};
}
const gT=()=>{const t=[0,0];S.sets.forEach(s=>{t[0]+=s.teams[0].sc;t[1]+=s.teams[1].sc;});return t;}
// 途中終了時にモルックアウトが必要か（勝利セット数・合計点ともに同点）
function needsMolkout(){
  if(S.fmt==='round2')return false;
  const wins=[0,0];S.sets.forEach(s=>{if(s.wid!=null)wins[s.wid]++;});
  if(wins[0]!==wins[1])return false;
  const t=gT();
  return t[0]===t[1];
}
const mxS=()=>S.fmt==='best2'?3:S.fmt==='best3'?5:2;
const nW=()=>S.fmt==='best2'?2:S.fmt==='best3'?3:99;
function mW(){if(S.fmt==='round2')return null;const w=[0,0];S.sets.forEach(s=>{if(s.wid!=null)w[s.wid]++;});const n=nW();return w[0]>=n?0:w[1]>=n?1:null;}
function mkSet(idx,fid,ord,excl){
  return{idx,ftid:fid,ctid:fid,teams:[
    {id:0,sc:0,ms:0,el:false,throws:[],mi:0,order:ord[0]||[],excluded:excl&&excl[0]?[...excl[0]]:[]},
    {id:1,sc:0,ms:0,el:false,throws:[],mi:0,order:ord[1]||[],excluded:excl&&excl[1]?[...excl[1]]:[]}
  ],wid:null,hist:[]};
}
const cs=()=>S.sets[S.cur];
function isTurnEnd(cset){const t0=cset.teams[0].throws.length,t1=cset.teams[1].throws.length;return t0===t1&&t0>0;}
function gmb(td,ti){
  // pExclude を除いたリストでローテーション
  const full=td.order.length>0?td.order:S.teams[ti].members;
  const excl=td.excluded||[];
  const active=full.filter(m=>!excl.includes(m));
  if(!active.length)return full.length?full[td.mi%full.length]:null;
  return active[td.mi%active.length];
}
function dots(n){return[0,1,2].map(i=>`<span style="display:inline-block;width:11px;height:11px;border-radius:50%;background:${i<n?'#E24B4A':'#e5e7eb'};border:1px solid ${i<n?'#E24B4A':'#d1d5db'};"></span>`).join('');}

function recompute(cset){
  [0,1].forEach(ti=>{
    const td=cset.teams[ti];let sc=0,ms=0,el=false;
    td.throws.forEach(th=>{
      if(th.miss){ms++;if(ms>=MM)el=true;th.cumul=sc;}
      else{ms=0;const ns=sc+th.pts;if(ns>MAX){sc=RST;th.over=true;}else{sc=ns;th.over=false;}th.cumul=sc;}
    });
    td.sc=sc;td.ms=ms;td.el=el;
  });
  const e0=cset.teams[0].el,e1=cset.teams[1].el;
  // 失格チームは0点。勝者チーム（失格なし）は50点に設定
  if(e0&&!e1){cset.teams[0].sc=0;cset.teams[1].sc=MAX;cset.wid=1;}
  else if(e1&&!e0){cset.teams[1].sc=0;cset.teams[0].sc=MAX;cset.wid=0;}
  else if(e0&&e1){cset.teams[0].sc=0;cset.teams[1].sc=0;cset.wid=null;}
  else{
    const s0=cset.teams[0].sc,s1=cset.teams[1].sc;
    if(s0===MAX&&s1!==MAX)cset.wid=0;
    else if(s1===MAX&&s0!==MAX)cset.wid=1;
    // それ以外はwidを変更しない（途中終了等で既にwidがセットされている場合）
  }
}

function processTurnLimitSetEnd(isExtended){
  const cset=cs();
  const e0=cset.teams[0].el,e1=cset.teams[1].el;
  if(e0&&!e1){cset.teams[0].sc=0;cset.teams[1].sc=MAX;cset.wid=1;}
  else if(e1&&!e0){cset.teams[1].sc=0;cset.teams[0].sc=MAX;cset.wid=0;}
  else if(e0&&e1){cset.teams[0].sc=0;cset.teams[1].sc=0;cset.wid=null;}
  else{
    const sc0=cset.teams[0].sc,sc1=cset.teams[1].sc;
    if(S.fmt==='round2'){cset.wid=sc0>sc1?0:sc1>sc0?1:null;cset.draw=(sc0===sc1);}
    else{cset.wid=sc0>sc1?0:sc1>sc0?1:null;}
  }
  cset.endType=isExtended?'tlExtend':'tl'; // 呼び出し元から明示的に渡す
  S.tlTieExtend=false;S.phase='setOver';render();
}

function processEarlyEnd(){
  const cset=cs();
  const e0=cset.teams[0].el,e1=cset.teams[1].el;
  if(e0&&!e1){cset.teams[0].sc=0;cset.teams[1].sc=MAX;cset.wid=1;}
  else if(e1&&!e0){cset.teams[1].sc=0;cset.teams[0].sc=MAX;cset.wid=0;}
  else if(e0&&e1){cset.teams[0].sc=0;cset.teams[1].sc=0;cset.wid=null;}
  else{
    const sc0=cset.teams[0].sc,sc1=cset.teams[1].sc;
    if(S.fmt==='round2'){
      // 表裏：同点は引き分けでセット終了
      cset.wid=sc0>sc1?0:sc1>sc0?1:null;cset.draw=(sc0===sc1);
    } else {
      // 2先・3先：同点ならもう1ターン延長
      if(sc0===sc1){
        S.endPending=false;S.tieExtend=true;render();return;
      }
      cset.wid=sc0>sc1?0:sc1>sc0?1:null;
    }
  }
  cset.endType='early'; // 強制終了
  S.endPending=false;S.tieExtend=false;
  S.earlyEnd=true;
  S.phase='setOver';render();
}

function round2Stats(){
  const completedSets=[...S.sets];
  const phantom=[];
  for(let i=completedSets.length;i<2;i++)phantom.push({teams:[{sc:0},{sc:0}],wid:null,draw:true,phantom:true});
  const allSets=[...completedSets,...phantom];
  const wins=[0,0];
  allSets.forEach(s=>{if(s.wid!=null&&!s.draw)wins[s.wid]++;});
  const draws=allSets.filter(s=>s.draw||s.wid==null).length;
  const totals=[0,0];
  allSets.forEach(s=>{totals[0]+=s.teams[0].sc;totals[1]+=s.teams[1].sc;});
  return{allSets,wins,draws,totals};
}

async function hashPw(pw){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function checkAdminPw(pw){

// ===== GitHub から リアルタイム対戦データ取得 =====
// 【変更】読み取りは raw.githubusercontent.com から行う。
//   ・api.github.com … 未認証60回/時の制限があり多人数で403になるため使わない
//   ・github.io(Pages) … レート制限は無いがCDNキャッシュで反映が数十秒〜遅れる
//   ・raw … レート制限が実質問題にならず、反映も速い（即時性とのバランスが最良）
//   raw は生JSONをそのまま返す（base64デコード不要）。
const GITHUB_RAW_BASE='https://raw.githubusercontent.com/longbeachknit/molkkymania-deta/main';
const GITHUB_DATA_BASE='https://api.github.com/repos/longbeachknit/molkkymania-deta/contents'; // 書き込み(PUT)用に残す
const CACHE_TTL=20000; // 20秒キャッシュ
const _jsonCache={};

// ===== メンバー名の難読化（GitHub上のJSONで本名が直接読めないようにする） =====
// XOR + Base64 による軽量難読化。接頭辞 enc1: で暗号化済みかを自動判定する。
// 注意: 鍵はアプリ内にあるため「本気の解読」は防げない。覗き見・検索インデックス対策。
const MEMBER_ENC_KEY='molkky-himitsu-2025';
function encMembers(plain){
  if(!plain)return plain;
  const s=String(plain);
  if(s.startsWith('enc1:'))return s; // 二重暗号化防止
  try{
    const bytes=new TextEncoder().encode(s);
    const key=new TextEncoder().encode(MEMBER_ENC_KEY);
    const out=new Uint8Array(bytes.length);
    for(let i=0;i<bytes.length;i++)out[i]=bytes[i]^key[i%key.length];
    let bin='';for(const b of out)bin+=String.fromCharCode(b);
    return'enc1:'+btoa(bin);
  }catch(e){return s;}
}
function decMembers(value){
  if(!value)return value;
  const s=String(value);
  if(!s.startsWith('enc1:'))return s; // 平文（旧データ）はそのまま
  try{
    const bin=atob(s.slice(5));
    const bytes=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
    const key=new TextEncoder().encode(MEMBER_ENC_KEY);
    const out=new Uint8Array(bytes.length);
    for(let i=0;i<bytes.length;i++)out[i]=bytes[i]^key[i%key.length];
    return new TextDecoder().decode(out);
  }catch(e){return s;}
}
// teams 配列の members を暗号化／復号したコピーを返す
function encTeams(teams){
  return(teams||[]).map(t=>({...t,members:encMembers(t.members||'')}));
}
function decTeams(teams){
  return(teams||[]).map(t=>({...t,members:decMembers(t.members||'')}));
}

// eventCode("01_0601" 形式)をJSONファイル名用("0601")に変換する
// venue接頭辞を取り除き、最後のコード部分のみをファイル名に使う
function toJsonFileCode(eventCode){
  const parts=String(eventCode).split('_');
  return parts.length>=2?parts[parts.length-1]:eventCode;
}

async function fetchMatchesJson(eventCode){
  const now=Date.now();
  if(_jsonCache[eventCode]&&(now-_jsonCache[eventCode].ts)<CACHE_TTL){
    return _jsonCache[eventCode].data;
  }
  try{
    const fileCode=toJsonFileCode(eventCode);
    // 【API経由】対戦表は api.github.com 経由で取得（各端末60回/時の制限あり）
    const url=GITHUB_DATA_BASE+'/'+fileCode+'.json?t='+Date.now();
    const res=await fetch(url,{cache:'no-store',headers:{'Accept':'application/vnd.github.v3+json'}});
    if(!res.ok)throw new Error('HTTP '+res.status);
    const apiData=await res.json();
    const b64=apiData.content.replace(/\s/g,'');
    const binary=atob(b64);
    const bytes=new Uint8Array(binary.length);
    for(let i=0;i<binary.length;i++)bytes[i]=binary.charCodeAt(i);
    const data=JSON.parse(new TextDecoder('utf-8').decode(bytes));
    _jsonCache[eventCode]={ts:now,data};
    return data;
  }catch(e){
    console.warn('GitHub JSON取得失敗:',e.message);
    return null;
  }
}

async function syncSettingsFromGitHub(eventCode){
  const data=await fetchSettingsJson(eventCode);
  if(!data)return false;
  // eventCodeは "01_0601" 形式の場合がある。venueCode/eventCodeに正規化する
  const parts=String(eventCode).split('_');
  const normVenue=parts.length>=2?parts[0]:(data.venueCode||'');
  const normEvent=parts.length>=2?parts[1]:eventCode;
  // 大会設定を上書き（対象大会のみ。venueCode+eventCodeで照合）
  const tour=AD.tournaments&&AD.tournaments.find(t=>
    (t.venueCode===normVenue&&t.eventCode===normEvent)||
    t.eventCode===eventCode
  );
  if(tour){
    if(data.eventName!==undefined)tour.eventName=data.eventName;
    if(data.priority!==undefined)tour.priority=data.priority;
    if(data.matchRules!==undefined)tour.matchRules=data.matchRules;
    if(data.tourneyRules!==undefined)tour.tourneyRules=data.tourneyRules;
    if(data.roundRules!==undefined)tour.roundRules=data.roundRules;
    if(data.teams!==undefined)tour.teams=decTeams(data.teams);
    if(data.eventPeriodStart!==undefined)tour.eventPeriodStart=data.eventPeriodStart;
    if(data.eventPeriodEnd!==undefined)tour.eventPeriodEnd=data.eventPeriodEnd;
    if(data.receptionPw!==undefined)tour.receptionPw=data.receptionPw;
    if(data.bracketTeamCount!==undefined)tour.bracketTeamCount=Number(data.bracketTeamCount)||64;
    if(data.sheetUrl!==undefined)tour.sheetUrl=data.sheetUrl;
    if(data.systemChart!==undefined)tour.systemChart=data.systemChart;
    if(data.courtLayout!==undefined)tour.courtLayout=data.courtLayout;
    saveActiveTour(tour);
  } else {
    // 大会が存在しない場合は新規作成（venueCode/eventCodeを正規化して保存）
    const newTour=makeTournament({
      venueCode:data.venueCode||normVenue,
      eventCode:normEvent,
      eventName:data.eventName||'',
      gasUrl:data.gasUrl||'',
      sheetUrl:data.sheetUrl||'',
      priority:data.priority||'tournament',
      matchRules:data.matchRules||[],
      tourneyRules:data.tourneyRules||[],
      roundRules:data.roundRules||[],
      teams:decTeams(data.teams||[]),
      matches:[],
      eventPeriodStart:data.eventPeriodStart||'',
      eventPeriodEnd:data.eventPeriodEnd||'',
      receptionPw:data.receptionPw||'',
      bracketTeamCount:Number(data.bracketTeamCount)||64,
      systemChart:data.systemChart||null,
      courtLayout:data.courtLayout||{grid:'',labelTop:'',labelBottom:'',labelLeft:'',labelRight:'',centerLabel:{text:'',pos:'bottom'}}
    });
    if(!AD.tournaments)AD.tournaments=[];
    AD.tournaments.push(newTour);
    saveAdmin(AD);
  }
  return true;
}

async function syncMatchesFromGitHub(eventCode){
  const data=await fetchMatchesJson(eventCode);
  const tour=AD.tournaments&&AD.tournaments.find(t=>t.eventCode===eventCode);
  if(!tour)return false;
  // 取得成功時のみ上書き、失敗時は古いデータもクリア

    tour.matches=data.matches;
  }
  saveActiveTour(tour);
  return !!(data&&data.matches);
}

// ===== 組み合わせID取得（GASから） =====
function parseCombinedId(id){
  // 例: 01_0602_02_002_01_073005
  // 構造: 場所_大会_試合区分_コート_トーナメント_チームAB
  const parts=id.trim().split('_');
  if(parts.length<6)return null;
  const last=parts[5]; // 6桁: 073005
  if(last.length<6)return null;
  const teamA=last.slice(0,3);  // 073
  const teamB=last.slice(3,6);  // 005
  return{
    matchId:parts.slice(0,4).join('_'), // 試合ID（4パーツ: 場所_大会_試合区分_コート）
    matchCode:parts[2],   // 試合区分ID
    tourneyCode:parts[4], // トーナメントID（5番目）
    courtCode:parts[3],   // コートID（4番目）
    teamA,teamB,
    combinedId:id.trim()
  };
}

async function fetchTournamentInfo(action){
  // 【変更】GAS直叩き → GitHub上のJSONを読む方式に変更。
  //   ・スケジュール/レギュ(_info.json) … raw.githubusercontent から読む（レート制限実質なし）
  //   ・予選結果(_prelim.json) ………… api.github.com から読む（各端末60回/時の制限あり・即時性重視）
  //   返り値の形は旧GASと同じ（{schedule} / {sections} / {teams}）に保つので呼び出し側は無変更。
  const tour=S._editingTourId?AD.tournaments.find(t=>t.id===S._editingTourId):activeTour();
  if(!tour){ throw new Error('対象の大会が見つかりません。'); }

  const fileCode=toJsonFileCode(tour.eventCode||'');
  if(!fileCode){ throw new Error('大会コードが設定されていません。'); }

  // action に応じて、読むファイル・取得方式・返り値への変換を切り替える
  let fileName, transform, useApi=false;
  if(action==='getSchedule'){
    fileName='_info.json';
    transform=d=>({ schedule:(d&&d.schedule)||[] });
  }else if(action==='getRegulation'){
    fileName='_info.json';
    // 旧GASは {sections} を返していたので、それに合わせる
    transform=d=>({ sections:(d&&d.regulation)||[] });
  }else if(action==='getPrelim'){
    fileName='_prelim.json';
    transform=d=>({ teams:(d&&d.teams)||[] });
    useApi=true;   // ★予選結果はAPI経由
  }else if(action==='getBracket'){
    fileName='_bracket.json';
    // 決勝トーナメントは raw 経由（レート制限実質なし・一斉閲覧に強い）
    transform=d=>({ rounds:(d&&d.rounds)||[] });
  }else{
    throw new Error('未知のaction: '+action);
  }

  const url=(useApi?GITHUB_DATA_BASE:GITHUB_RAW_BASE)+'/'+fileCode+fileName+'?t='+Date.now();

  const doFetch=async()=>{
    const opt=useApi
      ? {cache:'no-store',headers:{'Accept':'application/vnd.github.v3+json'}}
      : {cache:'no-store'};
    const res=await fetch(url,opt);
    if(res.status===404){ throw new Error('まだ配信されていません'); }
    if(!res.ok)throw new Error('HTTP '+res.status);
    if(useApi){
      // API経由はbase64でcontentが返るのでデコードする
      const apiData=await res.json();
      const b64=apiData.content.replace(/\s/g,'');
      const binary=atob(b64);
      const bytes=new Uint8Array(binary.length);
      for(let i=0;i<binary.length;i++)bytes[i]=binary.charCodeAt(i);
      const data=JSON.parse(new TextDecoder('utf-8').decode(bytes));
      return transform(data);
    }else{
      // raw経由は生JSONをそのまま返す
      const data=await res.json();
      return transform(data);
    }
  };

  // 既存と同様、失敗時は0.5秒待って1回だけ自動リトライ
  try{
    return await doFetch();
  }catch(e1){
    await new Promise(r=>setTimeout(r,500));
    return await doFetch();
  }
}

// 受付データの送信／確認（試合情報と同じ tour.gasUrl 経由・キャッシュなし）
async function callReceptionGas(action,params={}){
  const tour=S._editingTourId?AD.tournaments.find(t=>t.id===S._editingTourId):activeTour();
  const fetchUrl=tour&&tour.gasUrl&&tour.gasUrl.trim();
  if(!fetchUrl||!fetchUrl.startsWith('https://script.google.com/')){
    throw new Error('GAS URLが設定されていません。');
  }
  const extra=Object.keys(params).map(k=>'&'+encodeURIComponent(k)+'='+encodeURIComponent(params[k])).join('');
  const doFetch=async()=>{
    const url=fetchUrl+'?action='+action+extra+'&t='+Date.now()+'_'+Math.random().toString(36).slice(2);
    const res=await fetch(url,{mode:'cors',cache:'no-store',credentials:'omit',redirect:'follow'});
    if(!res.ok)throw new Error('HTTP '+res.status);
    return await res.json();
  };
  try{ return await doFetch(); }
  catch(e1){ await new Promise(r=>setTimeout(r,500)); return await doFetch(); }
}

async function fetchCombinedIds(){
  const btn=document.getElementById('btn-fetch-combined');
  if(btn){btn.disabled=true;btn.textContent='取得中...';}
  try{
    const tour=S._editingTourId?AD.tournaments.find(t=>t.id===S._editingTourId):activeTour();
    const fetchUrl=tour&&tour.gasUrl&&tour.gasUrl.trim();
    if(!fetchUrl||!fetchUrl.startsWith('https://script.google.com/')){
      alert('この大会の組み合わせ取得URLが設定されていません。\n大会編集画面の「基本情報」→「組み合わせ取得URL」を入力してください。');
      if(btn){btn.disabled=false;btn.textContent='🔄 組み合わせ取得';}
      return;
    }
    const res=await fetch(fetchUrl+'?action=getCombinedIds&t='+Date.now(),{mode:'cors',cache:'no-store'});
    if(!res.ok)throw new Error('HTTP '+res.status);
    const json=await res.json();
    const ids=(json.ids||[]).filter(v=>v&&v.trim());
    if(!ids.length){alert('データが見つかりませんでした。');return;}
    
    // 組み合わせIDをパースしてAD.matchesに変換
    const parsed=ids.map(id=>parseCombinedId(id)).filter(v=>v);

function parseCSV(text){
  if(text.charCodeAt(0)===0xFEFF)text=text.slice(1);
  return text.split(/\r?\n/).map(row=>{
    const cells=[];let cur='',inQ=false;
    for(let i=0;i<row.length;i++){
      const c=row[i];
      if(c==='"'){if(inQ&&row[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
      else if(c===','&&!inQ){cells.push(cur.trim());cur='';}
      else cur+=c;
    }
    cells.push(cur.trim());
    return cells;
  }).filter(r=>r.some(c=>c!==''));
}

function importTeamsCSV(text){
  const rows=parseCSV(text);
  const teams=[];
  for(const row of rows){
    const id=(row[0]||'').trim();
    const name=(row[1]||'').trim();
    if(!id||!name)continue;
    const members=row.slice(2).map(s=>s.trim()).filter(s=>s!=='');
    teams.push({id,name,members:members.join(',')});
  }
  return teams;
}

function triggerTeamsCSV(){
  const inp=document.createElement('input');
  inp.type='file';inp.accept='.csv,text/csv';
  inp.onchange=async(e)=>{

    const targetTour2=S._editingTourId?AD.tournaments.find(t=>t.id===S._editingTourId):activeTour();

      saveActiveTour(targetTour2);
    }

}

// 試合IDから設定を解決
// スキャン/入力された文字列から試合IDを取り出す（URL形式・素のID形式の両対応）
// 対応: "…/#/m/01_0602_02_003" "…/#/r/ID" "…?m=ID" "01_0602_02_003"
function normalizeScannedId(raw){
  let s=(raw||'').trim();
  if(!s)return s;
  // URLなら末尾のID部分を抽出
  if(/^https?:\/\//i.test(s)||s.includes('#/')||s.includes('?')){
    // ハッシュ #/m/ID or #/r/ID
    let m=s.match(/#\/[mr]\/([^?&#]+)/);
    if(m&&m[1])return decodeURIComponent(m[1]).trim();
    // クエリ ?m=ID or &m=ID
    m=s.match(/[?&]m=([^?&#]+)/);
    if(m&&m[1])return decodeURIComponent(m[1]).trim();
    // それ以外のURLはパス末尾セグメントを試す
    try{
      const u=new URL(s);
      const seg=(u.pathname.split('/').filter(Boolean).pop())||'';
      if(seg.split('_').length>=4)return decodeURIComponent(seg).trim();
    }catch(e){}
  }
  return s;
}

function resolveMatchId(id){
  // 試合ID: 場所_大会_試合区分_コート（4パーツ）
  const parts=id.trim().split('_');
  if(parts.length<4)return null;
  const venueCode=parts[0];
  const eventCode=parts[1];
  const matchCode=parts[2];  // 試合区分ID
  const courtCode=parts[3];  // コートID

  // 場所+大会コードで大会を特定してアクティブにセット
  let tour=AD.tournaments&&AD.tournaments.find(t=>t.venueCode===venueCode&&t.eventCode===eventCode);
  if(!tour)tour=activeTour();
  if(tour){AD.activeTourId=tour.id;saveAdmin(AD);}

  const src=tour||{matches:[],teams:[],matchRules:[],tourneyRules:[],roundRules:[],priority:'tournament'};

  // 試合ID（4パーツ）で対戦カード検索
  const matchIdKey=parts.slice(0,4).join('_');
  const mc=src.matches.find(m=>m.matchId===matchIdKey);

  // トーナメントIDはmatchesから取得（組み合わせIDに含まれる）
  const tourneyCode=mc?mc.tourneyCode:'';

  // 試合形式解決（試合区分 × トーナメント種類）
  let rule=null;
  if(src.priority==='tournament'){
    rule=(src.tourneyRules||[]).find(r=>r.code===tourneyCode)||(src.matchRules||[]).find(r=>r.code===matchCode);
  } else {
    rule=(src.matchRules||[]).find(r=>r.code===matchCode)||(src.tourneyRules||[]).find(r=>r.code===tourneyCode);
  }

  const teamA=mc?(src.teams||[]).find(t=>t.id===mc.teamA):null;
  const teamB=mc?(src.teams||[]).find(t=>t.id===mc.teamB):null;
  const roundRule=(src.roundRules||[]).find(r=>r.matchCode===matchCode&&r.tourneyCode===tourneyCode);

  return {
    matchId:matchIdKey,
    venueCode,eventCode,matchCode,tourneyCode,courtCode,
    tour,rule,
    round:roundRule?roundRule.round:'',
    teamA,teamB,
    hasTeams:!!(teamA&&teamB),
    hasRule:!!rule
  };
}

// tourneyCode未指定の場合は対戦表(tour.matches)からmatchIdで照合して補完する
function resolveMatchLabels(tour,matchId,tourneyCode){
  const t=tour||{};
  const parts=String(matchId||'').split('_');
  const matchCode=parts[2]||'';
  const mr=(t.matchRules||[]).find(r=>r.code===matchCode);
  const matchLabel=(mr&&mr.name)?mr.name:(matchCode?('第'+(parseInt(matchCode,10)||matchCode)+'試合'):'');
  let tc=tourneyCode||'';
  if(!tc){
    const m=(t.matches||[]).find(x=>x.matchId===matchId);
    if(m)tc=m.tourneyCode||'';
  }
  const tr=(t.tourneyRules||[]).find(r=>r.code===tc);
  const rr=(t.roundRules||[]).find(r=>r.matchCode===matchCode&&r.tourneyCode===tc);
  const tourneyName=(tr&&tr.name)?tr.name:'';
  const roundName=(rr&&rr.round)?rr.round:'';
  const roundLabel=[tourneyName,roundName].filter(Boolean).join(' ');
  return {matchLabel,roundLabel,matchCode,tourneyCode:tc,hasMatchRule:!!(mr&&mr.name)};
}

function calcRank(arr,key,desc=true){
  // 配列の各要素にkeyの順位を付与して返す
  const sorted=[...arr].sort((a,b)=>desc?(b[key]-a[key]):(a[key]-b[key]));
  const rankMap={};
  sorted.forEach((item,i)=>{
    if(i>0&&sorted[i][key]===sorted[i-1][key]){
      rankMap[item.teamNo||item.name+'_'+item.eventCode]=rankMap[sorted[i-1].teamNo||sorted[i-1].name+'_'+sorted[i-1].eventCode];
    }else{
      rankMap[item.teamNo||item.name+'_'+item.eventCode]=i+1;
    }
  });
  return rankMap;
}

async function submitResult(){
  // 試合IDとチームNo（試合開始時に保存済み）
  const matchId=S._matchId||'';
  const teamNos=S._teamNos||['',''];
  const tour=activeTour();

  // 勝者判定
  const wins=[0,0];
  S.sets.forEach(s=>{if(s.wid!=null)wins[s.wid]++;});
  let matchWin=mW();
  if(matchWin==null){
    const totals=S.sets.reduce((a,s)=>{a[0]+=s.teams[0].sc;a[1]+=s.teams[1].sc;return a;},[0,0]);
    if(wins[0]>wins[1])matchWin=0;
    else if(wins[1]>wins[0])matchWin=1;
    else if(totals[0]>totals[1])matchWin=0;
    else if(totals[1]>totals[0])matchWin=1;
    else if(S.molkoutWinner!=null)matchWin=S.molkoutWinner;
  }

  // ===== チーム結果データ（2行分）=====
  const teamRows=[0,1].map(ti=>{
    const result=S.fmt==='round2'?'':matchWin===null?'引き分け':matchWin===ti?'勝ち':'負け';
    const totalSets=S.sets.length;
    const lossSets=S.sets.filter(s=>s.wid!=null&&s.wid!==ti).length;
    const drawSets=S.sets.filter(s=>s.wid===null&&s.draw).length;
    // セットごとの点数（最大5セット）
    const setScores=[0,1,2,3,4].map(si=>{
      const s=S.sets[si];
      return s?s.teams[ti].sc:'';
    });
    // 先攻・後攻セット数
    let firstSets=0,secondSets=0,firstWin=0,secondWin=0,firstLoss=0,secondLoss=0;
    S.sets.forEach(s=>{
      const isFirst=s.ftid===ti;
      if(isFirst){firstSets++;if(s.wid===ti)firstWin++;else if(s.wid!==null)firstLoss++;}
      else{secondSets++;if(s.wid===ti)secondWin++;else if(s.wid!==null)secondLoss++;}
    });
    return [
      matchId,          // A: 試合ID
      teamNos[ti],      // B: チームNo
      S.teams[ti].name, // C: チーム名
      result,           // D: 試合結果
      totalSets,        // E: 総セット
      wins[ti],         // F: 勝利セット数
      lossSets,         // G: 敗北セット数
      drawSets,         // H: 引き分けセット数
      setScores[0],     // I: 1セット目点数
      setScores[1],     // J: 2セット目点数
      setScores[2],     // K: 3セット目点数
      setScores[3],     // L: 4セット目点数
      setScores[4],     // M: 5セット目点数
      ...[0,1,2,3,4].map(si=>{
        const s=S.sets[si];
        if(!s)return'';
        // 強制終了は空欄
        if(s.endType==='early')return'';
        // 勝利チームのみ記入
        if(s.wid!==ti)return'';
        // ターン制限終了（点数勝負）
        if(s.endType==='tl')return 12;
        if(s.endType==='tlExtend')return 13;
        // 通常終了：勝利チームのthrowsからcumul===50になったインデックスを探す
        const throws=s.teams[ti].throws;
        const idx=throws.findIndex(th=>th.cumul>=50);
        if(idx<0)return'';
        // ターン数 = Math.ceil((idx+1)/1)（先攻後攻で1ターン）
        // throwsは先攻・後攻交互に進むので、ターン数はfloor(index/1)+1ではなく
        // 相手チームのthrowsと合わせて「何ターン目か」を算出
        const fti=s.ftid;
        const myIdx=idx; // 自チームのthrows内インデックス
        // 自チームがmyIdx番目を投げた時点でのターン数
        const turnNum=myIdx+1; // 1始まり
        return turnNum;
      }), // N〜R: 1〜5セット目上がりターン数
      firstSets,        // S: 先攻セット数
      secondSets,       // T: 後攻セット数
      firstWin,         // U: 先攻セット勝利数
      secondWin,        // V: 後攻セット勝利数
      firstLoss,        // W: 先攻セット敗北数
      secondLoss        // X: 後攻セット敗北数
    ];
  });

  // ===== 個人結果データ（投擲ごとに1行）=====
  const personalRows=[];
  const summaryRows=[]; // 個人集計行（投擲データ送信後に別送信）
  S.sets.forEach((s,si)=>{
    // 両チームの投擲を時系列（ターン）順に並べる
    // ターンごとに先攻→後攻の順
    const fti=s.ftid; // 先攻チームID
    const sti=1-fti;
    const perThrowCounts={}; // メンバーごとのセット内投擲回数
    const maxLen=Math.max(s.teams[0].throws.length,s.teams[1].throws.length);
    // ターン数：先攻・後攻が1回ずつ投げたら1ターン（1,1,2,2,3,3...）
    for(let i=0;i<maxLen;i++){
      const turnNum=i+1; // i番目のラウンド = ターン数
      [fti,sti].forEach(ti=>{
        const th=s.teams[ti].throws[i];
        if(!th)return;
        const member=th.member||'';
        if(!perThrowCounts[ti+'-'+member])perThrowCounts[ti+'-'+member]=0;
        perThrowCounts[ti+'-'+member]++;
        const aimStr=th.result==='circle'?'T':th.result==='cross'?'F':th.result==='unknown'?'Q':'';
        personalRows.push([
          matchId,                          // A: 試合ID
          si+1,                             // B: セット
          s.ftid===ti?'先攻':'後攻',         // C: 先攻後攻
          teamNos[ti],                      // D: チームNo
          S.teams[ti].name,                 // E: チーム名
          member,                           // F: 投擲者個人名
          turnNum,                          // G: ターン数
          perThrowCounts[ti+'-'+member],    // H: 個人投擲回数（セット内）
          th.time!=null?th.time:'',         // I: 投擲時間
          th.pts,                           // J: 得点
          th.cumul,                         // K: 合計点
          '',                               // L: 空欄
          '',                               // M: 空欄
          '',                               // N: 空欄（集計行のみ）
          '',                               // O: 空欄（集計行のみ）
          '',                               // P: 空欄（集計行のみ）
          '',                               // Q: 空欄（集計行のみ）
          '',                               // R: 空欄（集計行のみ）
          '',                               // S: 空欄（集計行のみ）
          th.multi?0:1,                     // T: 単品1/複数0
          aimStr==='T'?1:aimStr==='F'?0:'', // U: 狙いどおり1/0
          s.ftid===ti?1:0                   // V: 先攻1/後攻0
        ]);
      });
    }
  });

  // ===== 個人別集計行を追加（各投擲データの後に1人1行）=====
  [0,1].forEach(ti=>{
    // このチームに出場した全メンバーを収集
    const memberStats={};
    S.sets.forEach((s,si)=>{
      const isFirst=s.ftid===ti;
      s.teams[ti].throws.forEach(th=>{
        const m=th.member||'';
        if(!memberStats[m])memberStats[m]={
          sets:new Set(),firstSets:new Set(),secondSets:new Set(),
          firstWinSets:new Set(),secondWinSets:new Set()
        };
        const ms=memberStats[m];
        ms.sets.add(si);
        if(isFirst)ms.firstSets.add(si);
        else ms.secondSets.add(si);
        if(isFirst&&s.wid===ti)ms.firstWinSets.add(si);
        if(!isFirst&&s.wid===ti)ms.secondWinSets.add(si);
      });
    });
    Object.entries(memberStats).forEach(([member,ms])=>{
      const row=new Array(22).fill(''); // A〜V列（22列、T/U/V列は空欄）
      row[0]=matchId;           // A: 試合ID
      row[3]=teamNos[ti];       // D: チームNo
      row[4]=S.teams[ti].name;  // E: チーム名
      row[5]=member;            // F: 出場者名
      row[13]=ms.sets.size;                // N: 出場セット数
      row[14]=ms.firstSets.size;           // O: 先攻セット出場数
      row[15]=ms.secondSets.size;          // P: 後攻セット出場数
      row[16]=ms.firstWinSets.size;        // Q: 先攻セット勝利数
      row[17]=ms.secondWinSets.size;       // R: 後攻セット勝利数
      const setTotalPts=[...ms.sets].reduce((sum,si)=>{
        const s=S.sets[si];
        return sum+(s?s.teams[ti].sc:0);
      },0);
      row[18]=setTotalPts;                 // S: 出場セット合計点
      summaryRows.push(row); // ← personalRowsではなくsummaryRowsへ
    });
  });

  // ===== GASに1回のPOSTで全データ送信（高速化：コールドスタート1回のみ）=====
  const body=new URLSearchParams({data:JSON.stringify({
    type:'all',
    teamRows,
    personalRows,
    summaryRows
  })});
  const res=await fetch(GAS_URL,{method:'POST',mode:'cors',body});
  const json=await res.json();
  // 他端末が既に同じ試合を送信済み → エラーではなく「送信済み」として扱う
  if(json.status==='duplicate'){
    const err=new Error(json.message||'この試合は既に送信済みです');
    err.isDuplicate=true;
    throw err;
  }
  if(json.status!=='ok')throw new Error(json.message||'送信エラー');
  return {teamRows,personalRows,summaryRows};
}

// ===== 結果のみ送信：各セット点数からチーム結果行を組み立ててGASへ =====
async function submitResultOnly(){
  const matchId=S._matchId||'';
  const teamNos=S._teamNos||['',''];
  const scores=(S._roScores||[]).map(([a,b])=>[
    a===''?null:parseInt(a,10),
    b===''?null:parseInt(b,10)
  ]);
  // 入力済みセット（両チーム数値）のみ採用
  const filledSets=scores.filter(([a,b])=>a!==null&&b!==null&&!isNaN(a)&&!isNaN(b));

  const nW=S.fmt==='best2'?2:S.fmt==='best3'?3:99;
  const early=!!S._roEarly;

  // 有効セットの決定
  let validSets=filledSets;
  if(!early&&S.fmt!=='round2'){
    // 通常：先取で決着したらそのセットまでを有効とする（残りセットは無視）
    const w=[0,0];const acc=[];
    for(const [a,b] of filledSets){
      acc.push([a,b]);
      if(a>b)w[0]++;else if(b>a)w[1]++;
      if(w[0]>=nW||w[1]>=nW)break;
    }
    validSets=acc;
  }
  // 時間切れ（early）：入力済みセットを全て採用（表裏で1セットのみ等も可）

  // 各セット勝者（wid: 0/1/null=引き分け）
  const setWid=validSets.map(([a,b])=>a>b?0:b>a?1:null);
  const wins=[0,0];
  setWid.forEach(w=>{if(w===0)wins[0]++;else if(w===1)wins[1]++;});

  // 試合勝敗
  let matchWin=null;
  if(early){
    // 時間切れ終了：earlyロジック（セット勝数→合計点→同点ならモルックアウト勝者）
    if(wins[0]>wins[1])matchWin=0;
    else if(wins[1]>wins[0])matchWin=1;
    else{
      const tot=[validSets.reduce((s,r)=>s+r[0],0),validSets.reduce((s,r)=>s+r[1],0)];
      if(tot[0]>tot[1])matchWin=0;
      else if(tot[1]>tot[0])matchWin=1;
      else matchWin=(S._roMolkoutWinner!=null?S._roMolkoutWinner:null); // 同点→モルックアウト勝者
    }
  }else if(S.fmt!=='round2'){
    if(wins[0]>=nW)matchWin=0;
    else if(wins[1]>=nW)matchWin=1;
  }else{
    const tot=[validSets.reduce((s,r)=>s+r[0],0),validSets.reduce((s,r)=>s+r[1],0)];
    matchWin=tot[0]>tot[1]?0:tot[1]>tot[0]?1:null;
  }

  // 試合結果ラベル：表裏は通常空欄だが、時間切れ時は勝敗を記入する
  const writeResult=early||S.fmt!=='round2';

  const teamRows=[0,1].map(ti=>{
    const result=writeResult?(matchWin===null?'引き分け':matchWin===ti?'勝ち':'負け'):'';
    const totalSets=validSets.length;
    const lossSets=setWid.filter(w=>w!==null&&w!==ti).length;
    const drawSets=setWid.filter(w=>w===null).length;
    const setScores=[0,1,2,3,4].map(si=>{
      const s=validSets[si];
      return s?s[ti]:'';
    });
    return [
      matchId,          // A: 試合ID
      teamNos[ti],      // B: チームNo
      S.teams[ti].name, // C: チーム名
      result,           // D: 試合結果
      totalSets,        // E: 総セット
      wins[ti],         // F: 勝利セット数
      lossSets,         // G: 敗北セット数
      drawSets,         // H: 引き分けセット数
      setScores[0],     // I: 1セット目点数
      setScores[1],     // J: 2セット目点数
      setScores[2],     // K: 3セット目点数
      setScores[3],     // L: 4セット目点数
      setScores[4],     // M: 5セット目点数
      '', '', '', '', '', // N〜R: 上がりターン数（点数のみのため空欄）
      '', '', '', '', '', '' // S〜X: 先攻後攻統計（点数のみのため空欄）
    ];
  });

  // 既存と同じ type:'all' で teamRows のみ送信（personalRows等は空）
  const body=new URLSearchParams({data:JSON.stringify({
    type:'all',
    teamRows,
    personalRows:[],
    summaryRows:[]
  })});
  const res=await fetch(GAS_URL,{method:'POST',mode:'cors',body});
  const json=await res.json();
  // 他端末が既に同じ試合を送信済み → エラーではなく「送信済み」として扱う
  if(json.status==='duplicate'){
    const err=new Error(json.message||'この試合は既に送信済みです');
    err.isDuplicate=true;
    throw err;
  }
  if(json.status!=='ok')throw new Error(json.message||'送信エラー');
  return {teamRows};
}

async function handleResultOnlySubmit(){
  S._roSubmitting=true;S._roSubmitError='';render();
  let result=null;
  let isDup=false;
  try{
    result=await submitResultOnly();
  }catch(e){
    console.error(e);
    isDup=e.isDuplicate===true;
    if(!isDup) S._roSubmitError=e.message||'送信に失敗しました';
  }
  S._roSubmitting=false;
  // 結果のみ用のリセット：試合状態をクリアして最初の画面へ
  const resetRO=()=>{
    S._roScores=null;S._roEarly=false;S._roMolkoutWinner=null;S._matchConfirmMode=null;S._savedMatchIdData=null;
    S._matchId='';S._teamNos=['',''];S.matchIdData=null;
    S.phase='setup';render();
  };
  if(result){
    showSubmitConfirm(result.teamRows,[],resetRO);
  }else if(isDup){
    showDuplicateNotice(resetRO);
  }else{
    render();
  }
}

async function handleSubmitAndReset(){
  const btn=document.getElementById('btn-submit-reset');
  if(btn){btn.disabled=true;btn.textContent='送信中...';}
  let result=null;
  let isDup=false;
  try{
    result=await submitResult();
  }catch(e){
    console.error(e);
    isDup=e.isDuplicate===true;
    // 重複以外のエラー時のみ、再送信ボタンを表示する
    if(!isDup && btn){
      btn.disabled=false;btn.textContent='⚠️ 失敗 - もう一度送信する';btn.style.background='#E24B4A';
    }
  }
  if(result){
    showSubmitConfirm(result.teamRows,result.personalRows,()=>doReset());
  } else if(isDup){
    // 他端末が既に送信済み：エラーではないので、確認後リセットして最初へ戻す
    showDuplicateNotice(()=>doReset());
  }
}

async function startQRScan(mode){
  const resultOnly=(mode==='resultOnly');
  const container=document.getElementById('qr-reader-container');
  if(!container)return;
  container.style.display='flex';

  let html5QrCode=null;
  let scanning=true;

  const stopScan=async()=>{
    scanning=false;
    if(html5QrCode){
      try{await html5QrCode.stop();}catch(e){}
      html5QrCode=null;
    }
    container.style.display='none';
  };

  const onScanSuccess=async(decodedText)=>{
    if(!scanning)return;
    await stopScan();
    const val=normalizeScannedId(decodedText); // URL形式なら試合IDを抽出
    const qrParts=val.split('_');
    if(qrParts.length>=2)await syncAllFromGitHub(qrParts[1]);
    const result=resolveMatchId(val);
    if(!result){
      S._matchIdError='QRコードの形式が正しくありません';
      S._matchIdInput=val;S.phase=resultOnly?'resultOnlyMatchId':'matchId';render();return;
    }
    S._matchIdInput=val;S._matchIdError='';S.matchIdData=result;
    if(resultOnly){
      S._matchConfirmMode='resultOnly';
      S._matchConfirmFrom='resultOnlyMatchId';
    }else{
      S._matchConfirmMode=null;
    }
    S.phase='matchConfirm';render();
  };

  const closeBtn=document.getElementById('btn-qr-close');
  if(closeBtn)closeBtn.onclick=async()=>{ await stopScan(); };
  // 右下「試合IDを入力する」→ 既存の試合ID入力画面へ
  const toManual=document.getElementById('btn-qr-to-manual');
  if(toManual)toManual.onclick=async()=>{ await stopScan(); S._matchIdInput='';S._matchIdError='';S.phase=resultOnly?'resultOnlyMatchId':'matchId';render(); };

  try{
    html5QrCode=new Html5Qrcode('qr-reader');
    const config={fps:10,qrbox:{width:250,height:250}};
    await html5QrCode.start({facingMode:'environment'},config,onScanSuccess);
  }catch(err){
    alert('カメラの起動に失敗しました。カメラへのアクセスを許可してください。');
    container.style.display='none';
  }
}

function rSetup(){
  // 受付済みチームの保持状態（ローカルのアクティブ大会で照合）
  const _my=getValidMyTeam();

function rFirst(){
  const si=S.pIdx!=null?S.pIdx:S.sets.length,sn=si+1;
  const sl=S.fmt==='round2'?`${sn}セット目`:`第${sn}セット`;
  const pf=S.pFirst!=null?S.pFirst:S.fid;
  const fin=isFin(si),tots=gT(),isDraw=fin&&tots[0]===tots[1];
  const chooser=fin&&!isDraw?(tots[0]>tots[1]?0:1):null;
  let top='';
  if(fin){top=isDraw
    ?`<div style="background:#FFF7ED;border:1.5px solid #fed7aa;border-radius:10px;padding:12px;margin-bottom:14px;font-size:14px;color:#92400e;">合計点が同点のため、ドローショットをして先攻後攻を決めてください。</div>`
    :`<div style="background:#E1F5EE;border:1.5px solid #9FE1CB;border-radius:10px;padding:12px;margin-bottom:14px;font-size:14px;color:#085041;">合計点が高い <strong>${S.teams[chooser].name}（${tots[chooser]}点）</strong> が先攻後攻を選択できます。</div>`;}
  return`<div style="padding:8px 0 4px;">
    ${si>0?histTbl(si):''}
    <div style="font-size:17px;font-weight:600;color:#111;margin-bottom:8px;">${sl} 先攻チームを選択</div>${top}
    ${[0,1].map(i=>`<div style="margin-bottom:10px;">
      <button class="btn fc-btn" data-id="${i}" style="width:100%;padding:16px;border:2.5px solid ${pf===i?C[i]:'#d1d5db'};background:${pf===i?LB[i]:'#fff'};border-radius:10px;">

          ${fin&&chooser!=null&&i===chooser?`<span style="font-size:12px;background:${LB[i]};color:${LT[i]};padding:3px 8px;border-radius:99px;border:1px solid ${LBR[i]};">選択権あり</span>`:''}
          ${pf===i?`<span style="font-size:12px;background:${C[i]};color:#fff;padding:3px 9px;border-radius:99px;">先攻 ✓</span>`:''}
        </div>
      </button>
    </div>`).join('')}

  </div>`;
}

function rOrder(){
  const si=S.pIdx!=null?S.pIdx:S.sets.length,sn=si+1;

  const pf=S.pFirst!=null?S.pFirst:(nfc(si)?S.fid:aF(si));
  const autoSwap=!nfc(si),isSecondPlus=si>0;
  return`<div style="padding:8px 0 4px;">
    ${si>0?histTbl(si):''}
    <div style="font-size:17px;font-weight:600;color:#111;margin-bottom:6px;">${sl} 投げ順の設定</div>
    ${autoSwap?`<div style="background:${LB[pf]};border:1.5px solid ${LBR[pf]};border-radius:10px;padding:10px 12px;margin-bottom:12px;font-size:13px;color:${LT[pf]};">先攻後攻は自動入れ替え：先攻 <strong>${S.teams[pf].name}</strong></div>`:''}
    <div style="font-size:13px;color:#6b7280;margin-bottom:12px;">↑↓またはドラッグで並び替え、チェックで今セットの参加者を選択</div>
    ${[0,1].map(ti=>{
      const team=S.teams[ti],ord=S.pOrders[ti].length>0?S.pOrders[ti]:team.members;
      const excl=S.pExclude[ti]||[];
      if(!team.members.length)return`<div class="card" style="padding:12px;margin-bottom:12px;opacity:0.5;"><div style="font-size:14px;color:#9ca3af;">${team.name} — メンバー未登録</div></div>`;
      const activeCount=ord.filter(m=>!excl.includes(m)).length;
      const minOk=S.playerMin<=1||activeCount>=S.playerMin;
      const maxOk=S.playerMax>=99||activeCount<=S.playerMax;
      return`<div class="card" style="padding:12px;margin-bottom:12px;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
          <div style="width:10px;height:10px;border-radius:50%;background:${C[ti]};flex-shrink:0;"></div>

        </div>
        <div style="font-size:12px;color:${(!minOk||!maxOk)?'#b91c1c':'#6b7280'};margin-bottom:8px;font-weight:${(!minOk||!maxOk)?600:400};">参加: ${activeCount}人${S.playerMax<99?' / 最大'+S.playerMax+'人':''}${!maxOk?' ⚠️ 上限超過 → 外す必要があります':''}</div>
        <div id="order-list-${ti}" data-team="${ti}" style="display:grid;gap:6px;">
          ${ord.map((m,i)=>{const isExcl=excl.includes(m);const canExcl=!isExcl&&activeCount>Math.max(S.playerMin,1);const canIncl=isExcl&&(S.playerMax>=99||activeCount<S.playerMax);
          return`<div class="order-item${isExcl?' order-excl':''}" draggable="${isExcl?'false':'true'}" data-team="${ti}" data-idx="${i}" style="${isExcl?'opacity:0.45;background:#f9fafb;':''}">
            <span style="font-size:13px;color:#9ca3af;min-width:22px;">${isExcl?'－':''+( i-excl.filter((x,j)=>ord.indexOf(x)<i).length+1)+'.'}</span>
            <span style="font-size:15px;flex:1;${isExcl?'text-decoration:line-through;color:#9ca3af;':''}">${m}</span>
            ${!isExcl?`<button class="btn btn-gray btn-xs move-up" data-team="${ti}" data-idx="${i}" ${i===0||ord.slice(0,i).every(x=>excl.includes(x))?'disabled':''} style="padding:4px 8px;">↑</button>

                    :`<button class="btn btn-red-o btn-xs excl-toggle" data-team="${ti}" data-member="${m}" ${canExcl?'':'disabled'} style="padding:4px 8px;font-size:11px;">外す</button>`}
            ${!isExcl?`<span style="font-size:18px;color:#9ca3af;cursor:grab;padding:0 2px;">≡</span>`:''}

      <button class="btn btn-yellow btn-sm" id="btn-add-member-1" style="padding:10px;font-size:13px;">＋ メンバー追加<br><span style="font-size:11px;color:#92400e;">${S.teams[1].name}</span></button>
    </div>
    <div style="display:flex;gap:8px;margin-top:4px;">
      <button class="btn btn-gray" onclick="goBackFromOrder()" style="flex:1;">← 戻る</button>
      <button class="btn btn-green" id="btn-start" style="flex:2;padding:14px;font-size:16px;">ゲーム開始 ▶</button>
    </div>
  </div>`;
}

function rGame(){

  const wins=[0,0];S.sets.forEach((s,si)=>{if(si<S.cur&&s.wid!=null)wins[s.wid]++;});
  const sn=S.cur+1,sl=S.fmt==='round2'?`${sn}セット目`:`第${sn}セット`;

  const hasPrev=S.cur>0,isFirst=cset.teams[0].throws.length===0&&cset.teams[1].throws.length===0;

  const hasThrows=cset.teams[0].throws.length>0||cset.teams[1].throws.length>0;
  const fti=cset.ftid;
  const ftiThrows=cset.teams[fti].throws.length;
  const nextIsFirst=ct===fti;
  const displayTurnNum=nextIsFirst?ftiThrows+1:ftiThrows;
  const completedT=Math.min(cset.teams[0].throws.length,cset.teams[1].throws.length);
  const remaining=S.turnLimit?(TURN_LIMIT-completedT):null;
  return`<div style="padding:6px 0 4px;">
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:10px;flex-wrap:wrap;">

function buildSS(cset,editable,_setIdx){
  const fti=cset.ftid,sti=1-fti;
  // スコアシート：実際に投げたメンバーは必ず列に含める（excludedでも投擲があれば表示）
  const mbrs=[0,1].map(ti=>{
    const td=cset.teams[ti];
    const excl=td.excluded||[];
    const full=td.order&&td.order.length>0?td.order:(S.teams[ti].members.length?S.teams[ti].members:['投てき者']);
    // このセットで実際に投げたメンバー（throwsに登場する名前）
    const threwSet=new Set();
    (td.throws||[]).forEach(th=>{if(th&&th.member!=null&&th.member!=='')threwSet.add(th.member);});
    // 基本はexcludedを除いた順。ただし実際に投げたメンバーはexcludedでも残す
    let active=full.filter(m=>!excl.includes(m)||threwSet.has(m));
    // orderに載っていないが投げたメンバー（名簿変更等）も末尾に追加して取りこぼし防止
    threwSet.forEach(m=>{if(!active.includes(m))active.push(m);});
    return active.length>0?active:full;
  });
  const nM=[mbrs[0].length,mbrs[1].length];
  const maxT=Math.max(cset.teams[0].throws.length,cset.teams[1].throws.length);
  const cF=nM[fti]+1,cS=nM[sti]+1;
  const mhdr=(ti)=>mbrs[ti].map(m=>`<th class="mbr-th" style="border:1px solid #bbb;">${m}</th>`).join('');
  function tDisp(th,ti,thIdx){
    if(!th)return'';
    if(th.miss){const inner=`<span style="color:#9ca3af;font-size:15px;">—</span>`;return editable?`<span class="edit-th-btn" data-ti="${ti}" data-idx="${thIdx}" data-setidx="${_setIdx}" style="cursor:pointer;">${inner}✏️</span>`:inner;}
    const sc=th.raw!==undefined?th.raw:th.pts;
    let inner='';
    if(th.result==='circle'&&th.multi)inner=svgS(sc,22);
    else if(th.result==='circle')inner=svgC(sc,22);
    else if(th.result==='unknown')inner=`<span style="font-weight:600;font-size:14px;color:#f59e0b;">${sc}？</span>`;
    else inner=`<span style="font-weight:600;font-size:14px;">${sc}</span>`;
    return editable?`<span class="edit-th-btn" data-ti="${ti}" data-idx="${thIdx}" data-setidx="${_setIdx}" style="cursor:pointer;">${inner}✏️</span>`:inner;
  }
  const prevC=[0,0];
  function totDisp(th,ti){
    if(!th)return'';
    if(th.miss)return`<span style="color:#6b7280;">${prevC[ti]}</span>`;
    if(th.over){prevC[ti]=th.cumul;return`<span style="color:#b45309;font-weight:600;">${th.cumul}</span>`;}
    prevC[ti]=th.cumul;return`<span style="font-weight:600;">${th.cumul}</span>`;
  }
  let rows='';
  for(let t=0;t<maxT;t++){
    const thF=cset.teams[fti].throws[t],thS=cset.teams[sti].throws[t];
    // 投擲者名で列を特定。名前が見つからない場合のみローテーション位置でフォールバック
    const idxF=thF?mbrs[fti].indexOf(thF.member):-1;
    const idxS=thS?mbrs[sti].indexOf(thS.member):-1;
    const mF=thF?(idxF>=0?idxF:(nM[fti]?t%nM[fti]:-1)):-1;
    const mS=thS?(idxS>=0?idxS:(nM[sti]?t%nM[sti]:-1)):-1;
    const cF2=mbrs[fti].map((_,mi)=>mi!==mF||!thF?`<td class="sc-cell" style="border:1px solid #bbb;"></td>`:`<td class="sc-cell ${editable?'editable':''}" style="border:1px solid #bbb;">${tDisp(thF,fti,t)}</td>`).join('');
    const cS2=mbrs[sti].map((_,mi)=>mi!==mS||!thS?`<td class="sc-cell" style="border:1px solid #bbb;"></td>`:`<td class="sc-cell ${editable?'editable':''}" style="border:1px solid #bbb;">${tDisp(thS,sti,t)}</td>`).join('');
    rows+=`<tr><td class="turn-col" style="border:1px solid #bbb;">${t+1}</td>${cF2}<td class="tot-cell" style="border:1px solid #bbb;border-right:2.5px solid #aaa;">${totDisp(thF,fti)}</td>${cS2}<td class="tot-cell" style="border:1px solid #bbb;">${totDisp(thS,sti)}</td></tr>`;
  }
  const eF=cset.teams[fti].el,eS=cset.teams[sti].el;
  if(eF||eS){
    const fe=eF?`<span style="color:#E24B4A;font-weight:700;">0</span>`:`<span style="color:#1D9E75;font-weight:700;">50</span>`;
    const se=eS?`<span style="color:#E24B4A;font-weight:700;">0</span>`:`<span style="color:#1D9E75;font-weight:700;">50</span>`;
    rows+=`<tr style="background:#fff8f8;"><td class="turn-col" style="border:1px solid #bbb;font-size:11px;color:#E24B4A;font-weight:700;">失</td>${mbrs[fti].map(()=>`<td class="sc-cell" style="border:1px solid #bbb;background:#fff8f8;"></td>`).join('')}<td class="tot-cell" style="border:1px solid #bbb;border-right:2.5px solid #aaa;background:#fff8f8;">${fe}</td>${mbrs[sti].map(()=>`<td class="sc-cell" style="border:1px solid #bbb;background:#fff8f8;"></td>`).join('')}<td class="tot-cell" style="border:1px solid #bbb;background:#fff8f8;">${se}</td></tr>`;
  }
  if(!rows)rows=`<tr><td colspan="${1+cF+cS}" style="border:1px solid #bbb;padding:12px;font-size:13px;color:#9ca3af;text-align:center;">まだ投てきなし</td></tr>`;
  return`<div class="ss-wrap"><table class="ss-tbl"><thead>
    <tr><th class="turn-col" style="border:1px solid #bbb;"></th>
      <th colspan="${cF}" class="team-hdr" style="border:1px solid #bbb;border-right:2.5px solid #aaa;background:${LB[fti]};color:${LT[fti]};">${S.teams[fti].name}</th>
      <th colspan="${cS}" class="team-hdr" style="border:1px solid #bbb;background:${LB[sti]};color:${LT[sti]};">${S.teams[sti].name}</th>
    </tr>
    <tr><th class="turn-col" style="border:1px solid #bbb;"></th>
      ${mhdr(fti)}<th class="tot-th" style="border:1px solid #bbb;border-right:2.5px solid #aaa;">計</th>
      ${mhdr(sti)}<th class="tot-th" style="border:1px solid #bbb;">計</th>
    </tr></thead><tbody>${rows}</tbody></table></div>`;
}

function rSS(){
  const total=S.sets.length,idx=S.ssIdx,cset=S.sets[idx];
  const sn=idx+1,sl=S.fmt==='round2'?`${sn}セット目`:`第${sn}セット`;
  const canP=idx>0,canN=idx<total-1,isEditMode=S.afterEdit!=null||S._ucFrom!=null;
  return`<div style="padding:6px 0 4px;">
    ${isEditMode?`<div style="background:#FFFBEB;border:1.5px solid #FCD34D;border-radius:10px;padding:10px 12px;margin-bottom:12px;font-size:13px;color:#92400e;">✏️ <strong>スコアを確認してください。</strong>間違いがあれば各投擲の ✏️ をタップして修正できます。</div>`:''}
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
      <button class="btn btn-gray btn-sm" id="btn-back-ss">← 戻る</button>
      <div style="flex:1;"><div style="font-size:12px;color:#6b7280;">${fl()}</div><div style="font-size:16px;font-weight:700;color:#111;">スコアシート${isEditMode?' (確認・修正)':''}</div></div>
    </div>
    ${total>1?`<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;justify-content:center;">
      <button class="btn btn-gray btn-sm" id="btn-ss-prev" ${canP?'':'disabled'} style="min-width:48px;font-size:16px;">◀</button>
      <span style="font-size:15px;font-weight:700;color:#111;min-width:80px;text-align:center;">${sl}</span>
      <button class="btn btn-gray btn-sm" id="btn-ss-next" ${canN?'':'disabled'} style="min-width:48px;font-size:16px;">▶</button>
    </div>`:`<div style="font-size:15px;font-weight:700;color:#111;margin-bottom:10px;">${sl}</div>`}
    ${buildSS(cset,isEditMode,idx)}
    ${isEditMode?`<button class="btn btn-green" id="btn-edit-done" style="width:100%;padding:14px;font-size:16px;margin-top:12px;">確認完了 ✓</button>`:''}
  </div>`;
}

  const ti=S.editTi,thIdx=S.editThIdx;const th=cset.teams[ti].throws[thIdx];
  if(!th){return '<div style="padding:20px;text-align:center;color:#9ca3af;">投擲データ取得エラー</div>';}
  return`<div style="padding:8px 0 4px;">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;">
      <button class="btn btn-gray btn-sm" id="btn-bk-edit">← 戻る</button>

    </div>
    <div class="card" style="padding:14px;margin-bottom:12px;">

            <option value="miss" ${th.miss?'selected':''}>ミス（0点）</option>

function rSetOver(){
  const cset=cs(),wt=cset.wid!=null?S.teams[cset.wid]:null;
  const sn=S.cur+1,sl=S.fmt==='round2'?`${sn}セット目`:`第${sn}セット`;
  const wins=[0,0];S.sets.forEach(s=>{if(s.wid!=null)wins[s.wid]++;});

      ${[0,1].map(i=>{const w=r2.wins[i],d=r2.draws,l=r2.allSets.length-w-d;return`

          <div style="font-size:13px;color:#6b7280;margin-top:2px;">合計 ${r2.totals[i]}点</div></div>

}

// ルール行（prefix: match / tourney）。opts.reorder=true で▲▼並び替えボタンを表示
function ruleRowsHtml(rules,prefix,opts){
  opts=opts||{};
  if(!rules||!rules.length)return'<div style="font-size:13px;color:#9ca3af;padding:6px 0;">まだ設定がありません</div>';
  return rules.map((r,i)=>{
    const reorder=opts.reorder?`<div style="display:flex;flex-direction:column;gap:2px;margin-right:2px;">
      <button class="btn btn-gray btn-xs admin-move-rule" data-prefix="${prefix}" data-idx="${i}" data-dir="up" ${i===0?'disabled':''} style="padding:0 6px;line-height:1.4;${i===0?'opacity:0.3;':''}">▲</button>
      <button class="btn btn-gray btn-xs admin-move-rule" data-prefix="${prefix}" data-idx="${i}" data-dir="down" ${i===rules.length-1?'disabled':''} style="padding:0 6px;line-height:1.4;${i===rules.length-1?'opacity:0.3;':''}">▼</button>
    </div>`:'';

      <div style="flex:1;">

        <div style="font-size:12px;color:#1D9E75;">${r.fmt==='best2'?'2先':r.fmt==='best3'?'3先':'表裏'}${r.turnLimit?' 12T':''}　${r.playerMin}〜${r.playerMax>=99?'∞':r.playerMax}人</div>

      <button class="btn btn-gray btn-xs admin-edit-rule" data-prefix="${prefix}" data-idx="${i}" style="padding:3px 8px;">編集</button>
      <button class="btn btn-red-o btn-xs admin-del-rule" data-prefix="${prefix}" data-idx="${i}" style="padding:3px 8px;">削除</button>

// 3つのルールセクション（試合区分・トーナメント種類・ラウンド名）を「中身だけ」生成
// （外側のカードは呼び出し側でまとめる）
function ruleCardsHtml(obj){
  const matchRules=obj.matchRules||[];
  const tourneyRules=obj.tourneyRules||[];
  const roundRules=obj.roundRules||[];
  const foldSection=(title,count,addBtnId,innerHtml,subHtml,first)=>`<div style="${first?'':'border-top:1px solid #e5e7eb;margin-top:12px;'}padding-top:${first?'0':'12px'};">
    <div style="display:flex;align-items:center;margin-bottom:8px;">
      <div style="flex:1;font-size:14px;font-weight:600;color:#111;">${title}</div>
      <button class="btn btn-green btn-xs" id="${addBtnId}" style="padding:4px 10px;">＋ 追加</button>
    </div>
    ${subHtml||''}
    ${count>0?`<details style="margin-top:4px;"><summary style="cursor:pointer;font-size:13px;color:#378ADD;padding:6px 0;">詳細を表示（${count}件）</summary>
      <div style="margin-top:6px;">${innerHtml}</div>
    </details>`:'<div style="font-size:13px;color:#9ca3af;padding:4px 0;">まだ設定がありません</div>'}
  </div>`;

  const roundInner=roundRules.length?roundRules.map((r,i)=>`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f3f4f6;">
    <div style="flex:1;font-size:13px;">区分${r.matchCode} × T${r.tourneyCode} → <span style="font-weight:600;">${r.round}</span></div>
    <button class="btn btn-gray btn-xs admin-edit-round" data-idx="${i}" style="padding:3px 8px;">編集</button>
    <button class="btn btn-red-o btn-xs admin-del-round" data-idx="${i}" style="padding:3px 8px;">削除</button>
  </div>`).join(''):'';

  const scText=systemChartToText(obj.systemChart);
  const scHasRules=(matchRules.length||tourneyRules.length||roundRules.length);
  const scCh=obj.systemChart;
  const scCols=(scCh&&scCh.columns)||[];
  // 色設定（10色パレットから列ごとに選択）
  const scColorRows=scCols.length?scCols.map(col=>{
    const cur=(scCh.colors&&scCh.colors[col.name])||col.color||'green';
    const curCk=scColorOf(cur);
    const cc=SC_COLORS[curCk]||SC_COLORS.green;
    const opts=SC_PALETTE.map(p=>`<option value="${p.key}" ${p.key===curCk?'selected':''}>${p.label}</option>`).join('');
    const nm=String(col.name||'').replace(/\\n|<br\s*\/?>/ig,' ');
    return`<div style="display:flex;align-items:center;gap:8px;padding:4px 0;">
      <span style="display:inline-block;width:20px;height:14px;border-radius:3px;background:${cc.bg};border:1px solid ${cc.bd};flex-shrink:0;" class="sc-color-sw" data-col="${scEsc(col.name)}"></span>
      <div style="flex:1;font-size:13px;color:#374151;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${scEsc(nm)}</div>
      <select class="sc-color" data-col="${scEsc(col.name)}" style="width:auto;min-width:130px;font-size:13px;padding:6px 8px;background:${cc.bg};">${opts}</select>
    </div>`;
  }).join(''):'<div style="font-size:12px;color:#9ca3af;padding:4px 0;">先に構成を入力すると、トーナメントごとに色を選べます。</div>';

  const scSection=`<div style="border-top:1px solid #e5e7eb;margin-top:12px;padding-top:12px;">
    <div style="display:flex;align-items:center;margin-bottom:8px;">
      <div style="flex:1;font-size:14px;font-weight:600;color:#111;">🗺 試合システム図</div>
      <button class="btn btn-blue btn-xs" id="btn-sc-autogen" style="padding:4px 10px;">ルールから自動生成</button>
    </div>
    <div style="font-size:12px;color:#6b7280;margin-bottom:8px;">「残り試合数を確認」で表示される図です。一度負けると右の列（トーナメント）へ移ります。${scHasRules?'':'<br>※ 先に試合区分・トーナメント種類・ラウンド名を登録すると自動生成できます。'}</div>

    <details style="margin-bottom:10px;"${scText.trim()?'':' open'}>
      <summary style="cursor:pointer;font-size:13px;color:#378ADD;padding:6px 0;">① 構成を編集する（トーナメント名・回戦）</summary>
      <div style="margin-top:8px;">
        <div style="font-size:11px;color:#9ca3af;line-height:1.7;background:#f9fafb;border-radius:8px;padding:8px 10px;margin-bottom:8px;">
          1行＝1トーナメント（列）。形式は<br>
          <span style="font-family:monospace;color:#374151;">トーナメント名 | 開始行 | 注記 | 回戦1, 回戦2, …</span><br>
          開始行＝何試合目から始まるか(1〜)。注記は空欄でもOK。<br>
          トーナメント名に <span style="font-family:monospace;">\\n</span> を入れると2行に折り返します（例: <span style="font-family:monospace;">5位タイ\\nトーナメント</span>）。<br>
          先頭の <span style="font-family:monospace;">タイトル: / 予選: / 行: / 凡例:</span> 行で全体設定。<br>
          ※ 色は下の「② 色の設定」で選びます。
        </div>
        <textarea id="sc-edit" rows="9" placeholder="タイトル: 128T&#10;予選: 予選第1試合 | 予選第2試合 | 予選第3試合&#10;行: 第1試合 | 第2試合 | 第3試合 | 第4試合 | 第5試合 | 第6試合&#10;凡例: 表裏=gray | 3先=pink | 2先=green&#10;&#10;決勝トーナメント | 1 | 上位64チーム | 1回戦, 2回戦, 3回戦, 4回戦, 準決勝, 決勝、3決&#10;5位タイ\\nトーナメント | 1 | 次点64チーム | 1回戦, 2回戦, 3回戦, 4回戦, 5回戦, 5位タイ決定戦&#10;15位タイ\\nトーナメント | 2 |  | 1回戦, 2回戦, 3回戦, 4回戦, 15位タイ決定戦&#10;交流戦 | 3 |  | 1回戦, 2回戦">${scEsc(scText)}</textarea>
      </div>
    </details>

    <details style="margin-bottom:10px;">
      <summary style="cursor:pointer;font-size:13px;color:#378ADD;padding:6px 0;">② 色の設定（10色から選択）</summary>
      <div style="margin-top:8px;background:#f9fafb;border-radius:8px;padding:8px 10px;">
        ${scColorRows}
      </div>
    </details>

    <div style="font-size:12px;color:#6b7280;margin:6px 0 4px;">プレビュー　<span style="color:#9ca3af;">（青い ↘ をタップすると「負け矢印」の表示／非表示を切り替えできます）</span></div>
    <div id="sc-preview" style="overflow-x:auto;padding:8px;background:#fafafa;border-radius:8px;">${renderSystemChart(scCh,true)}</div>
  </div>`;

  return `<div style="margin-top:14px;">`+foldSection('試合区分ルール',matchRules.length,'btn-add-match-rule',ruleRowsHtml(matchRules,'match',{reorder:true}),'',true)
    +foldSection('トーナメント種類ルール',tourneyRules.length,'btn-add-tourney-rule',ruleRowsHtml(tourneyRules,'tourney',{}),'',false)
    +foldSection('ラウンド名設定',roundRules.length,'btn-add-round-rule',roundInner,'<div style="font-size:12px;color:#6b7280;margin-bottom:8px;">試合区分×トーナメント種類の組み合わせ</div>',false)
    +scSection+`</div>`;
}

}

// ===== ルール入力モーダル（overlay方式） =====
function showRuleModal(prefix,idx){
  const _t=ruleEditTarget();const tour=_t.obj;
  const rules=prefix==='match'?(tour.matchRules=tour.matchRules||[]):(tour.tourneyRules=tour.tourneyRules||[]);
  const r=idx!=null?{...rules[idx]}:{code:'',name:'',fmt:'best2',turnLimit:false,playerMin:2,playerMax:4,round:''};
  const label=prefix==='match'?'試合区分':'トーナメント種類';
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;';
  overlay.innerHTML=`<div style="background:#fff;border-radius:12px;padding:18px;width:100%;max-width:420px;">
    <div style="font-size:16px;font-weight:700;margin-bottom:14px;">${label}ルール${idx!=null?'を編集':'を追加'}</div>
    <div style="display:grid;gap:10px;">
      <div><div style="font-size:13px;color:#6b7280;margin-bottom:4px;">コード（試合IDの該当桁）</div><input type="text" id="m-code" value="${r.code}" placeholder="例: 01"/></div>
      <div><div style="font-size:13px;color:#6b7280;margin-bottom:4px;">名称（任意）</div><input type="text" id="m-name" value="${r.name}" placeholder="例: 予選"/></div>
      <div><div style="font-size:13px;color:#6b7280;margin-bottom:4px;">試合形式</div>
        <select id="m-fmt"><option value="best2" ${r.fmt==='best2'?'selected':''}>2先</option><option value="best3" ${r.fmt==='best3'?'selected':''}>3先</option><option value="round2" ${r.fmt==='round2'?'selected':''}>表裏</option></select></div>
      <div><label style="display:flex;align-items:center;gap:8px;cursor:pointer;"><input type="checkbox" id="m-tl" ${r.turnLimit?'checked':''} style="width:auto;accent-color:#1D9E75;"/><span style="font-size:14px;">12ターン制限</span></label></div>
      <div style="display:flex;gap:10px;">
        <div style="flex:1;"><div style="font-size:13px;color:#6b7280;margin-bottom:4px;">最小人数</div><input type="text" id="m-pmin" value="${r.playerMin}" style="text-align:center;"/></div>
        <div style="flex:1;"><div style="font-size:13px;color:#6b7280;margin-bottom:4px;">最大人数</div><input type="text" id="m-pmax" value="${r.playerMax>=99?'∞':r.playerMax}" style="text-align:center;"/></div>
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-top:14px;">
      <button id="m-cancel" class="btn btn-gray" style="flex:1;">キャンセル</button>
      <button id="m-save" class="btn btn-green" style="flex:2;">保存</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  document.getElementById('m-cancel').onclick=()=>document.body.removeChild(overlay);
  document.getElementById('m-save').onclick=()=>{
    const code=document.getElementById('m-code').value.trim();
    if(!code){alert('コードを入力してください');return;}
    const pmaxVal=document.getElementById('m-pmax').value.trim();
    const newRule={
      code,
      name:document.getElementById('m-name').value.trim(),
      fmt:document.getElementById('m-fmt').value,
      turnLimit:document.getElementById('m-tl').checked,
      playerMin:parseInt(document.getElementById('m-pmin').value)||2,
      playerMax:pmaxVal==='∞'||pmaxVal===''?99:(parseInt(pmaxVal)||4)
    };
    const _t2=ruleEditTarget();const tour=_t2.obj;
  const rules=prefix==='match'?(tour.matchRules=tour.matchRules||[]):(tour.tourneyRules=tour.tourneyRules||[]);
    if(idx!=null)rules[idx]=newRule;else rules.push(newRule);
    _t2.save();document.body.removeChild(overlay);render();
  };
}

function rViewTeamDetail(){
  const t=_viewState.selectedTeam;
  if(_viewState.loading||!t){
    return`<div style="padding:20px;text-align:center;padding:48px;color:#6b7280;">
      <div style="font-size:24px;margin-bottom:8px;">⏳</div>
      <div>読み込み中...</div>
    </div>`;
  }

  // スプシの確定版値をそのまま使用（既にパーセント換算済みの場合とそうでない場合を判定）
  const toP=(v)=>{
    const n=parseFloat(v)||0;
    // 0〜1の範囲なら×100、既に0〜100ならそのまま
    return n>0&&n<=1?Math.round(n*1000)/10:Math.round(n*10)/10;
  };

  // sub: 例 '2勝 / 3試合' のような補足テキスト（省略可）
  const sr=(label,val,rank,color,barMax,sub)=>{
    const r=parseInt(rank)||0;
    const rb=r>0?`<span style="display:inline-block;background:${r===1?'#f59e0b':r<=3?'#94a3b8':'#e5e7eb'};color:${r<=3?'#fff':'#374151'};border-radius:99px;padding:1px 7px;font-size:11px;font-weight:700;margin-left:4px;">${r}位</span>`:'';
    const num=parseFloat(val)||0;
    const w=barMax>0?Math.min(100,Math.round(num/barMax*100)):0;
    return`<div style="padding:8px 0;border-bottom:1px solid #f3f4f6;">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div style="font-size:13px;color:#374151;">${label}</div>
        <div style="font-size:14px;font-weight:700;">${val??'-'}${rb}</div>
      </div>
      ${sub?`<div style="font-size:11px;color:#9ca3af;text-align:right;margin-top:2px;">${sub}</div>`:''}
      <div style="background:#e5e7eb;border-radius:4px;height:6px;margin-top:4px;"><div style="background:#3b82f6;width:${w}%;height:6px;border-radius:4px;"></div></div>
    </div>`;
  };

  const mwr=toP(t.matchWinRate);
  const swr=toP(t.setWinRate);
  const fwr=toP(t.firstWinRate);
  const swr2=toP(t.secondWinRate);
  const qhr=toP(t.qhRate);
  const fr=toP(t.fRate);

  return`<div style="padding:8px 0 4px;">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;">
      <button class="btn btn-gray btn-sm" id="btn-bk-view-detail">← 戻る</button>
      <div style="font-size:16px;font-weight:700;">${t.teamName}</div>
    </div>
    <div class="card" style="padding:14px;margin-bottom:12px;">
      <div style="font-size:12px;color:#6b7280;margin-bottom:4px;">メンバー</div>
      <div style="font-size:14px;">${(t.members||[]).join(' / ')||'未登録'}</div>
    </div>
    <div class="card" style="padding:14px;margin-bottom:12px;">
      <div style="font-size:14px;font-weight:700;margin-bottom:8px;">勝敗</div>
      ${sr('試合勝率',mwr+'%',t.rankMatchWin,'#3b82f6',100,`${t.winMatches??'?'}勝 / ${t.totalMatches??'?'}試合`)}
      ${sr('セット勝率',swr+'%',t.rankSetWin,'#3b82f6',100,`${(t.firstWinSets??0)+(t.secondWinSets??0)}勝 / ${t.totalSets??'?'}セット`)}
      <div style="padding:6px 0;font-size:13px;color:#6b7280;">${t.winMatches??'-'}勝 / ${t.loseMatches??'-'}敗 / ${t.totalMatches??'-'}試合</div>
    </div>
    <div class="card" style="padding:14px;margin-bottom:12px;">
      <div style="font-size:14px;font-weight:700;margin-bottom:8px;">先攻・後攻</div>
      ${sr('先攻セット勝率',fwr+'%',t.rankFirstWin,'#3b82f6',100,`${t.firstWinSets??'?'}勝 / ${t.firstSets??'?'}セット`)}
      ${sr('後攻セット勝率',swr2+'%',t.rankSecondWin,'#3b82f6',100,`${t.secondWinSets??'?'}勝 / ${t.secondSets??'?'}セット`)}
    </div>
    <div class="card" style="padding:14px;margin-bottom:12px;">
      <div style="font-size:14px;font-weight:700;margin-bottom:8px;">スタッツ</div>
      ${sr('QH率',qhr+'%',t.rankQh,'#3b82f6',100,(parseInt(t.dTotalThrows)||0)>0?`${t.totalAim??'?'}投 / ${t.dTotalThrows??'?'}投`:'')}
      ${sr('フォルト率',fr+'%',t.rankF,'#3b82f6',100,(parseInt(t.dTotalThrows)||0)>0?`${t.totalFault??'?'}投 / ${t.dTotalThrows??'?'}投`:'')}
      ${sr('上がりターン平均',t.agariAvg,t.rankAgari,'#3b82f6',12)}
      ${sr('セット点数平均',t.setPtsAvg,t.rankSetPts,'#3b82f6',50)}
      ${sr('平均ブレーク本数',t.breakAvg,t.rankBreak,'#3b82f6',12)}
      ${sr('平均投擲得点',t.throwPtsAvg,t.rankThrowPts,'#3b82f6',12)}
      ${sr('平均投擲時間(秒)',t.throwTimeAvg,t.rankThrowTime,'#3b82f6',60)}

  const m=metrics.find(x=>x.key===selMetric)||metrics[0];

    </div>`:'';

  let bodyHtml='';
  if(vs.loading){
    bodyHtml='<div style="text-align:center;padding:48px;color:#6b7280;"><div style="font-size:24px;">⏳</div><div>読み込み中...</div></div>';
  } else if(vs.rankData.length){
    // 元のインデックスを保持して分類（クリック時のrankData参照を維持するため）
    const withIdx=vs.rankData.map((d,i)=>({d,i}));
    const rankStr=x=>String(x.d.rank==null?'':x.d.rank).trim();
    // 「データなし」はランキングから除外
    const visible=withIdx.filter(x=>rankStr(x)!=='データなし');
    // 数値順位を持つ人／圏外（数値でない）に分類
    const ranked=visible.filter(x=>{const n=parseInt(rankStr(x));return !isNaN(n)&&n>0;});
    const out   =visible.filter(x=>{const n=parseInt(rankStr(x));return isNaN(n)||n<=0;});
    // 順位ありは順位昇順
    ranked.sort((a,b)=>(parseInt(rankStr(a))||999)-(parseInt(rankStr(b))||999));
    // 圏外は名前順（漢字優先→五十音順）
    const _isKanji=n=>/^[\u4E00-\u9FFF\u3400-\u4DBF]/.test(n||'');
    const nameOf=x=>type==='team'?(x.d.teamName||''):(x.d.name||'');
    out.sort((a,b)=>{const an=nameOf(a),bn=nameOf(b);const ak=_isKanji(an)?0:1,bk=_isKanji(bn)?0:1;if(ak!==bk)return ak-bk;return an.localeCompare(bn,'ja');});

    const renderRow=(x,isOut)=>{
      const d=x.d,i=x.i;
      const val=parseFloat(d.value)||0;
      const r=parseInt(d.rank)||0;
      const label=type==='team'?d.teamName:d.name;
      const sub=type==='team'?`No.${d.teamNo}`:(rankPersonMode==='cumul'?'通算':d.teamName||'');
      const color=isOut?'#9ca3af':(r===1?'#f59e0b':r===2?'#94a3b8':r===3?'#b45309':'#6b7280');
      const dataAttr=type==='team'?`data-rank-team="${i}"`:rankPersonMode==='cumul'?`data-rank-cumul="${d.name}"`:`data-rank-person="${i}"`;
      const rankDisp=isOut?'<span style="font-size:12px;">圏外</span>':r;
      return`<div class="card" style="padding:10px 14px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:10px;" ${dataAttr}>
        <div style="font-size:18px;font-weight:800;color:${color};min-width:28px;">${rankDisp}</div>
        <div style="flex:1;">
          <div style="font-size:14px;font-weight:700;">${label}</div>
          <div style="font-size:12px;color:#9ca3af;">${sub}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <div style="font-size:16px;font-weight:700;">${val}${m.unit}</div>
          <div style="color:#9ca3af;">›</div>
        </div>
      </div>`;
    };
    bodyHtml=ranked.map(x=>renderRow(x,false)).join('')+out.map(x=>renderRow(x,true)).join('');
  } else if(!vs.loading){
    bodyHtml='<div style="text-align:center;padding:24px;color:#9ca3af;">指標を選択してください</div>';
  }

  const metricBtns=metrics.map(mx=>`<button class="btn ${selMetric&&mx.key===selMetric?'btn-blue':'btn-gray'} btn-xs" data-metric="${mx.key}" style="margin:3px;padding:5px 10px;font-size:12px;">${mx.label}</button>`).join('');

  return`<div style="padding:8px 0 4px;">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;">
      <button class="btn btn-gray btn-sm" id="btn-bk-ranking">← 戻る</button>
      <div style="font-size:16px;font-weight:700;">🏅 ${type==='team'?'チーム':'個人'}ランキング</div>
    </div>
    ${modeTabs}
    <div class="card" style="padding:12px;margin-bottom:12px;">
      <div style="font-size:13px;color:#6b7280;margin-bottom:8px;">指標を選択（タップで読み込み）</div>
      <div style="display:flex;flex-wrap:wrap;">${metricBtns}</div>
    </div>
    ${vs.rankMetric?`<div style="font-size:14px;font-weight:600;color:#374151;margin-bottom:8px;">【${m.label}】ランキング</div>`:''}
    ${bodyHtml}
  </div>`;
}

async function loadViewData(eventCode,tab){
  if(!eventCode)return;
  tab=tab||_viewState.tab;

  if(tab==='event'&&!_viewState.eventStat){
    _viewState.loading=true;render();
    const d=await fetchViewData('getEventStat',{eventCode});
    _viewState.eventStat=d&&d.stat?d.stat:null;
    _viewState.loading=false;
  } else if(tab==='team'&&!_viewState.teams.length){
    // チームリストのみ取得（名前・No・メンバー）
    _viewState.loading=true;render();
    const d=await fetchViewData('getTeamList',{eventCode});
    _viewState.teams=d&&d.teams?d.teams:[];
    _viewState.loading=false;
  } else if(tab==='person'&&!_viewState.persons.length){

    _viewState.loading=false;
  }
}

function getEventName(eventCode){
  // eventCodeは "01_0601" 形式。AD.tournamentsはvenueCode="01",eventCode="0601"を持つ
  const parts=eventCode.split('_');
  let tour=null;
  if(parts.length>=2){
    // 01_0601 → venueCode=01, eventCode=0601
    tour=AD.tournaments&&AD.tournaments.find(t=>t.venueCode===parts[0]&&t.eventCode===parts[1]);
  }
  if(!tour){
    // フォールバック：eventCodeのみで検索
    tour=AD.tournaments&&AD.tournaments.find(t=>t.eventCode===eventCode||t.eventCode===parts[parts.length-1]);
  }
  return tour?tour.eventName:eventCode;
}

function generateQRPrintPage(venueId, eventId, courtCount, matchCount, customLabels){
  // カスタムラベルが空なら「第N試合」をデフォルトにする
  const getLabel=(m)=>{
    const custom=(customLabels&&customLabels[m-1])||'';
    return custom.trim()||('第'+m+'試合');
  };

  // 1ページあたり最大10個、超える場合はページを分割
  const PER_PAGE=10;

  // コートごとのHTMLを生成
  let pagesHtml='';
  for(let c=1;c<=courtCount;c++){
    const courtStr=String(c).padStart(3,'0');
    // 10個以内ならそのまま1ページ、超えるなら複数ページに分割
    const totalMatches=matchCount;
    const pageCount=Math.ceil(totalMatches/PER_PAGE);
    for(let pg=0;pg<pageCount;pg++){
      const startM=pg*PER_PAGE+1;
      const endM=Math.min((pg+1)*PER_PAGE,totalMatches);
      let itemsHtml='';
      for(let m=startM;m<=endM;m++){
        const matchStr=String(m).padStart(2,'0');
        const plainId=`${venueId}_${eventId}_${matchStr}_${courtStr}`;
        const qrText=`${APP_BASE_URL}#/m/${plainId}`; // カメラアプリからも開けるURLを埋め込む
        itemsHtml+=`<div class="qr-item">
          <div class="qr-code" id="qr-${c}-${m}" data-text="${qrText}"></div>
          <div class="qr-label">${getLabel(m)}</div>
          <div class="qr-id">${plainId}</div>
        </div>`;
      }
      const pageLabel=pageCount>1?` (${pg+1}/${pageCount})`:'' ;
      pagesHtml+=`<div class="page-break">
        <div class="page-header">
          <h1>コート ${courtStr}${pageLabel}</h1>
          <div class="page-sub">${venueId}_${eventId} &nbsp;|&nbsp; ${totalMatches}試合</div>
        </div>
        <div class="qr-grid">${itemsHtml}</div>
      </div>`;
    }
  }

  const html=`<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>QRコード印刷 - ${venueId}_${eventId}</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"><\/script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, sans-serif; background: #fff; }
  .no-print { padding: 16px; background: #f0f9ff; border-bottom: 1px solid #bae6fd; }
  .no-print button { padding: 10px 24px; background: #2563eb; color: #fff; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; margin-right: 10px; }
  .no-print button.close { background: #6b7280; }
  /* 10個を2列×5行に収める: A4縦(297mm)想定 */
  .page-break { padding: 12px 16px; min-height: 100vh; }
  .page-header { margin-bottom: 10px; border-bottom: 2px solid #111; padding-bottom: 6px; }
  .page-header h1 { font-size: 22px; font-weight: 800; }
  .page-sub { font-size: 12px; color: #6b7280; margin-top: 2px; }
  .qr-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .qr-item { display: flex; flex-direction: column; align-items: center; padding: 8px 6px 6px; border: 1px solid #e5e7eb; border-radius: 8px; }
  .qr-code { margin-bottom: 4px; }
  .qr-code img { display: block; }
  .qr-label { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
  .qr-id { font-size: 10px; color: #9ca3af; font-family: monospace; }
  @media print {
    .no-print { display: none !important; }
    .page-break { page-break-after: always; padding: 8px 12px; min-height: auto; }
    .page-break:last-child { page-break-after: avoid; }
    .page-header { margin-bottom: 8px; }
    .qr-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .qr-item { padding: 6px 4px 4px; }
    .qr-label { font-size: 13px; }
    .qr-id { font-size: 9px; }
  }
</style>
</head>
<body>
<div class="no-print">
  <button onclick="window.print()">🖨️ 印刷する</button>

${pagesHtml}
<script>
  // QRコードを一括生成（10個対応: 128×128px）
  document.querySelectorAll('.qr-code[data-text]').forEach(el=>{
    new QRCode(el, {
      text: el.dataset.text,
      width: 128,
      height: 128,
      correctLevel: QRCode.CorrectLevel.M

<\/script>
</body>
</html>`;

  const blob=new Blob([html],{type:'text/html'});

    .mbr-th{writing-mode:vertical-rl;text-orientation:upright;font-size:13px;width:22px;min-width:22px;max-width:22px;padding:8px 2px;white-space:nowrap;letter-spacing:1px;}
    .tot-th{font-size:13px;min-width:38px;}
    .sc-cell{font-size:14px;min-width:34px;padding:5px 6px;}
    .tot-cell{font-size:14px;font-weight:600;min-width:38px;background:#fafaf6;padding:5px 6px;}
    .team-hdr{font-size:14px;font-weight:600;padding:7px 8px;}
  </style>`;

  function buildSetHtml(cset, si){
    const sl=S.fmt==='round2'?`${si+1}セット目`:`第${si+1}セット`;
    // 勝者表示
    let resultHtml='';
    if(cset.wid!=null){
      resultHtml=`<div style="padding:5px 8px;background:#f8fafc;border:1px solid #bbb;border-top:none;text-align:center;font-size:12px;font-weight:700;color:#111;">${S.teams[cset.wid].name} 勝利</div>`;
    } else if(cset.draw){
      resultHtml=`<div style="padding:5px 8px;background:#f8fafc;border:1px solid #bbb;border-top:none;text-align:center;font-size:12px;font-weight:700;color:#111;">引き分け</div>`;
    }
    return`<div style="flex-shrink:0;">
      <div style="background:#f8fafc;padding:5px 10px;font-size:12px;font-weight:700;border:1px solid #bbb;border-bottom:none;text-align:center;color:#111;">${sl}</div>
      ${buildSS(cset,false,si)}
      ${resultHtml}
    </div>`;
  }

  const setsHtml=S.sets.map((cset,si)=>buildSetHtml(cset,si)).join('');

  const container=document.createElement('div');
  container.style.cssText='position:fixed;top:-99999px;left:0;background:#fff;padding:16px;font-family:-apple-system,sans-serif;';

  const infoBadge=(icon,text)=>text?`<span style="background:#f8fafc;padding:2px 8px;border-radius:99px;border:1px solid #e5e7eb;font-size:12px;">${icon} ${text}</span>`:'';
  const headerHtml=`<div style="margin-bottom:12px;border-bottom:2px solid #111;padding-bottom:8px;">
    <div style="font-size:16px;font-weight:800;color:#111;margin-bottom:6px;">スコアシート</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;">
      ${infoBadge('🏆',eventName)}
      ${infoBadge('⚔️',matchRuleName)}
      ${infoBadge('🎯',tourneyRuleName)}
      ${infoBadge('🔄',roundRuleName)}
      ${infoBadge('📋',fmtName)}
      ${infoBadge('🏟',courtCode?'コート'+courtCode:'')}
    </div>
  </div>`;

  container.innerHTML=`${ssStyle}${headerHtml}<div style="display:flex;gap:10px;align-items:flex-start;">${setsHtml}</div>`;
  document.body.appendChild(container);

  try{
    const canvas=await Promise.race([
      html2canvas(container,{backgroundColor:'#ffffff',scale:2,useCORS:true,logging:false,width:container.scrollWidth,height:container.scrollHeight}),
      new Promise((_,reject)=>setTimeout(()=>reject(new Error('タイムアウト（10秒）')),10000))
    ]);
    const date=new Date().toISOString().slice(0,10);
    const fileName=`scoresheet_${matchId||date}.png`;
    await new Promise((resolve,reject)=>{
      canvas.toBlob(async(blob)=>{
        if(!blob){reject(new Error('Blob生成失敗'));return;}
        try{
          const file=new File([blob],fileName,{type:'image/png'});
          if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
            await navigator.share({files:[file],title:'スコアシート'});
            alert('✅ 保存しました');
          } else {
            const url=URL.createObjectURL(blob);
            const link=document.createElement('a');
            link.href=url;link.download=fileName;
            document.body.appendChild(link);link.click();document.body.removeChild(link);
            setTimeout(()=>URL.revokeObjectURL(url),5000);
            alert('✅ スコアシートを保存しました');
          }
          resolve();
        }catch(e){reject(e);}
      },'image/png');
    });
  }catch(e){
    if(e.name==='AbortError')return;
    alert('❌ 保存に失敗しました: '+e.message);
  }finally{
    document.body.removeChild(container);
  }
}
