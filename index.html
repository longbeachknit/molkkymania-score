<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f5f5f5;}
.app{padding:10px;max-width:480px;margin:0 auto;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
.btn{padding:8px 16px;border:1px solid #d1d5db;border-radius:8px;background:#fff;color:#111;cursor:pointer;font-size:14px;font-family:inherit;transition:background 0.15s;}
.btn:hover{background:#f3f4f6;}
.btn:active{transform:scale(0.97);}
.btn-green{background:#1D9E75;color:#fff;border-color:#1D9E75;}
.btn-green:hover{background:#178a64;}
.btn-blue{background:#378ADD;color:#fff;border-color:#378ADD;}
.btn-blue:hover{background:#2e72c4;}
.btn-red-o{background:#FEE2E2;color:#b91c1c;border-color:#fca5a5;}
.btn-red-o:hover{background:#fecaca;}
.btn-orange{background:#FFF7ED;color:#92400e;border-color:#fed7aa;}
.btn-orange:hover{background:#fef3c7;}
.btn-gray{background:#f3f4f6;color:#374151;border-color:#d1d5db;}
.btn-gray:hover{background:#e5e7eb;}
.btn-xs{padding:5px 11px;font-size:12px;}
.btn-sm{padding:7px 13px;font-size:13px;}
.btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;overflow:hidden;}
input[type=text]{width:100%;padding:9px 11px;border:1.5px solid #d1d5db;border-radius:8px;background:#f3f4f6;color:#111;font-size:15px;font-family:inherit;}
input[type=text]:focus{outline:none;border-color:#1D9E75;background:#fff;}
select{width:100%;padding:10px 11px;border:1.5px solid #d1d5db;border-radius:8px;background:#f3f4f6;color:#111;font-size:15px;font-family:inherit;cursor:pointer;}
select:focus{outline:none;border-color:#1D9E75;background:#fff;}
.order-item{padding:10px 12px;background:#f3f4f6;border:1.5px solid #d1d5db;border-radius:8px;display:flex;align-items:center;gap:8px;font-size:14px;color:#111;user-select:none;}
.order-item.dragging{opacity:0.4;}
.order-item.over{border-color:#1D9E75;background:#E1F5EE;}
.ss-wrap{overflow-x:auto;}
.ss-tbl{border-collapse:collapse;width:100%;}
.ss-tbl th,.ss-tbl td{border:1px solid #bbb;text-align:center;vertical-align:middle;padding:5px 6px;}
.ss-tbl th{background:#f3f4f6;font-size:13px;font-weight:600;}
.turn-col{width:26px;font-size:13px;color:#888;background:#f8f8f8;}
.mbr-th{writing-mode:vertical-rl;font-size:13px;min-width:32px;padding:8px 4px;}
.tot-th{font-size:13px;min-width:38px;}
.sc-cell{font-size:14px;min-width:34px;padding:5px 6px;}
.tot-cell{font-size:14px;font-weight:600;min-width:38px;background:#fafaf6;padding:5px 6px;}
.team-hdr{font-size:14px;font-weight:600;padding:7px 8px;}
label.radio-card{display:flex;align-items:center;gap:10px;padding:10px 12px;border:2px solid #e5e7eb;border-radius:10px;cursor:pointer;background:#fff;}
label.radio-card.selected{border-color:#1D9E75;background:#E1F5EE;}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const C=['#1D9E75','#E24B4A'];
const LB=['#E1F5EE','#FCEBEB'];
const LBR=['#9FE1CB','#F7C1C1'];
const LT=['#085041','#A32D2D'];
const MAX=50,RST=25,MM=3;

let S={
  phase:'setup',fmt:'best2',
  teams:[{id:0,name:'チームA',members:[]},{id:1,name:'チームB',members:[]}],
  sets:[],cur:0,fid:0,showHist:false,
  pFirst:null,pIdx:null,pOrders:[[],[]],
  iP:'',iM:'single',iA:'cross',
  prev:null,ssIdx:0,
  endPending:false,
  tieExtend:false,
  molkoutWinner:null
};

const fl=()=>S.fmt==='best2'?'2先':S.fmt==='best3'?'3先':'表裏';
const nfc=(i)=>(S.fmt==='best2')?(i===0||i===2):(S.fmt==='best3')?(i===0||i===4):i===0;
const isFin=(i)=>(S.fmt==='best2'&&i===2)||(S.fmt==='best3'&&i===4);
function aF(ni){
  const f=S.fid;
  if(S.fmt==='best2')return ni===1?1-f:f;
  if(S.fmt==='best3'){
    if(ni===2){const w=[0,0];S.sets.slice(0,2).forEach(s=>{if(s.wid!=null)w[s.wid]++;});if(w[0]===2)return 1;if(w[1]===2)return 0;return 1-S.sets[1].ftid;}
    if(ni===3)return 1-S.sets[2].ftid;
    return 1-f;
  }
  return 1-f;
}
function gIO(ni,fid){
  const o=[[],[]];
  [0,1].forEach(ti=>{
    const isF=ti===fid;let fd=null;
    for(let i=S.sets.length-1;i>=0;i--){const s=S.sets[i];if((s.ftid===ti)===isF){const x=s.teams[ti].order;if(x&&x.length){fd=x;break;}}}
    if(!fd&&S.sets.length>0){const pv=S.sets[S.sets.length-1];const x=pv.teams[ti].order;if(x&&x.length)fd=x;}
    if(!fd)fd=S.teams[ti].members.slice();
    o[ti]=fd?[...fd]:S.teams[ti].members.slice();
  });
  return o;
}
const gT=()=>{const t=[0,0];S.sets.forEach(s=>{t[0]+=s.teams[0].sc;t[1]+=s.teams[1].sc;});return t;}
const mxS=()=>S.fmt==='best2'?3:S.fmt==='best3'?5:2;
const nW=()=>S.fmt==='best2'?2:S.fmt==='best3'?3:99;
function mW(){if(S.fmt==='round2')return null;const w=[0,0];S.sets.forEach(s=>{if(s.wid!=null)w[s.wid]++;});const n=nW();return w[0]>=n?0:w[1]>=n?1:null;}
function mkSet(idx,fid,ord){return{idx,ftid:fid,ctid:fid,teams:[{id:0,sc:0,ms:0,el:false,throws:[],mi:0,order:ord[0]||[]},{id:1,sc:0,ms:0,el:false,throws:[],mi:0,order:ord[1]||[]}],wid:null,hist:[]};}
const cs=()=>S.sets[S.cur];
function isTurnEnd(cset){const t0=cset.teams[0].throws.length,t1=cset.teams[1].throws.length;return t0===t1&&t0>0;}
function gmb(td,ti){const o=td.order.length>0?td.order:S.teams[ti].members;return o.length?o[td.mi%o.length]:null;}
function dots(n){return[0,1,2].map(i=>`<span style="display:inline-block;width:11px;height:11px;border-radius:50%;background:${i<n?'#E24B4A':'#e5e7eb'};border:1px solid ${i<n?'#E24B4A':'#d1d5db'};"></span>`).join('');}
function svgC(t,s=22){return`<svg width="${s}" height="${s}" viewBox="0 0 22 22" style="vertical-align:middle;"><circle cx="11" cy="11" r="10" fill="none" stroke="#111" stroke-width="1.5"/><text x="11" y="15.5" text-anchor="middle" font-size="11" font-family="-apple-system,sans-serif" fill="#111">${t}</text></svg>`;}
function svgS(t,s=22){return`<svg width="${s+6}" height="${s}" viewBox="0 0 28 22" style="vertical-align:middle;"><rect x="1" y="1" width="26" height="20" rx="3" fill="none" stroke="#111" stroke-width="1.5"/><text x="14" y="15.5" text-anchor="middle" font-size="11" font-family="-apple-system,sans-serif" fill="#111">${t}</text></svg>`;}

function processEarlyEnd(){
  const cset=cs();
  const sc0=cset.teams[0].sc,sc1=cset.teams[1].sc;
  if(S.fmt==='round2'){
    cset.wid=sc0>sc1?0:sc1>sc0?1:null;
    cset.draw=(sc0===sc1);
  } else {
    cset.wid=sc0>sc1?0:sc1>sc0?1:null;
  }
  S.endPending=false;S.tieExtend=false;
  S.phase='earlyMatchOver';render();
}

function histTbl(upTo){
  const rows=S.sets.slice(0,upTo).map((ss,i)=>{
    const wn=ss.draw?'引き分け':ss.wid!=null?S.teams[ss.wid].name:'−';
    const lb=S.fmt==='round2'?`${i+1}セット`:`第${i+1}セット`;
    return`<tr style="border-top:1px solid #e5e7eb;">
      <td style="padding:5px 8px;font-size:13px;color:#6b7280;">${lb}</td>
      <td style="padding:5px 8px;font-size:13px;text-align:center;font-weight:${ss.wid===0?600:400};">${ss.teams[0].sc}</td>
      <td style="padding:5px 8px;font-size:13px;text-align:center;font-weight:${ss.wid===1?600:400};">${ss.teams[1].sc}</td>
      <td style="padding:5px 8px;font-size:13px;text-align:center;">${wn}</td>
    </tr>`;
  }).join('');
  if(!rows)return'';
  return`<div class="card" style="margin-bottom:12px;">
    <div style="padding:8px 12px;border-bottom:1px solid #e5e7eb;font-size:13px;color:#6b7280;">これまでのセット結果</div>
    <table style="width:100%;border-collapse:collapse;"><thead><tr>
      <th style="padding:5px 8px;font-size:12px;font-weight:400;color:#9ca3af;text-align:left;">セット</th>
      <th style="padding:5px 8px;font-size:12px;font-weight:400;color:#9ca3af;text-align:center;">${S.teams[0].name}</th>
      <th style="padding:5px 8px;font-size:12px;font-weight:400;color:#9ca3af;text-align:center;">${S.teams[1].name}</th>
      <th style="padding:5px 8px;font-size:12px;font-weight:400;color:#9ca3af;text-align:center;">結果</th>
    </tr></thead><tbody>${rows}</tbody></table>
  </div>`;
}
function doReset(){
  S={phase:'setup',fmt:S.fmt,teams:S.teams.map(t=>({...t,members:[...t.members]})),sets:[],cur:0,fid:0,showHist:false,pFirst:null,pIdx:null,pOrders:[[],[]],iP:'',iM:'single',iA:'cross',prev:null,ssIdx:0,endPending:false,tieExtend:false,molkoutWinner:null};render();
}
function goNext(ni){
  S.pIdx=ni;const fid=nfc(ni)?S.fid:aF(ni);
  S.pFirst=fid;S.pOrders=gIO(ni,fid);
  S.phase=nfc(ni)?'firstChoice':'orderSetup';render();
}

function render(){
  const app=document.getElementById('app');
  const p=S.phase;
  if(p==='setup')app.innerHTML=rSetup();
  else if(p==='firstChoice')app.innerHTML=rFirst();
  else if(p==='orderSetup')app.innerHTML=rOrder();
  else if(p==='game')app.innerHTML=rGame();
  else if(p==='scoresheet')app.innerHTML=rSS();
  else if(p==='setOver')app.innerHTML=rSetOver();
  else if(p==='matchOver')app.innerHTML=rMatchOver();
  else if(p==='earlyMatchOver')app.innerHTML=rEarlyMatchOver();
  else if(p==='molkout')app.innerHTML=rMolkout();
  bind();
  if(p==='orderSetup')setTimeout(bindDrag,0);
}

function rSetup(){
  return`<div style="padding:8px 0 4px;">
    <div style="font-size:22px;font-weight:700;color:#111;margin-bottom:2px;">Mölkky スコアシート</div>
    <div style="font-size:13px;color:#6b7280;margin-bottom:16px;">日本モルック協会公式ルール準拠</div>
    <div class="card" style="padding:14px;margin-bottom:12px;">
      <div style="font-size:15px;font-weight:600;color:#111;margin-bottom:10px;">試合形式</div>
      <div style="display:grid;gap:8px;">
        ${[['best2','2セット先取'],['best3','3セット先取'],['round2','2セット勝負（表裏）']].map(([v,l])=>`
        <label class="radio-card ${S.fmt===v?'selected':''}">
          <input type="radio" name="fmt" value="${v}" ${S.fmt===v?'checked':''} style="width:auto;accent-color:#1D9E75;"/>
          <span style="font-size:15px;color:${S.fmt===v?'#085041':'#111'};">${l}</span>
        </label>`).join('')}
      </div>
    </div>
    ${[0,1].map(i=>`<div class="card" style="padding:14px;margin-bottom:12px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
        <div style="width:12px;height:12px;border-radius:50%;background:${C[i]};flex-shrink:0;"></div>
        <span style="font-size:15px;font-weight:600;color:#111;">チーム ${i+1}</span>
      </div>
      <div style="margin-bottom:10px;"><div style="font-size:13px;color:#6b7280;margin-bottom:4px;">チーム名</div><input type="text" id="tn${i}" value="${S.teams[i].name}"/></div>
      <div><div style="font-size:13px;color:#6b7280;margin-bottom:4px;">メンバー（カンマ区切り、省略可）</div><input type="text" id="tm${i}" value="${S.teams[i].members.join(', ')}" placeholder="例: 田中, 鈴木"/></div>
    </div>`).join('')}
    <button class="btn btn-green" id="btn-next" style="width:100%;padding:14px;font-size:16px;">次へ →</button>
  </div>`;
}

function rFirst(){
  const si=S.pIdx!=null?S.pIdx:S.sets.length,sn=si+1;
  const sl=S.fmt==='round2'?`${sn}セット目`:`第${sn}セット`;
  const pf=S.pFirst!=null?S.pFirst:S.fid;
  const fin=isFin(si),tots=gT(),isDraw=fin&&tots[0]===tots[1];
  const chooser=fin&&!isDraw?(tots[0]>tots[1]?0:1):null;
  let top='';
  if(fin){top=isDraw
    ?`<div style="background:#FFF7ED;border:1.5px solid #fed7aa;border-radius:10px;padding:12px;margin-bottom:14px;font-size:14px;color:#92400e;">合計点が同点のため、ドローショットをして先攻後攻を決めてください。</div>`
    :`<div style="background:#E1F5EE;border:1.5px solid #9FE1CB;border-radius:10px;padding:12px;margin-bottom:14px;font-size:14px;color:#085041;">合計点が高い <strong>${S.teams[chooser].name}（${tots[chooser]}点）</strong> が先攻後攻を選択できます。</div>`;}
  return`<div style="padding:8px 0 4px;">
    ${si>0?histTbl(si):''}
    <div style="font-size:17px;font-weight:600;color:#111;margin-bottom:8px;">${sl} 先攻チームを選択</div>${top}
    ${[0,1].map(i=>`<div style="margin-bottom:10px;">
      <button class="btn fc-btn" data-id="${i}" style="width:100%;padding:16px;border:2.5px solid ${pf===i?C[i]:'#d1d5db'};background:${pf===i?LB[i]:'#fff'};border-radius:10px;">
        <div style="display:flex;align-items:center;gap:12px;justify-content:center;">
          <div style="width:14px;height:14px;border-radius:50%;background:${C[i]};"></div>
          <span style="font-size:17px;font-weight:600;color:#111;">${S.teams[i].name}</span>
          ${fin&&chooser!=null&&i===chooser?`<span style="font-size:12px;background:${LB[i]};color:${LT[i]};padding:3px 8px;border-radius:99px;border:1px solid ${LBR[i]};">選択権あり</span>`:''}
          ${pf===i?`<span style="font-size:12px;background:${C[i]};color:#fff;padding:3px 9px;border-radius:99px;">先攻 ✓</span>`:''}
        </div>
      </button>
    </div>`).join('')}
    <div style="display:flex;gap:8px;margin-top:12px;">
      ${si===0?`<button class="btn btn-gray" id="btn-bk-setup" style="flex:1;">戻る</button>`:''}
      <button class="btn btn-green" id="btn-go-order" style="${si===0?'flex:2;':'width:100%;'}padding:14px;font-size:16px;">投げ順を設定 →</button>
    </div>
  </div>`;
}

function rOrder(){
  const si=S.pIdx!=null?S.pIdx:S.sets.length,sn=si+1;
  const sl=S.fmt==='round2'?`${sn}セット目`:`第${sn}セット`;
  const pf=S.pFirst!=null?S.pFirst:0;
  const autoSwap=!nfc(si),isSecondPlus=si>0;
  return`<div style="padding:8px 0 4px;">
    ${si>0?histTbl(si):''}
    <div style="font-size:17px;font-weight:600;color:#111;margin-bottom:6px;">${sl} 投げ順の設定</div>
    ${autoSwap?`<div style="background:${LB[pf]};border:1.5px solid ${LBR[pf]};border-radius:10px;padding:10px 12px;margin-bottom:12px;font-size:13px;color:${LT[pf]};">先攻後攻は自動入れ替え：先攻 <strong>${S.teams[pf].name}</strong></div>`:''}
    <div style="font-size:13px;color:#6b7280;margin-bottom:12px;">↑↓ボタンまたはドラッグで並び替え</div>
    ${[0,1].map(ti=>{
      const team=S.teams[ti],ord=S.pOrders[ti].length>0?S.pOrders[ti]:team.members;
      if(!team.members.length)return`<div class="card" style="padding:12px;margin-bottom:12px;opacity:0.5;"><div style="font-size:14px;color:#9ca3af;">${team.name} — メンバー未登録</div></div>`;
      return`<div class="card" style="padding:12px;margin-bottom:12px;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
          <div style="width:10px;height:10px;border-radius:50%;background:${C[ti]};flex-shrink:0;"></div>
          <span style="font-size:14px;font-weight:600;color:#111;">${team.name}</span>
          <span style="font-size:13px;margin-left:auto;background:${pf===ti?LB[ti]:'#f3f4f6'};color:${pf===ti?LT[ti]:'#374151'};padding:2px 8px;border-radius:99px;">${pf===ti?'先攻':'後攻'}</span>
        </div>
        <div id="order-list-${ti}" data-team="${ti}" style="display:grid;gap:6px;">
          ${ord.map((m,i)=>`<div class="order-item" draggable="true" data-team="${ti}" data-idx="${i}">
            <span style="font-size:13px;color:#9ca3af;min-width:22px;">${i+1}.</span>
            <span style="font-size:15px;flex:1;">${m}</span>
            <button class="btn btn-gray btn-xs move-up" data-team="${ti}" data-idx="${i}" ${i===0?'disabled':''} style="padding:4px 8px;">↑</button>
            <button class="btn btn-gray btn-xs move-dn" data-team="${ti}" data-idx="${i}" ${i===ord.length-1?'disabled':''} style="padding:4px 8px;">↓</button>
            <span style="font-size:18px;color:#9ca3af;cursor:grab;padding:0 2px;">≡</span>
          </div>`).join('')}
        </div>
      </div>`;
    }).join('')}
    <div style="display:flex;gap:8px;margin-top:4px;">
      ${isSecondPlus?`<button class="btn btn-gray" id="btn-bk-order-to-setover" style="flex:1;">← 戻る</button>`:`<button class="btn btn-gray" id="btn-bk-first" style="flex:1;">← 戻る</button>`}
      <button class="btn btn-green" id="btn-start" style="flex:2;padding:14px;font-size:16px;">ゲーム開始 ▶</button>
    </div>
  </div>`;
}

function rGame(){
  const cset=cs(),ct=cset.ctid;
  const wins=[0,0];S.sets.forEach((s,si)=>{if(si<S.cur&&s.wid!=null)wins[s.wid]++;});
  const sn=S.cur+1,sl=S.fmt==='round2'?`${sn}セット目`:`第${sn}セット`;
  const ctd=cset.teams[ct],cm=gmb(ctd,ct);
  const hasPrev=S.cur>0,isFirst=cset.teams[0].throws.length===0&&cset.teams[1].throws.length===0;
  const pBg=LB[ct],pBr=LBR[ct],pTx=LT[ct],pCl=C[ct];
  const hasThrows=cset.teams[0].throws.length>0||cset.teams[1].throws.length>0;
  return`<div style="padding:6px 0 4px;">
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:10px;flex-wrap:wrap;">
      <span style="font-size:12px;padding:3px 8px;border-radius:99px;background:#f3f4f6;color:#6b7280;font-weight:600;">${fl()}</span>
      <span style="font-size:15px;font-weight:700;color:#111;">${sl}</span>
      ${S.fmt!=='round2'?`<div style="display:flex;gap:4px;">${[0,1].map(i=>`<span style="font-size:12px;padding:3px 8px;border-radius:99px;background:${wins[i]>0?LB[i]:'#f3f4f6'};color:${wins[i]>0?LT[i]:'#6b7280'};">${S.teams[i].name} ${wins[i]}勝</span>`).join('')}</div>`:''}
      <div style="display:flex;gap:4px;margin-left:auto;flex-wrap:wrap;justify-content:flex-end;">
        ${hasPrev?`<button class="btn btn-gray btn-xs" id="btn-hist">${S.showHist?'▲':'▼ 前セット'}</button>`:''}
        <button class="btn btn-blue btn-xs" id="btn-scoresheet">スコアシート</button>
        ${isFirst?`<button class="btn btn-gray btn-xs" id="btn-bk-order">← 戻る</button>`:`<button class="btn btn-gray btn-xs" id="btn-undo" ${cset.hist.length===0?'disabled':''}>↩ 戻す</button>`}
        ${hasThrows?`<button class="btn btn-orange btn-xs" id="btn-early-end">試合終了</button>`:''}
      </div>
    </div>
    ${S.endPending?`<div style="background:#FFF7ED;border:1.5px solid #fed7aa;border-radius:10px;padding:10px 12px;margin-bottom:10px;font-size:13px;color:#92400e;">⏳ <strong>後攻の投擲が終わり次第、試合を終了します</strong></div>`:''}
    ${S.tieExtend?`<div style="background:#EEF2FF;border:1.5px solid #a5b4fc;border-radius:10px;padding:10px 12px;margin-bottom:10px;font-size:13px;color:#3730a3;">🔁 <strong>このターンまでの合計点が同点のため、もう1ターン延長します。</strong>得点差がついた時点で試合終了となります。</div>`:''}
    ${S.showHist&&hasPrev?histTbl(S.cur):''}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;">
      ${[0,1].map(i=>{
        const td=cset.teams[i],ic=i===ct;
        return`<div class="card" style="border:${ic?`2.5px solid ${C[i]}`:'1px solid #e5e7eb'};">

function buildSS(cset){
  const fti=cset.ftid,sti=1-fti;
  const mbrs=[
    cset.teams[0].order.length>0?cset.teams[0].order:S.teams[0].members.length?S.teams[0].members:['投てき者'],
    cset.teams[1].order.length>0?cset.teams[1].order:S.teams[1].members.length?S.teams[1].members:['投てき者']
  ];
  const nM=[mbrs[0].length,mbrs[1].length];
  const maxT=Math.max(cset.teams[0].throws.length,cset.teams[1].throws.length);
  const cF=nM[fti]+1,cS=nM[sti]+1;
  const mhdr=(ti)=>mbrs[ti].map(m=>`<th class="mbr-th" style="border:1px solid #bbb;">${m}</th>`).join('');
  function tDisp(th){
    if(!th)return'';
    if(th.miss)return`<span style="color:#9ca3af;font-size:15px;">—</span>`;
    const sc=th.raw!==undefined?th.raw:th.pts;
    if(th.result==='circle'&&th.multi)return svgS(sc,22);
    if(th.result==='circle')return svgC(sc,22);
    return`<span style="font-weight:600;font-size:14px;">${sc}</span>`;
  }
  const prevC=[0,0];
  function totDisp(th,ti){
    if(!th)return'';
    if(th.miss)return`<span style="color:#6b7280;">${prevC[ti]}</span>`;
    if(th.over){prevC[ti]=th.cumul;return`<span style="color:#b45309;font-weight:600;">${th.cumul}</span>`;}
    prevC[ti]=th.cumul;return`<span style="font-weight:600;">${th.cumul}</span>`;
  }
  let rows='';
  for(let t=0;t<maxT;t++){
    const thF=cset.teams[fti].throws[t],thS=cset.teams[sti].throws[t];
    const mF=thF?t%nM[fti]:-1,mS=thS?t%nM[sti]:-1;
    const cF2=mbrs[fti].map((_,mi)=>mi!==mF||!thF?`<td class="sc-cell" style="border:1px solid #bbb;"></td>`:`<td class="sc-cell" style="border:1px solid #bbb;">${tDisp(thF)}</td>`).join('');
    const cS2=mbrs[sti].map((_,mi)=>mi!==mS||!thS?`<td class="sc-cell" style="border:1px solid #bbb;"></td>`:`<td class="sc-cell" style="border:1px solid #bbb;">${tDisp(thS)}</td>`).join('');
    rows+=`<tr><td class="turn-col" style="border:1px solid #bbb;">${t+1}</td>${cF2}<td class="tot-cell" style="border:1px solid #bbb;border-right:2.5px solid #aaa;">${totDisp(thF,fti)}</td>${cS2}<td class="tot-cell" style="border:1px solid #bbb;">${totDisp(thS,sti)}</td></tr>`;
  }
  const eF=cset.teams[fti].el,eS=cset.teams[sti].el;
  if(eF||eS){
    const fe=eF?`<span style="color:#E24B4A;font-weight:700;">0</span>`:`<span style="color:#1D9E75;font-weight:700;">50</span>`;
    const se=eS?`<span style="color:#E24B4A;font-weight:700;">0</span>`:`<span style="color:#1D9E75;font-weight:700;">50</span>`;
    rows+=`<tr style="background:#fff8f8;"><td class="turn-col" style="border:1px solid #bbb;font-size:11px;color:#E24B4A;font-weight:700;">失</td>${mbrs[fti].map(()=>`<td class="sc-cell" style="border:1px solid #bbb;background:#fff8f8;"></td>`).join('')}<td class="tot-cell" style="border:1px solid #bbb;border-right:2.5px solid #aaa;background:#fff8f8;">${fe}</td>${mbrs[sti].map(()=>`<td class="sc-cell" style="border:1px solid #bbb;background:#fff8f8;"></td>`).join('')}<td class="tot-cell" style="border:1px solid #bbb;background:#fff8f8;">${se}</td></tr>`;
  }
  if(!rows)rows=`<tr><td colspan="${1+cF+cS}" style="border:1px solid #bbb;padding:12px;font-size:13px;color:#9ca3af;text-align:center;">まだ投てきなし</td></tr>`;
  return`<div class="ss-wrap"><table class="ss-tbl"><thead>
    <tr><th class="turn-col" style="border:1px solid #bbb;"></th>
      <th colspan="${cF}" class="team-hdr" style="border:1px solid #bbb;border-right:2.5px solid #aaa;background:${LB[fti]};color:${LT[fti]};">${S.teams[fti].name}（先攻）</th>
      <th colspan="${cS}" class="team-hdr" style="border:1px solid #bbb;background:${LB[sti]};color:${LT[sti]};">${S.teams[sti].name}（後攻）</th>
    </tr>
    <tr><th class="turn-col" style="border:1px solid #bbb;"></th>
      ${mhdr(fti)}<th class="tot-th" style="border:1px solid #bbb;border-right:2.5px solid #aaa;">計</th>
      ${mhdr(sti)}<th class="tot-th" style="border:1px solid #bbb;">計</th>
    </tr></thead><tbody>${rows}</tbody></table></div>`;
}

      <div style="font-size:14px;font-weight:600;color:#111;margin-bottom:12px;">勝利チームを選択してください</div>
      ${[0,1].map(i=>`<div style="margin-bottom:10px;">
        <button class="molkout-btn" data-id="${i}" style="width:100%;padding:16px;border:2.5px solid ${mw===i?C[i]:'#d1d5db'};background:${mw===i?LB[i]:'#fff'};border-radius:10px;cursor:pointer;font-family:inherit;">
          <div style="display:flex;align-items:center;gap:12px;justify-content:center;">
            <div style="width:14px;height:14px;border-radius:50%;background:${C[i]};"></div>
            <span style="font-size:17px;font-weight:600;color:#111;">${S.teams[i].name}</span>
            ${mw===i?`<span style="font-size:12px;background:${C[i]};color:#fff;padding:3px 9px;border-radius:99px;">選択中 ✓</span>`:''}
          </div>
        </button>
      </div>`).join('')}
    </div>
    <button class="btn btn-green" id="btn-molkout-confirm" style="width:100%;padding:14px;font-size:16px;" ${mw!=null?'':'disabled'}>この結果で確定 →</button>
  </div>`;
}

function updPrev(){
  const pv=document.getElementById('preview');if(!pv)return;
  if(!S.iP){pv.textContent='';return;}
  if(S.iP==='miss'){pv.textContent='ミス（0点）記録';return;}
  const pts=parseInt(S.iP),multi=S.iM==='multi',res=S.iA;
  const cset=cs(),ct=cset.ctid,td=cset.teams[ct],ns=td.sc+pts;
  const sym=res==='circle'?(multi?' ［複数本・囲み］':' ［単品・囲み］'):' ［×］';
  if(ns>50)pv.textContent=`${td.sc}+${pts}=${ns} → 25点にリセット${sym}`;
  else if(ns===50)pv.textContent=`${td.sc}+${pts}=50点！セット勝利${sym}`;
  else pv.textContent=`${td.sc}+${pts}=${ns}点${sym}`;
}

function bindDrag(){
  [0,1].forEach(ti=>{
    const list=document.getElementById(`order-list-${ti}`);if(!list)return;
    let src=null;
    list.querySelectorAll('.order-item').forEach(item=>{
      item.addEventListener('dragstart',e=>{src=item;item.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
      item.addEventListener('dragend',()=>{item.classList.remove('dragging');list.querySelectorAll('.order-item').forEach(i=>i.classList.remove('over'));src=null;});
      item.addEventListener('dragover',e=>{e.preventDefault();list.querySelectorAll('.order-item').forEach(i=>i.classList.remove('over'));item.classList.add('over');});
      item.addEventListener('dragleave',()=>item.classList.remove('over'));
      item.addEventListener('drop',e=>{
        e.preventDefault();item.classList.remove('over');if(!src||src===item)return;
        const all=Array.from(list.querySelectorAll('.order-item'));
        const from=all.indexOf(src),to=all.indexOf(item);if(from<0||to<0)return;
        const base=S.pOrders[ti].length>0?[...S.pOrders[ti]]:S.teams[ti].members.slice();
        base.splice(to,0,base.splice(from,1)[0]);S.pOrders[ti]=base;src=null;render();
      });
    });
  });
}

function bind(){
  const app=document.getElementById('app');
  app.querySelectorAll('input[name="fmt"]').forEach(el=>{el.addEventListener('change',e=>{S.fmt=e.target.value;render();});});
  app.querySelectorAll('.move-up').forEach(btn=>{btn.addEventListener('click',()=>{
    const ti=parseInt(btn.dataset.team),idx=parseInt(btn.dataset.idx);
    const base=S.pOrders[ti].length>0?[...S.pOrders[ti]]:S.teams[ti].members.slice();
    if(idx<=0)return;[base[idx-1],base[idx]]=[base[idx],base[idx-1]];S.pOrders[ti]=base;render();
  });});
  app.querySelectorAll('.move-dn').forEach(btn=>{btn.addEventListener('click',()=>{
    const ti=parseInt(btn.dataset.team),idx=parseInt(btn.dataset.idx);
    const base=S.pOrders[ti].length>0?[...S.pOrders[ti]]:S.teams[ti].members.slice();
    if(idx>=base.length-1)return;[base[idx+1],base[idx]]=[base[idx],base[idx+1]];S.pOrders[ti]=base;render();
  });});
  const bn=document.getElementById('btn-next');
  if(bn)bn.onclick=()=>{
    [0,1].forEach(i=>{const n=document.getElementById(`tn${i}`),m=document.getElementById(`tm${i}`);if(n)S.teams[i].name=n.value||`チーム${i+1}`;if(m)S.teams[i].members=m.value.split(/[,、]/).map(s=>s.trim()).filter(Boolean);});
    S.pFirst=S.fid;S.pIdx=0;S.pOrders=[S.teams[0].members.slice(),S.teams[1].members.slice()];S.phase='firstChoice';render();
  };
  const bbs=document.getElementById('btn-bk-setup');if(bbs)bbs.onclick=()=>{S.phase='setup';render();};
  const bbf=document.getElementById('btn-bk-first');if(bbf)bbf.onclick=()=>{S.phase='firstChoice';render();};
  app.querySelectorAll('.fc-btn').forEach(el=>{el.addEventListener('click',()=>{S.pFirst=parseInt(el.dataset.id);S.pOrders=gIO(S.pIdx!=null?S.pIdx:S.sets.length,S.pFirst);render();});});
  const bgo=document.getElementById('btn-go-order');if(bgo)bgo.onclick=()=>{S.phase='orderSetup';render();};
  const bbots=document.getElementById('btn-bk-order-to-setover');if(bbots)bbots.onclick=()=>{S.phase='setOver';render();};
  const bst=document.getElementById('btn-start');
  if(bst)bst.onclick=()=>{
    const fid=S.pFirst!=null?S.pFirst:S.fid;if(S.sets.length===0)S.fid=fid;
    const si=S.pIdx!=null?S.pIdx:S.sets.length;
    S.sets.push(mkSet(si,fid,[...S.pOrders]));
    S.cur=si;S.pFirst=null;S.pIdx=null;S.pOrders=[[],[]];S.showHist=false;S.iP='';S.iM='single';S.iA='cross';S.endPending=false;S.tieExtend=false;S.phase='game';render();
  };
  const bee=document.getElementById('btn-early-end');
  if(bee)bee.onclick=()=>{
    const cset=cs();
    if(isTurnEnd(cset)){processEarlyEnd();}
    else{S.endPending=true;render();}
  };
  const br=document.getElementById('btn-reset');if(br)br.onclick=doReset;
  const bu=document.getElementById('btn-undo');
  if(bu)bu.onclick=()=>{const cset=cs();if(!cset.hist.length)return;const p=cset.hist.pop();cset.teams=p.teams;cset.ctid=p.ctid;cset.wid=p.wid;S.iP='';S.iM='single';S.iA='cross';S.endPending=false;S.tieExtend=false;render();};
  const bbo=document.getElementById('btn-bk-order');if(bbo)bbo.onclick=()=>{S.sets.pop();S.pIdx=S.sets.length;S.pFirst=nfc(S.pIdx)?S.fid:aF(S.pIdx);S.pOrders=gIO(S.pIdx,S.pFirst);S.phase=nfc(S.pIdx)?'firstChoice':'orderSetup';render();};
  const bue=document.getElementById('btn-undo-end');if(bue)bue.onclick=()=>{const cset=cs();if(!cset.hist.length)return;const p=cset.hist.pop();cset.teams=p.teams;cset.ctid=p.ctid;cset.wid=null;S.iP='';S.iM='single';S.iA='cross';S.phase='game';render();};
  const bue2=document.getElementById('btn-undo-early');
  if(bue2)bue2.onclick=()=>{const cset=cs();if(!cset.hist.length)return;const p=cset.hist.pop();cset.teams=p.teams;cset.ctid=p.ctid;cset.wid=null;if(cset.draw!==undefined)cset.draw=false;S.iP='';S.iM='single';S.iA='cross';S.endPending=false;S.tieExtend=false;S.phase='game';render();};
  const bum=document.getElementById('btn-undo-match');if(bum)bum.onclick=()=>{const cset=cs();if(!cset.hist.length)return;const p=cset.hist.pop();cset.teams=p.teams;cset.ctid=p.ctid;cset.wid=null;S.iP='';S.iM='single';S.iA='cross';S.phase='game';render();};
  const bh=document.getElementById('btn-hist');if(bh)bh.onclick=()=>{S.showHist=!S.showHist;render();};
  const bss=document.getElementById('btn-scoresheet');if(bss)bss.onclick=()=>{S.ssIdx=S.cur;S.prev='game';S.phase='scoresheet';render();};
  const bsso=document.getElementById('btn-ss-setover');if(bsso)bsso.onclick=()=>{S.ssIdx=S.cur;S.prev='setOver';S.phase='scoresheet';render();};
  const bbg=document.getElementById('btn-back-ss');if(bbg)bbg.onclick=()=>{S.phase=S.prev||'game';render();};
  const bsp=document.getElementById('btn-ss-prev');if(bsp)bsp.onclick=()=>{if(S.ssIdx>0){S.ssIdx--;render();}};
  const bsn=document.getElementById('btn-ss-next');if(bsn)bsn.onclick=()=>{if(S.ssIdx<S.sets.length-1){S.ssIdx++;render();}};
  const ps=document.getElementById('sel-pts'),ms=document.getElementById('sel-multi'),as=document.getElementById('sel-aimed');
  if(ps){ps.addEventListener('change',()=>{S.iP=ps.value;S.iA=ps.value==='miss'?'cross':'circle';render();});}
  if(ms)ms.addEventListener('change',()=>{S.iM=ms.value;render();});
  if(as)as.addEventListener('change',()=>{S.iA=as.value;render();});
  updPrev();
  const bc=document.getElementById('btn-confirm');
  if(bc)bc.onclick=()=>{
    if(!S.iP){alert('得点を選択してください');return;}
    const cset=cs(),ct=cset.ctid,td=cset.teams[ct];
    cset.hist.push({teams:JSON.parse(JSON.stringify(cset.teams)),ctid:cset.ctid,wid:cset.wid});
    const isMiss=S.iP==='miss';let pts=0,raw=0,over=false;
    const multi=S.iM==='multi',result=isMiss?'cross':S.iA;
    if(!isMiss){pts=parseInt(S.iP);raw=pts;const ns=td.sc+pts;if(ns>50){over=true;td.sc=RST;}else td.sc=ns;}
    const mn=gmb(td,ct);td.mi++;
    td.throws.push({miss:isMiss,pts,raw,over,multi,result,member:mn,cumul:td.sc});
    if(isMiss)td.ms++;else td.ms=0;if(td.ms>=MM)td.el=true;
    S.iP='';S.iM='single';S.iA='cross';
    const active=cset.teams.filter(t=>!t.el);
    if(!over&&!isMiss&&td.sc===MAX){cset.wid=ct;S.endPending=false;S.tieExtend=false;S.phase='setOver';render();return;}
    if(active.length===1){active[0].sc=MAX;cset.wid=active[0].id;S.endPending=false;S.tieExtend=false;S.phase='setOver';render();return;}
    if(active.length===0){cset.wid=null;S.endPending=false;S.tieExtend=false;S.phase='setOver';render();return;}
    let next=1-ct;if(cset.teams[next].el)next=ct;cset.ctid=next;
    const justFinishedTurn=isTurnEnd(cset);
    if(justFinishedTurn){
      const sc0=cset.teams[0].sc,sc1=cset.teams[1].sc;
      if(S.endPending){
        if(S.fmt!=='round2'&&sc0===sc1){S.endPending=false;S.tieExtend=true;render();return;}
        processEarlyEnd();return;
      }
      if(S.tieExtend){
        if(sc0!==sc1){processEarlyEnd();return;}
        // まだ同点 → バナー継続
      }
    }
    render();
  };
  const bns=document.getElementById('btn-next-set');if(bns)bns.onclick=()=>{goNext(parseInt(bns.dataset.next));};
  const bmo=document.getElementById('btn-match-over');if(bmo)bmo.onclick=()=>{S.phase='matchOver';render();};
  app.querySelectorAll('.molkout-btn').forEach(el=>{el.addEventListener('click',()=>{S.molkoutWinner=parseInt(el.dataset.id);render();});});
  const bgm=document.getElementById('btn-go-molkout');if(bgm)bgm.onclick=()=>{S.molkoutWinner=null;S.phase='molkout';render();};
  const bmc=document.getElementById('btn-molkout-confirm');if(bmc)bmc.onclick=()=>{if(S.molkoutWinner==null)return;S.phase='earlyMatchOver';render();};
}
render();
</script>
</body>
</html>
