  const btisc=document.getElementById('btn-ti-schedule');
  if(btisc)btisc.onclick=async()=>{
    S._tiView='schedule';S._tiLoading=true;S._tiError=null;S._tiSchedule=[];render();
    try{
      const json=await fetchTournamentInfo('getSchedule');
      if(json.error)throw new Error('GAS: '+json.error);
      S._tiSchedule=json.schedule||[];
    }catch(e){S._tiError='取得に失敗しました: '+e.message;}
    S._tiLoading=false;render();
  };
  // レギュレーション
  const btirg=document.getElementById('btn-ti-regulation');
  if(btirg)btirg.onclick=async()=>{
    S._tiView='regulation';S._tiLoading=true;S._tiError=null;S._tiRegulation='';render();
    try{
      const json=await fetchTournamentInfo('getRegulation');
      if(json.error)throw new Error('GAS: '+json.error);
      // sections形式（新）またはregulation文字列（旧）に対応
      S._tiSections=json.sections||null;
      S._tiRegulation=json.regulation||'';
    }catch(e){S._tiError='取得に失敗しました: '+e.message;}
    S._tiLoading=false;render();
  };
  // 予選結果
  // 予選結果
  const btipr=document.getElementById('btn-ti-prelim');
  if(btipr)btipr.onclick=async()=>{
    S._tiView='prelim';S._tiLoading=true;S._tiError=null;S._tiPrelim=[];S._tiPrelimQuery='';S._tiPrelimSelected=null;render();
    try{
      const json=await fetchTournamentInfo('getPrelim');
      if(json.error)throw new Error('GAS: '+json.error);
      S._tiPrelim=json.teams||[];
    }catch(e){S._tiError='取得に失敗しました: '+e.message;}
    S._tiLoading=false;render();
  };
  // 試合システム図（残り試合数）：ローカル同期済み設定から表示
  const btisys=document.getElementById('btn-ti-system');
  if(btisys)btisys.onclick=()=>{S._tiView='system';S._tiLoading=false;S._tiError=null;render();};
  // 予選結果 - 検索
  const tpi=document.getElementById('ti-prelim-input');
  const tps=document.getElementById('ti-prelim-search');
  const doPrelimSearch=()=>{
    const q=(document.getElementById('ti-prelim-input')||{value:''}).value.trim();
    S._tiPrelimQuery=q;
    if(!q){S._tiPrelimSelected=null;render();return;}
    // チームNoで一致検索（前ゼロ無視でも一致するように）
    const found=S._tiPrelim.find(t=>t.teamNo===q||String(parseInt(t.teamNo,10))===String(parseInt(q,10)));
    S._tiPrelimSelected=found||null;
    render();
  };
  if(tps)tps.onclick=doPrelimSearch;
  if(tpi)tpi.addEventListener('keydown',e=>{if(e.key==='Enter')doPrelimSearch();});
  // 予選結果 - チーム名／チームNoのタブ切替
  document.querySelectorAll('.ti-prelim-mode-tab').forEach(el=>el.addEventListener('click',()=>{
    S._tiPrelimMode=el.dataset.mode;
    render();
  }));
  // 予選結果 - チーム名プルダウンで選択 → 即結果表示
  const tpsel=document.getElementById('ti-prelim-select');
  if(tpsel)tpsel.addEventListener('change',()=>{
    const v=tpsel.value;
    S._tiPrelimQuery=v;
    S._tiPrelimSelected=v?(S._tiPrelim.find(t=>String(t.teamNo)===v||String(parseInt(t.teamNo,10))===String(parseInt(v,10)))||null):null;
    render();
  });
  // チームNo検索 - キーワード入力でリアルタイム絞り込み（一覧のみ差し替えてフォーカス維持）
  const tsi=document.getElementById('ts-input');
  if(tsi)tsi.addEventListener('input',()=>{
    S._tsQuery=tsi.value;
    const list=document.getElementById('ts-list');
    if(list)list.innerHTML=buildTeamSearchList(S._tsQuery);
  });
}
// ===== カメラアプリ等からのディープリンク起動 =====
// QRに埋め込まれたURL（…/#/m/＜試合ID＞）を起動時に解釈し、
// 大会ガード（配信中・開催期間内）を通したうえで対戦カード確認（選択モード）に着地させる。
function parseDeepLinkId(){
  // 形式: #/m/＜試合ID＞ （将来の拡張のため /r/ も受理して同じ着地にする）
  const h=(location.hash||'').trim();
  const m=h.match(/^#\/[mr]\/(.+)$/);
  if(m&&m[1])return decodeURIComponent(m[1]).trim();
  return null;
}
let _deepLinkBusy=false;
async function enterMatchFromDeepLink(rawId){
  const id=(rawId||'').trim();
  if(!id)return;
  if(_deepLinkBusy)return; // 処理中の多重起動を防ぐ
  // 試合中・結果入力中などに割り込むと内容が失われるため確認
  const inProgress=(typeof IN_GAME_PHASES!=='undefined'&&IN_GAME_PHASES.includes(S.phase))
    ||S.phase==='resultOnlyInput';
  if(inProgress){
    if(!confirm('別の試合のQRが読み込まれました。\n現在の入力内容を破棄して新しい試合に切り替えますか？')){
      // キャンセル時はハッシュだけ消して現状維持
      try{history.replaceState(null,'',location.pathname+location.search);}catch(e){}
      return;
    }
  }
  _deepLinkBusy=true;
  try{
  // ハッシュは一度消費したら消す（リロードや戻る操作で再発火しないように）
  try{history.replaceState(null,'',location.pathname+location.search);}catch(e){location.hash='';}

  // 大会ガード（試合IDで開始ボタンと同じ判定）
  const eventCode=await resolveActiveEventCode();
  if(!eventCode){
    alert('現在、開催中の大会はありません。\n大会が開始されるまでお待ちください。');
    S.phase='setup';render();return;
  }
  await syncAllFromGitHub(eventCode);
  const tour=AD.tournaments&&AD.tournaments.find(t=>t.eventCode===eventCode);
  if(tour){AD.activeTourId=tour.id;saveAdmin(AD);}
  const ps=tour&&tour.eventPeriodStart;
  const pe=tour&&tour.eventPeriodEnd;
  if(!ps||!pe){
    alert('試合開催期間が設定されていません。\n管理者にお問い合わせください。');
    S.phase='setup';render();return;
  }
  const now=new Date(),start=new Date(ps),end=new Date(pe);
  const fmt=d=>`${d.getMonth()+1}月${d.getDate()}日 ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  if(now<start){alert(`試合開催期間は${fmt(start)}からです。`);S.phase='setup';render();return;}
  if(now>end){alert('今大会の試合開催期間は終了しました。');S.phase='setup';render();return;}

  // 試合ID解決 → 対戦カード確認（選択モード：試合開始 / 結果のみ送信）
  const result=resolveMatchId(id);
  if(!result){
    alert('QRコードの試合IDが正しくありません。\nホームから試合IDを入力してください。');
    S.phase='setup';render();return;
  }
  S._matchIdInput=id;S._matchIdError='';
  S.matchIdData=result;
  S._matchConfirmMode='choose';
  S._matchConfirmFrom='setup'; // 「戻る」でホームへ
  S.phase='matchConfirm';render();
  }finally{_deepLinkBusy=false;}
}

(function bootstrapDeepLink(){
  const id=parseDeepLinkId();
  render(); // まず通常描画
  if(id)enterMatchFromDeepLink(id); // ディープリンクがあれば非同期で着地
})();

// 2回目以降：同じタブが開いたままカメラから別のQRを開くと、
// ページは再読み込みされずハッシュだけが書き換わる。これを検知して再着地する。
window.addEventListener('hashchange',()=>{
  const id=parseDeepLinkId();
  if(id)enterMatchFromDeepLink(id);
});
