<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Mölkky スコアシート</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f5f5f5;}
.app{padding:10px;max-width:480px;margin:0 auto;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
.btn{padding:8px 16px;border:1px solid #d1d5db;border-radius:8px;background:#fff;color:#111;cursor:pointer;font-size:14px;font-family:inherit;transition:background 0.15s;}
.btn:hover{background:#f3f4f6;}.btn:active{transform:scale(0.97);}
.btn-green{background:#1D9E75;color:#fff;border-color:#1D9E75;}.btn-green:hover{background:#178a64;}
.btn-blue{background:#378ADD;color:#fff;border-color:#378ADD;}.btn-blue:hover{background:#2e72c4;}
.btn-red-o{background:#FEE2E2;color:#b91c1c;border-color:#fca5a5;}.btn-red-o:hover{background:#fecaca;}
.btn-orange{background:#FFF7ED;color:#92400e;border-color:#fed7aa;}.btn-orange:hover{background:#fef3c7;}
.btn-yellow{background:#FEFCE8;color:#854d0e;border-color:#fde68a;}.btn-yellow:hover{background:#fef9c3;}
.btn-gray{background:#f3f4f6;color:#374151;border-color:#d1d5db;}.btn-gray:hover{background:#e5e7eb;}
.btn-xs{padding:5px 11px;font-size:12px;}.btn-sm{padding:7px 13px;font-size:13px;}
.btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;overflow:hidden;}
input[type=text]{width:100%;padding:9px 11px;border:1.5px solid #d1d5db;border-radius:8px;background:#f3f4f6;color:#111;font-size:15px;font-family:inherit;}
input[type=text]:focus{outline:none;border-color:#1D9E75;background:#fff;}
select{width:100%;padding:10px 11px;border:1.5px solid #d1d5db;border-radius:8px;background:#f3f4f6;color:#111;font-size:15px;font-family:inherit;cursor:pointer;}
select:focus{outline:none;border-color:#1D9E75;background:#fff;}
.order-item{padding:10px 12px;background:#f3f4f6;border:1.5px solid #d1d5db;border-radius:8px;display:flex;align-items:center;gap:8px;font-size:14px;color:#111;user-select:none;}
.order-item.dragging{opacity:0.4;}.order-item.over{border-color:#1D9E75;background:#E1F5EE;}
.ss-wrap{overflow-x:auto;}
.ss-tbl{border-collapse:collapse;width:100%;}
.ss-tbl th,.ss-tbl td{border:1px solid #bbb;text-align:center;vertical-align:middle;padding:5px 6px;}
.ss-tbl th{background:#f3f4f6;font-size:13px;font-weight:600;}
.turn-col{width:26px;font-size:13px;color:#888;background:#f8f8f8;}
.mbr-th{writing-mode:vertical-rl;font-size:13px;min-width:32px;padding:8px 4px;}
.tot-th{font-size:13px;min-width:38px;}
.sc-cell{font-size:14px;min-width:34px;padding:5px 6px;}
.sc-cell.editable:hover{background:#FFFBEB;}
.tot-cell{font-size:14px;font-weight:600;min-width:38px;background:#fafaf6;padding:5px 6px;}
.team-hdr{font-size:14px;font-weight:600;padding:7px 8px;}
label.radio-card{display:flex;align-items:center;gap:10px;padding:10px 12px;border:2px solid #e5e7eb;border-radius:10px;cursor:pointer;background:#fff;}
label.radio-card.selected{border-color:#1D9E75;background:#E1F5EE;}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const C=['#1D9E75','#E24B4A'];
const LB=['#E1F5EE','#FCEBEB'];
const LBR=['#9FE1CB','#F7C1C1'];
const LT=['#085041','#A32D2D'];
const MAX=50,RST=25,MM=3,TURN_LIMIT=12;

let S={
  phase:'setup',fmt:'best2',turnLimit:false,
  playerMin:2,playerMax:4,
  teams:[{id:0,name:'チームA',members:[]},{id:1,name:'チームB',members:[]}],
  sets:[],cur:0,fid:0,showHist:false,
  pFirst:null,pIdx:null,pOrders:[[],[]],
  pExclude:[[],[]],
  iP:'',iM:'single',iA:'cross',
  prev:null,ssIdx:0,
  endPending:false,tieExtend:false,tlTieExtend:false,
  molkoutWinner:null,
  editSetIdx:null,editTi:null,editThIdx:null,afterEdit:null,_ucFrom:null,
  throwStartTime:null,lastThrowSec:null
};
function fmtSec(sec){if(sec===null||sec===undefined)return'--';const m=Math.floor(sec/60),s=sec%60;return m>0?m+'分'+s+'秒':s+'秒';}
let _timerInterval=null;
function startTimer(){
  S.throwStartTime=Date.now();
  if(_timerInterval)clearInterval(_timerInterval);
  _timerInterval=setInterval(()=>{
    const el=document.getElementById('throw-timer-display');
    if(!el){clearInterval(_timerInterval);_timerInterval=null;return;}
    const sec=Math.round((Date.now()-S.throwStartTime)/1000);
    const m=Math.floor(sec/60),s=sec%60;
    el.textContent='⏱ '+(m>0?m+'分'+s+'秒':s+'秒');
  },1000);
}
function stopTimer(){
  if(_timerInterval){clearInterval(_timerInterval);_timerInterval=null;}
  if(!S.throwStartTime)return null;
  const sec=Math.round((Date.now()-S.throwStartTime)/1000);
  S.throwStartTime=null;
  return sec;
}

const fl=()=>S.fmt==='best2'?'2先':S.fmt==='best3'?'3先':'表裏';
const nfc=(i)=>(S.fmt==='best2')?(i===0||i===2):(S.fmt==='best3')?(i===0||i===4):i===0;
const isFin=(i)=>(S.fmt==='best2'&&i===2)||(S.fmt==='best3'&&i===4);
function aF(ni){
  const f=S.fid;
  if(S.fmt==='best2')return ni===1?1-f:f;
  if(S.fmt==='best3'){
    if(ni===2){const w=[0,0];S.sets.slice(0,2).forEach(s=>{if(s.wid!=null)w[s.wid]++;});if(w[0]===2)return 1;if(w[1]===2)return 0;return 1-S.sets[1].ftid;}
    if(ni===3)return 1-S.sets[2].ftid;
    return 1-f;
  }
  return 1-f;
}
function gIO(ni,fid){
  const o=[[],[]];
  const excls=[[],[]];
  [0,1].forEach(ti=>{
    const isF=ti===fid;let fd=null,fdExcl=[];
    // 同じ先/後攻ロールの直前セットのorderとexcludedを引き継ぐ
    for(let i=S.sets.length-1;i>=0;i--){
      const s=S.sets[i];
      if((s.ftid===ti)===isF){const x=s.teams[ti].order;if(x&&x.length){fd=x;fdExcl=s.teams[ti].excluded||[];break;}}
    }
    if(!fd&&S.sets.length>0){
      const pv=S.sets[S.sets.length-1];const x=pv.teams[ti].order;
      if(x&&x.length){fd=x;fdExcl=pv.teams[ti].excluded||[];}
    }
    if(!fd)fd=S.teams[ti].members.slice();
    // orderに含まれていないexcludedメンバーを末尾に追加（全員含める）
    const base=[...fd];
    fdExcl.forEach(m=>{if(!base.includes(m))base.push(m);});
    // チームメンバー全員をリストに含める
    S.teams[ti].members.forEach(m=>{if(!base.includes(m))base.push(m);});
    o[ti]=base;
    excls[ti]=[...fdExcl];
  });
  return{orders:o,excludes:excls};
}
const gT=()=>{const t=[0,0];S.sets.forEach(s=>{t[0]+=s.teams[0].sc;t[1]+=s.teams[1].sc;});return t;}
const mxS=()=>S.fmt==='best2'?3:S.fmt==='best3'?5:2;
const nW=()=>S.fmt==='best2'?2:S.fmt==='best3'?3:99;
function mW(){if(S.fmt==='round2')return null;const w=[0,0];S.sets.forEach(s=>{if(s.wid!=null)w[s.wid]++;});const n=nW();return w[0]>=n?0:w[1]>=n?1:null;}
function mkSet(idx,fid,ord,excl){
  return{idx,ftid:fid,ctid:fid,teams:[
    {id:0,sc:0,ms:0,el:false,throws:[],mi:0,order:ord[0]||[],excluded:excl&&excl[0]?[...excl[0]]:[]},
    {id:1,sc:0,ms:0,el:false,throws:[],mi:0,order:ord[1]||[],excluded:excl&&excl[1]?[...excl[1]]:[]}
  ],wid:null,hist:[]};
}
const cs=()=>S.sets[S.cur];
function isTurnEnd(cset){const t0=cset.teams[0].throws.length,t1=cset.teams[1].throws.length;return t0===t1&&t0>0;}
function gmb(td,ti){
  // pExclude を除いたリストでローテーション
  const full=td.order.length>0?td.order:S.teams[ti].members;
  const excl=td.excluded||[];
  const active=full.filter(m=>!excl.includes(m));
  if(!active.length)return full.length?full[td.mi%full.length]:null;
  return active[td.mi%active.length];
}
function dots(n){return[0,1,2].map(i=>`<span style="display:inline-block;width:11px;height:11px;border-radius:50%;background:${i<n?'#E24B4A':'#e5e7eb'};border:1px solid ${i<n?'#E24B4A':'#d1d5db'};"></span>`).join('');}
function svgC(t,s=22){return`<svg width="${s}" height="${s}" viewBox="0 0 22 22" style="vertical-align:middle;"><circle cx="11" cy="11" r="10" fill="none" stroke="#111" stroke-width="1.5"/><text x="11" y="15.5" text-anchor="middle" font-size="11" font-family="-apple-system,sans-serif" fill="#111">${t}</text></svg>`;}
function svgS(t,s=22){return`<svg width="${s+6}" height="${s}" viewBox="0 0 28 22" style="vertical-align:middle;"><rect x="1" y="1" width="26" height="20" rx="3" fill="none" stroke="#111" stroke-width="1.5"/><text x="14" y="15.5" text-anchor="middle" font-size="11" font-family="-apple-system,sans-serif" fill="#111">${t}</text></svg>`;}

function recompute(cset){
  [0,1].forEach(ti=>{
    const td=cset.teams[ti];let sc=0,ms=0,el=false;
    td.throws.forEach(th=>{
      if(th.miss){ms++;if(ms>=MM)el=true;th.cumul=sc;}
      else{ms=0;const ns=sc+th.pts;if(ns>MAX){sc=RST;th.over=true;}else{sc=ns;th.over=false;}th.cumul=sc;}
    });
    td.sc=sc;td.ms=ms;td.el=el;
  });
  const e0=cset.teams[0].el,e1=cset.teams[1].el;
  // 失格チームは0点。勝者チーム（失格なし）は50点に設定
  if(e0&&!e1){cset.teams[0].sc=0;cset.teams[1].sc=MAX;cset.wid=1;}
  else if(e1&&!e0){cset.teams[1].sc=0;cset.teams[0].sc=MAX;cset.wid=0;}
  else if(e0&&e1){cset.teams[0].sc=0;cset.teams[1].sc=0;cset.wid=null;}
  else{
    const s0=cset.teams[0].sc,s1=cset.teams[1].sc;
    if(s0===MAX&&s1!==MAX)cset.wid=0;
    else if(s1===MAX&&s0!==MAX)cset.wid=1;
    // それ以外はwidを変更しない（途中終了等で既にwidがセットされている場合）
  }
}

function processTurnLimitSetEnd(){
  const cset=cs();
  const e0=cset.teams[0].el,e1=cset.teams[1].el;
  if(e0&&!e1){cset.teams[0].sc=0;cset.teams[1].sc=MAX;cset.wid=1;}
  else if(e1&&!e0){cset.teams[1].sc=0;cset.teams[0].sc=MAX;cset.wid=0;}
  else if(e0&&e1){cset.teams[0].sc=0;cset.teams[1].sc=0;cset.wid=null;}
  else{
    const sc0=cset.teams[0].sc,sc1=cset.teams[1].sc;
    if(S.fmt==='round2'){cset.wid=sc0>sc1?0:sc1>sc0?1:null;cset.draw=(sc0===sc1);}
    else{cset.wid=sc0>sc1?0:sc1>sc0?1:null;}
  }
  S.tlTieExtend=false;S.phase='setOver';render();
}

function processEarlyEnd(){
  const cset=cs();
  // 失格チームのscを正しく設定してから比較
  const e0=cset.teams[0].el,e1=cset.teams[1].el;
  if(e0&&!e1){cset.teams[0].sc=0;cset.teams[1].sc=MAX;cset.wid=1;}
  else if(e1&&!e0){cset.teams[1].sc=0;cset.teams[0].sc=MAX;cset.wid=0;}
  else if(e0&&e1){cset.teams[0].sc=0;cset.teams[1].sc=0;cset.wid=null;}
  else{
    const sc0=cset.teams[0].sc,sc1=cset.teams[1].sc;
    if(S.fmt==='round2'){cset.wid=sc0>sc1?0:sc1>sc0?1:null;cset.draw=(sc0===sc1);}
    else{cset.wid=sc0>sc1?0:sc1>sc0?1:null;}
  }
  S.endPending=false;S.tieExtend=false;
  if(unknownSets().length>0){S.ssIdx=0;S.afterEdit=null;S._ucFrom='earlyMatchOver';S.phase='unknownCheck';render();return;}
  S.phase='earlyMatchOver';render();
}

function round2Stats(){
  const completedSets=[...S.sets];
  const phantom=[];
  for(let i=completedSets.length;i<2;i++)phantom.push({teams:[{sc:0},{sc:0}],wid:null,draw:true,phantom:true});
  const allSets=[...completedSets,...phantom];
  const wins=[0,0];
  allSets.forEach(s=>{if(s.wid!=null&&!s.draw)wins[s.wid]++;});
  const draws=allSets.filter(s=>s.draw||s.wid==null).length;
  const totals=[0,0];
  allSets.forEach(s=>{totals[0]+=s.teams[0].sc;totals[1]+=s.teams[1].sc;});
  return{allSets,wins,draws,totals};
}

function histTbl(upTo){
  const rows=S.sets.slice(0,upTo).map((ss,i)=>{
    const wn=ss.draw?'引き分け':ss.wid!=null?S.teams[ss.wid].name:'−';
    const lb=S.fmt==='round2'?`${i+1}セット`:`第${i+1}セット`;
    return`<tr style="border-top:1px solid #e5e7eb;">
      <td style="padding:5px 8px;font-size:13px;color:#6b7280;">${lb}</td>
      <td style="padding:5px 8px;font-size:13px;text-align:center;font-weight:${ss.wid===0?600:400};">${ss.teams[0].sc}</td>
      <td style="padding:5px 8px;font-size:13px;text-align:center;font-weight:${ss.wid===1?600:400};">${ss.teams[1].sc}</td>
      <td style="padding:5px 8px;font-size:13px;text-align:center;">${wn}</td>
    </tr>`;
  }).join('');
  if(!rows)return'';
  return`<div class="card" style="margin-bottom:12px;">
    <div style="padding:8px 12px;border-bottom:1px solid #e5e7eb;font-size:13px;color:#6b7280;">これまでのセット結果</div>
    <table style="width:100%;border-collapse:collapse;"><thead><tr>
      <th style="padding:5px 8px;font-size:12px;font-weight:400;color:#9ca3af;text-align:left;">セット</th>
      <th style="padding:5px 8px;font-size:12px;font-weight:400;color:#9ca3af;text-align:center;">${S.teams[0].name}</th>
      <th style="padding:5px 8px;font-size:12px;font-weight:400;color:#9ca3af;text-align:center;">${S.teams[1].name}</th>
      <th style="padding:5px 8px;font-size:12px;font-weight:400;color:#9ca3af;text-align:center;">結果</th>
    </tr></thead><tbody>${rows}</tbody></table>
  </div>`;
}

function doReset(){
  S={phase:'setup',fmt:S.fmt,turnLimit:S.turnLimit,playerMin:S.playerMin,playerMax:S.playerMax,teams:S.teams.map(t=>({...t,members:[...t.members]})),sets:[],cur:0,fid:0,showHist:false,pFirst:null,pIdx:null,pOrders:[[],[]],pExclude:[[],[]],iP:'',iM:'single',iA:'cross',prev:null,ssIdx:0,endPending:false,tieExtend:false,tlTieExtend:false,molkoutWinner:null,editSetIdx:null,editTi:null,editThIdx:null,afterEdit:null,_ucFrom:null,throwStartTime:null,lastThrowSec:null};render();
}
function goNext(ni){
  S.tlTieExtend=false;
  S.pIdx=ni;
  // nfc=true(先攻選択が必要)なら S.fid を初期値として firstChoice へ
  // nfc=false(自動入れ替え)なら aF で先攻を決定して orderSetup へ
  const fid=nfc(ni)?S.fid:aF(ni);
  S.pFirst=fid; // ★ 必ずセット
  const _gio=gIO(ni,fid);S.pOrders=_gio.orders;S.pExclude=_gio.excludes;
  S.phase=nfc(ni)?'firstChoice':'orderSetup';render();
}

// 「？」が残っているセットのインデックスを返す
function unknownSets(){
  return S.sets.map((cset,i)=>{
    const hasUnknown=cset.teams.some(td=>td.throws.some(th=>!th.miss&&th.result==='unknown'));
    return hasUnknown?i:-1;
  }).filter(i=>i>=0);
}

function render(){
  const app=document.getElementById('app');
  const p=S.phase;
  if(p==='setup')app.innerHTML=rSetup();
  else if(p==='firstChoice')app.innerHTML=rFirst();
  else if(p==='orderSetup')app.innerHTML=rOrder();
  else if(p==='game')app.innerHTML=rGame();
  else if(p==='scoresheet')app.innerHTML=rSS();
  else if(p==='setOver')app.innerHTML=rSetOver();
  else if(p==='matchOver')app.innerHTML=rMatchOver();
  else if(p==='earlyMatchOver')app.innerHTML=rEarlyMatchOver();
  else if(p==='molkout')app.innerHTML=rMolkout();
  else if(p==='editThrow')app.innerHTML=rEditThrow();
  else if(p==='unknownCheck')app.innerHTML=rUnknownCheck();
  bind();
  if(p==='orderSetup')setTimeout(bindDrag,0);
}

function rSetup(){
  return`<div style="padding:8px 0 4px;">
    <div style="font-size:22px;font-weight:700;color:#111;margin-bottom:2px;">Mölkky スコアシート</div>
    <div style="font-size:13px;color:#6b7280;margin-bottom:16px;">日本モルック協会公式ルール準拠</div>
    <div class="card" style="padding:14px;margin-bottom:12px;">
      <div style="font-size:15px;font-weight:600;color:#111;margin-bottom:10px;">試合形式</div>
      <div style="display:grid;gap:8px;">
        ${[['best2','2セット先取'],['best3','3セット先取'],['round2','2セット勝負（表裏）']].map(([v,l])=>`
        <label class="radio-card ${S.fmt===v?'selected':''}">
          <input type="radio" name="fmt" value="${v}" ${S.fmt===v?'checked':''} style="width:auto;accent-color:#1D9E75;"/>
          <span style="font-size:15px;color:${S.fmt===v?'#085041':'#111'};">${l}</span>
        </label>`).join('')}
      </div>
    </div>
    <div class="card" style="padding:14px;margin-bottom:12px;">
      <div style="font-size:15px;font-weight:600;color:#111;margin-bottom:10px;">ターン制限</div>
      <div style="display:grid;gap:8px;">
        <label class="radio-card ${!S.turnLimit?'selected':''}">
          <input type="radio" name="tl" value="none" ${!S.turnLimit?'checked':''} style="width:auto;accent-color:#1D9E75;"/>
          <span style="font-size:15px;color:${!S.turnLimit?'#085041':'#111'};">制限なし</span>
        </label>
        <label class="radio-card ${S.turnLimit?'selected':''}">
          <input type="radio" name="tl" value="12" ${S.turnLimit?'checked':''} style="width:auto;accent-color:#1D9E75;"/>
          <div>
            <span style="font-size:15px;color:${S.turnLimit?'#085041':'#111'};">12ターン制限</span>
            <div style="font-size:12px;color:#6b7280;margin-top:2px;">12ターン終了後にセットを自動終了</div>
          </div>
        </label>
      </div>
    </div>
    <div class="card" style="padding:14px;margin-bottom:12px;">
      <div style="font-size:15px;font-weight:600;color:#111;margin-bottom:10px;">1セットの投擲人数</div>
      <div style="font-size:13px;color:#6b7280;margin-bottom:10px;">チームメンバーが多い場合、セットごとに投げる人数を制限できます</div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
        <div style="display:flex;flex-direction:column;gap:4px;flex:1;">
          <label style="font-size:13px;color:#6b7280;font-weight:500;">最小人数</label>
          <div style="display:flex;align-items:center;gap:8px;">
            <button class="btn btn-gray" id="btn-pm-min-" style="padding:6px 12px;font-size:18px;line-height:1;">−</button>
            <span id="pm-min-val" style="font-size:17px;font-weight:700;min-width:28px;text-align:center;">${S.playerMin===1?'制限なし':S.playerMin+'人'}</span>
            <button class="btn btn-gray" id="btn-pm-min+" style="padding:6px 12px;font-size:18px;line-height:1;">＋</button>
          </div>
        </div>
        <div style="font-size:20px;color:#d1d5db;">〜</div>
        <div style="display:flex;flex-direction:column;gap:4px;flex:1;">
          <label style="font-size:13px;color:#6b7280;font-weight:500;">最大人数</label>
          <div style="display:flex;align-items:center;gap:8px;">
            <button class="btn btn-gray" id="btn-pm-max-" style="padding:6px 12px;font-size:18px;line-height:1;">−</button>
            <span id="pm-max-val" style="font-size:17px;font-weight:700;min-width:28px;text-align:center;">${S.playerMax>=99?'制限なし':S.playerMax+'人'}</span>
            <button class="btn btn-gray" id="btn-pm-max+" style="padding:6px 12px;font-size:18px;line-height:1;">＋</button>
          </div>
        </div>
      </div>
    </div>
    ${[0,1].map(i=>`<div class="card" style="padding:14px;margin-bottom:12px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
        <div style="width:12px;height:12px;border-radius:50%;background:${C[i]};flex-shrink:0;"></div>
        <span style="font-size:15px;font-weight:600;color:#111;">チーム ${i+1}</span>
      </div>

    </div>`).join('')}

  </div>`;
}

function buildSS(cset,editable,_setIdx){
  const fti=cset.ftid,sti=1-fti;
  // スコアシート：excluded を除いたメンバーのみ表示
  const mbrs=[0,1].map(ti=>{
    const excl=cset.teams[ti].excluded||[];
    const full=cset.teams[ti].order.length>0?cset.teams[ti].order:S.teams[ti].members.length?S.teams[ti].members:['投てき者'];
    const active=full.filter(m=>!excl.includes(m));
    return active.length>0?active:full;
  });
  const nM=[mbrs[0].length,mbrs[1].length];
  const maxT=Math.max(cset.teams[0].throws.length,cset.teams[1].throws.length);
  const cF=nM[fti]+1,cS=nM[sti]+1;
  const mhdr=(ti)=>mbrs[ti].map(m=>`<th class="mbr-th" style="border:1px solid #bbb;">${m}</th>`).join('');
  function tDisp(th,ti,thIdx){
    if(!th)return'';
    if(th.miss){const inner=`<span style="color:#9ca3af;font-size:15px;">—</span>`;return editable?`<span class="edit-th-btn" data-ti="${ti}" data-idx="${thIdx}" data-setidx="${_setIdx}" style="cursor:pointer;">${inner}✏️</span>`:inner;}
    const sc=th.raw!==undefined?th.raw:th.pts;
    let inner='';
    if(th.result==='circle'&&th.multi)inner=svgS(sc,22);
    else if(th.result==='circle')inner=svgC(sc,22);
    else if(th.result==='unknown')inner=`<span style="font-weight:600;font-size:14px;color:#f59e0b;">${sc}？</span>`;
    else inner=`<span style="font-weight:600;font-size:14px;">${sc}</span>`;
    return editable?`<span class="edit-th-btn" data-ti="${ti}" data-idx="${thIdx}" data-setidx="${_setIdx}" style="cursor:pointer;">${inner}✏️</span>`:inner;
  }
  const prevC=[0,0];
  function totDisp(th,ti){
    if(!th)return'';
    if(th.miss)return`<span style="color:#6b7280;">${prevC[ti]}</span>`;
    if(th.over){prevC[ti]=th.cumul;return`<span style="color:#b45309;font-weight:600;">${th.cumul}</span>`;}
    prevC[ti]=th.cumul;return`<span style="font-weight:600;">${th.cumul}</span>`;
  }
  let rows='';
  for(let t=0;t<maxT;t++){
    const thF=cset.teams[fti].throws[t],thS=cset.teams[sti].throws[t];
    const mF=thF?t%nM[fti]:-1,mS=thS?t%nM[sti]:-1;
    const cF2=mbrs[fti].map((_,mi)=>mi!==mF||!thF?`<td class="sc-cell" style="border:1px solid #bbb;"></td>`:`<td class="sc-cell ${editable?'editable':''}" style="border:1px solid #bbb;">${tDisp(thF,fti,t)}</td>`).join('');
    const cS2=mbrs[sti].map((_,mi)=>mi!==mS||!thS?`<td class="sc-cell" style="border:1px solid #bbb;"></td>`:`<td class="sc-cell ${editable?'editable':''}" style="border:1px solid #bbb;">${tDisp(thS,sti,t)}</td>`).join('');
    rows+=`<tr><td class="turn-col" style="border:1px solid #bbb;">${t+1}</td>${cF2}<td class="tot-cell" style="border:1px solid #bbb;border-right:2.5px solid #aaa;">${totDisp(thF,fti)}</td>${cS2}<td class="tot-cell" style="border:1px solid #bbb;">${totDisp(thS,sti)}</td></tr>`;
  }
  const eF=cset.teams[fti].el,eS=cset.teams[sti].el;
  if(eF||eS){
    const fe=eF?`<span style="color:#E24B4A;font-weight:700;">0</span>`:`<span style="color:#1D9E75;font-weight:700;">50</span>`;
    const se=eS?`<span style="color:#E24B4A;font-weight:700;">0</span>`:`<span style="color:#1D9E75;font-weight:700;">50</span>`;
    rows+=`<tr style="background:#fff8f8;"><td class="turn-col" style="border:1px solid #bbb;font-size:11px;color:#E24B4A;font-weight:700;">失</td>${mbrs[fti].map(()=>`<td class="sc-cell" style="border:1px solid #bbb;background:#fff8f8;"></td>`).join('')}<td class="tot-cell" style="border:1px solid #bbb;border-right:2.5px solid #aaa;background:#fff8f8;">${fe}</td>${mbrs[sti].map(()=>`<td class="sc-cell" style="border:1px solid #bbb;background:#fff8f8;"></td>`).join('')}<td class="tot-cell" style="border:1px solid #bbb;background:#fff8f8;">${se}</td></tr>`;
  }
  if(!rows)rows=`<tr><td colspan="${1+cF+cS}" style="border:1px solid #bbb;padding:12px;font-size:13px;color:#9ca3af;text-align:center;">まだ投てきなし</td></tr>`;
  return`<div class="ss-wrap"><table class="ss-tbl"><thead>
    <tr><th class="turn-col" style="border:1px solid #bbb;"></th>
      <th colspan="${cF}" class="team-hdr" style="border:1px solid #bbb;border-right:2.5px solid #aaa;background:${LB[fti]};color:${LT[fti]};">${S.teams[fti].name}（先攻）</th>

}

function rSS(){

  return`<div style="padding:6px 0 4px;">
    ${isEditMode?`<div style="background:#FFFBEB;border:1.5px solid #FCD34D;border-radius:10px;padding:10px 12px;margin-bottom:12px;font-size:13px;color:#92400e;">✏️ <strong>スコアを確認してください。</strong>間違いがあれば各投擲の ✏️ をタップして修正できます。</div>`:''}

      <button class="btn btn-gray btn-sm" id="btn-back-ss">← 戻る</button>
      <div style="flex:1;"><div style="font-size:12px;color:#6b7280;">${fl()}</div><div style="font-size:16px;font-weight:700;color:#111;">スコアシート${isEditMode?' (確認・修正)':''}</div></div>

      <span style="font-size:15px;font-weight:700;color:#111;min-width:80px;text-align:center;">${sl}</span>

}

function rEditThrow(){

      <button class="btn btn-gray btn-sm" id="btn-bk-edit">← キャンセル</button>
      <div style="flex:1;"><div style="font-size:12px;color:#6b7280;">${S.teams[ti].name} / ${thIdx+1}投目</div><div style="font-size:16px;font-weight:700;color:#111;">投擲の修正</div></div>
    </div>
    <div class="card" style="padding:14px;margin-bottom:12px;">

          <select id="edit-aimed"><option value="circle" ${th.result==='circle'?'selected':''}>○ 狙い通り</option><option value="cross" ${th.result==='cross'?'selected':''}>× 狙い通りでない</option><option value="unknown" ${th.result==='unknown'?'selected':''}>？ わからない</option></select>
        </div>
      </div>
    </div>
    <button class="btn btn-green" id="btn-save-edit" style="width:100%;padding:14px;font-size:16px;">この内容で保存 ✓</button>

}

      ${[0,1].map(i=>`<div style="display:flex;align-items:center;gap:10px;padding:6px 0;">
        <div style="width:12px;height:12px;border-radius:50%;background:${C[i]};flex-shrink:0;"></div>

    </div>`:``}

    ${mw!=null?`<div style="text-align:center;padding:10px 0 14px;background:${LB[mw]};border-radius:10px;margin-bottom:10px;"><div style="font-size:18px;font-weight:700;color:${LT[mw]};">🏆 試合終了 — ${S.teams[mw].name} の勝利！</div></div>

  </div>`;
}

  const totals=S.sets.reduce((a,s)=>{a[0]+=s.teams[0].sc;a[1]+=s.teams[1].sc;return a;},[0,0]);
  let matchWin=null,needMolkout=false;
  if(S.fmt!=='round2'){
    if(wins[0]>wins[1])matchWin=0;else if(wins[1]>wins[0])matchWin=1;

    else needMolkout=true;
  }
  if(needMolkout&&S.molkoutWinner!=null)matchWin=S.molkoutWinner;
  const cu=cset.hist.length>0;
  const r2=S.fmt==='round2'?round2Stats():null;
  return`<div style="padding:12px 0;">
    <div style="text-align:center;padding:14px 0 12px;background:#FFF7ED;border-radius:12px;margin-bottom:16px;">
      <div style="font-size:13px;color:#92400e;margin-bottom:6px;">⏹ 途中試合終了（${sl}終了時点）</div>
      ${matchWin!=null?`<div style="font-size:24px;font-weight:700;color:#111;">🏆 ${S.teams[matchWin].name} の勝利</div>`
       :needMolkout&&S.molkoutWinner==null?`<div style="font-size:18px;font-weight:700;color:#111;">勝利セット数・合計点が同点</div><div style="font-size:14px;color:#92400e;margin-top:4px;">モルックアウトで決定します</div>`
       :`<div style="font-size:20px;font-weight:700;color:#111;">試合終了</div>`}
    </div>
    ${S.fmt==='round2'?`
    <div class="card" style="padding:14px;margin-bottom:12px;">
      <div style="font-size:14px;font-weight:600;color:#111;margin-bottom:12px;">通算成績</div>
      ${[0,1].map(i=>{const w=r2.wins[i],d=r2.draws,l=r2.allSets.length-w-d;return`
        <div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f3f4f6;">
          <div style="width:12px;height:12px;border-radius:50%;background:${C[i]};flex-shrink:0;"></div>
          <div style="flex:1;"><div style="font-size:15px;font-weight:600;color:#111;">${S.teams[i].name}</div>
          <div style="font-size:13px;color:#6b7280;margin-top:2px;">合計 ${r2.totals[i]}点</div></div>
          <span style="font-size:17px;font-weight:700;color:#111;">${w}勝${d}分${l}敗</span>
        </div>`;}).join('')}
    </div>
    ${r2.allSets.some(s=>s.phantom)?`<div style="font-size:12px;color:#9ca3af;margin-bottom:12px;">※ 2セット目は未実施のため 0-0 引き分けとして計算</div>`:''}`:`

      <div style="font-size:14px;font-weight:600;color:#111;margin-bottom:12px;">勝敗・合計点</div>
      ${[0,1].map(i=>`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f3f4f6;">
        <div style="width:12px;height:12px;border-radius:50%;background:${C[i]};flex-shrink:0;"></div>
        <div style="flex:1;"><div style="font-size:15px;font-weight:600;color:#111;">${S.teams[i].name}</div>
        <div style="font-size:13px;color:#6b7280;margin-top:2px;">${wins[i]}勝　合計${totals[i]}点</div></div>
        ${matchWin===i?`<span style="font-size:13px;background:${LB[i]};color:${LT[i]};padding:3px 10px;border-radius:99px;border:1px solid ${LBR[i]};">勝利</span>`:''}
      </div>`).join('')}
    </div>`}
    ${histTbl(S.sets.length)}
    ${needMolkout&&S.molkoutWinner==null?`<button class="btn btn-orange" id="btn-go-molkout" style="width:100%;padding:14px;font-size:15px;margin-bottom:10px;">🎯 モルックアウトへ進む</button>`:''}
    <button class="btn btn-yellow" id="btn-ss-early-edit" style="width:100%;margin-bottom:10px;padding:12px;font-size:14px;">📋 スコアシートを確認・修正する</button>
    <button class="btn btn-gray" id="btn-bk-to-setover-early" style="width:100%;margin-bottom:10px;padding:12px;font-size:14px;">← 戻る（セット終了画面）</button>
    <button class="btn btn-red-o" id="btn-undo-early" style="width:100%;margin-bottom:10px;padding:12px;font-size:14px;" ${cu?'':'disabled'}>↩ 最後の1投に戻す</button>

function rUnknownCheck(){
  const uSets=unknownSets();
  // 全て修正済みなら自動的に結果画面へ
  if(uSets.length===0){
    const ph=S._ucFrom||'matchOver';
    S._ucFrom=null;
    setTimeout(()=>{S.phase=ph;render();},0);
    return'<div style="padding:20px;text-align:center;color:#1D9E75;font-weight:600;">✓ 全て確認済みです。結果画面へ移動します...</div>';
  }
  const idx=S.ssIdx<uSets.length?S.ssIdx:0;
  const setIdx=uSets[idx]!=null?uSets[idx]:uSets[0];
  const sn=setIdx+1;
  const sl=S.fmt==='round2'?sn+'セット目':'第'+sn+'セット';
  const cset=S.sets[setIdx];
  if(!cset){return'<div style="padding:20px;text-align:center;color:#9ca3af;">データ取得エラー</div>';}
  const total=uSets.length;
  // スコアシートを編集モードで表示
  return`<div style="padding:6px 0 4px;">
    <div style="background:#FEF3C7;border:1.5px solid #fcd34d;border-radius:10px;padding:12px;margin-bottom:12px;">
      <div style="font-size:14px;font-weight:700;color:#92400e;margin-bottom:4px;">⚠️ 「？ わからない」の投擲が残っています</div>
      <div style="font-size:13px;color:#92400e;">試合結果を確定する前に、全ての投擲の結果（○か×）を確定してください。✏️をタップして修正できます。</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
      <div style="flex:1;"><div style="font-size:12px;color:#6b7280;">${fl()} | 未確定 ${total}セット</div><div style="font-size:16px;font-weight:700;color:#111;">スコア確認・修正</div></div>
    </div>
    ${total>1?`<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;justify-content:center;">
      <button class="btn btn-gray btn-sm" id="btn-uc-prev" ${idx>0?'':'disabled'} style="min-width:48px;font-size:16px;">◀</button>
      <span style="font-size:15px;font-weight:700;color:#111;min-width:80px;text-align:center;">${sl}</span>
      <button class="btn btn-gray btn-sm" id="btn-uc-next" ${idx<total-1?'':'disabled'} style="min-width:48px;font-size:16px;">▶</button>
    </div>`:'<div style="font-size:15px;font-weight:700;color:#111;margin-bottom:10px;">'+sl+'</div>'}
    ${buildSS(cset,true,setIdx)}
    <button class="btn btn-green" id="btn-uc-done" style="width:100%;padding:14px;font-size:16px;margin-top:12px;" ${unknownSets().length===0?'':'disabled'}>
      ${unknownSets().length===0?'確認完了 → 結果へ進む ✓':'まだ「？」が残っています（'+unknownSets().length+'セット）'}
    </button>
  </div>`;
}

function rMolkout(){
  const mw=S.molkoutWinner;
  return`<div style="padding:12px 0;">
    <div style="text-align:center;padding:14px 0 12px;">
      <div style="font-size:16px;font-weight:700;color:#111;margin-bottom:4px;">モルックアウト</div>

    </div>

      ${[0,1].map(i=>`<div style="margin-bottom:10px;">

function updPrev(){
  const pv=document.getElementById('preview');if(!pv)return;
  if(!S.iP){pv.textContent='';return;}
  if(S.iP==='miss'){pv.textContent='ミス（0点）記録';return;}
  const pts=parseInt(S.iP),multi=S.iM==='multi',res=S.iA;
  const cset=cs(),ct=cset.ctid,td=cset.teams[ct],ns=td.sc+pts;
  const sym=res==='circle'?(multi?' ［複数本・囲み］':' ［単品・囲み］'):' ［×］';
  if(ns>50)pv.textContent=`${td.sc}+${pts}=${ns} → 25点にリセット${sym}`;
  else if(ns===50)pv.textContent=`${td.sc}+${pts}=50点！セット勝利${sym}`;
  else pv.textContent=`${td.sc}+${pts}=${ns}点${sym}`;
}

function bindDrag(){
  [0,1].forEach(ti=>{
    const list=document.getElementById(`order-list-${ti}`);if(!list)return;
    let src=null;
    list.querySelectorAll('.order-item').forEach(item=>{
      item.addEventListener('dragstart',e=>{src=item;item.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
      item.addEventListener('dragend',()=>{item.classList.remove('dragging');list.querySelectorAll('.order-item').forEach(i=>i.classList.remove('over'));src=null;});
      item.addEventListener('dragover',e=>{e.preventDefault();list.querySelectorAll('.order-item').forEach(i=>i.classList.remove('over'));item.classList.add('over');});
      item.addEventListener('dragleave',()=>item.classList.remove('over'));
      item.addEventListener('drop',e=>{
        e.preventDefault();item.classList.remove('over');if(!src||src===item)return;
        const all=Array.from(list.querySelectorAll('.order-item'));
        const from=all.indexOf(src),to=all.indexOf(item);if(from<0||to<0)return;
        const base=S.pOrders[ti].length>0?[...S.pOrders[ti]]:S.teams[ti].members.slice();
        base.splice(to,0,base.splice(from,1)[0]);S.pOrders[ti]=base;src=null;render();
      });
    });
  });
}

function bind(){
  const app=document.getElementById('app');
  app.querySelectorAll('input[name="fmt"]').forEach(el=>{el.addEventListener('change',e=>{S.fmt=e.target.value;render();});});
  app.querySelectorAll('input[name="tl"]').forEach(el=>{el.addEventListener('change',e=>{S.turnLimit=e.target.value==='12';render();});});
  // 投擲人数 min/max ボタン
  const bpmn_=document.getElementById('btn-pm-min-');if(bpmn_)bpmn_.onclick=()=>{if(S.playerMin>1)S.playerMin--;render();};
  const bpmn_p=document.getElementById('btn-pm-min+');if(bpmn_p)bpmn_p.onclick=()=>{if(S.playerMin<S.playerMax&&S.playerMin<12)S.playerMin++;render();};
  const bpmx_=document.getElementById('btn-pm-max-');if(bpmx_)bpmx_.onclick=()=>{if(S.playerMax>S.playerMin&&S.playerMax>1)S.playerMax--;render();};
  const bpmx_p=document.getElementById('btn-pm-max+');if(bpmx_p)bpmx_p.onclick=()=>{if(S.playerMax<99)S.playerMax++;render();};
  // 外す / 参加ボタン
  app.querySelectorAll('.excl-toggle').forEach(btn=>{btn.addEventListener('click',()=>{
    const ti=parseInt(btn.dataset.team),m=btn.dataset.member;
    if(!S.pExclude[ti])S.pExclude[ti]=[];
    if(S.pExclude[ti].includes(m)){
      // 参加に戻す：元の位置（先頭から）に挿入
      S.pExclude[ti]=S.pExclude[ti].filter(x=>x!==m);
      // 投げ順リストで excluded でない人の末尾（=excludedの先頭）の位置に挿入
      const ord=S.pOrders[ti].length>0?S.pOrders[ti]:S.teams[ti].members.slice();
      const excl=S.pExclude[ti];
      const firstExclIdx=ord.findIndex(x=>excl.includes(x));
      const insertAt=firstExclIdx>=0?firstExclIdx:ord.length;
      if(!ord.includes(m)){ord.splice(insertAt,0,m);}
      else{
        // 現在の位置から一番下のactive位置へ
        const curIdx=ord.indexOf(m);
        ord.splice(curIdx,1);
        const newInsert=ord.findIndex(x=>excl.includes(x));
        ord.splice(newInsert>=0?newInsert:ord.length,0,m);
      }
      S.pOrders[ti]=ord;
    } else {
      // 外す：リスト内で一番下に移動
      const ord=S.pOrders[ti].length>0?[...S.pOrders[ti]]:S.teams[ti].members.slice();
      const idx=ord.indexOf(m);
      if(idx>=0){ord.splice(idx,1);ord.push(m);}
      S.pOrders[ti]=ord;
      S.pExclude[ti].push(m);
    }
    render();
  });});
  app.querySelectorAll('.move-up').forEach(btn=>{btn.addEventListener('click',()=>{
    const ti=parseInt(btn.dataset.team),idx=parseInt(btn.dataset.idx);
    const base=S.pOrders[ti].length>0?[...S.pOrders[ti]]:S.teams[ti].members.slice();
    if(idx<=0)return;[base[idx-1],base[idx]]=[base[idx],base[idx-1]];S.pOrders[ti]=base;render();
  });});
  app.querySelectorAll('.move-dn').forEach(btn=>{btn.addEventListener('click',()=>{
    const ti=parseInt(btn.dataset.team),idx=parseInt(btn.dataset.idx);
    const base=S.pOrders[ti].length>0?[...S.pOrders[ti]]:S.teams[ti].members.slice();
    if(idx>=base.length-1)return;[base[idx+1],base[idx]]=[base[idx],base[idx+1]];S.pOrders[ti]=base;render();
  });});
  const bn=document.getElementById('btn-next');
  if(bn)bn.onclick=()=>{
    [0,1].forEach(i=>{const n=document.getElementById(`tn${i}`),m=document.getElementById(`tm${i}`);if(n)S.teams[i].name=n.value||`チーム${i+1}`;if(m)S.teams[i].members=m.value.split(/[,、]/).map(s=>s.trim()).filter(Boolean);});
    S.pFirst=S.fid;S.pIdx=0;const _gn=gIO(0,S.fid);S.pOrders=_gn.orders;S.pExclude=_gn.excludes;S.phase='firstChoice';render();
  };
  const bbs=document.getElementById('btn-bk-setup');if(bbs)bbs.onclick=()=>{S.phase='setup';render();};
  const bbfso=document.getElementById('btn-bk-first-to-setover');if(bbfso)bbfso.onclick=()=>{S.phase='setOver';render();};
  const bbf=document.getElementById('btn-bk-first');if(bbf)bbf.onclick=()=>{S.phase='firstChoice';render();};
  app.querySelectorAll('.fc-btn').forEach(el=>{el.addEventListener('click',()=>{S.pFirst=parseInt(el.dataset.id);const _g=gIO(S.pIdx!=null?S.pIdx:S.sets.length,S.pFirst);S.pOrders=_g.orders;S.pExclude=_g.excludes;render();});});
  const bgo=document.getElementById('btn-go-order');if(bgo)bgo.onclick=()=>{S.phase='orderSetup';render();};
  const bbots=document.getElementById('btn-bk-order-to-setover');if(bbots)bbots.onclick=()=>{S.phase='setOver';render();};
  const bst=document.getElementById('btn-start');
  if(bst)bst.onclick=()=>{
    // 最大人数チェック
    const overMax=[0,1].filter(ti=>{
      const ord=S.pOrders[ti].length>0?S.pOrders[ti]:S.teams[ti].members;
      const excl=S.pExclude[ti]||[];
      const active=ord.filter(m=>!excl.includes(m)).length;
      return S.teams[ti].members.length>0&&S.playerMax<99&&active>S.playerMax;
    });
    if(overMax.length>0){
      const names=overMax.map(ti=>S.teams[ti].name).join('・');
      alert(names+'の参加人数が最大人数（'+S.playerMax+'人）を超えています。\n「外す」ボタンで人数を調整してください。');
      return;
    }
    const fid=S.pFirst!=null?S.pFirst:S.fid;if(S.sets.length===0)S.fid=fid;
    const si=S.pIdx!=null?S.pIdx:S.sets.length;
    S.sets.push(mkSet(si,fid,[...S.pOrders],[...S.pExclude.map(a=>[...a])]));
    S.cur=si;S.pFirst=null;S.pIdx=null;S.pOrders=[[],[]];S.pExclude=[[],[]];S.showHist=false;S.iP='';S.iM='single';S.iA='cross';S.endPending=false;S.tieExtend=false;S.tlTieExtend=false;S.lastThrowSec=null;startTimer();S.phase='game';render();
  };
  const bee=document.getElementById('btn-early-end');
  if(bee)bee.onclick=()=>{const cset=cs();if(isTurnEnd(cset)){processEarlyEnd();}else{S.endPending=true;render();}};
  const br=document.getElementById('btn-reset');if(br)br.onclick=doReset;
  const bu=document.getElementById('btn-undo');if(bu)bu.onclick=()=>{const cset=cs();if(!cset.hist.length)return;const p=cset.hist.pop();cset.teams=p.teams;cset.ctid=p.ctid;cset.wid=p.wid;S.iP='';S.iM='single';S.iA='cross';S.endPending=false;S.tieExtend=false;S.tlTieExtend=false;render();};
  const bbo=document.getElementById('btn-bk-order');if(bbo)bbo.onclick=()=>{S.sets.pop();S.pIdx=S.sets.length;S.pFirst=nfc(S.pIdx)?S.fid:aF(S.pIdx);const _gb=gIO(S.pIdx,S.pFirst);S.pOrders=_gb.orders;S.pExclude=_gb.excludes;S.phase=nfc(S.pIdx)?'firstChoice':'orderSetup';render();};
  const bue=document.getElementById('btn-undo-end');if(bue)bue.onclick=()=>{const cset=cs();if(!cset.hist.length)return;const p=cset.hist.pop();cset.teams=p.teams;cset.ctid=p.ctid;cset.wid=null;S.iP='';S.iM='single';S.iA='cross';S.tlTieExtend=false;S.phase='game';render();};
  const bue2=document.getElementById('btn-undo-early');if(bue2)bue2.onclick=()=>{const cset=cs();if(!cset.hist.length)return;const p=cset.hist.pop();cset.teams=p.teams;cset.ctid=p.ctid;cset.wid=null;if(cset.draw!==undefined)cset.draw=false;S.iP='';S.iM='single';S.iA='cross';S.endPending=false;S.tieExtend=false;S.tlTieExtend=false;S.phase='game';render();};
  const bbksm=document.getElementById('btn-bk-to-setover-match');if(bbksm)bbksm.onclick=()=>{S.phase='setOver';render();};
  const bbkse=document.getElementById('btn-bk-to-setover-early');if(bbkse)bbkse.onclick=()=>{S.phase='setOver';render();};
  const bum=document.getElementById('btn-undo-match');if(bum)bum.onclick=()=>{const cset=cs();if(!cset.hist.length)return;const p=cset.hist.pop();cset.teams=p.teams;cset.ctid=p.ctid;cset.wid=null;S.iP='';S.iM='single';S.iA='cross';S.phase='game';render();};
  const bh=document.getElementById('btn-hist');if(bh)bh.onclick=()=>{S.showHist=!S.showHist;render();};
  const bss=document.getElementById('btn-scoresheet');if(bss)bss.onclick=()=>{S.ssIdx=S.cur;S.prev='game';S.afterEdit=null;S.phase='scoresheet';render();};
  const bssE=document.getElementById('btn-ss-setover-edit');if(bssE)bssE.onclick=()=>{S.ssIdx=S.cur;S.afterEdit='setOver';S.phase='scoresheet';render();};
  const bssM=document.getElementById('btn-ss-match-edit');if(bssM)bssM.onclick=()=>{S.ssIdx=S.sets.length-1;S.afterEdit='matchOver';S.phase='scoresheet';render();};
  const bssEa=document.getElementById('btn-ss-early-edit');if(bssEa)bssEa.onclick=()=>{S.ssIdx=S.sets.length-1;S.afterEdit='earlyMatchOver';S.phase='scoresheet';render();};
  const bbg=document.getElementById('btn-back-ss');if(bbg)bbg.onclick=()=>{S.phase=S.afterEdit||S.prev||'game';S.afterEdit=null;render();};
  const bed=document.getElementById('btn-edit-done');if(bed)bed.onclick=()=>{S.phase=S.afterEdit||'game';S.afterEdit=null;render();};
  const bsp=document.getElementById('btn-ss-prev');if(bsp)bsp.onclick=()=>{if(S.ssIdx>0){S.ssIdx--;render();}};
  const bsn=document.getElementById('btn-ss-next');if(bsn)bsn.onclick=()=>{if(S.ssIdx<S.sets.length-1){S.ssIdx++;render();}};
  // unknownCheck ページング
  const bucP=document.getElementById('btn-uc-prev');if(bucP)bucP.onclick=()=>{if(S.ssIdx>0){S.ssIdx--;render();}};
  const bucN=document.getElementById('btn-uc-next');if(bucN)bucN.onclick=()=>{S.ssIdx++;render();};
  const bucD=document.getElementById('btn-uc-done');
  if(bucD&&!bucD.disabled)bucD.onclick=()=>{
    const prevPhase=S._ucFrom||'matchOver';
    S._ucFrom=null;
    S.phase=prevPhase;render();
  };
  app.querySelectorAll('.edit-th-btn').forEach(el=>{el.addEventListener('click',()=>{S.editSetIdx=parseInt(el.dataset.setidx);S.editTi=parseInt(el.dataset.ti);S.editThIdx=parseInt(el.dataset.idx);S.phase='editThrow';render();});});
  const bbe=document.getElementById('btn-bk-edit');if(bbe)bbe.onclick=()=>{S.phase=S._ucFrom?'unknownCheck':'scoresheet';render();};
  const ep=document.getElementById('edit-pts');
  if(ep){ep.addEventListener('change',()=>{const isMiss=ep.value==='miss';const mr=document.getElementById('edit-multi-row'),ar=document.getElementById('edit-aimed-row');if(mr)mr.style.display=isMiss?'none':'';if(ar)ar.style.display=isMiss?'none':'';const ea2=document.getElementById('edit-aimed');if(ea2&&isMiss)ea2.value='cross';});}
  const bse=document.getElementById('btn-save-edit');
  if(bse)bse.onclick=()=>{
    const _ep=document.getElementById('edit-pts');if(!_ep)return;
    const cset=S.sets[S.editSetIdx];const ti=S.editTi,thIdx=S.editThIdx;const th=cset.teams[ti].throws[thIdx];
    const isMiss=_ep.value==='miss';th.miss=isMiss;
    if(isMiss){th.pts=0;th.raw=0;th.result='cross';th.multi=false;}
    else{const pts=parseInt(_ep.value);th.pts=pts;th.raw=pts;const eaval=document.getElementById('edit-aimed');th.result=eaval?eaval.value:'circle';const emval=document.getElementById('edit-multi');th.multi=emval?emval.value==='multi':false;th.over=false;}
    recompute(cset);
    S.editSetIdx=null;S.editTi=null;S.editThIdx=null;
    if(S._ucFrom){
      // unknownCheck経由：残り0なら直接結果画面へ
      if(unknownSets().length===0){
        const ph=S._ucFrom;S._ucFrom=null;
        S.phase=ph;render();
      } else {
        S.phase='unknownCheck';render();
      }
    } else {
      S.phase='scoresheet';render();
    }
  };
  const ps=document.getElementById('sel-pts'),ms=document.getElementById('sel-multi'),as=document.getElementById('sel-aimed');
  if(ps){ps.addEventListener('change',()=>{S.iP=ps.value;if(ps.value==='miss')S.iA='cross';else S.iA='circle';render();});}
  if(ms)ms.addEventListener('change',()=>{S.iM=ms.value;render();});
  if(as)as.addEventListener('change',()=>{S.iA=as.value;render();});
  updPrev();
  const bc=document.getElementById('btn-confirm');
  if(bc)bc.onclick=()=>{
    if(!S.iP){alert('得点を選択してください');return;}
    S.lastThrowSec=stopTimer();
    const cset=cs(),ct=cset.ctid,td=cset.teams[ct];
    cset.hist.push({teams:JSON.parse(JSON.stringify(cset.teams)),ctid:cset.ctid,wid:cset.wid});
    const isMiss=S.iP==='miss';let pts=0,raw=0,over=false;
    const multi=S.iM==='multi',result=isMiss?'cross':S.iA;
    if(!isMiss){pts=parseInt(S.iP);raw=pts;const ns=td.sc+pts;if(ns>MAX){over=true;td.sc=RST;}else td.sc=ns;}
    const mn=gmb(td,ct);td.mi++;
    td.throws.push({miss:isMiss,pts,raw,over,multi,result,member:mn,cumul:td.sc});
    if(isMiss)td.ms++;else td.ms=0;if(td.ms>=MM)td.el=true;
    S.iP='';S.iM='single';S.iA='cross';
    const active=cset.teams.filter(t=>!t.el);
    if(!over&&!isMiss&&td.sc===MAX){cset.wid=ct;S.endPending=false;S.tieExtend=false;S.tlTieExtend=false;S.phase='setOver';render();return;}
    if(active.length===1){active[0].sc=MAX;cset.wid=active[0].id;cset.teams.forEach(t=>{if(t.el)t.sc=0;});S.endPending=false;S.tieExtend=false;S.tlTieExtend=false;S.phase='setOver';render();return;}
    if(active.length===0){cset.wid=null;S.endPending=false;S.tieExtend=false;S.tlTieExtend=false;S.phase='setOver';render();return;}
    let next=1-ct;if(cset.teams[next].el)next=ct;cset.ctid=next;
    startTimer();
    const justFinishedTurn=isTurnEnd(cset);
    if(justFinishedTurn){
      const sc0=cset.teams[0].sc,sc1=cset.teams[1].sc;
      const fti=cset.ftid;
      const doneT=cset.teams[fti].throws.length;
      if(S.turnLimit&&doneT>=TURN_LIMIT){
        if(!S.tlTieExtend){
          if(S.fmt!=='round2'&&sc0===sc1){S.tlTieExtend=true;render();return;}
          processTurnLimitSetEnd();return;
        } else {
          if(sc0!==sc1){processTurnLimitSetEnd();return;}
          render();return;
        }
      }
      if(S.endPending){
        if(S.fmt!=='round2'&&sc0===sc1){S.endPending=false;S.tieExtend=true;render();return;}
        processEarlyEnd();return;
      }
      if(S.tieExtend){if(sc0!==sc1){processEarlyEnd();return;}}
    }
    render();
  };
  const bns=document.getElementById('btn-next-set');
  if(bns)bns.onclick=()=>{S.tlTieExtend=false;goNext(parseInt(bns.dataset.next));};
  const bmo=document.getElementById('btn-match-over');if(bmo)bmo.onclick=()=>{
    if(unknownSets().length>0){S.ssIdx=0;S.afterEdit=null;S._ucFrom='matchOver';S.phase='unknownCheck';render();return;}
    S.phase='matchOver';render();
  };
  app.querySelectorAll('.molkout-btn').forEach(el=>{el.addEventListener('click',()=>{S.molkoutWinner=parseInt(el.dataset.id);render();});});
  const bgm=document.getElementById('btn-go-molkout');if(bgm)bgm.onclick=()=>{S.molkoutWinner=null;S.phase='molkout';render();};
  const bmc=document.getElementById('btn-molkout-confirm');if(bmc)bmc.onclick=()=>{if(S.molkoutWinner==null)return;S.phase='earlyMatchOver';render();};
}
render();
</script>
