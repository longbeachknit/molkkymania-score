<body>
<div class="app" id="app"></div>
<script>
const C=['#1D9E75','#E24B4A'];
const LB=['#E1F5EE','#FCEBEB'];
const LBR=['#9FE1CB','#F7C1C1'];
const LT=['#085041','#A32D2D'];
const MAX=50,RST=25,MM=3,TURN_LIMIT=12;

let S={
  phase:'setup',fmt:'best2',turnLimit:false,
  playerMin:2,playerMax:4,
  teams:[{id:0,name:'チームA',members:[]},{id:1,name:'チームB',members:[]}],
  matchIdData:null, // 試合ID読み込み後の確認データ
  sets:[],cur:0,fid:0,showHist:false,
  pFirst:null,pIdx:null,pOrders:[[],[]],
  pExclude:[[],[]],
  iP:'',iM:'single',iA:'cross',
  prev:null,ssIdx:0,
  endPending:false,tieExtend:false,tlTieExtend:false,earlyEnd:false,
  molkoutWinner:null,
  editSetIdx:null,editTi:null,editThIdx:null,afterEdit:null,_ucFrom:null,
  throwStartTime:null,lastThrowSec:null
};
function fmtSec(sec){if(sec===null||sec===undefined)return'--';const m=Math.floor(sec/60),s=sec%60;return m>0?m+'分'+s+'秒':s+'秒';}
let _timerInterval=null;
function startTimer(){
  S.throwStartTime=Date.now();
  if(_timerInterval)clearInterval(_timerInterval);
  _timerInterval=setInterval(()=>{
    const el=document.getElementById('throw-timer-display');
    if(!el){clearInterval(_timerInterval);_timerInterval=null;return;}
    const sec=Math.round((Date.now()-S.throwStartTime)/1000);
    const m=Math.floor(sec/60),s=sec%60;
    el.textContent='⏱ '+(m>0?m+'分'+s+'秒':s+'秒');
  },1000);
}
function stopTimer(){
  if(_timerInterval){clearInterval(_timerInterval);_timerInterval=null;}
  if(!S.throwStartTime)return null;
  const sec=Math.round((Date.now()-S.throwStartTime)/1000);
  S.throwStartTime=null;
  return sec;
}

const fl=()=>S.fmt==='best2'?'2先':S.fmt==='best3'?'3先':'表裏';
const nfc=(i)=>(S.fmt==='best2')?(i===0||i===2):(S.fmt==='best3')?(i===0||i===4):i===0;
// ===== 戻るボタン用グローバル関数 =====
function goBackFromFirst(){
  var si=S.pIdx!=null?S.pIdx:S.sets.length;
  S.pIdx=null;S.pFirst=null;S.pOrders=[[],[]];S.pExclude=[[],[]];
  if(si===0){
    // matchConfirmに戻る：退避していたデータを復元
    if(S._savedMatchIdData)S.matchIdData=JSON.parse(JSON.stringify(S._savedMatchIdData));
    S.phase='matchConfirm';
  } else {
    S.phase='setOver';
  }
  render();
}
function goBackFromOrder(){
  var si=S.pIdx!=null?S.pIdx:S.sets.length;
  var fb=S._orderFromBack;
  var hasNfc=(S.fmt==='best2')?(si===0||si===2):(S.fmt==='best3')?(si===0||si===4):(si===0);
  S.pIdx=null;S.pFirst=null;S.pOrders=[[],[]];S.pExclude=[[],[]];S._orderFromBack=false;
  if(fb){
    // game戻りの場合は常にsetOver
    S.phase='setOver';
  } else if(hasNfc){
    // 先攻選択が必要なセット → firstChoiceへ（pIdxを復元）
    S.pIdx=si;
    S.pFirst=S.fid;
    var _g=gIO(si,S.fid);S.pOrders=_g.orders;S.pExclude=_g.excludes;
    S.phase='firstChoice';
  } else if(si===0){
    // 第1セット・自動入れ替えの場合 → matchConfirmへ
    if(S._savedMatchIdData)S.matchIdData=JSON.parse(JSON.stringify(S._savedMatchIdData));
    S.phase='matchConfirm';
  } else {
    S.phase='setOver';
  }
  render();
}


const isFin=(i)=>(S.fmt==='best2'&&i===2)||(S.fmt==='best3'&&i===4);
function aF(ni){
  const f=S.fid;
  if(S.fmt==='best2')return ni===1?1-f:f;
  if(S.fmt==='best3'){
    if(ni===2){const w=[0,0];S.sets.slice(0,2).forEach(s=>{if(s.wid!=null)w[s.wid]++;});if(w[0]===2)return 1;if(w[1]===2)return 0;return 1-S.sets[1].ftid;}
    if(ni===3)return 1-S.sets[2].ftid;
    return 1-f;
  }
  return 1-f;
}
function gIO(ni,fid){
  const o=[[],[]];
  const excls=[[],[]];
  [0,1].forEach(ti=>{
    const isF=ti===fid;let fd=null,fdExcl=[];
    // 同じ先/後攻ロールの直前セットのorderとexcludedを引き継ぐ
    for(let i=S.sets.length-1;i>=0;i--){
      const s=S.sets[i];
      if((s.ftid===ti)===isF){const x=s.teams[ti].order;if(x&&x.length){fd=x;fdExcl=s.teams[ti].excluded||[];break;}}
    }
    if(!fd&&S.sets.length>0){
      const pv=S.sets[S.sets.length-1];const x=pv.teams[ti].order;
      if(x&&x.length){fd=x;fdExcl=pv.teams[ti].excluded||[];}
    }
    if(!fd)fd=S.teams[ti].members.slice();
    // orderに含まれていないexcludedメンバーを末尾に追加（全員含める）
    const base=[...fd];
    fdExcl.forEach(m=>{if(!base.includes(m))base.push(m);});
    // チームメンバー全員をリストに含める
    S.teams[ti].members.forEach(m=>{if(!base.includes(m))base.push(m);});
    o[ti]=base;
    excls[ti]=[...fdExcl];
  });
  return{orders:o,excludes:excls};
}
const gT=()=>{const t=[0,0];S.sets.forEach(s=>{t[0]+=s.teams[0].sc;t[1]+=s.teams[1].sc;});return t;}
const mxS=()=>S.fmt==='best2'?3:S.fmt==='best3'?5:2;
const nW=()=>S.fmt==='best2'?2:S.fmt==='best3'?3:99;
function mW(){if(S.fmt==='round2')return null;const w=[0,0];S.sets.forEach(s=>{if(s.wid!=null)w[s.wid]++;});const n=nW();return w[0]>=n?0:w[1]>=n?1:null;}
function mkSet(idx,fid,ord,excl){
  return{idx,ftid:fid,ctid:fid,teams:[
    {id:0,sc:0,ms:0,el:false,throws:[],mi:0,order:ord[0]||[],excluded:excl&&excl[0]?[...excl[0]]:[]},
    {id:1,sc:0,ms:0,el:false,throws:[],mi:0,order:ord[1]||[],excluded:excl&&excl[1]?[...excl[1]]:[]}
  ],wid:null,hist:[]};
}
const cs=()=>S.sets[S.cur];
function isTurnEnd(cset){const t0=cset.teams[0].throws.length,t1=cset.teams[1].throws.length;return t0===t1&&t0>0;}
function gmb(td,ti){
  // pExclude を除いたリストでローテーション
  const full=td.order.length>0?td.order:S.teams[ti].members;
  const excl=td.excluded||[];
  const active=full.filter(m=>!excl.includes(m));
  if(!active.length)return full.length?full[td.mi%full.length]:null;
  return active[td.mi%active.length];
}
function dots(n){return[0,1,2].map(i=>`<span style="display:inline-block;width:11px;height:11px;border-radius:50%;background:${i<n?'#E24B4A':'#e5e7eb'};border:1px solid ${i<n?'#E24B4A':'#d1d5db'};"></span>`).join('');}
function svgC(t,s=22){return`<svg width="${s}" height="${s}" viewBox="0 0 22 22" style="vertical-align:middle;"><circle cx="11" cy="11" r="10" fill="none" stroke="#111" stroke-width="1.5"/><text x="11" y="15.5" text-anchor="middle" font-size="11" font-family="-apple-system,sans-serif" fill="#111">${t}</text></svg>`;}
function svgS(t,s=22){return`<svg width="${s+6}" height="${s}" viewBox="0 0 28 22" style="vertical-align:middle;"><rect x="1" y="1" width="26" height="20" rx="3" fill="none" stroke="#111" stroke-width="1.5"/><text x="14" y="15.5" text-anchor="middle" font-size="11" font-family="-apple-system,sans-serif" fill="#111">${t}</text></svg>`;}

function recompute(cset){
  [0,1].forEach(ti=>{
    const td=cset.teams[ti];let sc=0,ms=0,el=false;
    td.throws.forEach(th=>{
      if(th.miss){ms++;if(ms>=MM)el=true;th.cumul=sc;}
      else{ms=0;const ns=sc+th.pts;if(ns>MAX){sc=RST;th.over=true;}else{sc=ns;th.over=false;}th.cumul=sc;}
    });
    td.sc=sc;td.ms=ms;td.el=el;
  });
  const e0=cset.teams[0].el,e1=cset.teams[1].el;
  // 失格チームは0点。勝者チーム（失格なし）は50点に設定
  if(e0&&!e1){cset.teams[0].sc=0;cset.teams[1].sc=MAX;cset.wid=1;}
  else if(e1&&!e0){cset.teams[1].sc=0;cset.teams[0].sc=MAX;cset.wid=0;}
  else if(e0&&e1){cset.teams[0].sc=0;cset.teams[1].sc=0;cset.wid=null;}
  else{
    const s0=cset.teams[0].sc,s1=cset.teams[1].sc;
    if(s0===MAX&&s1!==MAX)cset.wid=0;
    else if(s1===MAX&&s0!==MAX)cset.wid=1;
    // それ以外はwidを変更しない（途中終了等で既にwidがセットされている場合）
  }
}

function processTurnLimitSetEnd(isExtended){
  const cset=cs();
  const e0=cset.teams[0].el,e1=cset.teams[1].el;
  if(e0&&!e1){cset.teams[0].sc=0;cset.teams[1].sc=MAX;cset.wid=1;}
  else if(e1&&!e0){cset.teams[1].sc=0;cset.teams[0].sc=MAX;cset.wid=0;}
  else if(e0&&e1){cset.teams[0].sc=0;cset.teams[1].sc=0;cset.wid=null;}
  else{
    const sc0=cset.teams[0].sc,sc1=cset.teams[1].sc;
    if(S.fmt==='round2'){cset.wid=sc0>sc1?0:sc1>sc0?1:null;cset.draw=(sc0===sc1);}
    else{cset.wid=sc0>sc1?0:sc1>sc0?1:null;}
  }
  cset.endType=isExtended?'tlExtend':'tl'; // 呼び出し元から明示的に渡す
  S.tlTieExtend=false;S.phase='setOver';render();
}

function processEarlyEnd(){
  const cset=cs();
  const e0=cset.teams[0].el,e1=cset.teams[1].el;
  if(e0&&!e1){cset.teams[0].sc=0;cset.teams[1].sc=MAX;cset.wid=1;}
  else if(e1&&!e0){cset.teams[1].sc=0;cset.teams[0].sc=MAX;cset.wid=0;}
  else if(e0&&e1){cset.teams[0].sc=0;cset.teams[1].sc=0;cset.wid=null;}
  else{
    const sc0=cset.teams[0].sc,sc1=cset.teams[1].sc;
    if(S.fmt==='round2'){
      // 表裏：同点は引き分けでセット終了
      cset.wid=sc0>sc1?0:sc1>sc0?1:null;cset.draw=(sc0===sc1);
    } else {
      // 2先・3先：同点ならもう1ターン延長
      if(sc0===sc1){
        S.endPending=false;S.tieExtend=true;render();return;
      }
      cset.wid=sc0>sc1?0:sc1>sc0?1:null;
    }
  }
  cset.endType='early'; // 強制終了
  S.endPending=false;S.tieExtend=false;
  S.earlyEnd=true;
  S.phase='setOver';render();
}

function round2Stats(){
  const completedSets=[...S.sets];
  const phantom=[];
  for(let i=completedSets.length;i<2;i++)phantom.push({teams:[{sc:0},{sc:0}],wid:null,draw:true,phantom:true});
  const allSets=[...completedSets,...phantom];
  const wins=[0,0];
  allSets.forEach(s=>{if(s.wid!=null&&!s.draw)wins[s.wid]++;});
  const draws=allSets.filter(s=>s.draw||s.wid==null).length;
  const totals=[0,0];
  allSets.forEach(s=>{totals[0]+=s.teams[0].sc;totals[1]+=s.teams[1].sc;});
  return{allSets,wins,draws,totals};
}

function histTbl(upTo){
  const rows=S.sets.slice(0,upTo).map((ss,i)=>{
    const wn=ss.draw?'引き分け':ss.wid!=null?S.teams[ss.wid].name:'−';
    const lb=S.fmt==='round2'?`${i+1}セット`:`第${i+1}セット`;
    return`<tr style="border-top:1px solid #e5e7eb;">
      <td style="padding:5px 8px;font-size:13px;color:#6b7280;">${lb}</td>
      <td style="padding:5px 8px;font-size:13px;text-align:center;font-weight:${ss.wid===0?600:400};">${ss.teams[0].sc}</td>
      <td style="padding:5px 8px;font-size:13px;text-align:center;font-weight:${ss.wid===1?600:400};">${ss.teams[1].sc}</td>
      <td style="padding:5px 8px;font-size:13px;text-align:center;">${wn}</td>
    </tr>`;
  }).join('');
  if(!rows)return'';
  return`<div class="card" style="margin-bottom:12px;">
    <div style="padding:8px 12px;border-bottom:1px solid #e5e7eb;font-size:13px;color:#6b7280;">これまでのセット結果</div>
    <table style="width:100%;border-collapse:collapse;"><thead><tr>
      <th style="padding:5px 8px;font-size:12px;font-weight:400;color:#9ca3af;text-align:left;">セット</th>
      <th style="padding:5px 8px;font-size:12px;font-weight:400;color:#9ca3af;text-align:center;">${S.teams[0].name}</th>
      <th style="padding:5px 8px;font-size:12px;font-weight:400;color:#9ca3af;text-align:center;">${S.teams[1].name}</th>
      <th style="padding:5px 8px;font-size:12px;font-weight:400;color:#9ca3af;text-align:center;">結果</th>
    </tr></thead><tbody>${rows}</tbody></table>
  </div>`;
}



// ===== 管理者パスワード認証 =====
const ADMIN_PW_HASH='75ac6ea6d261b6c9d18aabb35a06758a8867d6f469a487c2a0aec4b6deeedfbb';
async function hashPw(pw){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function checkAdminPw(pw){
  const h=await hashPw(pw);
  return h===ADMIN_PW_HASH;
}




// ===== GitHub Pages からリアルタイム対戦データ取得 =====
const GITHUB_DATA_BASE='https://api.github.com/repos/longbeachknit/molkkymania-deta/contents';
const CACHE_TTL=20000; // 20秒キャッシュ
const _jsonCache={};

async function fetchMatchesJson(eventCode){
  const now=Date.now();
  if(_jsonCache[eventCode]&&(now-_jsonCache[eventCode].ts)<CACHE_TTL){
    return _jsonCache[eventCode].data;
  }
  try{
    const url=GITHUB_DATA_BASE+'/'+eventCode+'.json';
    const res=await fetch(url,{cache:'no-store',headers:{'Accept':'application/vnd.github.v3+json'}});
    if(!res.ok)throw new Error('HTTP '+res.status);
    const apiData=await res.json();
    const b64=apiData.content.replace(/\s/g,'');
    const binary=atob(b64);
    const bytes=new Uint8Array(binary.length);
    for(let i=0;i<binary.length;i++)bytes[i]=binary.charCodeAt(i);
    const data=JSON.parse(new TextDecoder('utf-8').decode(bytes));
    _jsonCache[eventCode]={ts:now,data};
    return data;
  }catch(e){
    console.warn('GitHub JSON取得失敗:',e.message);
    return null;
  }
}


async function fetchSettingsJson(eventCode){
  const now=Date.now();
  const cacheKey='settings_'+eventCode;
  if(_jsonCache[cacheKey]&&(now-_jsonCache[cacheKey].ts)<CACHE_TTL){
    return _jsonCache[cacheKey].data;
  }
  try{
    const url=GITHUB_DATA_BASE+'/'+eventCode+'_settings.json';
    const res=await fetch(url,{cache:'no-store',headers:{'Accept':'application/vnd.github.v3+json'}});
    if(!res.ok)throw new Error('HTTP '+res.status);
    const apiData=await res.json();
    const b64=apiData.content.replace(/\s/g,'');
    const binary=atob(b64);
    const bytes=new Uint8Array(binary.length);
    for(let i=0;i<binary.length;i++)bytes[i]=binary.charCodeAt(i);
    const data=JSON.parse(new TextDecoder('utf-8').decode(bytes));
    _jsonCache[cacheKey]={ts:now,data};
    return data;
  }catch(e){
    console.warn('settings.json取得失敗:',e.message);
    return null;
  }
}


async function syncSettingsFromGitHub(eventCode){
  const data=await fetchSettingsJson(eventCode);
  if(!data)return false;
  // 大会設定を上書き（対象大会のみ）
  const tour=AD.tournaments&&AD.tournaments.find(t=>t.eventCode===eventCode);
  if(tour){
    if(data.eventName!==undefined)tour.eventName=data.eventName;
    if(data.priority!==undefined)tour.priority=data.priority;
    if(data.matchRules!==undefined)tour.matchRules=data.matchRules;
    if(data.tourneyRules!==undefined)tour.tourneyRules=data.tourneyRules;
    if(data.roundRules!==undefined)tour.roundRules=data.roundRules;
    if(data.teams!==undefined)tour.teams=data.teams;
    saveActiveTour(tour);
  } else {
    // 大会が存在しない場合は新規作成してアクティブにセット
    const venueCode=data.venueCode||'';
    const newTour=makeTournament({
      venueCode,eventCode,
      eventName:data.eventName||'',
      gasUrl:data.gasUrl||'',
      priority:data.priority||'tournament',
      matchRules:data.matchRules||[],
      tourneyRules:data.tourneyRules||[],
      roundRules:data.roundRules||[],
      teams:data.teams||[],
      matches:[]
    });
    if(!AD.tournaments)AD.tournaments=[];
    AD.tournaments.push(newTour);
    AD.activeTourId=newTour.id;
    saveAdmin(AD);
  }
  return true;
}

// 設定→対戦カードの順で取得（設定で大会を先に作成してからmatchesを反映）
async function syncAllFromGitHub(eventCode){
  // 1) 先に設定を取得して大会を作成/更新
  await syncSettingsFromGitHub(eventCode);
  // 2) 大会が存在する状態でmatchesを取得
  await syncMatchesFromGitHub(eventCode);
}

async function syncMatchesFromGitHub(eventCode){
  const data=await fetchMatchesJson(eventCode);
  const tour=AD.tournaments&&AD.tournaments.find(t=>t.eventCode===eventCode);
  if(!tour)return false;
  // 取得成功時のみ上書き、失敗時は古いデータもクリア
  if(data&&data.matches){
    // 新しいデータが取得できた時のみ上書き（失敗時は古いデータを保持）
    tour.matches=data.matches;
  }
  saveActiveTour(tour);
  return !!(data&&data.matches);
}

// ===== 組み合わせID取得（GASから） =====
function parseCombinedId(id){
  // 例: 01_0602_02_002_01_073005
  // 構造: 場所_大会_試合区分_コート_トーナメント_チームAB
  const parts=id.trim().split('_');
  if(parts.length<6)return null;
  const last=parts[5]; // 6桁: 073005
  if(last.length<6)return null;
  const teamA=last.slice(0,3);  // 073
  const teamB=last.slice(3,6);  // 005
  return{
    matchId:parts.slice(0,4).join('_'), // 試合ID（4パーツ: 場所_大会_試合区分_コート）
    matchCode:parts[2],   // 試合区分ID
    tourneyCode:parts[4], // トーナメントID（5番目）
    courtCode:parts[3],   // コートID（4番目）
    teamA,teamB,
    combinedId:id.trim()
  };
}

// ===== CSV インポート =====
function parseCSV(text){
  if(text.charCodeAt(0)===0xFEFF)text=text.slice(1);
  return text.split(/\r?\n/).map(row=>{
    const cells=[];let cur='',inQ=false;
    for(let i=0;i<row.length;i++){
      const c=row[i];
      if(c==='"'){if(inQ&&row[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
      else if(c===','&&!inQ){cells.push(cur.trim());cur='';}
      else cur+=c;
    }
    cells.push(cur.trim());
    return cells;
  }).filter(r=>r.some(c=>c!==''));
}

function importTeamsCSV(text){
  const rows=parseCSV(text);
  const teams=[];
  for(const row of rows){
    const id=(row[0]||'').trim();
    const name=(row[1]||'').trim();
    if(!id||!name)continue;
    const members=row.slice(2).map(s=>s.trim()).filter(s=>s!=='');
    teams.push({id,name,members:members.join(',')});
  }
  return teams;
}

function triggerTeamsCSV(){
  const inp=document.createElement('input');
  inp.type='file';inp.accept='.csv,text/csv';
  inp.onchange=async(e)=>{
    const file=e.target.files[0];if(!file)return;
    const text=await file.text();
    const imported=importTeamsCSV(text);
    if(!imported.length){
      alert('チームデータが見つかりませんでした。\nA列:チームNo、B列:チーム名、C〜G列:メンバー の形式か確認してください。');
      return;
    }
    const mode=confirm(imported.length+'件のチームを読み込みました。\n\nOK → 既存データを上書き\nキャンセル → 既存データに追加');
    const targetTour2=S._editingTourId?AD.tournaments.find(t=>t.id===S._editingTourId):activeTour();
    if(targetTour2){
      if(mode)targetTour2.teams=imported;else targetTour2.teams=[...(targetTour2.teams||[]),...imported];
      saveActiveTour(targetTour2);
    }
    render();
    alert('✅ '+imported.length+'チームをインポートしました。');
  };
  inp.click();
}

// 試合IDから設定を解決
function resolveMatchId(id){
  // 試合ID: 場所_大会_試合区分_コート（4パーツ）
  const parts=id.trim().split('_');
  if(parts.length<4)return null;
  const venueCode=parts[0];
  const eventCode=parts[1];
  const matchCode=parts[2];  // 試合区分ID
  const courtCode=parts[3];  // コートID

  // 場所+大会コードで大会を特定してアクティブにセット
  let tour=AD.tournaments&&AD.tournaments.find(t=>t.venueCode===venueCode&&t.eventCode===eventCode);
  if(!tour)tour=activeTour();
  if(tour){AD.activeTourId=tour.id;saveAdmin(AD);}

  const src=tour||{matches:[],teams:[],matchRules:[],tourneyRules:[],roundRules:[],priority:'tournament'};

  // 試合ID（4パーツ）で対戦カード検索
  const matchIdKey=parts.slice(0,4).join('_');
  const mc=src.matches.find(m=>m.matchId===matchIdKey);

  // トーナメントIDはmatchesから取得（組み合わせIDに含まれる）
  const tourneyCode=mc?mc.tourneyCode:'';

  // 試合形式解決（試合区分 × トーナメント種類）
  let rule=null;
  if(src.priority==='tournament'){
    rule=(src.tourneyRules||[]).find(r=>r.code===tourneyCode)||(src.matchRules||[]).find(r=>r.code===matchCode);
  } else {
    rule=(src.matchRules||[]).find(r=>r.code===matchCode)||(src.tourneyRules||[]).find(r=>r.code===tourneyCode);
  }

  const teamA=mc?(src.teams||[]).find(t=>t.id===mc.teamA):null;
  const teamB=mc?(src.teams||[]).find(t=>t.id===mc.teamB):null;
  const roundRule=(src.roundRules||[]).find(r=>r.matchCode===matchCode&&r.tourneyCode===tourneyCode);

  return {
    matchId:matchIdKey,
    venueCode,eventCode,matchCode,tourneyCode,courtCode,
    tour,rule,
    round:roundRule?roundRule.round:'',
    teamA,teamB,
    hasTeams:!!(teamA&&teamB),
    hasRule:!!rule
  };
}

function calcRank(arr,key,desc=true){
  // 配列の各要素にkeyの順位を付与して返す
  const sorted=[...arr].sort((a,b)=>desc?(b[key]-a[key]):(a[key]-b[key]));
  const rankMap={};
  sorted.forEach((item,i)=>{
    if(i>0&&sorted[i][key]===sorted[i-1][key]){
      rankMap[item.teamNo||item.name+'_'+item.eventCode]=rankMap[sorted[i-1].teamNo||sorted[i-1].name+'_'+sorted[i-1].eventCode];
    }else{
      rankMap[item.teamNo||item.name+'_'+item.eventCode]=i+1;
    }
  });
  return rankMap;
}

async function submitResult(){
  // 試合IDとチームNo（試合開始時に保存済み）
  const matchId=S._matchId||'';
  const teamNos=S._teamNos||['',''];
  const tour=activeTour();

  // 勝者判定
  const wins=[0,0];
  S.sets.forEach(s=>{if(s.wid!=null)wins[s.wid]++;});
  let matchWin=mW();
  if(matchWin==null){
    const totals=S.sets.reduce((a,s)=>{a[0]+=s.teams[0].sc;a[1]+=s.teams[1].sc;return a;},[0,0]);
    if(wins[0]>wins[1])matchWin=0;
    else if(wins[1]>wins[0])matchWin=1;
    else if(totals[0]>totals[1])matchWin=0;
    else if(totals[1]>totals[0])matchWin=1;
    else if(S.molkoutWinner!=null)matchWin=S.molkoutWinner;
  }

  // ===== チーム結果データ（2行分）=====
  const teamRows=[0,1].map(ti=>{
    const result=S.fmt==='round2'?'':matchWin===null?'引き分け':matchWin===ti?'勝ち':'負け';
    const totalSets=S.sets.length;
    const lossSets=S.sets.filter(s=>s.wid!=null&&s.wid!==ti).length;
    const drawSets=S.sets.filter(s=>s.wid===null&&s.draw).length;
    // セットごとの点数（最大5セット）
    const setScores=[0,1,2,3,4].map(si=>{
      const s=S.sets[si];
      return s?s.teams[ti].sc:'';
    });
    // 先攻・後攻セット数
    let firstSets=0,secondSets=0,firstWin=0,secondWin=0,firstLoss=0,secondLoss=0;
    S.sets.forEach(s=>{
      const isFirst=s.ftid===ti;
      if(isFirst){firstSets++;if(s.wid===ti)firstWin++;else if(s.wid!==null)firstLoss++;}
      else{secondSets++;if(s.wid===ti)secondWin++;else if(s.wid!==null)secondLoss++;}
    });
    return [
      matchId,          // A: 試合ID
      teamNos[ti],      // B: チームNo
      S.teams[ti].name, // C: チーム名
      result,           // D: 試合結果
      totalSets,        // E: 総セット
      wins[ti],         // F: 勝利セット数
      lossSets,         // G: 敗北セット数
      drawSets,         // H: 引き分けセット数
      setScores[0],     // I: 1セット目点数
      setScores[1],     // J: 2セット目点数
      setScores[2],     // K: 3セット目点数
      setScores[3],     // L: 4セット目点数
      setScores[4],     // M: 5セット目点数
      ...[0,1,2,3,4].map(si=>{
        const s=S.sets[si];
        if(!s)return'';
        // 強制終了は空欄
        if(s.endType==='early')return'';
        // 勝利チームのみ記入
        if(s.wid!==ti)return'';
        // ターン制限終了（点数勝負）
        if(s.endType==='tl')return 12;
        if(s.endType==='tlExtend')return 13;
        // 通常終了：勝利チームのthrowsからcumul===50になったインデックスを探す
        const throws=s.teams[ti].throws;
        const idx=throws.findIndex(th=>th.cumul>=50);
        if(idx<0)return'';
        // ターン数 = Math.ceil((idx+1)/1)（先攻後攻で1ターン）
        // throwsは先攻・後攻交互に進むので、ターン数はfloor(index/1)+1ではなく
        // 相手チームのthrowsと合わせて「何ターン目か」を算出
        const fti=s.ftid;
        const myIdx=idx; // 自チームのthrows内インデックス
        // 自チームがmyIdx番目を投げた時点でのターン数
        const turnNum=myIdx+1; // 1始まり
        return turnNum;
      }), // N〜R: 1〜5セット目上がりターン数
      firstSets,        // S: 先攻セット数
      secondSets,       // T: 後攻セット数
      firstWin,         // U: 先攻セット勝利数
      secondWin,        // V: 後攻セット勝利数
      firstLoss,        // W: 先攻セット敗北数
      secondLoss        // X: 後攻セット敗北数
    ];
  });

  // ===== 個人結果データ（投擲ごとに1行）=====
  const personalRows=[];
  const summaryRows=[]; // 個人集計行（投擲データ送信後に別送信）
  S.sets.forEach((s,si)=>{
    // 両チームの投擲を時系列（ターン）順に並べる
    // ターンごとに先攻→後攻の順
    const fti=s.ftid; // 先攻チームID
    const sti=1-fti;
    const perThrowCounts={}; // メンバーごとのセット内投擲回数
    const maxLen=Math.max(s.teams[0].throws.length,s.teams[1].throws.length);
    // ターン数：先攻・後攻が1回ずつ投げたら1ターン（1,1,2,2,3,3...）
    for(let i=0;i<maxLen;i++){
      const turnNum=i+1; // i番目のラウンド = ターン数
      [fti,sti].forEach(ti=>{
        const th=s.teams[ti].throws[i];
        if(!th)return;
        const member=th.member||'';
        if(!perThrowCounts[ti+'-'+member])perThrowCounts[ti+'-'+member]=0;
        perThrowCounts[ti+'-'+member]++;
        const aimStr=th.result==='circle'?'T':th.result==='cross'?'F':th.result==='unknown'?'Q':'';
        personalRows.push([
          matchId,                          // A: 試合ID
          si+1,                             // B: セット
          s.ftid===ti?'先攻':'後攻',         // C: 先攻後攻
          teamNos[ti],                      // D: チームNo
          S.teams[ti].name,                 // E: チーム名
          member,                           // F: 投擲者個人名
          turnNum,                          // G: ターン数
          perThrowCounts[ti+'-'+member],    // H: 個人投擲回数（セット内）
          th.time!=null?th.time:'',         // I: 投擲時間
          th.pts,                           // J: 得点
          th.cumul,                         // K: 合計点
          '',                               // L: 空欄
          '',                               // M: 空欄
          '',                               // N: 空欄（集計行のみ）
          '',                               // O: 空欄（集計行のみ）
          '',                               // P: 空欄（集計行のみ）
          '',                               // Q: 空欄（集計行のみ）
          '',                               // R: 空欄（集計行のみ）
          '',                               // S: 空欄（集計行のみ）
          th.multi?0:1,                     // T: 単品1/複数0
          aimStr==='T'?1:aimStr==='F'?0:'', // U: 狙いどおり1/0
          s.ftid===ti?1:0                   // V: 先攻1/後攻0
        ]);
      });
    }
  });

  // ===== 個人別集計行を追加（各投擲データの後に1人1行）=====
  [0,1].forEach(ti=>{
    // このチームに出場した全メンバーを収集
    const memberStats={};
    S.sets.forEach((s,si)=>{
      const isFirst=s.ftid===ti;
      s.teams[ti].throws.forEach(th=>{
        const m=th.member||'';
        if(!memberStats[m])memberStats[m]={
          sets:new Set(),firstSets:new Set(),secondSets:new Set(),
          firstWinSets:new Set(),secondWinSets:new Set()
        };
        const ms=memberStats[m];
        ms.sets.add(si);
        if(isFirst)ms.firstSets.add(si);
        else ms.secondSets.add(si);
        if(isFirst&&s.wid===ti)ms.firstWinSets.add(si);
        if(!isFirst&&s.wid===ti)ms.secondWinSets.add(si);
      });
    });
    Object.entries(memberStats).forEach(([member,ms])=>{
      const row=new Array(22).fill(''); // A〜V列（22列、T/U/V列は空欄）
      row[0]=matchId;           // A: 試合ID
      row[3]=teamNos[ti];       // D: チームNo
      row[4]=S.teams[ti].name;  // E: チーム名
      row[5]=member;            // F: 出場者名
      row[13]=ms.sets.size;                // N: 出場セット数
      row[14]=ms.firstSets.size;           // O: 先攻セット出場数
      row[15]=ms.secondSets.size;          // P: 後攻セット出場数
      row[16]=ms.firstWinSets.size;        // Q: 先攻セット勝利数
      row[17]=ms.secondWinSets.size;       // R: 後攻セット勝利数
      const setTotalPts=[...ms.sets].reduce((sum,si)=>{
        const s=S.sets[si];
        return sum+(s?s.teams[ti].sc:0);
      },0);
      row[18]=setTotalPts;                 // S: 出場セット合計点
      summaryRows.push(row); // ← personalRowsではなくsummaryRowsへ
    });
  });

  // ===== GASに1回のPOSTで全データ送信（高速化：コールドスタート1回のみ）=====
  const body=new URLSearchParams({data:JSON.stringify({
    type:'all',
    teamRows,
    personalRows,
    summaryRows
  })});
  const res=await fetch(GAS_URL,{method:'POST',mode:'cors',body});
  const json=await res.json();
  if(json.status!=='ok')throw new Error(json.message||'送信エラー');
  return {teamRows,personalRows,summaryRows};
}

function doReset(){
  S={phase:'setup',fmt:S.fmt,turnLimit:S.turnLimit,playerMin:S.playerMin,playerMax:S.playerMax,teams:S.teams.map(t=>({...t,members:[...t.members]})),sets:[],cur:0,fid:0,showHist:false,pFirst:null,pIdx:null,pOrders:[[],[]],pExclude:[[],[]],iP:'',iM:'single',iA:'cross',prev:null,ssIdx:0,endPending:false,tieExtend:false,tlTieExtend:false,earlyEnd:false,molkoutWinner:null,editSetIdx:null,editTi:null,editThIdx:null,afterEdit:null,_ucFrom:null,throwStartTime:null,lastThrowSec:null,_matchId:'',_teamNos:['',''],_orderFromBack:false,_cameFromGame:false,_savedMatchIdData:null};render();
}
function goNext(ni){
  S.tlTieExtend=false;
  S.pIdx=ni;
  // nfc=true(先攻選択が必要)なら S.fid を初期値として firstChoice へ
  // nfc=false(自動入れ替え)なら aF で先攻を決定して orderSetup へ
  const fid=nfc(ni)?S.fid:aF(ni);
  S.pFirst=fid; // ★ 必ずセット
  const _gio=gIO(ni,fid);S.pOrders=_gio.orders;S.pExclude=_gio.excludes;
  S.phase=nfc(ni)?'firstChoice':'orderSetup';render();
}

// 「？」が残っているセットのインデックスを返す
function unknownSets(){
  return S.sets.map((cset,i)=>{
    const hasUnknown=cset.teams.some(td=>td.throws.some(th=>!th.miss&&th.result==='unknown'));
    return hasUnknown?i:-1;
  }).filter(i=>i>=0);
}

function buildSS(cset,editable,_setIdx){
  const fti=cset.ftid,sti=1-fti;
  // スコアシート：excluded を除いたメンバーのみ表示
  const mbrs=[0,1].map(ti=>{
    const excl=cset.teams[ti].excluded||[];
    const full=cset.teams[ti].order.length>0?cset.teams[ti].order:S.teams[ti].members.length?S.teams[ti].members:['投てき者'];
    const active=full.filter(m=>!excl.includes(m));
    return active.length>0?active:full;
  });
  const nM=[mbrs[0].length,mbrs[1].length];
  const maxT=Math.max(cset.teams[0].throws.length,cset.teams[1].throws.length);
  const cF=nM[fti]+1,cS=nM[sti]+1;
  const mhdr=(ti)=>mbrs[ti].map(m=>`<th class="mbr-th" style="border:1px solid #bbb;">${m}</th>`).join('');
  function tDisp(th,ti,thIdx){
    if(!th)return'';
    if(th.miss){const inner=`<span style="color:#9ca3af;font-size:15px;">—</span>`;return editable?`<span class="edit-th-btn" data-ti="${ti}" data-idx="${thIdx}" data-setidx="${_setIdx}" style="cursor:pointer;">${inner}✏️</span>`:inner;}
    const sc=th.raw!==undefined?th.raw:th.pts;
    let inner='';
    if(th.result==='circle'&&th.multi)inner=svgS(sc,22);
    else if(th.result==='circle')inner=svgC(sc,22);
    else if(th.result==='unknown')inner=`<span style="font-weight:600;font-size:14px;color:#f59e0b;">${sc}？</span>`;
    else inner=`<span style="font-weight:600;font-size:14px;">${sc}</span>`;
    return editable?`<span class="edit-th-btn" data-ti="${ti}" data-idx="${thIdx}" data-setidx="${_setIdx}" style="cursor:pointer;">${inner}✏️</span>`:inner;
  }
  const prevC=[0,0];
  function totDisp(th,ti){
    if(!th)return'';
    if(th.miss)return`<span style="color:#6b7280;">${prevC[ti]}</span>`;
    if(th.over){prevC[ti]=th.cumul;return`<span style="color:#b45309;font-weight:600;">${th.cumul}</span>`;}
    prevC[ti]=th.cumul;return`<span style="font-weight:600;">${th.cumul}</span>`;
  }
  let rows='';
  for(let t=0;t<maxT;t++){
    const thF=cset.teams[fti].throws[t],thS=cset.teams[sti].throws[t];
    const mF=thF?t%nM[fti]:-1,mS=thS?t%nM[sti]:-1;
    const cF2=mbrs[fti].map((_,mi)=>mi!==mF||!thF?`<td class="sc-cell" style="border:1px solid #bbb;"></td>`:`<td class="sc-cell ${editable?'editable':''}" style="border:1px solid #bbb;">${tDisp(thF,fti,t)}</td>`).join('');
    const cS2=mbrs[sti].map((_,mi)=>mi!==mS||!thS?`<td class="sc-cell" style="border:1px solid #bbb;"></td>`:`<td class="sc-cell ${editable?'editable':''}" style="border:1px solid #bbb;">${tDisp(thS,sti,t)}</td>`).join('');
    rows+=`<tr><td class="turn-col" style="border:1px solid #bbb;">${t+1}</td>${cF2}<td class="tot-cell" style="border:1px solid #bbb;border-right:2.5px solid #aaa;">${totDisp(thF,fti)}</td>${cS2}<td class="tot-cell" style="border:1px solid #bbb;">${totDisp(thS,sti)}</td></tr>`;
  }
  const eF=cset.teams[fti].el,eS=cset.teams[sti].el;
  if(eF||eS){
    const fe=eF?`<span style="color:#E24B4A;font-weight:700;">0</span>`:`<span style="color:#1D9E75;font-weight:700;">50</span>`;
    const se=eS?`<span style="color:#E24B4A;font-weight:700;">0</span>`:`<span style="color:#1D9E75;font-weight:700;">50</span>`;
    rows+=`<tr style="background:#fff8f8;"><td class="turn-col" style="border:1px solid #bbb;font-size:11px;color:#E24B4A;font-weight:700;">失</td>${mbrs[fti].map(()=>`<td class="sc-cell" style="border:1px solid #bbb;background:#fff8f8;"></td>`).join('')}<td class="tot-cell" style="border:1px solid #bbb;border-right:2.5px solid #aaa;background:#fff8f8;">${fe}</td>${mbrs[sti].map(()=>`<td class="sc-cell" style="border:1px solid #bbb;background:#fff8f8;"></td>`).join('')}<td class="tot-cell" style="border:1px solid #bbb;background:#fff8f8;">${se}</td></tr>`;
  }
  if(!rows)rows=`<tr><td colspan="${1+cF+cS}" style="border:1px solid #bbb;padding:12px;font-size:13px;color:#9ca3af;text-align:center;">まだ投てきなし</td></tr>`;
  return`<div class="ss-wrap"><table class="ss-tbl"><thead>
    <tr><th class="turn-col" style="border:1px solid #bbb;"></th>
      <th colspan="${cF}" class="team-hdr" style="border:1px solid #bbb;border-right:2.5px solid #aaa;background:${LB[fti]};color:${LT[fti]};">${S.teams[fti].name}（先攻）</th>
      <th colspan="${cS}" class="team-hdr" style="border:1px solid #bbb;background:${LB[sti]};color:${LT[sti]};">${S.teams[sti].name}（後攻）</th>
    </tr>
    <tr><th class="turn-col" style="border:1px solid #bbb;"></th>
      ${mhdr(fti)}<th class="tot-th" style="border:1px solid #bbb;border-right:2.5px solid #aaa;">計</th>
      ${mhdr(sti)}<th class="tot-th" style="border:1px solid #bbb;">計</th>
    </tr></thead><tbody>${rows}</tbody></table></div>`;
}

function rSS(){
  const total=S.sets.length,idx=S.ssIdx,cset=S.sets[idx];
  const sn=idx+1,sl=S.fmt==='round2'?`${sn}セット目`:`第${sn}セット`;

  return`<div style="padding:6px 0 4px;">
    ${isEditMode?`<div style="background:#FFFBEB;border:1.5px solid #FCD34D;border-radius:10px;padding:10px 12px;margin-bottom:12px;font-size:13px;color:#92400e;">✏️ <strong>スコアを確認してください。</strong>間違いがあれば各投擲の ✏️ をタップして修正できます。</div>`:''}

      <div style="flex:1;"><div style="font-size:12px;color:#6b7280;">${fl()}</div><div style="font-size:16px;font-weight:700;color:#111;">スコアシート${isEditMode?' (確認・修正)':''}</div></div>

}

    </div>
    <div class="card" style="padding:14px;margin-bottom:12px;">

          <select id="edit-aimed"><option value="circle" ${th.result==='circle'?'selected':''}>○ 狙い通り</option><option value="cross" ${th.result==='cross'?'selected':''}>× 狙い通りでない</option><option value="unknown" ${th.result==='unknown'?'selected':''}>？ わからない</option></select>
        </div>
      </div>

    <button class="btn btn-green" id="btn-save-edit" style="width:100%;padding:14px;font-size:16px;">この内容で保存 ✓</button>

// ===== ルール入力モーダル（overlay方式） =====
function showRuleModal(prefix,idx){
  const tour=AD.tournaments.find(t=>t.id===S._editingTourId)||activeTour()||makeTournament();
  const rules=prefix==='match'?(tour.matchRules=tour.matchRules||[]):(tour.tourneyRules=tour.tourneyRules||[]);
  const r=idx!=null?{...rules[idx]}:{code:'',name:'',fmt:'best2',turnLimit:false,playerMin:2,playerMax:4,round:''};
  const label=prefix==='match'?'試合区分':'トーナメント種類';
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;';
  overlay.innerHTML=`<div style="background:#fff;border-radius:12px;padding:18px;width:100%;max-width:420px;">
    <div style="font-size:16px;font-weight:700;margin-bottom:14px;">${label}ルール${idx!=null?'を編集':'を追加'}</div>
    <div style="display:grid;gap:10px;">
      <div><div style="font-size:13px;color:#6b7280;margin-bottom:4px;">コード（試合IDの該当桁）</div><input type="text" id="m-code" value="${r.code}" placeholder="例: 01"/></div>
      <div><div style="font-size:13px;color:#6b7280;margin-bottom:4px;">名称（任意）</div><input type="text" id="m-name" value="${r.name}" placeholder="例: 予選"/></div>
      <div><div style="font-size:13px;color:#6b7280;margin-bottom:4px;">試合形式</div>
        <select id="m-fmt"><option value="best2" ${r.fmt==='best2'?'selected':''}>2先</option><option value="best3" ${r.fmt==='best3'?'selected':''}>3先</option><option value="round2" ${r.fmt==='round2'?'selected':''}>表裏</option></select></div>
      <div><label style="display:flex;align-items:center;gap:8px;cursor:pointer;"><input type="checkbox" id="m-tl" ${r.turnLimit?'checked':''} style="width:auto;accent-color:#1D9E75;"/><span style="font-size:14px;">12ターン制限</span></label></div>
      <div style="display:flex;gap:10px;">
        <div style="flex:1;"><div style="font-size:13px;color:#6b7280;margin-bottom:4px;">最小人数</div><input type="text" id="m-pmin" value="${r.playerMin}" style="text-align:center;"/></div>
        <div style="flex:1;"><div style="font-size:13px;color:#6b7280;margin-bottom:4px;">最大人数</div><input type="text" id="m-pmax" value="${r.playerMax>=99?'∞':r.playerMax}" style="text-align:center;"/></div>
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-top:14px;">
      <button id="m-cancel" class="btn btn-gray" style="flex:1;">キャンセル</button>
      <button id="m-save" class="btn btn-green" style="flex:2;">保存</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  document.getElementById('m-cancel').onclick=()=>document.body.removeChild(overlay);
  document.getElementById('m-save').onclick=()=>{
    const code=document.getElementById('m-code').value.trim();
    if(!code){alert('コードを入力してください');return;}
    const pmaxVal=document.getElementById('m-pmax').value.trim();
    const newRule={
      code,
      name:document.getElementById('m-name').value.trim(),
      fmt:document.getElementById('m-fmt').value,
      turnLimit:document.getElementById('m-tl').checked,
      playerMin:parseInt(document.getElementById('m-pmin').value)||2,
      playerMax:pmaxVal==='∞'||pmaxVal===''?99:(parseInt(pmaxVal)||4)
    };
    const tour=AD.tournaments.find(t=>t.id===S._editingTourId)||activeTour()||makeTournament();
  const rules=prefix==='match'?(tour.matchRules=tour.matchRules||[]):(tour.tourneyRules=tour.tourneyRules||[]);
    if(idx!=null)rules[idx]=newRule;else rules.push(newRule);
    saveActiveTour(tour);document.body.removeChild(overlay);render();
  };
}

          <div style="color:#9ca3af;font-size:18px;">›</div>

    const q=(vs.searchPerson||'').toLowerCase();

function rViewTeamDetail(){
  const t=_viewState.selectedTeam;
  if(_viewState.loading||!t){
    return`<div style="padding:20px;text-align:center;padding:48px;color:#6b7280;">
      <div style="font-size:24px;margin-bottom:8px;">⏳</div>
      <div>読み込み中...</div>
    </div>`;
  }

  // スプシの確定版値をそのまま使用（既にパーセント換算済みの場合とそうでない場合を判定）
  const toP=(v)=>{
    const n=parseFloat(v)||0;
    // 0〜1の範囲なら×100、既に0〜100ならそのまま
    return n>0&&n<=1?Math.round(n*1000)/10:Math.round(n*10)/10;
  };

  // sub: 例 '2勝 / 3試合' のような補足テキスト（省略可）
  const sr=(label,val,rank,color,barMax,sub)=>{
    const r=parseInt(rank)||0;
    const rb=r>0?`<span style="display:inline-block;background:${r===1?'#f59e0b':r<=3?'#94a3b8':'#e5e7eb'};color:${r<=3?'#fff':'#374151'};border-radius:99px;padding:1px 7px;font-size:11px;font-weight:700;margin-left:4px;">${r}位</span>`:'';
    const num=parseFloat(val)||0;
    const w=barMax>0?Math.min(100,Math.round(num/barMax*100)):0;
    return`<div style="padding:8px 0;border-bottom:1px solid #f3f4f6;">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div style="font-size:13px;color:#374151;">${label}</div>
        <div style="font-size:14px;font-weight:700;">${val??'-'}${rb}</div>
      </div>
      ${sub?`<div style="font-size:11px;color:#9ca3af;text-align:right;margin-top:2px;">${sub}</div>`:''}
      <div style="background:#e5e7eb;border-radius:4px;height:6px;margin-top:4px;"><div style="background:#3b82f6;width:${w}%;height:6px;border-radius:4px;"></div></div>
    </div>`;
  };

  const mwr=toP(t.matchWinRate);
  const swr=toP(t.setWinRate);
  const fwr=toP(t.firstWinRate);
  const swr2=toP(t.secondWinRate);
  const qhr=toP(t.qhRate);
  const fr=toP(t.fRate);

  return`<div style="padding:8px 0 4px;">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;">
      <button class="btn btn-gray btn-sm" id="btn-bk-view-detail">← 戻る</button>
      <div style="font-size:16px;font-weight:700;">${t.teamName}</div>
    </div>
    <div class="card" style="padding:14px;margin-bottom:12px;">
      <div style="font-size:12px;color:#6b7280;margin-bottom:4px;">メンバー</div>
      <div style="font-size:14px;">${(t.members||[]).join(' / ')||'未登録'}</div>
    </div>
    <div class="card" style="padding:14px;margin-bottom:12px;">
      <div style="font-size:14px;font-weight:700;margin-bottom:8px;">勝敗</div>
      ${sr('試合勝率',mwr+'%',t.rankMatchWin,'#3b82f6',100,`${t.winMatches??'?'}勝 / ${t.totalMatches??'?'}試合`)}
      ${sr('セット勝率',swr+'%',t.rankSetWin,'#3b82f6',100,`${(t.firstWinSets??0)+(t.secondWinSets??0)}勝 / ${t.totalSets??'?'}セット`)}
      <div style="padding:6px 0;font-size:13px;color:#6b7280;">${t.winMatches??'-'}勝 / ${t.loseMatches??'-'}敗 / ${t.totalMatches??'-'}試合</div>
    </div>
    <div class="card" style="padding:14px;margin-bottom:12px;">
      <div style="font-size:14px;font-weight:700;margin-bottom:8px;">先攻・後攻</div>
      ${sr('先攻セット勝率',fwr+'%',t.rankFirstWin,'#3b82f6',100,`${t.firstWinSets??'?'}勝 / ${t.firstSets??'?'}セット`)}
      ${sr('後攻セット勝率',swr2+'%',t.rankSecondWin,'#3b82f6',100,`${t.secondWinSets??'?'}勝 / ${t.secondSets??'?'}セット`)}
    </div>
    <div class="card" style="padding:14px;margin-bottom:12px;">
      <div style="font-size:14px;font-weight:700;margin-bottom:8px;">スタッツ</div>
      ${sr('QH率',qhr+'%',t.rankQh,'#3b82f6',100,(parseInt(t.totalThrows)||0)>0?`${t.totalAim??'?'}投 / ${t.totalThrows??'?'}投`:'')}
      ${sr('フォルト率',fr+'%',t.rankF,'#3b82f6',100,(parseInt(t.totalThrows)||0)>0?`${t.totalFault??'?'}投 / ${t.totalThrows??'?'}投`:'')}
      ${sr('上がりターン平均',t.agariAvg,t.rankAgari,'#3b82f6',12)}
      ${sr('セット点数平均',t.setPtsAvg,t.rankSetPts,'#3b82f6',50)}
      ${sr('平均ブレーク本数',t.breakAvg,t.rankBreak,'#3b82f6',12)}
      ${sr('平均投擲得点',t.throwPtsAvg,t.rankThrowPts,'#3b82f6',12)}
      ${sr('平均投擲時間(秒)',t.throwTimeAvg,t.rankThrowTime,'#3b82f6',60)}
    </div>
  </div>`;
}

function rViewRanking(type){
  const vs=_viewState;
  const metrics=type==='team'?TEAM_METRICS:PERSON_METRICS;
  const selMetric=vs.rankMetric||'';
  const m=metrics.find(x=>x.key===selMetric)||metrics[0];
  const rankPersonMode=vs.rankPersonMode||'event';

  // モード切り替えタブ（個人のみ）
  const modeTabs=type==='person'?`
    <div style="display:flex;gap:6px;margin-bottom:12px;">
      <button class="btn ${rankPersonMode==='event'?'btn-blue':'btn-gray'} btn-sm" id="vrpm-event" style="flex:1;">大会ごと</button>
      <button class="btn ${rankPersonMode==='cumul'?'btn-blue':'btn-gray'} btn-sm" id="vrpm-cumul" style="flex:1;">通算</button>
    </div>`:'';

  let bodyHtml='';
  if(vs.loading){
    bodyHtml='<div style="text-align:center;padding:48px;color:#6b7280;"><div style="font-size:24px;">⏳</div><div>読み込み中...</div></div>';
  } else if(vs.rankData.length){
    bodyHtml=vs.rankData.map((d,i)=>{
      const val=parseFloat(d.value)||0;
      const r=parseInt(d.rank)||i+1;
      const label=type==='team'?d.teamName:d.name;
      const sub=type==='team'?`No.${d.teamNo}`:(rankPersonMode==='cumul'?'通算':d.teamName||'');
      const color=r===1?'#f59e0b':r===2?'#94a3b8':r===3?'#b45309':'#6b7280';
      const dataAttr=type==='team'?`data-rank-team="${i}"`:rankPersonMode==='cumul'?`data-rank-cumul="${d.name}"`:`data-rank-person="${i}"`;
      return`<div class="card" style="padding:10px 14px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:10px;" ${dataAttr}>
        <div style="font-size:18px;font-weight:800;color:${color};min-width:28px;">${r}</div>
        <div style="flex:1;">
          <div style="font-size:14px;font-weight:700;">${label}</div>
          <div style="font-size:12px;color:#9ca3af;">${sub}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <div style="font-size:16px;font-weight:700;">${val}${m.unit}</div>
          <div style="color:#9ca3af;">›</div>
        </div>
      </div>`;
    }).join('');
  } else if(!vs.loading){
    bodyHtml='<div style="text-align:center;padding:24px;color:#9ca3af;">指標を選択してください</div>';
  }

  const metricBtns=metrics.map(mx=>`<button class="btn ${selMetric&&mx.key===selMetric?'btn-blue':'btn-gray'} btn-xs" data-metric="${mx.key}" style="margin:3px;padding:5px 10px;font-size:12px;">${mx.label}</button>`).join('');

  return`<div style="padding:8px 0 4px;">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;">
      <button class="btn btn-gray btn-sm" id="btn-bk-ranking">← 戻る</button>
      <div style="font-size:16px;font-weight:700;">🏅 ${type==='team'?'チーム':'個人'}ランキング</div>
    </div>
    ${modeTabs}
    <div class="card" style="padding:12px;margin-bottom:12px;">
      <div style="font-size:13px;color:#6b7280;margin-bottom:8px;">指標を選択（タップで読み込み）</div>
      <div style="display:flex;flex-wrap:wrap;">${metricBtns}</div>
    </div>
    ${vs.rankMetric?`<div style="font-size:14px;font-weight:600;color:#374151;margin-bottom:8px;">【${m.label}】ランキング</div>`:''}
    ${bodyHtml}
  </div>`;
}

async function loadViewData(eventCode,tab){
  if(!eventCode)return;
  tab=tab||_viewState.tab;

  if(tab==='event'&&!_viewState.eventStat){
    _viewState.loading=true;render();

function getEventName(eventCode){
  // eventCodeは "01_0601" 形式。AD.tournamentsはvenueCode="01",eventCode="0601"を持つ
  const parts=eventCode.split('_');
  let tour=null;
  if(parts.length>=2){
    // 01_0601 → venueCode=01, eventCode=0601
    tour=AD.tournaments&&AD.tournaments.find(t=>t.venueCode===parts[0]&&t.eventCode===parts[1]);
  }
  if(!tour){
    // フォールバック：eventCodeのみで検索
    tour=AD.tournaments&&AD.tournaments.find(t=>t.eventCode===eventCode||t.eventCode===parts[parts.length-1]);
  }
  return tour?tour.eventName:eventCode;
}

// ===== 設定をGitHub Pagesに配信 =====

async function publishSettings(tour){
  if(!tour||!tour.eventCode){
    alert('大会コードが設定されていません。基本情報を先に保存してください。');
    return;
  }
  if(!AD.githubPat||!AD.githubPat.startsWith('ghp_')){
    alert('GitHub Personal Access Tokenが設定されていません。\n管理者設定画面のトップで設定してください。');
    return;
  }
  const payload={
    venueCode: tour.venueCode||'',
    eventCode: tour.eventCode,
    eventName: tour.eventName||'',
    gasUrl: tour.gasUrl||'',
    priority: tour.priority||'tournament',
    matchRules: tour.matchRules||[],
    tourneyRules: tour.tourneyRules||[],
    roundRules: tour.roundRules||[],
    teams: tour.teams||[],
    publishedAt: new Date().toISOString()
  };
  const fileName=tour.eventCode+'_settings.json';
  const jsonBody=JSON.stringify(payload,null,2);
  const apiUrl='https://api.github.com/repos/longbeachknit/molkkymania-deta/contents/'+fileName;

  const btn=document.getElementById('btn-publish-settings');
  if(btn){btn.disabled=true;btn.textContent='配信中...';}

  try{
    // 既存ファイルのSHAを取得
    let sha=null;
    try{
      const getRes=await fetch(apiUrl,{headers:{'Authorization':'token '+AD.githubPat}});
      if(getRes.ok){const d=await getRes.json();sha=d.sha;}
    }catch(e){}

    // アップロード
    const body={
      message:'Update '+fileName,
      content:btoa(unescape(encodeURIComponent(jsonBody)))
    };
    if(sha)body.sha=sha;
    const res=await fetch(apiUrl,{
      method:'PUT',
      headers:{'Authorization':'token '+AD.githubPat,'Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    if(res.ok){
      alert('✅ 配信完了！\n参加者が次回アクセス時に自動で設定が反映されます。');
    } else {
      const err=await res.json();
      alert('❌ 配信失敗: '+(err.message||res.status));
    }
  }catch(e){
    alert('❌ エラー: '+e.message);
  }finally{
    if(btn){btn.disabled=false;btn.textContent='📡 設定を配信する';}
  }
}

function rUnknownCheck(){
  const uSets=unknownSets();
  // 全て修正済みなら自動的に結果画面へ
  if(uSets.length===0){
    const ph=S._ucFrom||'matchOver';
    S._ucFrom=null;
    setTimeout(()=>{S.phase=ph;render();},0);
    return'<div style="padding:20px;text-align:center;color:#1D9E75;font-weight:600;">✓ 全て確認済みです。結果画面へ移動します...</div>';
  }
  const idx=S.ssIdx<uSets.length?S.ssIdx:0;
  const setIdx=uSets[idx]!=null?uSets[idx]:uSets[0];
  const sn=setIdx+1;
  const sl=S.fmt==='round2'?sn+'セット目':'第'+sn+'セット';
  const cset=S.sets[setIdx];
  if(!cset){return'<div style="padding:20px;text-align:center;color:#9ca3af;">データ取得エラー</div>';}
  const total=uSets.length;
  // スコアシートを編集モードで表示
  return`<div style="padding:6px 0 4px;">
    <div style="background:#FEF3C7;border:1.5px solid #fcd34d;border-radius:10px;padding:12px;margin-bottom:12px;">
      <div style="font-size:14px;font-weight:700;color:#92400e;margin-bottom:4px;">⚠️ 「？ わからない」の投擲が残っています</div>
      <div style="font-size:13px;color:#92400e;">試合結果を確定する前に、全ての投擲の結果（○か×）を確定してください。✏️をタップして修正できます。</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
      <div style="flex:1;"><div style="font-size:12px;color:#6b7280;">${fl()} | 未確定 ${total}セット</div><div style="font-size:16px;font-weight:700;color:#111;">スコア確認・修正</div></div>
    </div>
    ${total>1?`<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;justify-content:center;">
      <button class="btn btn-gray btn-sm" id="btn-uc-prev" ${idx>0?'':'disabled'} style="min-width:48px;font-size:16px;">◀</button>
      <span style="font-size:15px;font-weight:700;color:#111;min-width:80px;text-align:center;">${sl}</span>
      <button class="btn btn-gray btn-sm" id="btn-uc-next" ${idx<total-1?'':'disabled'} style="min-width:48px;font-size:16px;">▶</button>
    </div>`:'<div style="font-size:15px;font-weight:700;color:#111;margin-bottom:10px;">'+sl+'</div>'}

    <button class="btn btn-green" id="btn-uc-done" style="width:100%;padding:14px;font-size:16px;margin-top:12px;" ${unknownSets().length===0?'':'disabled'}>
      ${unknownSets().length===0?'確認完了 → 結果へ進む ✓':'まだ「？」が残っています（'+unknownSets().length+'セット）'}
    </button>
  </div>`;
}

function bindDrag(){
  [0,1].forEach(ti=>{
    const list=document.getElementById(`order-list-${ti}`);if(!list)return;
    let src=null;
    list.querySelectorAll('.order-item').forEach(item=>{
      item.addEventListener('dragstart',e=>{src=item;item.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
      item.addEventListener('dragend',()=>{item.classList.remove('dragging');list.querySelectorAll('.order-item').forEach(i=>i.classList.remove('over'));src=null;});
      item.addEventListener('dragover',e=>{e.preventDefault();list.querySelectorAll('.order-item').forEach(i=>i.classList.remove('over'));item.classList.add('over');});
      item.addEventListener('dragleave',()=>item.classList.remove('over'));
      item.addEventListener('drop',e=>{
        e.preventDefault();item.classList.remove('over');if(!src||src===item)return;
        const all=Array.from(list.querySelectorAll('.order-item'));
        const from=all.indexOf(src),to=all.indexOf(item);if(from<0||to<0)return;
        const base=S.pOrders[ti].length>0?[...S.pOrders[ti]]:S.teams[ti].members.slice();
        base.splice(to,0,base.splice(from,1)[0]);S.pOrders[ti]=base;src=null;render();
      });
    });
  });
}

function bind(){
  const app=document.getElementById('app');
  app.querySelectorAll('input[name="fmt"]').forEach(el=>{el.addEventListener('change',e=>{S.fmt=e.target.value;render();});});
  app.querySelectorAll('input[name="tl"]').forEach(el=>{el.addEventListener('change',e=>{S.turnLimit=e.target.value==='12';render();});});
  // 投擲人数 min/max ボタン
  const bpmn_=document.getElementById('btn-pm-min-');if(bpmn_)bpmn_.onclick=()=>{if(S.playerMin>1)S.playerMin--;render();};
  const bpmn_p=document.getElementById('btn-pm-min+');if(bpmn_p)bpmn_p.onclick=()=>{if(S.playerMin<S.playerMax&&S.playerMin<12)S.playerMin++;render();};
  const bpmx_=document.getElementById('btn-pm-max-');if(bpmx_)bpmx_.onclick=()=>{if(S.playerMax>S.playerMin&&S.playerMax>1)S.playerMax--;render();};
  const bpmx_p=document.getElementById('btn-pm-max+');if(bpmx_p)bpmx_p.onclick=()=>{if(S.playerMax<99)S.playerMax++;render();};
  // 外す / 参加ボタン
  app.querySelectorAll('.excl-toggle').forEach(btn=>{btn.addEventListener('click',()=>{
    const ti=parseInt(btn.dataset.team),m=btn.dataset.member;
    if(!S.pExclude[ti])S.pExclude[ti]=[];
    if(S.pExclude[ti].includes(m)){
      // 参加に戻す：元の位置（先頭から）に挿入
      S.pExclude[ti]=S.pExclude[ti].filter(x=>x!==m);
      // 投げ順リストで excluded でない人の末尾（=excludedの先頭）の位置に挿入
      const ord=S.pOrders[ti].length>0?S.pOrders[ti]:S.teams[ti].members.slice();
      const excl=S.pExclude[ti];
      const firstExclIdx=ord.findIndex(x=>excl.includes(x));
      const insertAt=firstExclIdx>=0?firstExclIdx:ord.length;
      if(!ord.includes(m)){ord.splice(insertAt,0,m);}
      else{
        // 現在の位置から一番下のactive位置へ
        const curIdx=ord.indexOf(m);
        ord.splice(curIdx,1);
        const newInsert=ord.findIndex(x=>excl.includes(x));
        ord.splice(newInsert>=0?newInsert:ord.length,0,m);
      }
      S.pOrders[ti]=ord;
    } else {
      // 外す：リスト内で一番下に移動
      const ord=S.pOrders[ti].length>0?[...S.pOrders[ti]]:S.teams[ti].members.slice();
      const idx=ord.indexOf(m);
      if(idx>=0){ord.splice(idx,1);ord.push(m);}
      S.pOrders[ti]=ord;
      S.pExclude[ti].push(m);
    }
    render();
  });});
  app.querySelectorAll('.move-up').forEach(btn=>{btn.addEventListener('click',()=>{
    const ti=parseInt(btn.dataset.team),idx=parseInt(btn.dataset.idx);
    const base=S.pOrders[ti].length>0?[...S.pOrders[ti]]:S.teams[ti].members.slice();
    if(idx<=0)return;[base[idx-1],base[idx]]=[base[idx],base[idx-1]];S.pOrders[ti]=base;render();
  });});
  app.querySelectorAll('.move-dn').forEach(btn=>{btn.addEventListener('click',()=>{
    const ti=parseInt(btn.dataset.team),idx=parseInt(btn.dataset.idx);
    const base=S.pOrders[ti].length>0?[...S.pOrders[ti]]:S.teams[ti].members.slice();
    if(idx>=base.length-1)return;[base[idx+1],base[idx]]=[base[idx],base[idx+1]];S.pOrders[ti]=base;render();
  });});

      // matchId は試合ID（4パーツ: 場所_大会_試合区分_コート）
      const mparts=m.matchId.split('_');
      const mCode=mparts[2]||'';  // 試合区分ID
      const teamMatch=!teamNo||(m.teamA===teamNo||m.teamB===teamNo);
      const codeMatch=!matchCode||(mCode===matchCode.padStart(2,'0')||mCode===matchCode);
      return teamMatch&&codeMatch;
    });
    // コート番号順にソート
    results.sort((a,b)=>{
      const ca=parseInt((a.matchId.split('_')[3]||'0'));
      const cb=parseInt((b.matchId.split('_')[3]||'0'));
      return ca-cb;
    });
    S._courtSearchResults=results;
    render();
  };


  // 試合ID入力・検索
  const bmiGo=document.getElementById('btn-matchid-go');
  if(bmiGo)bmiGo.onclick=async()=>{
    const inp=document.getElementById('matchid-input');
    const id=inp?inp.value.trim():'';
    if(!id){S._matchIdError='試合IDを入力してください';render();return;}
    const parts=id.split('_');
    if(parts.length<4){S._matchIdError='試合IDの形式が正しくありません（例: 01_0602_02_002）';S._matchIdInput=id;render();return;}
    // GitHub から最新の対戦データを取得
    S._matchIdError='';S._matchIdInput=id;
    const eventCode=parts[1];
    const btn=document.getElementById('btn-matchid-go');
    if(btn){btn.disabled=true;btn.textContent='取得中...';}
    await syncAllFromGitHub(eventCode);
    if(btn){btn.disabled=false;btn.textContent='この試合IDで開始 →';}
    const result=resolveMatchId(id);
    if(!result){S._matchIdError='試合IDの形式が正しくありません（例: 01_0602_02_002）';render();return;}
    S._matchIdInput=id;S._matchIdError='';S.matchIdData=result;S.phase='matchConfirm';render();
  };

  // QRコードスキャン（カメラ起動）
  const bqr=document.getElementById('btn-qr-scan');
  if(bqr)bqr.onclick=async()=>{
    const val=prompt('QRコードの内容（試合ID）を貼り付けてください:');
    if(val&&val.trim()){
      const qrParts=val.trim().split('_');
      if(qrParts.length>=2)await syncAllFromGitHub(qrParts[1]);
      const result=resolveMatchId(val.trim());
      if(!result){S._matchIdError='試合IDの形式が正しくありません';S._matchIdInput=val.trim();render();return;}
      S._matchIdInput=val.trim();S._matchIdError='';S.matchIdData=result;S.phase='matchConfirm';render();
    }
  };

  // 対戦カード確認 → 試合開始
  document.querySelectorAll('.change-team-btn').forEach(btn=>{
    btn.addEventListener('click',()=>showChangeTeamModal(parseInt(btn.dataset.ci)));
  });
  const bmcs=document.getElementById('btn-matchconfirm-start');
  if(bmcs)bmcs.onclick=()=>{
    const d=S.matchIdData;
    if(!d||!d.hasRule)return;
    // チーム情報をStateに反映
    const r=d.rule;
    S.fmt=r.fmt;S.turnLimit=r.turnLimit;S.playerMin=r.playerMin;S.playerMax=r.playerMax>=99?99:r.playerMax;
    if(d.hasTeams){
      const mA=d.teamA.members?d.teamA.members.split(/[,、]/).map(s=>s.trim()).filter(Boolean):[];
      const mB=d.teamB.members?d.teamB.members.split(/[,、]/).map(s=>s.trim()).filter(Boolean):[];
      S.teams=[{id:0,name:d.teamA.name,members:mA},{id:1,name:d.teamB.name,members:mB}];
    }
    // 試合IDとチームNoを保持（送信用）
    S._matchId=d.matchId||'';
    S._teamNos=[
      d.teamA?String(d.teamA.id).padStart(3,'0'):'',
      d.teamB?String(d.teamB.id).padStart(3,'0'):''
    ];
    S._savedMatchIdData=JSON.parse(JSON.stringify(d)); // matchConfirmに戻るため退避
    S.matchIdData=null;
    // 先攻後攻選択へ直行
    S.pFirst=S.fid;S.pIdx=0;
    const _gn=gIO(0,S.fid);S.pOrders=_gn.orders;S.pExclude=_gn.excludes;
    S.phase='firstChoice';render();
  };
  const bu=document.getElementById('btn-undo');if(bu)bu.onclick=()=>{const cset=cs();if(!cset.hist.length)return;const p=cset.hist.pop();cset.teams=p.teams;cset.ctid=p.ctid;cset.wid=p.wid;S.iP='';S.iM='single';S.iA='cross';S.endPending=false;S.tieExtend=false;S.tlTieExtend=false;render();};
  const bbo=document.getElementById('btn-bk-order');if(bbo)bbo.onclick=()=>{
    const curIdx=S.cur;
    S.sets.pop();
    S.cur=S.sets.length-1; // ★ pop後の最後のセットにcurを更新
    S.pIdx=curIdx;
    S.pFirst=nfc(S.pIdx)?S.fid:aF(S.pIdx);
    const _gb=gIO(S.pIdx,S.pFirst);
    S.pOrders=_gb.orders;S.pExclude=_gb.excludes;
    S._orderFromBack=true;
    S.phase='orderSetup';render();
  };
  const bue=document.getElementById('btn-undo-end');if(bue)bue.onclick=()=>{const cset=cs();if(!cset.hist.length)return;const p=cset.hist.pop();cset.teams=p.teams;cset.ctid=p.ctid;cset.wid=null;S.iP='';S.iM='single';S.iA='cross';S.tlTieExtend=false;S.earlyEnd=false;S.phase='game';render();};
  const bue2=document.getElementById('btn-undo-early');if(bue2)bue2.onclick=()=>{const cset=cs();if(!cset.hist.length)return;const p=cset.hist.pop();cset.teams=p.teams;cset.ctid=p.ctid;cset.wid=null;if(cset.draw!==undefined)cset.draw=false;S.iP='';S.iM='single';S.iA='cross';S.endPending=false;S.tieExtend=false;S.tlTieExtend=false;S.phase='game';render();};
  const bbksm=document.getElementById('btn-bk-to-setover-match');if(bbksm)bbksm.onclick=()=>{S.phase='setOver';render();};
  const bbkse=document.getElementById('btn-bk-to-setover-early');if(bbkse)bbkse.onclick=()=>{S.phase='setOver';render();};
  const bum=document.getElementById('btn-undo-match');if(bum)bum.onclick=()=>{const cset=cs();if(!cset.hist.length)return;const p=cset.hist.pop();cset.teams=p.teams;cset.ctid=p.ctid;cset.wid=null;S.iP='';S.iM='single';S.iA='cross';S.phase='game';render();};
  const bh=document.getElementById('btn-hist');if(bh)bh.onclick=()=>{S.showHist=!S.showHist;render();};
  const bss=document.getElementById('btn-scoresheet');if(bss)bss.onclick=()=>{S.ssIdx=S.cur;S.prev='game';S.afterEdit=null;S.phase='scoresheet';render();};
  const bssE=document.getElementById('btn-ss-setover-edit');if(bssE)bssE.onclick=()=>{S.ssIdx=S.cur;S.afterEdit='setOver';S.phase='scoresheet';render();};
  const bssM=document.getElementById('btn-ss-match-edit');if(bssM)bssM.onclick=()=>{S.ssIdx=S.sets.length-1;S.afterEdit='matchOver';S.phase='scoresheet';render();};
  const bssEa=document.getElementById('btn-ss-early-edit');if(bssEa)bssEa.onclick=()=>{S.ssIdx=S.sets.length-1;S.afterEdit='earlyMatchOver';S.phase='scoresheet';render();};
  const bbg=document.getElementById('btn-back-ss');if(bbg)bbg.onclick=()=>{S.phase=S.afterEdit||S.prev||'game';S.afterEdit=null;render();};
  const bed=document.getElementById('btn-edit-done');if(bed)bed.onclick=()=>{S.phase=S.afterEdit||'game';S.afterEdit=null;render();};
  const bsp=document.getElementById('btn-ss-prev');if(bsp)bsp.onclick=()=>{if(S.ssIdx>0){S.ssIdx--;render();}};
  const bsn=document.getElementById('btn-ss-next');if(bsn)bsn.onclick=()=>{if(S.ssIdx<S.sets.length-1){S.ssIdx++;render();}};
  // unknownCheck ページング
  const bucP=document.getElementById('btn-uc-prev');if(bucP)bucP.onclick=()=>{if(S.ssIdx>0){S.ssIdx--;render();}};
  const bucN=document.getElementById('btn-uc-next');if(bucN)bucN.onclick=()=>{S.ssIdx++;render();};
  const bucD=document.getElementById('btn-uc-done');
  if(bucD&&!bucD.disabled)bucD.onclick=()=>{
    const prevPhase=S._ucFrom||'matchOver';
    S._ucFrom=null;
    S.phase=prevPhase;render();
  };
  app.querySelectorAll('.edit-th-btn').forEach(el=>{el.addEventListener('click',()=>{S.editSetIdx=parseInt(el.dataset.setidx);S.editTi=parseInt(el.dataset.ti);S.editThIdx=parseInt(el.dataset.idx);S.phase='editThrow';render();});});
  const bbe=document.getElementById('btn-bk-edit');if(bbe)bbe.onclick=()=>{S.phase=S._ucFrom?'unknownCheck':'scoresheet';render();};
  const ep=document.getElementById('edit-pts');
  if(ep){ep.addEventListener('change',()=>{const isMiss=ep.value==='miss';const mr=document.getElementById('edit-multi-row'),ar=document.getElementById('edit-aimed-row');if(mr)mr.style.display=isMiss?'none':'';if(ar)ar.style.display=isMiss?'none':'';const ea2=document.getElementById('edit-aimed');if(ea2&&isMiss)ea2.value='cross';});}
  const bse=document.getElementById('btn-save-edit');
  if(bse)bse.onclick=()=>{
    const _ep=document.getElementById('edit-pts');if(!_ep)return;
    const cset=S.sets[S.editSetIdx];const ti=S.editTi,thIdx=S.editThIdx;const th=cset.teams[ti].throws[thIdx];
    const isMiss=_ep.value==='miss';th.miss=isMiss;
    if(isMiss){th.pts=0;th.raw=0;th.result='cross';th.multi=false;}
    else{const pts=parseInt(_ep.value);th.pts=pts;th.raw=pts;const eaval=document.getElementById('edit-aimed');th.result=eaval?eaval.value:'circle';const emval=document.getElementById('edit-multi');th.multi=emval?emval.value==='multi':false;th.over=false;}
    recompute(cset);
    S.editSetIdx=null;S.editTi=null;S.editThIdx=null;
    if(S._ucFrom){
      // unknownCheck経由：残り0なら直接結果画面へ
      if(unknownSets().length===0){
        const ph=S._ucFrom;S._ucFrom=null;
        S.phase=ph;render();
      } else {
        S.phase='unknownCheck';render();
      }
    } else {
      S.phase='scoresheet';render();
    }
  };
  const ps=document.getElementById('sel-pts'),ms=document.getElementById('sel-multi'),as=document.getElementById('sel-aimed');
  if(ps){ps.addEventListener('change',()=>{S.iP=ps.value;if(ps.value==='miss')S.iA='cross';else S.iA='circle';render();});}
  if(ms)ms.addEventListener('change',()=>{S.iM=ms.value;render();});
  if(as)as.addEventListener('change',()=>{S.iA=as.value;render();});
  updPrev();
  const bc=document.getElementById('btn-confirm');
  if(bc)bc.onclick=()=>{
    if(!S.iP){alert('得点を選択してください');return;}
    S.lastThrowSec=stopTimer();
    const cset=cs(),ct=cset.ctid,td=cset.teams[ct];
    cset.hist.push({teams:JSON.parse(JSON.stringify(cset.teams)),ctid:cset.ctid,wid:cset.wid});
    const isMiss=S.iP==='miss';let pts=0,raw=0,over=false;
    const multi=S.iM==='multi',result=isMiss?'cross':S.iA;
    if(!isMiss){pts=parseInt(S.iP);raw=pts;const ns=td.sc+pts;if(ns>MAX){over=true;td.sc=RST;}else td.sc=ns;}
    const mn=gmb(td,ct);td.mi++;
    const throwSec=S.lastThrowSec!=null?S.lastThrowSec:null;
    td.throws.push({miss:isMiss,pts,raw,over,multi,result,member:mn,cumul:td.sc,time:throwSec});
    if(isMiss)td.ms++;else td.ms=0;if(td.ms>=MM)td.el=true;
    S.iP='';S.iM='single';S.iA='cross';
    const active=cset.teams.filter(t=>!t.el);
    if(!over&&!isMiss&&td.sc===MAX){cset.wid=ct;cset.endType='normal';S.endPending=false;S.tieExtend=false;S.tlTieExtend=false;S.phase='setOver';render();return;}
    if(active.length===1){active[0].sc=MAX;cset.wid=active[0].id;cset.endType='normal';cset.teams.forEach(t=>{if(t.el)t.sc=0;});S.endPending=false;S.tieExtend=false;S.tlTieExtend=false;S.phase='setOver';render();return;}
    if(active.length===0){cset.wid=null;S.endPending=false;S.tieExtend=false;S.tlTieExtend=false;S.phase='setOver';render();return;}
    let next=1-ct;if(cset.teams[next].el)next=ct;cset.ctid=next;
    startTimer();
    const justFinishedTurn=isTurnEnd(cset);
    if(justFinishedTurn){
      const sc0=cset.teams[0].sc,sc1=cset.teams[1].sc;
      const fti=cset.ftid;
      const doneT=cset.teams[fti].throws.length;
      if(S.turnLimit&&doneT>=TURN_LIMIT){
        if(!S.tlTieExtend){
          if(S.fmt!=='round2'&&sc0===sc1){S.tlTieExtend=true;render();return;}
          processTurnLimitSetEnd(false);return; // 通常終了（12T）
        } else {
          if(sc0!==sc1){processTurnLimitSetEnd(true);return;} // 延長終了（13T）
          render();return;
        }
      }
      if(S.endPending){
        if(S.fmt!=='round2'&&sc0===sc1){S.endPending=false;S.tieExtend=true;render();return;}
        processEarlyEnd();return;
      }
      if(S.tieExtend){if(sc0!==sc1){processEarlyEnd();return;}}
    }
    render();
  };
  const bns=document.getElementById('btn-next-set');
  if(bns)bns.onclick=()=>{S.tlTieExtend=false;S.earlyEnd=false;goNext(parseInt(bns.dataset.next));};
  const bemo=document.getElementById('btn-early-match-over');if(bemo)bemo.onclick=()=>{
    S.earlyEnd=false;
    if(unknownSets().length>0){S.ssIdx=0;S.afterEdit=null;S._ucFrom='earlyMatchOver';S.phase='unknownCheck';render();return;}
    S.phase='earlyMatchOver';render();
  };
  const bmo=document.getElementById('btn-match-over');if(bmo)bmo.onclick=()=>{
    if(unknownSets().length>0){S.ssIdx=0;S.afterEdit=null;S._ucFrom='matchOver';S.phase='unknownCheck';render();return;}
    S.phase='matchOver';render();
  };
  app.querySelectorAll('.molkout-btn').forEach(el=>{el.addEventListener('click',()=>{S.molkoutWinner=parseInt(el.dataset.id);render();});});
  const bgm=document.getElementById('btn-go-molkout');if(bgm)bgm.onclick=()=>{S.molkoutWinner=null;S.phase='molkout';render();};
  const bmc=document.getElementById('btn-molkout-confirm');if(bmc)bmc.onclick=()=>{if(S.molkoutWinner==null)return;S.phase='earlyMatchOver';render();};
}
render();
</script>
</body>
</html>
