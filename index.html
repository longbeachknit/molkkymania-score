function rScoreView(){
  const ss=_scoreState;
  if(ss.loading){
    return`<div style="padding:8px 0 4px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;">
        <button class="btn btn-gray btn-sm" id="btn-bk-score-view">← 戻る</button>
        <div style="font-size:16px;font-weight:700;">スコアシート</div>
      </div>
      <div style="text-align:center;padding:48px;color:#6b7280;"><div style="font-size:24px;">⏳</div><div>読み込み中...</div></div>
    </div>`;
  }
  if(!ss.scoreData)return'<div style="padding:20px;">データなし</div>';

  const {rows,teams,matchId}=ss.scoreData;
  if(!rows||rows.length===0)return`<div style="padding:20px;color:#9ca3af;">投擲データがありません</div>`;

  // セット数を特定
  const setNos=[...new Set(rows.map(r=>r.setNo))].sort((a,b)=>a-b);

  // チーム情報
  const teamA=teams&&teams[0]?teams[0]:null;
  const teamB=teams&&teams[1]?teams[1]:null;

  // セットごとにスコアシートを生成
  const setsHtml=setNos.map(setNo=>{
    const setRows=rows.filter(r=>r.setNo==setNo);
    // 先攻チームを特定
    const firstRow=setRows.find(r=>r.first==1||r.first==='1');
    const fTeamNo=firstRow?firstRow.teamNo:'';
    const fTeam=teams?teams.find(t=>String(t.teamNo).padStart(3,'0')===String(fTeamNo).padStart(3,'0'))||teams[0]:null;
    const sTeam=teams?teams.find(t=>t!==fTeam)||teams[1]:null;

    // 先攻・後攻のメンバーリスト（登場順）
    const getMbrs=(teamNo)=>{
      const tRows=setRows.filter(r=>String(r.teamNo).padStart(3,'0')===String(teamNo).padStart(3,'0'));
      const seen=new Set();const list=[];
      tRows.forEach(r=>{if(!seen.has(r.name)){seen.add(r.name);list.push(r.name);}});
      return list.length?list:[''];
    };
    const fNo=fTeam?fTeam.teamNo:'';
    const sNo=sTeam?sTeam.teamNo:'';
    const fMbrs=getMbrs(fNo);
    const sMbrs=getMbrs(sNo);

    // ターン数の最大値
    const maxTurn=Math.max(...setRows.map(r=>Number(r.turnNum)||0));

    // ターンごとの投擲データ
    const fThrows={},sThrows={};
    setRows.forEach(r=>{
      const turn=Number(r.turnNum);
      const key=String(r.teamNo).padStart(3,'0');
      const isFTeam=key===String(fNo).padStart(3,'0');
      const bucket=isFTeam?fThrows:sThrows;
      if(!bucket[turn])bucket[turn]=[];
      bucket[turn].push(r);
    });

    // 累計点追跡
    const fCumul={},sCumul={};
    const getLastCumul=(bucket,turn)=>{
      for(let t=turn;t>=1;t--){if(bucket[t]&&bucket[t].length)return bucket[t][bucket[t].length-1].cumul;}
      return 0;
    };

    let rows2='';
    for(let t=1;t<=maxTurn;t++){
      const fT=fThrows[t]||[];const sT=sThrows[t]||[];
      // 名前で一致させて正しい列に配置
      const dispTh=(th)=>{
        if(!th)return`<td style="padding:2px 3px;border:1px solid #bbb;min-width:22px;"></td>`;
        const sc=Number(th.pts);const aimed=th.aimed==1||th.aimed==='1';
        const disp=aimed?`<svg width="18" height="18" viewBox="0 0 22 22" style="vertical-align:middle;"><circle cx="11" cy="11" r="10" fill="none" stroke="#111" stroke-width="1.5"/><text x="11" y="15.5" text-anchor="middle" font-size="10" font-family="-apple-system,sans-serif" fill="#111">${sc}</text></svg>`:(sc===0?`<span style="font-size:11px;font-weight:600;">—</span>`:`<span style="font-size:11px;font-weight:600;">${sc}</span>`);
        return`<td style="padding:2px 3px;border:1px solid #bbb;text-align:center;">${disp}</td>`;
      };
      const fCols=fMbrs.map(m=>dispTh(fT.find(th=>th.name===m)));
      const sCols=sMbrs.map(m=>dispTh(sT.find(th=>th.name===m)));
      const fTot=fT.length?fT[fT.length-1].cumul:'';
      const sTot=sT.length?sT[sT.length-1].cumul:'';
      rows2+=`<tr>
        <td style="padding:2px 3px;border:1px solid #bbb;font-size:11px;text-align:center;color:#6b7280;">${t}</td>
        ${fCols.join('')}
        <td style="padding:2px 3px;border:1px solid #bbb;border-right:2.5px solid #aaa;font-size:11px;font-weight:600;text-align:center;">${fTot}</td>
        ${sCols.join('')}
        <td style="padding:2px 3px;border:1px solid #bbb;font-size:11px;font-weight:600;text-align:center;">${sTot}</td>
      </tr>`;
    }

    const mhdr=(mbrs)=>mbrs.map(m=>`<th style="padding:2px 2px;border:1px solid #bbb;font-size:10px;background:#f8fafc;min-width:18px;"><div style="display:flex;flex-direction:column;align-items:center;">${[...m].map(c=>`<span style="line-height:1.3;font-size:10px;">${c}</span>`).join('')}</div></th>`).join('');
    const sl=`第${setNo}セット`;

    // 勝者
    const fPts=fTeam?Number(fTeam[`set${setNo}pts`]||0):0;
    const sPts=sTeam?Number(sTeam[`set${setNo}pts`]||0):0;
    const winner=fPts>sPts?fTeam:sPts>fPts?sTeam:null;
    const resultHtml=winner?`<div style="padding:5px 8px;background:#f8fafc;border-top:1px solid #bbb;text-align:center;font-size:12px;font-weight:700;color:#111;">${winner.teamName} 勝利</div>`:`<div style="padding:5px 8px;background:#f8fafc;border-top:1px solid #bbb;text-align:center;font-size:12px;font-weight:700;color:#111;">引き分け</div>`;

    return`<div style="margin-bottom:16px;border:1px solid #bbb;border-radius:6px;overflow:hidden;">
      <div style="background:#f8fafc;padding:5px 10px;font-size:13px;font-weight:700;border-bottom:1px solid #bbb;text-align:center;">${sl}</div>
      <div style="overflow-x:auto;">
        <table style="border-collapse:collapse;width:100%;">
          <thead>
            <tr>
              <th style="padding:3px;border:1px solid #bbb;background:#f8fafc;"></th>
              <th colspan="${fMbrs.length}" style="padding:3px;border:1px solid #bbb;border-right:2.5px solid #aaa;background:#f8fafc;font-size:12px;">${fTeam?fTeam.teamName:''}</th>
              <th style="padding:3px;border:1px solid #bbb;border-right:2.5px solid #aaa;background:#f8fafc;font-size:11px;">計</th>
              <th colspan="${sMbrs.length}" style="padding:3px;border:1px solid #bbb;background:#f8fafc;font-size:12px;">${sTeam?sTeam.teamName:''}</th>
              <th style="padding:3px;border:1px solid #bbb;background:#f8fafc;font-size:11px;">計</th>
            </tr>
            <tr>
              <th style="border:1px solid #bbb;background:#f8fafc;"></th>
              ${mhdr(fMbrs)}
              <th style="padding:3px;border:1px solid #bbb;border-right:2.5px solid #aaa;background:#f8fafc;font-size:10px;">計</th>
              ${mhdr(sMbrs)}
              <th style="padding:3px;border:1px solid #bbb;background:#f8fafc;font-size:10px;">計</th>
            </tr>
          </thead>
          <tbody>${rows2}</tbody>
        </table>
      </div>
      ${resultHtml}
    </div>`;
  }).join('');

  const m=ss.selectedMatch;
  return`<div style="padding:8px 0 4px;">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
      <button class="btn btn-gray btn-sm" id="btn-bk-score-view">← 戻る</button>
      <div style="font-size:16px;font-weight:700;">📋 スコアシート</div>
    </div>
    <div style="font-size:13px;color:#6b7280;margin-bottom:8px;">
      ${m?m.teamName:''} &nbsp;|&nbsp; ${matchId}
    </div>
    ${setsHtml}
  </div>`;
}

// ===== 配信中大会の管理 =====
async function publishActiveEvent(eventCode){
  if(!AD.githubPat||!AD.githubPat.startsWith('ghp_')){
    alert('GitHub Personal Access Tokenが設定されていません。');
    return false;
  }
  const jsonBody=JSON.stringify({activeEventCode:eventCode},null,2);
  const apiUrl='https://api.github.com/repos/longbeachknit/molkkymania-deta/contents/active.json';
  try{
    let sha=null;
    // ?t=Date.now() でCDNキャッシュをバイパスし、常に最新のSHAを取得する（古いSHAだとPUTが409で失敗するため）
    const getRes=await fetch(apiUrl+'?t='+Date.now(),{headers:{'Authorization':'token '+AD.githubPat},cache:'no-store'});
    if(getRes.ok){const d=await getRes.json();sha=d.sha;}
    const body={
      message: eventCode?'Set active event: '+eventCode:'Stop broadcast',
      content: btoa(unescape(encodeURIComponent(jsonBody)))
    };
    if(sha)body.sha=sha;
    const res=await fetch(apiUrl,{
      method:'PUT',
      headers:{'Authorization':'token '+AD.githubPat,'Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    return res.ok;
  }catch(e){
    console.error('active.json配信エラー:',e);
    return false;
  }
}

async function fetchActiveEvent(){
  // 1回の取得処理（毎回URLを変えてSafari等の強いキャッシュをバイパス）
  const doFetch=async()=>{
    // 【API経由】稼働状態(開催中かどうか)は即時反映が必要なため api.github.com から取得
    //   （raw はCDNキャッシュで最大約5分遅れるため、大会の開始/停止の反映が遅くなる）
    const url=GITHUB_DATA_BASE+'/active.json?t='+Date.now()+'_'+Math.random().toString(36).slice(2);
    const res=await fetch(url,{cache:'no-store',headers:{'Accept':'application/vnd.github.v3+json'}});
    if(!res.ok)throw new Error('HTTP '+res.status);
    const apiData=await res.json();
    const b64=apiData.content.replace(/\s/g,'');
    const binary=atob(b64);
    const bytes=new Uint8Array(binary.length);
    for(let i=0;i<binary.length;i++)bytes[i]=binary.charCodeAt(i);
    return JSON.parse(new TextDecoder('utf-8').decode(bytes));
  };
  try{
    return await doFetch();
  }catch(e1){
    // 1回目失敗 → 0.5秒待って再試行（Safariのキャッシュ・一時的な通信エラー対策）
    await new Promise(r=>setTimeout(r,500));
    try{
      return await doFetch();
    }catch(e2){
      console.warn('active.json取得失敗:',e2);
      return null;
    }
  }
}

// 修正②：hasOwnProperty で空文字("")を正しく判定し、falsyバグを解消
// リモート取得成功時は必ずその値（空文字含む）を使用する
// リモート取得失敗（ネットワークエラー等）時のみ localStorage のコードにフォールバック
async function resolveActiveEventCode(){
  const remote=await fetchActiveEvent();
  if(remote&&remote.hasOwnProperty('activeEventCode'))return remote.activeEventCode||null;
  // ネットワークエラー等でremoteがnullの場合のみフォールバック
  console.warn('resolveActiveEventCode: リモート取得失敗、localStorageにフォールバック');
  return AD.activeEventCode||null;
}

async function publishSettings(tour,opts){
  const silent=opts&&opts.silent;
  if(!tour||!tour.eventCode){
    if(!silent)alert('大会コードが設定されていません。基本情報を先に保存してください。');
    return false;
  }
  if(!AD.githubPat||!AD.githubPat.startsWith('ghp_')){
    if(!silent)alert('GitHub Personal Access Tokenが設定されていません。\n管理者設定画面のトップで設定してください。');
    return false;
  }
  const payload={
    venueCode: tour.venueCode||'',
    eventCode: tour.eventCode,
    eventName: tour.eventName||'',
    gasUrl: tour.gasUrl||'',
    sheetUrl: tour.sheetUrl||'',
    priority: tour.priority||'tournament',
    matchRules: tour.matchRules||[],
    tourneyRules: tour.tourneyRules||[],
    roundRules: tour.roundRules||[],
    teams: encTeams(tour.teams||[]),
    eventPeriodStart: tour.eventPeriodStart||'',
    eventPeriodEnd: tour.eventPeriodEnd||'',
    receptionPw: tour.receptionPw||'',
    bracketTeamCount: Number(tour.bracketTeamCount)||64,
    systemChart: tour.systemChart||null,
    courtLayout: tour.courtLayout||{grid:'',labelTop:'',labelBottom:'',labelLeft:'',labelRight:'',centerLabel:{text:'',pos:'bottom'}},
    publishedAt: new Date().toISOString()
  };
  const fileName=tour.eventCode+'_settings.json';
  const jsonBody=JSON.stringify(payload,null,2);
  const apiUrl='https://api.github.com/repos/longbeachknit/molkkymania-deta/contents/'+fileName;

  const btn=document.getElementById('btn-publish-settings');
  if(btn&&!silent){btn.disabled=true;btn.textContent='配信中...';}

  try{
    // 既存ファイルのSHAを取得
    let sha=null;
    try{
      // ?t=Date.now() でCDNキャッシュをバイパスし、常に最新のSHAを取得する（古いSHAだとPUTが409で失敗するため）
      const getRes=await fetch(apiUrl+'?t='+Date.now(),{headers:{'Authorization':'token '+AD.githubPat},cache:'no-store'});
      if(getRes.ok){const d=await getRes.json();sha=d.sha;}
    }catch(e){}

    // アップロード
    const body={
      message:'Update '+fileName,
      content:btoa(unescape(encodeURIComponent(jsonBody)))
    };
    if(sha)body.sha=sha;
    const res=await fetch(apiUrl,{
      method:'PUT',
      headers:{'Authorization':'token '+AD.githubPat,'Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    if(res.ok){
      if(!silent)alert('✅ 配信完了！\n参加者が次回アクセス時に自動で設定が反映されます。');
      return true;
    } else {
      const err=await res.json();
      if(!silent)alert('❌ 配信失敗: '+(err.message||res.status));
      return false;
    }
  }catch(e){
    if(!silent)alert('❌ エラー: '+e.message);
    return false;
  }finally{
    if(btn){btn.disabled=false;btn.textContent='📡 設定を配信する';}
  }
}

//     colors:{ 列名:色キー }, loseArrows:{ "列名@行index":true/false } }
//   ・色は図の構成テキストとは分離して colors マップで管理（10色パレット）
//   ・loseArrows は自動判定の上書き（負け矢印を消す/出す）。未指定なら自動。
//   ・列名に \n または <br> を入れると2行に折り返す。
const SC_PALETTE=[
  {key:'gray',  label:'グレー（表裏）',  bg:'#D9D9D9',bd:'#9e9e9e',tx:'#333333'},
  {key:'pink',  label:'ピンク（3先）',  bg:'#F2DCDC',bd:'#D9A6A6',tx:'#5a2d2d'},
  {key:'green', label:'グリーン（2先）',bg:'#E2EFDA',bd:'#A9C98C',tx:'#2f4a1a'},
  {key:'blue',  label:'ブルー',        bg:'#DCE7F5',bd:'#9DB9E0',tx:'#1e3a66'},
  {key:'yellow',label:'イエロー',      bg:'#FBF0C9',bd:'#E6CF7A',tx:'#6b5510'},
  {key:'purple',label:'パープル',      bg:'#E7DDF2',bd:'#BFA6DD',tx:'#432a63'},
  {key:'orange',label:'オレンジ',      bg:'#FCE3CF',bd:'#EFB483',tx:'#7a3e12'},
  {key:'teal',  label:'ティール',      bg:'#D2EDEA',bd:'#8FCFC7',tx:'#134e48'},
  {key:'red',   label:'レッド',        bg:'#F6D4D2',bd:'#E59C97',tx:'#7a1f1a'},
  {key:'indigo',label:'インディゴ',    bg:'#D9DCEC',bd:'#A3A9D1',tx:'#2a2e63'}
];
const SC_COLORS={};SC_PALETTE.forEach(p=>{SC_COLORS[p.key]={bg:p.bg,bd:p.bd,tx:p.tx};});
function scEsc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function scCircled(n){const m=['','①','②','③','④','⑤','⑥','⑦','⑧','⑨','⑩'];return m[n]||('('+n+')');}
function scColorOf(v){
  v=String(v||'').trim().toLowerCase();
  const alias={'表裏':'gray','grey':'gray','round2':'gray','gy':'gray',
    '3先':'pink','best3':'pink','3sen':'pink',
    '2先':'green','best2':'green','2sen':'green',
    '青':'blue','黄':'yellow','紫':'purple','橙':'orange','緑':'green','赤':'red','灰':'gray'};
  if(SC_COLORS[v])return v;
  if(alias[v])return alias[v];
  return'green';
}
function fmtToColor(f){return f==='best3'?'pink':f==='round2'?'gray':'green';}
// 既存の壊れたデータ対策：「決勝」の直後に「3決」等が別セルに分かれていたら結合
function scRepairCols(columns){
  const isThird=s=>/^[0-9０-９]+\s*位?\s*決(定戦?)?$/.test(String(s||'').trim());
  return(columns||[]).map(col=>{
    const out=[];
    (col.cells||[]).forEach(cell=>{
      const prev=out.length?out[out.length-1]:null;
      if((prev==='決勝'||prev==='決勝戦')&&isThird(cell)){out[out.length-1]=prev+'、'+cell;}
      else{out.push(cell);}
    });
    return Object.assign({},col,{cells:out});
  });
}
// 列名を2行対応のHTMLに（\n / <br> を改行に）
function scNameHtml(name){return String(name==null?'':name).split(/\\n|<br\s*\/?>/i).map(scEsc).join('<br>');}
// 列の実効色を解決（colorsマップ優先、なければ旧col.color、なければgreen）
function scColData(ch,col){
  const k=(ch&&ch.colors&&ch.colors[col.name])||col.color||'green';
  return SC_COLORS[scColorOf(k)]||SC_COLORS.green;
}

// 大会ルール（試合区分×トーナメント種類×ラウンド名）から図のたたき台を自動生成
function buildSystemChartFromRules(obj){
  const mr=obj.matchRules||[],tr=obj.tourneyRules||[],rr=obj.roundRules||[];
  const usedMatch=[];rr.forEach(r=>{if(!usedMatch.includes(r.matchCode))usedMatch.push(r.matchCode);});
  const rowCodes=mr.map(m=>m.code).filter(c=>usedMatch.includes(c));
  usedMatch.forEach(c=>{if(!rowCodes.includes(c))rowCodes.push(c);});
  const rowLabels=rowCodes.map(c=>{const m=mr.find(x=>x.code===c);return(m&&m.name)?m.name:('第'+c+'試合');});
  const usedTour=[];rr.forEach(r=>{if(!usedTour.includes(r.tourneyCode))usedTour.push(r.tourneyCode);});
  const colCodes=tr.map(t=>t.code).filter(c=>usedTour.includes(c));
  usedTour.forEach(c=>{if(!colCodes.includes(c))colCodes.push(c);});
  const colors={};
  const columns=colCodes.map(tc=>{
    const tRule=tr.find(t=>t.code===tc);
    const byRow=rowCodes.map(mc=>{const rule=rr.find(r=>r.matchCode===mc&&r.tourneyCode===tc);return rule?(rule.round||''):null;});
    let start=byRow.findIndex(c=>c!=null);if(start<0)start=0;
    let cells=byRow.slice(start);
    while(cells.length&&cells[cells.length-1]==null)cells.pop();
    cells=cells.map(c=>c==null?'':c);
    const name=(tRule&&tRule.name)?tRule.name:('T'+tc);
    colors[name]=fmtToColor(tRule?tRule.fmt:'');
    return{name,startRow:start,note:'',cells};
  }).filter(c=>c.cells.length>0);
  const prelims=mr.filter(m=>!usedMatch.includes(m.code)).map(m=>m.name||('予選'+m.code));
  return{enabled:true,cornerLabel:'',prelims,rowLabels,
    legend:[{label:'表裏',color:'gray'},{label:'3先',color:'pink'},{label:'2先',color:'green'}],
    columns,colors,loseArrows:{}};
}

// 図オブジェクト → 構成テキスト（※色・矢印は含めない＝別管理）
function systemChartToText(ch){
  if(!ch)return'';
  const L=[];
  if(ch.cornerLabel)L.push('タイトル: '+ch.cornerLabel);
  if(ch.prelims&&ch.prelims.length)L.push('予選: '+ch.prelims.join(' | '));
  if(ch.rowLabels&&ch.rowLabels.length)L.push('行: '+ch.rowLabels.join(' | '));
  if(ch.legend&&ch.legend.length)L.push('凡例: '+ch.legend.map(x=>x.label+'='+x.color).join(' | '));
  L.push('');
  (ch.columns||[]).forEach(c=>{
    L.push([c.name,String((c.startRow||0)+1),c.note||'',(c.cells||[]).join(', ')].join(' | '));
  });
  return L.join('\n');
}

// 構成テキスト → 図オブジェクト（色・矢印は含まない）
// 列の書式: 新「名前 | 開始行 | 注記 | 回戦...」/ 旧「名前 | 色 | 開始行 | 注記 | 回戦...」両対応
function systemChartFromText(txt){
  const ch={enabled:true,cornerLabel:'',prelims:[],rowLabels:[],legend:[],columns:[],colors:{},loseArrows:{}};
  (txt||'').split('\n').forEach(raw=>{
    const line=raw.trim();
    if(!line||line[0]==='#')return;
    const km=line.match(/^([^|:：]+)[:：]\s*(.*)$/);
    const key=km?km[1].trim().toLowerCase():'';
    if(km&&/^(タイトル|title)$/.test(key)){ch.cornerLabel=km[2].trim();return;}
    if(km&&/^(予選|prelim|prelims)$/.test(key)){ch.prelims=km[2].split(/[|,，]/).map(x=>x.trim()).filter(Boolean);return;}
    if(km&&/^(行|行ラベル|rows|row)$/.test(key)){ch.rowLabels=km[2].split(/[|,，]/).map(x=>x.trim()).filter(Boolean);return;}
    if(km&&/^(凡例|legend)$/.test(key)){
      ch.legend=km[2].split('|').map(x=>x.trim()).filter(Boolean).map(p=>{const mm=p.split('=');return{label:(mm[0]||'').trim(),color:scColorOf(mm[1])};});
      return;
    }
    if(line.includes('|')){
      const f=line.split('|').map(x=>x.trim());
      const name=f[0]||'';
      let color=null,start,note,cellsRaw;
      // f[1]が整数なら新書式(開始行)、そうでなければ旧書式(色)
      if(/^\d+$/.test(f[1]||'')){
        start=parseInt(f[1],10);note=f[2]||'';cellsRaw=f[3]||'';
      }else{
        color=f[1]||null;start=parseInt(f[2],10);note=f[3]||'';cellsRaw=f[4]||'';
      }
      if(isNaN(start)||start<1)start=1;
      const cells=cellsRaw.split(/[,，]/).map(x=>x.trim());
      while(cells.length&&cells[cells.length-1]==='')cells.pop();
      if(name&&cells.length){
        const col={name,startRow:start-1,note,cells};
        if(color){const ck=scColorOf(color);ch.colors[name]=ck;col.color=ck;}
        ch.columns.push(col);
      }
    }
  });
  ch.columns=scRepairCols(ch.columns);
  return ch;
}

// 構成テキストを既存オブジェクトに適用（色・矢印は保持）
function scApplyStructureText(obj,text){
  const parsed=systemChartFromText(text);
  const oldColors=(obj&&obj.colors)?obj.colors:{};
  const oldArrows=(obj&&obj.loseArrows)?obj.loseArrows:{};
  const colors={};
  parsed.columns.forEach(c=>{
    // 旧テキスト由来の色 < 既存colorsマップ を優先
    if(oldColors[c.name])colors[c.name]=oldColors[c.name];
    else if(c.color)colors[c.name]=c.color;
  });
  // 既存マップのうち現存列のものを引き継ぎ（テキストに色が無い新書式でも保持）
  Object.keys(oldColors).forEach(n=>{if(!colors[n]&&parsed.columns.some(c=>c.name===n))colors[n]=oldColors[n];});
  parsed.colors=colors;
  // 矢印オーバーライドは現存する列に関係するものだけ残す
  const arrows={};
  Object.keys(oldArrows).forEach(k=>{const nm=k.split('@')[0];if(parsed.columns.some(c=>c.name===nm))arrows[k]=oldArrows[k];});
  parsed.loseArrows=arrows;
  return parsed;
}

function scIsConfigured(ch){return!!(ch&&((ch.columns&&ch.columns.length)||(ch.prelims&&ch.prelims.length)||ch.cornerLabel));}

// 図オブジェクト → 表示HTML。editable=true で矢印クリック編集用の属性を付与。
function renderSystemChart(ch,editable){
  if(!ch||!ch.columns||!ch.columns.length){
    return'<div style="font-size:13px;color:#9ca3af;padding:24px 12px;text-align:center;">試合システム図はまだ設定されていません。<br>管理者画面の「大会設定」または「ルールテンプレート」で登録してください。</div>';
  }
  const cols=scRepairCols(ch.columns),nCols=cols.length;
  const cellOf=(c,r)=>{const col=cols[c];const i=r-(col.startRow||0);return(i>=0&&i<col.cells.length)?col.cells[i]:null;};
  const hasCell=(c,r)=>{const v=cellOf(c,r);return v!=null&&v!=='';};
  const loseKey=(c,r)=>cols[c].name+'@'+r;
  const loseAuto=(c,r)=>hasCell(c,r)&&(c+1<nCols)&&hasCell(c+1,r+1);
  const loseActive=(c,r)=>{const ov=ch.loseArrows&&ch.loseArrows[loseKey(c,r)];if(ov===true)return true;if(ov===false)return false;return loseAuto(c,r);};
  let maxRows=0;cols.forEach(col=>{maxRows=Math.max(maxRows,(col.startRow||0)+col.cells.length);});
  const rowLabels=ch.rowLabels||[];
  const totalGrid=nCols*2-1;
  // 横スクロール不要で全体が収まるよう、幅を100%に固定し列幅を％配分する
  const labelPct=nCols>=5?9:11;
  const gapPct=nCols>=5?2.5:3;
  const cellPct=Math.max(6,(100-labelPct-(nCols-1)*gapPct)/nCols);
  const fs=nCols>=5?10:(nCols>=4?11:12);
  let cg='<colgroup>';
  cg+=`<col style="width:${labelPct}%">`;
  for(let c=0;c<nCols;c++){cg+=`<col style="width:${cellPct}%">`;if(c<nCols-1)cg+=`<col style="width:${gapPct}%">`;}
  cg+='</colgroup>';
  let h=`<table style="border-collapse:collapse;width:100%;table-layout:fixed;font-size:${fs}px;">`+cg;

  // ── ヘッダ ──
  h+='<tr>';
  h+=`<td style="background:${SC_COLORS.pink.bg};border:1px solid ${SC_COLORS.pink.bd};color:${SC_COLORS.pink.tx};font-weight:800;text-align:center;padding:6px 3px;white-space:normal;word-break:break-word;line-height:1.2;">${scNameHtml(ch.cornerLabel||'')}</td>`;
  for(let c=0;c<nCols;c++){
    h+=`<td style="border-bottom:2px solid #cfcfcf;font-weight:700;text-align:center;padding:6px 3px;color:#333;white-space:normal;word-break:break-word;overflow-wrap:anywhere;line-height:1.2;">${scNameHtml(cols[c].name)}</td>`;
    if(c<nCols-1)h+=`<td style="border-bottom:2px solid #cfcfcf;"></td>`;
  }
  h+='</tr>';
  h+=`<tr><td colspan="${totalGrid+1}" style="height:8px;"></td></tr>`;

  // ── 予選（横長バー）──
  (ch.prelims||[]).forEach((p,i)=>{
    h+='<tr>';
    h+=`<td style="text-align:center;padding:4px 1px;color:#444;white-space:normal;word-break:break-word;line-height:1.2;">予選${scCircled(i+1)}</td>`;
    h+=`<td colspan="${totalGrid}" style="background:${SC_COLORS.gray.bg};border:1px solid ${SC_COLORS.gray.bd};text-align:center;padding:8px;color:#333;font-weight:600;">${scEsc(p)}</td>`;
    h+='</tr>';
    h+=`<tr><td colspan="${totalGrid+1}" style="height:7px;"></td></tr>`;
  });

  // ── トーナメント本体 ──
  for(let r=0;r<maxRows;r++){
    if(cols.some(c=>(c.startRow||0)===r&&c.note)){
      h+='<tr><td></td>';
      for(let c=0;c<nCols;c++){
        const note=((cols[c].startRow||0)===r&&cols[c].note)?`<span style="font-size:9px;color:#555;white-space:normal;word-break:break-word;line-height:1.15;display:inline-block;">※${scEsc(cols[c].note)}</span>`:'';
        h+=`<td style="text-align:center;padding:2px 0;">${note}</td>`;
        if(c<nCols-1)h+='<td></td>';
      }
      h+='</tr>';
    }
    h+='<tr>';
    h+=`<td style="text-align:center;padding:3px 1px;color:#444;white-space:normal;word-break:break-word;line-height:1.2;">${scEsc(rowLabels[r]||('[第'+(r+1)+'試合]'))}</td>`;
    for(let c=0;c<nCols;c++){
      if(hasCell(c,r)){
        const cc=scColData(ch,cols[c]);
        h+=`<td style="background:${cc.bg};border:1px solid ${cc.bd};color:${cc.tx};text-align:center;padding:7px 3px;font-weight:600;white-space:normal;word-break:break-word;overflow-wrap:anywhere;line-height:1.25;">${scEsc(cellOf(c,r))}</td>`;
      }else{
        h+='<td></td>';
      }
      if(c<nCols-1)h+=`<td></td>`;
    }
    h+='</tr>';
    if(r<maxRows-1){
      h+='<tr><td></td>';
      for(let c=0;c<nCols;c++){
        const win=hasCell(c,r)&&hasCell(c,r+1);
        h+=`<td style="text-align:center;padding:0;height:16px;">${win?'<span style="color:#E24B4A;font-size:13px;font-weight:900;">↓</span>':''}</td>`;
        if(c<nCols-1){
          const active=loseActive(c,r);
          const toggleable=hasCell(c,r)&&hasCell(c+1,r+1);
          const arrow='<span style="display:inline-block;background:#DCEBFA;color:#2e72c4;border-radius:4px;padding:0 2px;font-size:11px;font-weight:900;line-height:1.4;">↘</span>';
          if(editable&&toggleable){
            const auto=loseAuto(c,r)?1:0;
            h+=`<td class="sc-arrow" data-k="${scEsc(loseKey(c,r))}" data-auto="${auto}" title="タップで負け矢印を表示／非表示" style="cursor:pointer;text-align:center;padding:0;vertical-align:middle;">${active?arrow:'<span style="opacity:0.28;font-size:12px;color:#378ADD;font-weight:900;">↘</span>'}</td>`;
          }else{
            h+=`<td style="text-align:center;padding:0;vertical-align:middle;">${active?arrow:''}</td>`;
          }
        }
      }
      h+='</tr>';
    }
  }
  h+='</table>';

  // ── 凡例 ──
  let legend='';
  if(ch.legend&&ch.legend.length){
    legend='<div style="display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:8px;">'+
      ch.legend.map(x=>{const cc=SC_COLORS[scColorOf(x.color)]||SC_COLORS.green;
        return`<div style="display:flex;align-items:center;gap:6px;"><span style="display:inline-block;width:26px;height:14px;background:${cc.bg};border:1px solid ${cc.bd};border-radius:3px;"></span><span style="font-size:12px;color:#374151;">${scEsc(x.label)}</span></div>`;
      }).join('')+'</div>';
  }
  // 矢印の凡例
  const arrowLegend='<div style="display:flex;flex-wrap:wrap;gap:14px;justify-content:center;margin-bottom:10px;">'+
    '<span style="font-size:11px;color:#374151;"><span style="color:#E24B4A;font-weight:900;">↓</span> 勝ち（次の回戦へ）</span>'+
    '<span style="font-size:11px;color:#374151;"><span style="display:inline-block;background:#DCEBFA;color:#2e72c4;border-radius:4px;padding:0 3px;font-weight:900;">↘</span> 負け（右のトーナメントへ）</span>'+
    '</div>';
  return legend+arrowLegend+`<div style="width:100%;padding:2px 0 6px;">${h}</div>`;
}


// ===== チームNo検索：一覧HTML生成（キーワードでチーム名を部分一致絞り込み） =====
function buildTeamSearchList(query){
  const tour=activeTour()||{teams:[]};
  const teams=(tour.teams||[]).slice().sort((a,b)=>parseInt(a.id,10)-parseInt(b.id,10));
  const q=String(query||'').trim().toLowerCase();
  const filtered=q?teams.filter(t=>String(t.name||'').toLowerCase().includes(q)||String(t.id||'').includes(q)):teams;
  if(teams.length===0){
    return`<div style="text-align:center;padding:24px;color:#9ca3af;font-size:14px;">参加チームが登録されていません</div>`;
  }
  if(filtered.length===0){
    return`<div style="text-align:center;padding:24px;color:#9ca3af;font-size:14px;">「${query}」に一致するチームが見つかりませんでした</div>`;
  }
  return`<div style="font-size:12px;color:#6b7280;margin-bottom:8px;">${filtered.length}チーム${q?'が一致':'を表示中'}</div>`
    +filtered.map(t=>`<div style="display:flex;align-items:center;gap:12px;background:#fff;border:1.5px solid #e5e7eb;border-radius:10px;padding:12px 14px;margin-bottom:8px;">
      <div style="background:#EEF2FF;color:#1d4ed8;border-radius:8px;padding:6px 10px;font-size:14px;font-weight:800;min-width:64px;text-align:center;">No.${t.id}</div>
      <div style="flex:1;font-size:15px;font-weight:700;color:#111;">${t.name||''}</div>
    </div>`).join('');
}

    function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

    /* チーム数から構造を導出。
       ・2の累乗（16/32/64）… シードなし
       ・それ以外（24/48）  … 上位がシード（1回戦免除）。シードは常にペアの上側。
       例) 24チーム: シード8 + 1回戦8試合 → 2回戦16人 → 8→4→2→1（5ラウンド） */
    function bracketStructure(N){
      let B=1; while(B<N) B*=2;
      const half=B/2;
      let seeds,r1Matches,r2Entrants;
      if(N===B){ seeds=0; r1Matches=N/2; r2Entrants=N/2; }
      else { r2Entrants=half; const r1Players=2*(N-half); r1Matches=r1Players/2; seeds=N-r1Players; }
      const roundSizes=[];
      if(r1Matches) roundSizes.push(r1Matches);
      let e=r2Entrants;
      while(e>=2){ roundSizes.push(e/2); e/=2; }
      return {seeds:seeds,r1Matches:r1Matches,r2Entrants:r2Entrants,roundSizes:roundSizes,hasSeeds:seeds>0};
    }
    const ST=bracketStructure(teamCount);

    // ラウンドr（0始まり）の試合配列を、必要数ぴったりに整えて返す（ヘッダー名に依存しない）
    function roundMatches(r){
      const want=ST.roundSizes[r]||0;
      const src=rawRounds[r];
      const ms=(src&&Array.isArray(src.matches))?src.matches.slice():[];
      while(ms.length<want)ms.push({team1:'',team2:'',win1:false,win2:false});
      ms.length=want;
      return ms;
    }
    const R=[];
    for(let r=0;r<ST.roundSizes.length;r++)R.push(roundMatches(r));

    // 優勝
    const finalM=(R[ST.roundSizes.length-1]||[])[0]||{team1:'',team2:'',win1:false,win2:false};
    const champion=finalM.win1?finalM.team1:(finalM.win2?finalM.team2:'');

    function buildVerticalSVG(){
      const ROW_H=22, PAD_TOP=16, PAD_BOTTOM=16;
      const LABEL_W=140, COL_W=46, CROWN_W=120;
      const BLACK='#111', RED='#dc2626';

      /* 最左のリーフを作る。
         シードあり: 2回戦の各試合について「シード(単独1行)」＋「1回戦ペア(2行)」を交互に置く
         シードなし: 1回戦の各試合＝ペア(2行) */
      const leaves=[];
      if(ST.hasSeeds){
        const r2=R[1]||[];
        for(let m=0;m<(ST.roundSizes[1]||0);m++){
          leaves.push({type:'seed', name:(r2[m]&&r2[m].team1)||''});
          const p=(R[0]||[])[m]||{team1:'',team2:''};
          leaves.push({type:'pair', m:m, names:[p.team1||'', p.team2||'']});
        }
      }else{
        const r1=R[0]||[];
        for(let m=0;m<(ST.roundSizes[0]||0);m++){
          const p=r1[m]||{team1:'',team2:''};
          leaves.push({type:'pair', m:m, names:[p.team1||'', p.team2||'']});
        }
      }

      // 各リーフのY座標
      let rows=0; leaves.forEach(l=>{rows+=(l.type==='seed'?1:2);});
      const svgH=PAD_TOP+rows*ROW_H+PAD_BOTTOM;
      const nRounds=ST.roundSizes.length;
      const svgW=LABEL_W+nRounds*COL_W+CROWN_W;

      let yc=PAD_TOP; const LY=[];
      leaves.forEach(l=>{
        if(l.type==='seed'){ LY.push({el:l,y:yc+ROW_H/2}); yc+=ROW_H; }
        else{
          const y1=yc+ROW_H/2, y2=yc+ROW_H+ROW_H/2;
          LY.push({el:l,y1:y1,y2:y2,y:(y1+y2)/2}); yc+=2*ROW_H;
        }
      });

      const parts=[];
      const x0=LABEL_W;
      function nameText(t,x,y){
        const s=esc(String(t||'').trim());
        if(s==='')return '';
        return `<text x="${x}" y="${y}" dominant-baseline="central" font-size="10" fill="#111">${s.length>12?s.slice(0,12)+'…':s}</text>`;
      }
      function seg(x1,y1,x2,y2,red){
        return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${red?RED:BLACK}" stroke-width="${red?2.5:1}"/>`;
      }
      function winSide(m){ if(!m)return 0; return m.win1?1:(m.win2?2:0); }

      // 最左：チーム名 ＋ 1回戦（ペア）の合流線
      LY.forEach(e=>{
        const l=e.el;
        if(l.type==='seed'){
          parts.push(nameText(l.name,4,e.y));
        }else{
          parts.push(nameText(l.names[0],4,e.y1));
          parts.push(nameText(l.names[1],4,e.y2));
          const mm=(R[0]||[])[l.m]||{};
          const ws=winSide(mm), rT=ws===1, rB=ws===2, rO=ws!==0;
          const xM=x0+COL_W;
          parts.push(seg(x0,e.y1,xM,e.y1,rT));
          parts.push(seg(x0,e.y2,xM,e.y2,rB));
          parts.push(seg(xM,e.y1,xM,e.y,rT));
          parts.push(seg(xM,e.y,xM,e.y2,rB));
          parts.push(seg(xM,e.y,xM+COL_W,e.y,rO));   // 次ラウンドへ
        }
      });

      // ノード（次ラウンド以降の合流点）を作る
      let nodes=[], colBase;
      if(ST.hasSeeds){
        // 2回戦: (シード, 1回戦勝者) のペアで合流
        const r2=R[1]||[];
        const xM=x0+2*COL_W;
        for(let m=0;m<(ST.roundSizes[1]||0);m++){
          const top=LY[2*m], bot=LY[2*m+1];
          if(!top||!bot)continue;
          const yT=top.y, yB=bot.y, yP=(yT+yB)/2;
          const ws=winSide(r2[m]), rT=ws===1, rB=ws===2, rO=ws!==0;
          // シードは最左からこの列まで一直線
          parts.push(seg(x0,yT,xM,yT,rT));
          parts.push(seg(xM,yT,xM,yP,rT));
          parts.push(seg(xM,yP,xM,yB,rB));
          parts.push(seg(xM,yP,xM+COL_W,yP,rO));
          nodes.push({y:yP});
        }
        colBase=xM;
      }else{
        LY.forEach(e=>nodes.push({y:e.y}));
        colBase=x0+COL_W;
      }

      // 残りのラウンド
      const startR=ST.hasSeeds?2:1;
      for(let r=startR;r<ST.roundSizes.length;r++){
        const md=R[r]||[];
        const xM=colBase+COL_W;
        const next=[];
        for(let m=0;m<ST.roundSizes[r];m++){
          const a=nodes[2*m], b=nodes[2*m+1];
          if(!a||!b)continue;
          const yT=a.y, yB=b.y, yP=(yT+yB)/2;
          const ws=winSide(md[m]), rT=ws===1, rB=ws===2, rO=ws!==0;
          parts.push(seg(xM,yT,xM,yP,rT));
          parts.push(seg(xM,yP,xM,yB,rB));
          parts.push(seg(xM,yP,xM+COL_W,yP,rO));
          next.push({y:yP});
        }
        nodes=next; colBase=xM;
      }

      // 最右：王冠＋優勝枠
      const yF=nodes[0]?nodes[0].y:PAD_TOP;
      const xC=colBase+COL_W;
      const cN=esc(String(champion||'').trim());
      parts.push(`<text x="${xC+CROWN_W/2-24}" y="${yF-16}" font-size="22">👑</text>`);
      parts.push(`<rect x="${xC}" y="${yF-12}" width="${CROWN_W-10}" height="24" rx="4" fill="#fff" stroke="${cN?RED:'#9ca3af'}" stroke-width="${cN?2.5:1.5}"/>`);
      if(cN!=='')parts.push(`<text x="${xC+7}" y="${yF}" dominant-baseline="central" font-size="11" font-weight="700" fill="#b45309">${cN.length>9?cN.slice(0,9)+'…':cN}</text>`);

      return `<svg width="${svgW}" height="${svgH}" viewBox="0 0 ${svgW} ${svgH}" style="display:block;font-family:inherit;">${parts.join('')}</svg>`;
    }

    const svg = rawRounds.length===0 ? '' : buildVerticalSVG();
    const seedNote = ST.hasSeeds
      ? `${teamCount}チーム（上位${ST.seeds}チームは1回戦免除のシード）`
      : `${teamCount}チーム`;

    return`<div style="padding:16px;max-width:820px;margin:0 auto;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
        <button id="btn-ti-sub-back" style="padding:6px 12px;border-radius:8px;border:1.5px solid #e5e7eb;background:#f9fafb;cursor:pointer;font-size:14px;color:#374151;">← 戻る</button>
        <div style="font-size:17px;font-weight:700;color:#111;">🏆 決勝トーナメント表</div>
      </div>
      ${loading?`<div style="text-align:center;padding:32px;color:#9ca3af;">読み込み中...</div>`
      :err?`<div style="padding:16px;background:#fee2e2;border-radius:10px;color:#dc2626;font-size:13px;">${err}</div>`
      :rawRounds.length===0?`<div style="text-align:center;padding:32px;color:#9ca3af;">まだ配信されていません</div>`
      :`<div style="text-align:center;margin-bottom:10px;">
          <div style="font-size:12px;color:#92400e;font-weight:700;">🏆 優勝</div>
          <div style="font-size:20px;font-weight:800;color:#b45309;margin-top:2px;min-height:26px;">${champion?esc(champion):'<span style=\"color:#d1d5db;font-size:14px;\">未確定</span>'}</div>
          <div style="font-size:11px;color:#9ca3af;margin-top:4px;">${seedNote}</div>
        </div>
        <div style="overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid #f3f4f6;border-radius:10px;padding:6px;">
          <div style="display:inline-block;">${svg}</div>
        </div>
        <div style="font-size:11px;color:#9ca3af;text-align:center;margin-top:10px;line-height:1.6;">
          勝ち上がったチームのラインが<span style="color:#dc2626;font-weight:700;">赤</span>く伸びていきます。<br>
          チーム名は一番左の列に表示されます。下・横にスクロールできます。
        </div>`}
    </div>`;
  }

  // ── サブ画面：レギュレーション ──
  if(v==='regulation'){
    const sections=S._tiSections||null;
    const text=S._tiRegulation||'';
    const loading=S._tiLoading;
    const err=S._tiError;
    const hasData=sections?sections.length>0:text.trim().length>0;

    // 箇条書き行（・で始まる）の折り返しにインデントを付ける関数
    function fmtContent(str){
      return str.split('\n').map(line=>{
        const trimmed=line.trimStart();
        if(trimmed.startsWith('・')){
          return`<div style="display:flex;gap:0;margin-bottom:4px;"><span style="flex-shrink:0;">・</span><span style="flex:1;">${trimmed.slice(1)}</span></div>`;
        }
        return trimmed?`<div style="margin-bottom:4px;">${trimmed}</div>`:'<div style="margin-bottom:2px;"></div>';
      }).join('');
    }

    return`<div style="padding:16px;max-width:480px;margin:0 auto;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px;">
        <button id="btn-ti-sub-back" style="padding:6px 12px;border-radius:8px;border:1.5px solid #e5e7eb;background:#f9fafb;cursor:pointer;font-size:14px;color:#374151;">← 戻る</button>
        <div style="font-size:17px;font-weight:700;color:#111;">📜 レギュレーション</div>
      </div>
      <div style="margin-bottom:22px;">
        <div style="font-size:16px;font-weight:700;color:#111;margin-bottom:8px;padding-bottom:6px;border-bottom:2px solid #e5e7eb;">試合システム</div>
        <div style="font-size:12px;color:#6b7280;margin-bottom:12px;">一度負けると右のトーナメントへ移動します。今いるトーナメント・回戦から、残りの試合数を確認できます。</div>
        <div id="sc-view-wrap" style="background:#fff;border:1px solid #eee;border-radius:12px;padding:12px 8px;">${renderSystemChart(tour?tour.systemChart:null)}</div>
      </div>
      ${loading?`<div style="text-align:center;padding:32px;color:#9ca3af;">読み込み中...</div>`
      :err?`<div style="padding:16px;background:#fee2e2;border-radius:10px;color:#dc2626;font-size:13px;">${err}</div>`
      :!hasData?`<div style="text-align:center;padding:32px;color:#9ca3af;">データがありません</div>`
      :sections
        ?sections.map(sec=>`
          <div style="margin-bottom:18px;">
            <div style="font-size:16px;font-weight:700;color:#111;margin-bottom:8px;padding-bottom:6px;border-bottom:2px solid #e5e7eb;">${sec.title}</div>
            <div style="font-size:14px;color:#374151;line-height:1.8;">${fmtContent(sec.content)}</div>
          </div>`).join('')
        :`<div style="font-size:14px;color:#374151;line-height:1.8;">${fmtContent(text)}</div>`}
    </div>`;
  }

  // ── サブ画面：予選結果 ──
  if(v==='prelim'){
    const loading=S._tiLoading;
    const err=S._tiError;
    const teams=S._tiPrelim||[];
    const q=(S._tiPrelimQuery||'').trim();
    const sel=S._tiPrelimSelected||null;

    // 検索ボックス＋結果表示（チーム名プルダウン／チームNo入力のタブ切替）
    const pMode=S._tiPrelimMode||'select';
    const pModeTab=(mv,l)=>`<button class="ti-prelim-mode-tab" data-mode="${mv}" style="flex:1;padding:9px 4px;font-size:13px;font-weight:700;border:none;border-radius:8px;background:${pMode===mv?'#1D9E75':'#f3f4f6'};color:${pMode===mv?'#fff':'#6b7280'};cursor:pointer;">${l}</button>`;
    const pTeamsSorted=teams.slice().sort((a,b)=>parseInt(a.teamNo,10)-parseInt(b.teamNo,10));
    const pSelectedNo=sel?String(sel.teamNo):'';
    const pInputBlock=pMode==='select'
      ?(pTeamsSorted.length>0
        ?`<select id="ti-prelim-select" style="width:100%;padding:10px 12px;border:1.5px solid #d1d5db;border-radius:10px;font-size:15px;background:#fff;">
            <option value="">-- チームを選択 --</option>
            ${pTeamsSorted.map(t=>`<option value="${t.teamNo}" ${pSelectedNo===String(t.teamNo)?'selected':''}>No.${t.teamNo}　${t.teamName||''}</option>`).join('')}
          </select>`
        :`<div style="font-size:13px;color:#9ca3af;padding:8px 0;">チームデータがありません</div>`)
      :`<div style="display:flex;gap:8px;">
          <input type="text" id="ti-prelim-input" value="${q}" placeholder="チームNo（例: 001）" inputmode="numeric"
            style="flex:1;padding:10px 12px;border:1.5px solid #d1d5db;border-radius:10px;font-size:15px;"/>
          <button id="ti-prelim-search" style="padding:10px 18px;background:#1d4ed8;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;">検索</button>
        </div>`;
    const searchBox=`<div style="margin-bottom:16px;">
      <div style="display:flex;gap:8px;margin-bottom:10px;">
        ${pModeTab('select','チーム名から選ぶ')}
        ${pModeTab('no','チームNoで入力')}
      </div>
      ${pInputBlock}
    </div>`;

    let body='';
    if(loading){body=`<div style="text-align:center;padding:32px;color:#9ca3af;">読み込み中...</div>`;}
    else if(err){body=`<div style="padding:16px;background:#fee2e2;border-radius:10px;color:#dc2626;font-size:13px;">${err}</div>`;}
    else if(sel){
      const setRow=(label,opp,a,b)=>{
        return`<div style="border:1.5px solid #e5e7eb;border-radius:10px;padding:12px;margin-bottom:10px;">
          <div style="font-size:13px;font-weight:700;color:#374151;margin-bottom:6px;">${label}　<span style="font-weight:400;color:#6b7280;">vs ${opp||'-'}</span></div>
          <div style="display:flex;gap:8px;">
            <div style="flex:1;text-align:center;background:#f8fafc;border-radius:8px;padding:8px;"><div style="font-size:11px;color:#9ca3af;">1セット目</div><div style="font-size:18px;font-weight:700;color:#111;">${a!==''?a:'-'}</div></div>
            <div style="flex:1;text-align:center;background:#f8fafc;border-radius:8px;padding:8px;"><div style="font-size:11px;color:#9ca3af;">2セット目</div><div style="font-size:18px;font-weight:700;color:#111;">${b!==''?b:'-'}</div></div>
          </div>
        </div>`;
      };
      body=`
        <div style="background:#fff;border:1.5px solid #e5e7eb;border-radius:12px;padding:16px;margin-bottom:16px;">
          <div style="font-size:16px;font-weight:700;color:#111;margin-bottom:2px;">No.${sel.teamNo}　${sel.teamName||''}</div>
          <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px;">
            <div style="text-align:center;background:#eff6ff;border-radius:8px;padding:10px 4px;"><div style="font-size:11px;color:#6b7280;">勝利数</div><div style="font-size:20px;font-weight:700;color:#1d4ed8;">${sel.wins||'0'}</div></div>
            <div style="text-align:center;background:#f0fdf4;border-radius:8px;padding:10px 4px;"><div style="font-size:11px;color:#6b7280;">引分</div><div style="font-size:20px;font-weight:700;color:#16a34a;">${sel.draws||'0'}</div></div>
            <div style="text-align:center;background:#fef3c7;border-radius:8px;padding:10px 4px;"><div style="font-size:11px;color:#6b7280;">合計点</div><div style="font-size:20px;font-weight:700;color:#d97706;">${sel.total||'0'}</div></div>
            <div style="text-align:center;background:#faf5ff;border-radius:8px;padding:10px 4px;"><div style="font-size:11px;color:#6b7280;">順位</div><div style="font-size:20px;font-weight:700;color:#9333ea;">${sel.rank||'-'}</div></div>
          </div>
        </div>
        <div style="font-size:14px;font-weight:700;color:#111;margin-bottom:10px;">各予選の結果</div>
        ${setRow('予選①',sel.opp1,sel.p1a,sel.p1b)}
        ${setRow('予選②',sel.opp2,sel.p2a,sel.p2b)}
        ${setRow('予選③',sel.opp3,sel.p3a,sel.p3b)}
      `;
    }
    else if(q){
      body=`<div style="text-align:center;padding:24px;color:#9ca3af;">「${q}」のチームが見つかりませんでした</div>`;
    }
    else{
      body=`<div style="text-align:center;padding:24px;color:#9ca3af;">${pMode==='select'?'チームを選択してください':'チームNoを入力して検索してください'}</div>`;
    }

    return`<div style="padding:16px;max-width:480px;margin:0 auto;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px;">
        <button id="btn-ti-sub-back" style="padding:6px 12px;border-radius:8px;border:1.5px solid #e5e7eb;background:#f9fafb;cursor:pointer;font-size:14px;color:#374151;">← 戻る</button>
        <div style="font-size:17px;font-weight:700;color:#111;">🏅 予選結果</div>
      </div>
      ${searchBox}
      ${body}
    </div>`;
  }

  // ── サブ画面：チームNo検索（チーム名キーワード → チームNo一覧） ──
  if(v==='teamsearch'){
    const q=S._tsQuery||'';
    return`<div style="padding:16px;max-width:480px;margin:0 auto;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px;">
        <button id="btn-ti-sub-back" style="padding:6px 12px;border-radius:8px;border:1.5px solid #e5e7eb;background:#f9fafb;cursor:pointer;font-size:14px;color:#374151;">← 戻る</button>
        <div style="font-size:17px;font-weight:700;color:#111;">🪪 チームNoを検索</div>
      </div>
      <div style="margin-bottom:12px;">
        <input type="text" id="ts-input" value="${q}" placeholder="チーム名のキーワードを入力"
          style="width:100%;padding:11px 12px;border:1.5px solid #d1d5db;border-radius:10px;font-size:15px;"/>
      </div>
      <div id="ts-list">${S._tiLoading?`<div style="text-align:center;padding:32px;color:#9ca3af;">読み込み中...</div>`:buildTeamSearchList(q)}</div>
    </div>`;
  }

  // ── サブ画面：試合システム図（残り試合数） ──
  if(v==='system'){
    const loading=S._tiLoading;
    const err=S._tiError;
    const chart=tour?tour.systemChart:null;
    return`<div style="padding:16px;max-width:480px;margin:0 auto;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
        <button id="btn-ti-sub-back" style="padding:6px 12px;border-radius:8px;border:1.5px solid #e5e7eb;background:#f9fafb;cursor:pointer;font-size:14px;color:#374151;">← 戻る</button>
        <div style="font-size:17px;font-weight:700;color:#111;">📊 試合システム</div>
      </div>
      <div style="font-size:12px;color:#6b7280;margin-bottom:12px;">一度負けると右のトーナメントへ移動します。今いるトーナメント・回戦から、残りの試合数を確認できます。</div>
      ${loading?`<div style="text-align:center;padding:32px;color:#9ca3af;">読み込み中...</div>`
      :err?`<div style="padding:16px;background:#fee2e2;border-radius:10px;color:#dc2626;font-size:13px;">${err}</div>`
      :`<div id="sc-view-wrap" style="background:#fff;border:1px solid #eee;border-radius:12px;padding:12px 8px;">${renderSystemChart(chart)}</div>`}
    </div>`;
  }

// ===== コート図（テキストグリッド方式） =====
// gridテキスト（カンマ区切り×改行）を2次元配列に変換
function parseCourtGrid(gridText){
  if(!gridText)return[];
  return gridText.split(/\r?\n/).filter(l=>l.trim()!=='').map(row=>row.split(',').map(c=>c.trim()));
}
// グリッド内から該当コート番号のセル位置を探す（"037"と"37"のような0埋め差異を無視して一致判定）
function findCourtCell(gridArr,no){
  if(no==null||no==='')return null;
  const targetStr=String(no).trim();
  const targetNum=parseInt(targetStr,10);
  for(let r=0;r<gridArr.length;r++){
    for(let c=0;c<gridArr[r].length;c++){
      const val=gridArr[r][c];
      if(val===''||val==null)continue;
      if(val===targetStr)return{r,c};
      const valNum=parseInt(val,10);
      if(!isNaN(valNum)&&!isNaN(targetNum)&&valNum===targetNum)return{r,c};
    }
  }
  return null;
}
// 中央ラベル（本部など）の情報を取得。新形式{text,pos}優先、旧labelCenterはbottom扱いでフォールバック
function getCenterLabel(layout){
  if(layout.centerLabel&&layout.centerLabel.text)return layout.centerLabel;
  if(layout.labelCenter)return{text:layout.labelCenter,pos:'bottom'};
  return null;
}
// 上下左右＋中央ラベル（4方向のいずれかに配置可）で枠を組み立てる
function buildCourtMapShell(layout,gridHtml){
  const cl=getCenterLabel(layout);
  const badge=cl?`<div class="cm-label-center">${cl.text}</div>`:'';
  const pos=cl?(cl.pos||'bottom'):'';
  const top=layout.labelTop?`<div class="cm-label-top">${layout.labelTop}</div>`:'';
  const bottom=layout.labelBottom?`<div class="cm-label-bottom">${layout.labelBottom}</div>`:'';
  const leftEdge=layout.labelLeft?`<div class="cm-label-left">${layout.labelLeft}</div>`:'';
  const rightEdge=layout.labelRight?`<div class="cm-label-right">${layout.labelRight}</div>`:'';
  const leftInner=`${pos==='left'?badge:''}${leftEdge}`;
  const rightInner=`${rightEdge}${pos==='right'?badge:''}`;
  const leftSlot=leftInner?`<div class="cm-side-slot">${leftInner}</div>`:'';
  const rightSlot=rightInner?`<div class="cm-side-slot">${rightInner}</div>`:'';
  return`<div class="cm-outer">
    ${pos==='top'?badge:''}
    ${top}
    <div class="cm-middle">${leftSlot}<div class="cm-grid-wrap">${gridHtml}</div>${rightSlot}</div>
    ${pos==='bottom'?badge:''}
    ${bottom}
  </div>`;
}
// セル1個分のHTML（空白セルも枠線付きで描画する）
function courtCellHtml(val,isHi){
  const isX=val==='×'||val.toLowerCase()==='x';
  const isEmpty=val==='';
  return`<td class="cm-cell${isHi?' cm-hi':''}${isX?' cm-x':''}${isEmpty?' cm-empty':''}">${isEmpty?'':val}</td>`;
}
// コート図本体を描画し、該当コートのセルだけ色をつける
function renderCourtMapFull(layout,highlightNo){
  const gridArr=parseCourtGrid(layout&&layout.grid||'');
  if(!gridArr.length)return'';
  const pos=findCourtCell(gridArr,highlightNo);
  const maxCols=Math.max(...gridArr.map(r=>r.length));
  const rowsHtml=gridArr.map((row,ri)=>{
    let tds='';
    for(let ci=0;ci<maxCols;ci++){
      const val=row[ci]!==undefined?row[ci]:'';
      tds+=courtCellHtml(val,!!(pos&&pos.r===ri&&pos.c===ci));
    }
    return`<tr>${tds}</tr>`;
  }).join('');
  return buildCourtMapShell(layout,`<table class="cm-tbl">${rowsHtml}</table>`);
}
// 検索結果カードに埋め込むブロック
function renderCourtMapBlock(layout,highlightNo,matchId){
  if(!layout||!layout.grid||!layout.grid.trim())return'';
  return`<div style="margin-top:10px;border-top:1px dashed #e5e7eb;padding-top:10px;">
    <div style="font-size:12px;color:#6b7280;margin-bottom:8px;">コートの場所</div>
    ${renderCourtMapFull(layout,highlightNo)}
  </div>`;
}

  const results=S._courtSearchResults||null;
  const tourSrc=activeTour()||{teams:[],matchRules:[]};

    } else {
      resultHtml=results.map(r=>{
        const teamAInfo=(tourSrc.teams||[]).find(t=>t.id===r.teamA);
        const teamBInfo=(tourSrc.teams||[]).find(t=>t.id===r.teamB);
        const teamAName=teamAInfo?teamAInfo.name:('No.'+r.teamA);
        const teamBName=teamBInfo?teamBInfo.name:('No.'+r.teamB);
        // 新試合ID構造: 場所_大会_試合区分_コート（4パーツ）
        const parts=r.matchId.split('_');
        const courtNo=parts[3]||'?';      // コートは4番目(index 3)
        const labels=resolveMatchLabels(tourSrc,r.matchId,r.tourneyCode||'');
        return`<div class="card" style="padding:14px;margin-bottom:10px;">
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;">
            <div style="background:#1D9E75;color:#fff;border-radius:10px;padding:8px 14px;text-align:center;min-width:64px;">
              <div style="font-size:11px;opacity:0.85;">コート</div>
              <div style="font-size:26px;font-weight:800;line-height:1.1;">${parseInt(courtNo)||courtNo}</div>
            </div>
            <div>
              <div style="font-size:17px;font-weight:800;color:#111;line-height:1.25;">${labels.matchLabel}</div>
              ${labels.roundLabel?`<div style="font-size:16px;font-weight:700;color:#1D9E75;margin-top:2px;line-height:1.25;">${labels.roundLabel}</div>`:''}
              <div style="font-size:11px;color:#9ca3af;margin-top:3px;">試合ID: ${r.matchId}</div>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;background:#f8fafc;border-radius:8px;padding:10px;margin-bottom:10px;">
            <div style="flex:1;text-align:center;">
              <div style="font-size:14px;font-weight:700;color:#1D9E75;">${teamAName}</div>
              <div style="font-size:11px;color:#9ca3af;">No.${r.teamA}</div>
            </div>
            <div style="font-size:15px;font-weight:800;color:#9ca3af;">VS</div>
            <div style="flex:1;text-align:center;">
              <div style="font-size:14px;font-weight:700;color:#E24B4A;">${teamBName}</div>
              <div style="font-size:11px;color:#9ca3af;">No.${r.teamB}</div>
            </div>
          </div>
          <button class="btn btn-green cs-start-btn" data-matchid="${r.matchId}" style="width:100%;padding:12px;font-size:15px;font-weight:700;">この試合を開始する →</button>
          ${renderCourtMapBlock(tourSrc.courtLayout,courtNo,r.matchId)}
        </div>`;
      }).join('');
    }
  }

  const tourMatchRules=tourSrc.matchRules||[];
  const myCs=getValidMyTeam();
  const personalized=!!myCs;
  const expanded=!!S._courtSearchExpanded;
  // 検索フォーム本体（チーム名プルダウン／チームNo入力のタブ切替）
  const csMode=S._csMode||'select';
  const csModeTab=(v,l)=>`<button class="cs-mode-tab" data-mode="${v}" style="flex:1;padding:9px 4px;font-size:13px;font-weight:700;border:none;border-radius:8px;background:${csMode===v?'#1D9E75':'#f3f4f6'};color:${csMode===v?'#fff':'#6b7280'};cursor:pointer;">${l}</button>`;
  const csTeamsSorted=(tourSrc.teams||[]).slice().sort((a,b)=>parseInt(a.id,10)-parseInt(b.id,10));
  const csTeamBlock=csMode==='select'
    ?`<div>
        <div style="font-size:13px;color:#6b7280;margin-bottom:4px;">チーム名を選択</div>
        ${csTeamsSorted.length>0
          ?`<select id="cs-team-select" style="font-size:16px;">
              <option value="">-- チームを選択 --</option>
              ${csTeamsSorted.map(t=>`<option value="${t.id}" ${String(q.teamNo)===String(t.id)?'selected':''}>No.${t.id}　${t.name}</option>`).join('')}
            </select>`
          :`<div style="font-size:13px;color:#9ca3af;padding:8px 0;">参加チームが登録されていません</div>`}
      </div>`
    :`<div>
        <div style="font-size:13px;color:#6b7280;margin-bottom:4px;">チームNo</div>
        <input type="text" id="cs-team-no" value="${q.teamNo}" placeholder="例: 073" style="font-size:18px;letter-spacing:2px;text-align:center;"/>
      </div>`;
  const searchForm=`<div class="card" style="padding:14px;margin-bottom:12px;">
      <div style="display:flex;gap:8px;margin-bottom:12px;">
        ${csModeTab('select','チーム名から選ぶ')}
        ${csModeTab('no','チームNoで入力')}
      </div>
      <div style="display:grid;gap:10px;">
        ${csTeamBlock}
        <div>
          <div style="font-size:13px;color:#6b7280;margin-bottom:4px;">試合区分</div>
          ${tourMatchRules.length>0?`<select id="cs-match-code" style="font-size:16px;">
            <option value="">-- すべて --</option>
            ${tourMatchRules.map(r=>`<option value="${r.code}" ${q.matchCode===r.code?'selected':''}>${r.name||('試合区分'+r.code)}</option>`).join('')}
          </select>`:`<input type="text" id="cs-match-code" value="${q.matchCode}" placeholder="例: 02"/>`}
        </div>
      </div>
      <button class="btn btn-blue" id="btn-cs-search" style="width:100%;padding:13px;font-size:15px;margin-top:12px;">🔍 検索する</button>
    </div>`;
  // パーソナライズ時は折りたたみUI
  const formBlock=personalized
    ?(expanded
      ?`<div style="margin-bottom:12px;">
          <button class="btn btn-gray btn-sm" id="btn-cs-toggle" style="width:100%;margin-bottom:8px;font-size:13px;">▲ 検索を閉じる</button>
          ${searchForm}
        </div>`
      :`<button class="btn btn-gray btn-sm" id="btn-cs-toggle" style="width:100%;margin-bottom:12px;font-size:13px;padding:9px;">🔍 他のチーム・試合区分を検索</button>`)
    :searchForm;

  const headerTitle=personalized?'対戦コートを見る':'対戦コートを検索';
  return`<div style="padding:8px 0 4px;">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
      <button class="btn btn-gray btn-sm" id="btn-bk-court-search">← 戻る</button>
      <div style="font-size:18px;font-weight:700;color:#111;">${headerTitle}</div>
    </div>
    ${(()=>{const atour=activeTour();if(!atour)return'';const cache=_jsonCache[atour.eventCode];const upd=cache&&cache.data&&cache.data.updatedAt?new Date(cache.data.updatedAt).toLocaleTimeString('ja-JP'):'未取得';return`<div style="font-size:12px;color:#9ca3af;margin-bottom:10px;text-align:right;">最終更新: ${upd} <button class="btn btn-gray btn-xs" id="btn-cs-refresh" style="padding:3px 8px;font-size:11px;">🔄 更新</button></div>`;})()} 
    ${formBlock}
    ${results!==null?`<div style="font-size:13px;color:#6b7280;margin-bottom:8px;">${results.length}件見つかりました</div>`:''}
    ${resultHtml}
  </div>`;
}

// ===== 結果のみ：各セット点数入力画面 =====
function rResultOnlyInput(){
  const d=S._savedMatchIdData||{};
  const fmtLabel=S.fmt==='best2'?'2先':S.fmt==='best3'?'3先':'表裏';
  const nameA=S.teams[0]?S.teams[0].name:'チームA';
  const nameB=S.teams[1]?S.teams[1].name:'チームB';
  const scores=S._roScores||[];
  const nW=S.fmt==='best2'?2:S.fmt==='best3'?3:99;
  const maxSets=scores.length;

  // 各セットの勝敗を点数から判定（点数が両方入力されているセットのみ）
  const setResults=scores.map(([a,b])=>{
    const va=a===''?null:parseInt(a,10);
    const vb=b===''?null:parseInt(b,10);
    if(va===null||vb===null||isNaN(va)||isNaN(vb))return null; // 未入力
    if(va>vb)return 0;
    if(vb>va)return 1;
    return 'draw';
  });

  // 何セット目で試合が決着したか（2先/3先）。決着後のセットは「試合終了」で入力不要
  let decidedAt=-1; // 決着したセットのindex（0始まり）。-1なら未決着
  if(S.fmt!=='round2'){
    const w=[0,0];
    for(let i=0;i<setResults.length;i++){
      const r=setResults[i];
      if(r===0)w[0]++; else if(r===1)w[1]++;
      if(w[0]>=nW||w[1]>=nW){decidedAt=i;break;}
    }
  }
  const early=!!S._roEarly; // 時間切れで途中終了モード

  // 集計対象セット：通常決着していればそこまで、それ以外は入力済みセット全部
  const countUpto=decidedAt>=0?decidedAt:(scores.length-1);
  const wins=[0,0];
  setResults.forEach((r,i)=>{ if(i>countUpto)return; if(r===0)wins[0]++;else if(r===1)wins[1]++; });

  // 通常決着（先取到達）
  let matchWin=null,matchDecided=false;
  if(S.fmt!=='round2'){
    if(wins[0]>=nW){matchWin=0;matchDecided=true;}
    else if(wins[1]>=nW){matchWin=1;matchDecided=true;}
  }
  // 時間切れ終了時の勝敗判定（earlyロジック：セット勝数→合計点→同点ならモルックアウト）
  let earlyWin=null;       // 0/1/null
  let earlyNeedMolkout=false; // セット勝数・合計点ともに同点 → モルックアウト
  if(early&&!matchDecided){
    const played=scores.map(([a,b])=>[a===''?null:parseInt(a,10),b===''?null:parseInt(b,10)])
      .filter(([a,b])=>a!==null&&b!==null&&!isNaN(a)&&!isNaN(b));
    if(wins[0]>wins[1])earlyWin=0;
    else if(wins[1]>wins[0])earlyWin=1;
    else{
      const tot=[played.reduce((s,r)=>s+r[0],0),played.reduce((s,r)=>s+r[1],0)];
      if(tot[0]>tot[1])earlyWin=0;
      else if(tot[1]>tot[0])earlyWin=1;
      else if(played.length>0){earlyNeedMolkout=true;earlyWin=(S._roMolkoutWinner!=null?S._roMolkoutWinner:null);}
    }
  }

  // 点数プルダウン（50→0）
  // ・2先/3先：セットに引き分けが無いため、相手と同じ点数は選べない
  // ・表裏：両者50（同時上がり）だけ不可
  const optsFor=(val,oppVal)=>{
    const opp=String(oppVal);
    const noDraw=(S.fmt!=='round2');
    let o=`<option value=""${val===''?' selected':''}>-</option>`;
    for(let n=50;n>=0;n--){
      const sameAsOpp=(opp!==''&&opp===String(n));
      let disabled='';
      if(String(val)!==String(n)){
        if(noDraw&&sameAsOpp)disabled=' disabled';            // 2先/3先：同点不可
        else if(!noDraw&&n===50&&opp==='50')disabled=' disabled'; // 表裏：両者50不可
      }
      o+=`<option value="${n}"${String(val)===String(n)?' selected':''}${disabled}>${n}</option>`;
    }
    return o;
  };

  // 「試合終了後で入力不要」になるセット：通常決着後
  const isLockedSet=(i)=>{
    if(decidedAt>=0&&i>decidedAt)return true;
    return false;
  };

  // 表形式の点数入力（セット=行）
  const rowsHtml=scores.map(([a,b],i)=>{
    const ended=isLockedSet(i);
    const r=setResults[i];
    let resCell;
    if(ended){
      resCell=`<span style="font-size:11px;color:#9ca3af;">試合終了</span>`;
    }else if(r===null){
      resCell=`<span style="font-size:11px;color:#cbd5e1;">—</span>`;
    }else if(r==='draw'){
      resCell=`<span style="font-size:11px;font-weight:700;color:#92400e;">引分</span>`;
    }else{
      resCell=`<span style="display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:700;color:${C[r]};"><span style="width:7px;height:7px;border-radius:50%;background:${C[r]};"></span>勝</span>`;
    }
    const cellBg=ended?'#f9fafb':'#fff';
    const selStyle=`width:100%;padding:8px 4px;font-size:16px;font-weight:700;text-align:center;text-align-last:center;border:1.5px solid #d1d5db;border-radius:8px;background:${ended?'#f3f4f6':'#fff'};color:${ended?'#9ca3af':'#111'};`;
    return`<tr style="background:${cellBg};">
      <td style="padding:6px 4px;text-align:center;font-size:12px;font-weight:700;color:#6b7280;border-top:1px solid #eef2f7;">${i+1}</td>
      <td style="padding:6px 4px;border-top:1px solid #eef2f7;">
        <select class="ro-score" data-set="${i}" data-ti="0" ${ended?'disabled':''} style="${selStyle}border-color:${r===0&&!ended?C[0]:'#d1d5db'};">${optsFor(a,b)}</select>
      </td>
      <td style="padding:6px 4px;border-top:1px solid #eef2f7;">
        <select class="ro-score" data-set="${i}" data-ti="1" ${ended?'disabled':''} style="${selStyle}border-color:${r===1&&!ended?C[1]:'#d1d5db'};">${optsFor(b,a)}</select>
      </td>
      <td style="padding:6px 4px;text-align:center;border-top:1px solid #eef2f7;white-space:nowrap;">${resCell}</td>
    </tr>`;
  }).join('');

  const tableHtml=`<div style="border:1px solid #e5e7eb;border-radius:12px;overflow:hidden;margin-bottom:12px;">
    <table style="width:100%;border-collapse:collapse;table-layout:fixed;">
      <colgroup><col style="width:34px;"/><col/><col/><col style="width:46px;"/></colgroup>
      <thead>
        <tr style="background:#f8fafc;">
          <th style="padding:8px 4px;font-size:11px;color:#6b7280;font-weight:700;">ｾｯﾄ</th>
          <th style="padding:8px 4px;font-size:12px;font-weight:700;color:${C[0]};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${nameA}</th>
          <th style="padding:8px 4px;font-size:12px;font-weight:700;color:${C[1]};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${nameB}</th>
          <th style="padding:8px 4px;font-size:11px;color:#6b7280;font-weight:700;">勝敗</th>
        </tr>
      </thead>
      <tbody>${rowsHtml}</tbody>
    </table>
  </div>`;

  // 時間切れ終了トグル（大きめ・文言シンプル）
  const earlyToggle=`<label style="display:flex;align-items:center;gap:14px;padding:16px 16px;border:2px solid ${early?'#f59e0b':'#e5e7eb'};border-radius:12px;background:${early?'#fffbeb':'#fff'};cursor:pointer;margin-bottom:12px;">
    <input type="checkbox" id="ro-early-toggle" ${early?'checked':''} style="width:24px;height:24px;flex-shrink:0;accent-color:#f59e0b;cursor:pointer;"/>
    <span style="font-size:16px;font-weight:700;color:#92400e;">時間切れで終了した試合の場合はチェック</span>
  </label>`;

  // 結果サマリー
  const anyInput=setResults.some((r,i)=>r!==null&&!isLockedSet(i));
  // モルックアウトボタン（時間切れ同点時）
  const molkoutHtml=(early&&earlyNeedMolkout)?`
    <div class="card" style="padding:14px;margin-bottom:12px;background:#FFF7ED;border:1.5px solid #fed7aa;">
      <div style="font-size:13px;font-weight:700;color:#92400e;margin-bottom:4px;">🎯 モルックアウトで決着</div>
      <div style="font-size:12px;color:#a16207;margin-bottom:10px;line-height:1.5;">勝利セット数・合計点が等しいため、規定によりモルックアウトで決着をつけてください。勝者を選択してください。</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        ${[0,1].map(ti=>`<button class="ro-molkout-btn" data-id="${ti}" style="padding:14px 8px;border:2.5px solid ${S._roMolkoutWinner===ti?C[ti]:'#d1d5db'};background:${S._roMolkoutWinner===ti?LB[ti]:'#fff'};border-radius:10px;cursor:pointer;font-family:inherit;">
          <div style="display:flex;align-items:center;gap:8px;justify-content:center;">
            <div style="width:12px;height:12px;border-radius:50%;background:${C[ti]};flex-shrink:0;"></div>
            <span style="font-size:14px;font-weight:700;color:#111;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${ti===0?nameA:nameB}</span>
          </div>
          ${S._roMolkoutWinner===ti?`<div style="font-size:11px;color:${C[ti]};font-weight:700;margin-top:4px;">勝者 ✓</div>`:''}
        </button>`).join('')}
      </div>
    </div>`:'';

  // 表示用の勝敗
  const effWin=matchDecided?matchWin:(early?earlyWin:null);
  const effDecided=matchDecided||(early&&anyInput&&!earlyNeedMolkout)||(early&&earlyNeedMolkout&&S._roMolkoutWinner!=null);
  let summaryHtml='';
  if(anyInput){
    const resLabel=ti=>S.fmt==='round2'&&!early
      ?(effDecided?(effWin===null?'引き分け':effWin===ti?'勝ち':'負け'):'')
      :!effDecided?'—':effWin===null?'引き分け':effWin===ti?'勝ち':'負け';
    summaryHtml=`<div class="card" style="padding:14px;margin-bottom:12px;background:#f0fdf4;border:1.5px solid #bbf7d0;">
      <div style="font-size:13px;font-weight:700;color:#166534;margin-bottom:10px;">自動判定された結果（${fmtLabel}${early?' / 時間切れ':''}）</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        ${[0,1].map(ti=>{
          const rl=resLabel(ti);
          const col=rl==='勝ち'?'#1D9E75':rl==='負け'?'#E24B4A':'#9ca3af';
          return`<div style="background:#fff;border:1.5px solid ${C[ti]};border-radius:10px;padding:10px;text-align:center;">
            <div style="font-size:13px;font-weight:700;color:#111;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${ti===0?nameA:nameB}</div>
            <div style="font-size:18px;font-weight:800;color:${col};">${rl||'—'}</div>
            <div style="font-size:12px;color:#6b7280;margin-top:2px;">勝利 ${wins[ti]} セット</div>
          </div>`;
        }).join('')}
      </div>
      ${!early&&S.fmt!=='round2'&&matchDecided?`<div style="font-size:12px;color:#166534;margin-top:8px;text-align:center;">✓ ${decidedAt+1}セットで決着（残りセットは入力不要）</div>`:''}
      ${!early&&S.fmt!=='round2'&&!matchDecided?`<div style="font-size:12px;color:#92400e;margin-top:8px;text-align:center;">⚠️ まだ勝敗が確定していません（${fmtLabel}に達していません）</div>`:''}
      ${early&&earlyNeedMolkout&&S._roMolkoutWinner==null?`<div style="font-size:12px;color:#92400e;margin-top:8px;text-align:center;">セット勝数・合計点が同数のため、下のモルックアウトで勝者を選択してください</div>`:''}
    </div>`;
  }

  const err=S._roSubmitError?`<div style="font-size:13px;color:#b91c1c;margin-bottom:10px;text-align:center;">⚠️ ${S._roSubmitError}</div>`:'';
  // 送信可能条件
  let canSubmit;
  if(early){
    const hasInput=setResults.some(r=>r!==null);
    canSubmit=hasInput && (!earlyNeedMolkout || S._roMolkoutWinner!=null);
  }else{

    const ph=S._ucFrom||'matchOver';
    S._ucFrom=null;
    setTimeout(()=>{S.phase=ph;render();},0);
    return'<div style="padding:20px;text-align:center;color:#1D9E75;font-weight:600;">✓ 全て確認済みです。結果画面へ移動します...</div>';
  }
  const idx=S.ssIdx<uSets.length?S.ssIdx:0;
  const setIdx=uSets[idx]!=null?uSets[idx]:uSets[0];
  const sn=setIdx+1;
  const sl=S.fmt==='round2'?sn+'セット目':'第'+sn+'セット';
  const cset=S.sets[setIdx];
  if(!cset){return'<div style="padding:20px;text-align:center;color:#9ca3af;">データ取得エラー</div>';}

  // スコアシートを編集モードで表示

    </div>`:'<div style="font-size:15px;font-weight:700;color:#111;margin-bottom:10px;">'+sl+'</div>'}

    </button>
  </div>`;
}

      <button id="am-cancel" class="btn btn-gray" style="flex:1;">キャンセル</button>
      <button id="am-save" class="btn btn-green" style="flex:2;">追加する</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);

  setTimeout(()=>{
    const inp=document.getElementById('am-name');
    if(inp)inp.focus();
  },100);

  document.getElementById('am-cancel').onclick=()=>document.body.removeChild(overlay);
  document.getElementById('am-save').onclick=()=>{
    const inp=document.getElementById('am-name');
    if(!inp)return;
    const name=inp.value.trim();
    if(!name){alert('氏名を入力してください');return;}
    // チームのメンバーリストに追加（永続）
    if(!S.teams[ti].members.includes(name)){
      S.teams[ti].members.push(name);
    }
    // 投げ順リストに追加（まだなければ）
    if(S.pOrders[ti].length===0){
      S.pOrders[ti]=[...S.teams[ti].members];
    } else if(!S.pOrders[ti].includes(name)){
      S.pOrders[ti].push(name);
    }
    document.body.removeChild(overlay);
    render();
  };
}

function bindDrag(){
  [0,1].forEach(ti=>{
    const list=document.getElementById(`order-list-${ti}`);if(!list)return;
    let src=null;
    list.querySelectorAll('.order-item').forEach(item=>{
      item.addEventListener('dragstart',e=>{src=item;item.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
      item.addEventListener('dragend',()=>{item.classList.remove('dragging');list.querySelectorAll('.order-item').forEach(i=>i.classList.remove('over'));src=null;});
      item.addEventListener('dragover',e=>{e.preventDefault();list.querySelectorAll('.order-item').forEach(i=>i.classList.remove('over'));item.classList.add('over');});
      item.addEventListener('dragleave',()=>item.classList.remove('over'));
      item.addEventListener('drop',e=>{
        e.preventDefault();item.classList.remove('over');if(!src||src===item)return;
        const all=Array.from(list.querySelectorAll('.order-item'));
        const from=all.indexOf(src),to=all.indexOf(item);if(from<0||to<0)return;
        const base=S.pOrders[ti].length>0?[...S.pOrders[ti]]:S.teams[ti].members.slice();
        base.splice(to,0,base.splice(from,1)[0]);S.pOrders[ti]=base;src=null;render();
      });
    });
  });
}

function bind(){
  const app=document.getElementById('app');
  app.querySelectorAll('input[name="fmt"]').forEach(el=>{el.addEventListener('change',e=>{S.fmt=e.target.value;render();});});
  app.querySelectorAll('input[name="tl"]').forEach(el=>{el.addEventListener('change',e=>{S.turnLimit=e.target.value==='12';render();});});
  // 投擲人数 min/max ボタン
  const bpmn_=document.getElementById('btn-pm-min-');if(bpmn_)bpmn_.onclick=()=>{if(S.playerMin>1)S.playerMin--;render();};
  const bpmn_p=document.getElementById('btn-pm-min+');if(bpmn_p)bpmn_p.onclick=()=>{if(S.playerMin<S.playerMax&&S.playerMin<12)S.playerMin++;render();};
  const bpmx_=document.getElementById('btn-pm-max-');if(bpmx_)bpmx_.onclick=()=>{if(S.playerMax>S.playerMin&&S.playerMax>1)S.playerMax--;render();};
  const bpmx_p=document.getElementById('btn-pm-max+');if(bpmx_p)bpmx_p.onclick=()=>{if(S.playerMax<99)S.playerMax++;render();};
  // 外す / 参加ボタン
  app.querySelectorAll('.excl-toggle').forEach(btn=>{btn.addEventListener('click',()=>{
    const ti=parseInt(btn.dataset.team),m=btn.dataset.member;
    if(!S.pExclude[ti])S.pExclude[ti]=[];
    if(S.pExclude[ti].includes(m)){
      // 参加に戻す：元の位置（先頭から）に挿入
      S.pExclude[ti]=S.pExclude[ti].filter(x=>x!==m);
      // 投げ順リストで excluded でない人の末尾（=excludedの先頭）の位置に挿入
      const ord=S.pOrders[ti].length>0?S.pOrders[ti]:S.teams[ti].members.slice();
      const excl=S.pExclude[ti];
      const firstExclIdx=ord.findIndex(x=>excl.includes(x));
      const insertAt=firstExclIdx>=0?firstExclIdx:ord.length;
      if(!ord.includes(m)){ord.splice(insertAt,0,m);}
      else{
        // 現在の位置から一番下のactive位置へ
        const curIdx=ord.indexOf(m);
        ord.splice(curIdx,1);
        const newInsert=ord.findIndex(x=>excl.includes(x));
        ord.splice(newInsert>=0?newInsert:ord.length,0,m);
      }
      S.pOrders[ti]=ord;
    } else {
      // 外す：リスト内で一番下に移動
      const ord=S.pOrders[ti].length>0?[...S.pOrders[ti]]:S.teams[ti].members.slice();
      const idx=ord.indexOf(m);
      if(idx>=0){ord.splice(idx,1);ord.push(m);}
      S.pOrders[ti]=ord;
      S.pExclude[ti].push(m);
    }
    render();
  });});
  app.querySelectorAll('.move-up').forEach(btn=>{btn.addEventListener('click',()=>{
    const ti=parseInt(btn.dataset.team),idx=parseInt(btn.dataset.idx);
    const base=S.pOrders[ti].length>0?[...S.pOrders[ti]]:S.teams[ti].members.slice();
    if(idx<=0)return;[base[idx-1],base[idx]]=[base[idx],base[idx-1]];S.pOrders[ti]=base;render();
  });});
  app.querySelectorAll('.move-dn').forEach(btn=>{btn.addEventListener('click',()=>{
    const ti=parseInt(btn.dataset.team),idx=parseInt(btn.dataset.idx);
    const base=S.pOrders[ti].length>0?[...S.pOrders[ti]]:S.teams[ti].members.slice();
    if(idx>=base.length-1)return;[base[idx+1],base[idx]]=[base[idx],base[idx+1]];S.pOrders[ti]=base;render();
  });});
  const bn=document.getElementById('btn-next');
  if(bn)bn.onclick=()=>{
    [0,1].forEach(i=>{const n=document.getElementById(`tn${i}`),m=document.getElementById(`tm${i}`);if(n)S.teams[i].name=n.value||`チーム${i+1}`;if(m)S.teams[i].members=m.value.split(/[,、]/).map(s=>s.trim()).filter(Boolean);});
    S.pFirst=S.fid;S.pIdx=0;const _gn=gIO(0,S.fid);S.pOrders=_gn.orders;S.pExclude=_gn.excludes;S._orderFromBack=false;S.phase='firstChoice';render();
  };
  // firstChoice キャンセル：si=0ならsetup、それ以外はsetOver
  (function(){
    const _bfc=document.getElementById('btn-bk-first-cancel');
    if(_bfc)_bfc.onclick=function(){
      const si=S.pIdx!=null?S.pIdx:S.sets.length;
      const fromGame=S._cameFromGame;
      S.pIdx=null;S.pFirst=null;S.pOrders=[[],[]];S.pExclude=[[],[]];
      S._cameFromGame=false;
      if(fromGame||si>0){S.phase='setOver';}
      else{S.phase='setup';}
      render();
    };
    const _boc=document.getElementById('btn-bk-order-cancel');

  // 大会編集ハンドラ
  // 基本情報フィールドを tour オブジェクトに取り込む
  // ===== 大会コード重複チェック（ローカル＋GitHub） =====
  // この大会が元々持っていたコード（自分自身の配信済みファイルを誤検知しないため）
  const _ownOriginalCode=((AD.tournaments||[]).find(t=>t.id===S._editingTourId)||{}).eventCode||'';
  // ローカル（localStorage）の大会一覧から、同じコードを使う「別の大会」を探す
  function findLocalCodeConflict(code,selfId){
    if(!code)return null;
    return (AD.tournaments||[]).find(t=>t.eventCode===code&&t.id!==selfId)||null;
  }
  // GitHub上に {code}_settings.json が存在するか確認し、あれば中身（大会名・場所）を返す
  async function fetchRemoteCodeInfo(code){
    if(!code)return null;
    try{
      const data=await fetchSettingsJson(code);
      if(data&&data.eventCode)return data; // 存在する
      return null;
    }catch(e){return null;}
  }
  // コード欄のステータス表示を更新（ローカル即時 → GitHub非同期）
  let _codeCheckSeq=0;
  async function updateCodeStatus(){
    const input=document.getElementById('te-code');
    const statusEl=document.getElementById('te-code-status');
    if(!input||!statusEl)return;
    const code=input.value.trim();
    const selfId=S._editingTourId;
    if(!code){statusEl.style.color='#9ca3af';statusEl.textContent='大会コードを入力してください';return;}
    const nm=(name)=>name||'（大会名未設定）';
    // ① ローカルの衝突を即時表示
    const local=findLocalCodeConflict(code,selfId);
    if(local){
      const v=(AD.venues||[]).find(x=>x.code===local.venueCode);
      statusEl.style.color='#dc2626';
      statusEl.innerHTML='⚠️ このコードは「'+nm(local.eventName)+'」'+(v?'（'+v.name+'）':'')+'で使用中です';
      return;
    }
    // ② GitHub側を非同期チェック（最新の入力のみ反映するためseqで制御）
    const mySeq=++_codeCheckSeq;
    statusEl.style.color='#9ca3af';statusEl.textContent='確認中…';
    const remote=await fetchRemoteCodeInfo(code);
    if(mySeq!==_codeCheckSeq)return; // 入力が進んでいたら破棄
    if(remote&&code===_ownOriginalCode){
      // 自分自身が配信したファイル → 問題なし
      statusEl.style.color='#16a34a';
      statusEl.textContent='✅ この大会のコードとして配信済みです';
    }else if(remote){
      const v=(AD.venues||[]).find(x=>x.code===remote.venueCode);
      statusEl.style.color='#dc2626';
      statusEl.innerHTML='⚠️ このコードは配信済みです：「'+nm(remote.eventName)+'」'+(v?'（'+v.name+'）':'')+'\u3000上書きに注意してください';
    }else{
      statusEl.style.color='#16a34a';
      statusEl.textContent='✅ この大会ではまだこのコードは使われていません';
    }
  }

  async function savePublishAndClose(triggerBtn){
    const tour=AD.tournaments.find(t=>t.id===S._editingTourId);
    if(!tour){S._editingTourId=undefined;render();return;}
    captureBasicFields(tour);
    saveActiveTour(tour);
    // 大会コード重複チェック（配信前の最終確認）
    if(tour.eventCode){
      // ローカル：別の大会が同じコードを使用

      if(local){

          if(triggerBtn){triggerBtn.disabled=false;}
          return; // キャンセル：編集画面に留まる
        }
      } else if(tour.eventCode!==_ownOriginalCode){
        // GitHub：自分以外が配信済みのコード
        const remote=await fetchRemoteCodeInfo(tour.eventCode);
        if(remote){
          const v=(AD.venues||[]).find(x=>x.code===remote.venueCode);
          if(!confirm('⚠️ 大会コード「'+tour.eventCode+'」は、すでにGitHubに配信済みです。\n配信元：「'+(remote.eventName||'（大会名未設定）')+'」'+(v?'（'+v.name+'）':'')+'\n\nこのまま配信すると、その大会の設定・試合データを上書きします。\n\n本当にこのコードで配信しますか？')){
            if(triggerBtn){triggerBtn.disabled=false;}
            return; // キャンセル：編集画面に留まる
          }
        }
      }
    }
    let label=null;
    if(triggerBtn){label=triggerBtn.textContent;triggerBtn.disabled=true;triggerBtn.textContent='保存・配信中...';}
    let published=false;
    if(tour.eventCode){

    S._editingTourId=undefined;render();
