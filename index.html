<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;margin:0;padding:0;}
.app{padding:10px;max-width:480px;margin:0 auto;font-family:var(--font-sans);}
.btn{padding:8px 16px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer;font-size:14px;font-family:var(--font-sans);}
.btn:hover{background:var(--color-background-secondary);}
.btn:active{transform:scale(0.98);}
.btn-primary{color:#fff;border-color:transparent;}
.btn-red-o{background:var(--color-background-danger);color:var(--color-text-danger);border-color:var(--color-border-danger);}
.btn-xs{padding:4px 10px;font-size:12px;}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;}
input[type=text]{width:100%;padding:8px 10px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:#F3F4F6;color:var(--color-text-primary);font-size:15px;font-family:var(--font-sans);}
select{width:100%;padding:9px 10px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:#F3F4F6;color:var(--color-text-primary);font-size:15px;font-family:var(--font-sans);}
input[type=text]:focus,select:focus{outline:none;border-color:#1D9E75;background:#fff;}
.drag-item{padding:10px 12px;background:#F3F4F6;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);display:flex;align-items:center;gap:8px;font-size:14px;color:var(--color-text-primary);user-select:none;}
.drag-item.dragging{opacity:0.4;}
.drag-item.over{border-color:#1D9E75;background:#E1F5EE;}
.ss-wrap{overflow-x:auto;}
.ss-table{border-collapse:collapse;}
.ss-table th,.ss-table td{border:1px solid #ccc;text-align:center;vertical-align:middle;padding:4px 5px;}
.ss-table th{background:#F3F4F6;font-size:12px;font-weight:500;}
.ss-turn-col{width:22px;font-size:12px;color:#888;background:#F8F8F8;}
.ss-member-th{writing-mode:vertical-rl;text-orientation:mixed;font-size:12px;min-width:28px;padding:6px 3px;}
.ss-total-th{font-size:12px;min-width:32px;}
.ss-cell{font-size:13px;min-width:28px;}
.ss-total-cell{font-size:13px;font-weight:500;min-width:32px;background:#FAFAF6;}
.ss-team-header{font-size:13px;font-weight:500;padding:5px 6px;}
</style>
<div class="app" id="app"></div>
<script>
const COLORS=['#1D9E75','#E24B4A'];
const LIGHT_BG=['#E1F5EE','#FCEBEB'];
const LIGHT_BORDER=['#9FE1CB','#F7C1C1'];
const LIGHT_TEXT=['#085041','#A32D2D'];
const MAX=50,RESET=25,MAXM=3;

let S={
  phase:'setup',format:'best2',
  teams:[{id:0,name:'チームA',color:COLORS[0],members:[]},{id:1,name:'チームB',color:COLORS[1],members:[]}],
  sets:[],cur:0,firstId:0,showHist:false,
  pFirst:null,pIdx:null,pOrders:[[],[]],
  inputPts:'',inputMulti:'single',inputAimed:'cross',
  prevPhase:null
};

function fmtLabel(){return S.format==='best2'?'2先':S.format==='best3'?'3先':'表裏';}
function needsFirstChoice(idx){if(S.format==='best2')return idx===0||idx===2;if(S.format==='best3')return idx===0||idx===4;return idx===0;}
function isFinal(i){return(S.format==='best2'&&i===2)||(S.format==='best3'&&i===4);}
function autoFirst(nextIdx){
  const f=S.firstId;
  if(S.format==='best2')return nextIdx===1?1-f:f;
  if(S.format==='best3'){
    if(nextIdx===2){const w=[0,0];S.sets.slice(0,2).forEach(s=>{if(s.winnerId!=null)w[s.winnerId]++;});if(w[0]===2)return 1;if(w[1]===2)return 0;return 1-S.sets[1].firstTeamId;}
    if(nextIdx===3)return 1-S.sets[2].firstTeamId;
    return 1-f;
  }
  return 1-f;
}
function getInitialOrders(nextIdx,firstId){
  const orders=[[],[]];
  [0,1].forEach(ti=>{
    const isFirst=ti===firstId;let found=null;
    for(let i=S.sets.length-1;i>=0;i--){const s=S.sets[i];if((s.firstTeamId===ti)===isFirst){const o=s.teams[ti].order;if(o&&o.length>0){found=o;break;}}}
    if(!found&&S.sets.length>0){const prev=S.sets[S.sets.length-1];const o=prev.teams[ti].order;if(o&&o.length>0)found=o;}
    if(!found)found=S.teams[ti].members.slice();
    orders[ti]=found?[...found]:S.teams[ti].members.slice();
  });
  return orders;
}
function getTotals(){const t=[0,0];S.sets.forEach(s=>{t[0]+=s.teams[0].score;t[1]+=s.teams[1].score;});return t;}
function maxSets(){return S.format==='best2'?3:S.format==='best3'?5:2;}
function needWins(){return S.format==='best2'?2:S.format==='best3'?3:99;}
function matchWinner(){if(S.format==='round2')return null;const w=[0,0];S.sets.forEach(s=>{if(s.winnerId!=null)w[s.winnerId]++;});const n=needWins();return w[0]>=n?0:w[1]>=n?1:null;}
function mkSet(idx,fid,ord){return{idx,firstTeamId:fid,currentTeamId:fid,teams:[{id:0,score:0,misses:0,eliminated:false,throws:[],mi:0,order:ord[0]||[]},{id:1,score:0,misses:0,eliminated:false,throws:[],mi:0,order:ord[1]||[]}],winnerId:null,hist:[]};}
function cs(){return S.sets[S.cur];}
function getMbr(td,ti){const o=td.order.length>0?td.order:S.teams[ti].members;return o.length?o[td.mi%o.length]:null;}
function dots(n){return[0,1,2].map(i=>`<div style="width:11px;height:11px;border-radius:50%;background:${i<n?'#E24B4A':'var(--color-border-tertiary)'};border:0.5px solid ${i<n?'#E24B4A':'var(--color-border-secondary)'};" ></div>`).join('');}

function histTbl(upTo){
  const rows=S.sets.slice(0,upTo).map((ss,i)=>{
    const wn=ss.winnerId!=null?S.teams[ss.winnerId].name:'−';
    const lb=S.format==='round2'?`${i+1}セット`:`第${i+1}セット`;
    return`<tr style="border-top:0.5px solid var(--color-border-tertiary);">
      <td style="padding:5px 8px;font-size:13px;color:var(--color-text-secondary);">${lb}</td>
      <td style="padding:5px 8px;font-size:13px;text-align:center;font-weight:${ss.winnerId===0?500:400};color:var(--color-text-primary);">${ss.teams[0].score}</td>
      <td style="padding:5px 8px;font-size:13px;text-align:center;font-weight:${ss.winnerId===1?500:400};color:var(--color-text-primary);">${ss.teams[1].score}</td>
      <td style="padding:5px 8px;font-size:13px;text-align:center;">${wn}</td>
    </tr>`;
  }).join('');
  if(!rows)return'';
  return`<div class="card" style="margin-bottom:12px;">
    <div style="padding:8px 12px;border-bottom:0.5px solid var(--color-border-tertiary);font-size:13px;color:var(--color-text-secondary);">これまでのセット結果</div>
    <table style="width:100%;border-collapse:collapse;">
      <thead><tr>
        <th style="padding:5px 8px;font-size:12px;font-weight:400;color:var(--color-text-secondary);text-align:left;">セット</th>
        <th style="padding:5px 8px;font-size:12px;font-weight:400;color:var(--color-text-secondary);text-align:center;">${S.teams[0].name}</th>
        <th style="padding:5px 8px;font-size:12px;font-weight:400;color:var(--color-text-secondary);text-align:center;">${S.teams[1].name}</th>
        <th style="padding:5px 8px;font-size:12px;font-weight:400;color:var(--color-text-secondary);text-align:center;">勝者</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}
function doReset(){
  if(!window.confirm('これまでの結果をすべて破棄して試合を終了しますか？'))return;
  S={phase:'setup',format:S.format,teams:S.teams.map(t=>({...t,members:[...t.members]})),sets:[],cur:0,firstId:0,showHist:false,pFirst:null,pIdx:null,pOrders:[[],[]],inputPts:'',inputMulti:'single',inputAimed:'cross',prevPhase:null};render();
}
function goNextSet(ni){
  S.pIdx=ni;const fid=needsFirstChoice(ni)?S.firstId:autoFirst(ni);
  S.pFirst=fid;S.pOrders=getInitialOrders(ni,fid);
  S.phase=needsFirstChoice(ni)?'firstChoice':'orderSetup';render();
}

function render(){
  const app=document.getElementById('app');
  if(S.phase==='setup')app.innerHTML=rSetup();
  else if(S.phase==='firstChoice')app.innerHTML=rFirst();
  else if(S.phase==='orderSetup')app.innerHTML=rOrder();
  else if(S.phase==='game')app.innerHTML=rGame();
  else if(S.phase==='scoresheet')app.innerHTML=rScoreSheet();
  else if(S.phase==='setOver')app.innerHTML=rSetOver();
  else if(S.phase==='matchOver')app.innerHTML=rMatchOver();
  bind();
  if(S.phase==='orderSetup')setTimeout(()=>bindDrag(),0);
}

function rSetup(){
  return`<div style="padding:8px 0 4px;">
    <div style="font-size:20px;font-weight:500;color:var(--color-text-primary);margin-bottom:2px;">Mölkky スコアシート</div>
    <div style="font-size:13px;color:var(--color-text-secondary);margin-bottom:16px;">日本モルック協会公式ルール準拠</div>
    <div class="card" style="padding:14px;margin-bottom:12px;">
      <div style="font-size:15px;font-weight:500;color:var(--color-text-primary);margin-bottom:10px;">試合形式</div>
      <div style="display:grid;gap:8px;">
        ${[['best2','2セット先取'],['best3','3セット先取'],['round2','2セット勝負（表裏）']].map(([v,l])=>`
        <label style="display:flex;align-items:center;gap:10px;padding:10px 12px;border:0.5px solid ${S.format===v?'#1D9E75':'var(--color-border-tertiary)'};border-radius:var(--border-radius-md);cursor:pointer;background:${S.format===v?'#E1F5EE':'var(--color-background-primary)'};">
          <input type="radio" name="fmt" value="${v}" ${S.format===v?'checked':''} style="width:auto;accent-color:#1D9E75;"/>
          <span style="font-size:15px;color:${S.format===v?'#085041':'var(--color-text-primary)'};">${l}</span>
        </label>`).join('')}
      </div>
    </div>
    ${[0,1].map(i=>`<div class="card" style="padding:14px;margin-bottom:12px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
        <div style="width:12px;height:12px;border-radius:50%;background:${COLORS[i]};flex-shrink:0;"></div>
        <span style="font-size:15px;font-weight:500;color:var(--color-text-primary);">チーム ${i+1}</span>
      </div>
      <div style="margin-bottom:10px;"><div style="font-size:13px;color:var(--color-text-secondary);margin-bottom:4px;">チーム名</div><input type="text" id="tn${i}" value="${S.teams[i].name}"/></div>
      <div><div style="font-size:13px;color:var(--color-text-secondary);margin-bottom:4px;">メンバー（カンマ区切り、省略可）</div><input type="text" id="tm${i}" value="${S.teams[i].members.join(', ')}" placeholder="例: 田中, 鈴木"/></div>
    </div>`).join('')}
    <button class="btn btn-primary" id="btn-next" style="width:100%;padding:14px;font-size:16px;background:#1D9E75;">次へ →</button>
  </div>`;
}

function rFirst(){
  const si=S.pIdx!=null?S.pIdx:S.sets.length,sn=si+1;
  const sl=S.format==='round2'?`${sn}セット目`:`第${sn}セット`;
  const pf=S.pFirst!=null?S.pFirst:S.firstId;
  const fin=isFinal(si),tots=getTotals(),isDraw=fin&&tots[0]===tots[1];
  const chooser=fin&&!isDraw?(tots[0]>tots[1]?0:1):null;
  let top='';
  if(fin){top=isDraw
    ?`<div style="background:var(--color-background-warning);border:0.5px solid var(--color-border-warning);border-radius:var(--border-radius-md);padding:12px;margin-bottom:14px;font-size:14px;color:var(--color-text-warning);">それまでのセットの合計点が同点のため、ドローショットをして先攻後攻を決めてください。</div>`
    :`<div style="background:#E1F5EE;border:0.5px solid #9FE1CB;border-radius:var(--border-radius-md);padding:12px;margin-bottom:14px;font-size:14px;color:#085041;">合計点が高い <strong>${S.teams[chooser].name}（${tots[chooser]}点）</strong> が先攻後攻を選択できます。</div>`;}
  return`<div style="padding:8px 0 4px;">
    ${si>0?histTbl(si):''}
    <div style="font-size:16px;font-weight:500;color:var(--color-text-primary);margin-bottom:8px;">${sl} 先攻チームを選択</div>${top}
    ${[0,1].map(i=>`<div style="margin-bottom:10px;">
      <button class="btn fc-btn" data-id="${i}" style="width:100%;padding:16px;border:2px solid ${pf===i?COLORS[i]:'var(--color-border-tertiary)'};background:${pf===i?LIGHT_BG[i]:'var(--color-background-primary)'};">
        <div style="display:flex;align-items:center;gap:12px;justify-content:center;">
          <div style="width:14px;height:14px;border-radius:50%;background:${COLORS[i]};"></div>
          <span style="font-size:17px;font-weight:500;color:var(--color-text-primary);">${S.teams[i].name}</span>
          ${fin&&chooser!=null&&i===chooser?`<span style="font-size:12px;background:${LIGHT_BG[i]};color:${LIGHT_TEXT[i]};padding:3px 8px;border-radius:99px;">選択権あり</span>`:''}
          ${pf===i?`<span style="font-size:12px;background:${LIGHT_BG[i]};color:${LIGHT_TEXT[i]};padding:3px 9px;border-radius:99px;">先攻</span>`:''}
        </div>
      </button>
    </div>`).join('')}
    <div style="display:flex;gap:8px;margin-top:12px;">
      ${si===0?`<button class="btn" id="btn-bk-setup" style="flex:1;">戻る</button>`:''}
      <button class="btn btn-primary" id="btn-go-order" style="${si===0?'flex:2;':'width:100%;'}padding:14px;font-size:16px;background:#1D9E75;">投げ順を設定 →</button>
    </div>
  </div>`;
}

function rOrder(){
  const si=S.pIdx!=null?S.pIdx:S.sets.length,sn=si+1;
  const sl=S.format==='round2'?`${sn}セット目`:`第${sn}セット`;
  const pf=S.pFirst!=null?S.pFirst:0;
  const autoSwap=!needsFirstChoice(si);
  return`<div style="padding:8px 0 4px;">
    ${si>0?histTbl(si):''}
    <div style="font-size:16px;font-weight:500;color:var(--color-text-primary);margin-bottom:6px;">${sl} 投げ順の設定</div>
    ${autoSwap?`<div style="background:${LIGHT_BG[pf]};border:0.5px solid ${LIGHT_BORDER[pf]};border-radius:var(--border-radius-md);padding:10px 12px;margin-bottom:12px;font-size:13px;color:${LIGHT_TEXT[pf]};">先攻後攻は自動入れ替え：先攻 <strong>${S.teams[pf].name}</strong></div>`:''}
    <div style="font-size:13px;color:var(--color-text-secondary);margin-bottom:12px;">ドラッグで並び替えができます</div>
    ${[0,1].map(ti=>{
      const team=S.teams[ti],ord=S.pOrders[ti].length>0?S.pOrders[ti]:team.members;
      if(!team.members.length)return`<div class="card" style="padding:12px;margin-bottom:12px;opacity:0.5;"><div style="font-size:14px;color:var(--color-text-secondary);">${team.name} — メンバー未登録</div></div>`;
      return`<div class="card" style="padding:12px;margin-bottom:12px;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
          <div style="width:10px;height:10px;border-radius:50%;background:${COLORS[ti]};flex-shrink:0;"></div>
          <span style="font-size:14px;font-weight:500;color:var(--color-text-primary);">${team.name}</span>
          <span style="font-size:13px;color:var(--color-text-secondary);margin-left:auto;">${pf===ti?'先攻':'後攻'}</span>
        </div>
        <div id="order-list-${ti}" data-team="${ti}" style="display:grid;gap:6px;">
          ${ord.map((m,i)=>`<div class="drag-item" data-team="${ti}" data-idx="${i}">
            <span style="font-size:13px;color:var(--color-text-secondary);min-width:22px;">${i+1}.</span>
            <span style="font-size:15px;">${m}</span>
            <span style="margin-left:auto;font-size:20px;color:var(--color-text-secondary);cursor:grab;">≡</span>
          </div>`).join('')}
        </div>
      </div>`;
    }).join('')}
    <div style="display:flex;gap:8px;margin-top:4px;">
      <button class="btn" id="btn-bk-first" style="flex:1;">← 戻る</button>
      <button class="btn btn-primary" id="btn-start" style="flex:2;padding:14px;font-size:16px;background:#1D9E75;">ゲーム開始</button>
    </div>
  </div>`;
}

function rGame(){
  const cset=cs(),ct=cset.currentTeamId;
  const wins=[0,0];S.sets.forEach((s,si)=>{if(si<S.cur&&s.winnerId!=null)wins[s.winnerId]++;});
  const sn=S.cur+1,sl=S.format==='round2'?`${sn}セット目`:`第${sn}セット`;
  const ctd=cset.teams[ct],cm=getMbr(ctd,ct);
  const hasPrev=S.cur>0;
  const isFirst=cset.teams[0].throws.length===0&&cset.teams[1].throws.length===0;
  const panelBg=LIGHT_BG[ct],panelBorder=LIGHT_BORDER[ct],panelText=LIGHT_TEXT[ct],panelColor=COLORS[ct];
  return`<div style="padding:6px 0 4px;">
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:10px;flex-wrap:wrap;">
      <div style="font-size:12px;padding:3px 8px;border-radius:99px;background:var(--color-background-secondary);color:var(--color-text-secondary);">${fmtLabel()}</div>
      <div style="font-size:15px;font-weight:500;color:var(--color-text-primary);">${sl}</div>
      ${S.format!=='round2'?`<div style="display:flex;gap:4px;">${[0,1].map(i=>`<div style="font-size:12px;padding:3px 8px;border-radius:99px;background:${wins[i]>0?LIGHT_BG[i]:'var(--color-background-secondary)'};color:${wins[i]>0?LIGHT_TEXT[i]:'var(--color-text-secondary)'};">${S.teams[i].name} ${wins[i]}勝</div>`).join('')}</div>`:''}
      <div style="display:flex;gap:4px;margin-left:auto;flex-wrap:wrap;justify-content:flex-end;">
        ${hasPrev?`<button class="btn btn-xs" id="btn-hist">${S.showHist?'▲':'▼ 前セット結果'}</button>`:''}
        <button class="btn btn-xs" id="btn-scoresheet">スコアシート</button>
        ${isFirst?`<button class="btn btn-xs" id="btn-bk-order">← 戻る</button>`:`<button class="btn btn-xs" id="btn-undo" ${cset.hist.length===0?'disabled':''}>↩ 戻す</button>`}
        <button class="btn btn-xs" id="btn-reset">最初から</button>
      </div>
    </div>
    ${S.showHist&&hasPrev?histTbl(S.cur):''}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;">
      ${[0,1].map(i=>{
        const td=cset.teams[i],ic=i===ct;
        return`<div class="card" style="border-color:${ic?COLORS[i]:'var(--color-border-tertiary)'};border-width:${ic?'2.5px':'0.5px'};">
          <div style="padding:8px 12px;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;gap:6px;">
            <div style="width:10px;height:10px;border-radius:50%;background:${COLORS[i]};flex-shrink:0;"></div>
            <span style="font-size:13px;font-weight:500;color:var(--color-text-primary);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${S.teams[i].name}</span>
            ${td.eliminated?'<span style="font-size:11px;color:var(--color-text-danger);background:var(--color-background-danger);padding:1px 6px;border-radius:99px;">失格</span>':ic?`<span style="font-size:11px;color:${LIGHT_TEXT[i]};background:${LIGHT_BG[i]};padding:1px 6px;border-radius:99px;">投てき中</span>`:''}
          </div>
          <div style="padding:12px 14px;text-align:center;border-bottom:0.5px solid var(--color-border-tertiary);">
            <span style="font-size:56px;font-weight:500;line-height:1;color:var(--color-text-primary);">${td.score}</span>
            <div style="font-size:13px;color:var(--color-text-secondary);margin-top:2px;">/ 50点</div>
          </div>
          <div style="padding:6px 12px;display:flex;align-items:center;gap:6px;">
            <span style="font-size:12px;color:var(--color-text-secondary);">連続ミス</span>
            <div style="display:flex;gap:4px;">${dots(td.misses)}</div>
          </div>
        </div>`;
      }).join('')}
    </div>
    ${!cset.winnerId?`
    <div class="card" style="border-color:${panelColor};border-width:1.5px;">
      <div style="padding:12px 14px;background:${panelBg};border-bottom:0.5px solid ${panelBorder};">
        <div style="font-size:12px;color:${panelText};margin-bottom:4px;">${cset.firstTeamId===ct?'先攻':'後攻'}</div>
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
          <div style="width:12px;height:12px;border-radius:50%;background:${panelColor};flex-shrink:0;"></div>
          <span style="font-size:20px;font-weight:500;color:${panelText};">${S.teams[ct].name}</span>
          ${cm?`<span style="font-size:18px;color:${panelText};font-weight:500;">/ ${cm}</span>`:''}
          <span style="font-size:16px;color:${panelText};margin-left:auto;font-weight:500;">${ctd.score} 点</span>
        </div>
      </div>
      <div style="padding:12px 14px;">
        <div style="display:grid;gap:10px;margin-bottom:10px;">
          <div>

// ★ スコアシート（投擲点数 + 計列に累計、ミス=横棒、3ミス失格行追加）
function buildScoreSheet(cset){
  const firstTi=cset.firstTeamId;
  const secondTi=1-firstTi;
  const members=[
    cset.teams[0].order.length>0?cset.teams[0].order:S.teams[0].members.length>0?S.teams[0].members:['投てき者'],
    cset.teams[1].order.length>0?cset.teams[1].order:S.teams[1].members.length>0?S.teams[1].members:['投てき者']
  ];
  const nM=[members[0].length,members[1].length];
  const maxT=Math.max(cset.teams[0].throws.length,cset.teams[1].throws.length);
  const colspanFirst=nM[firstTi]+1;
  const colspanSecond=nM[secondTi]+1;

  function memberHeaders(ti){
    return members[ti].map(m=>`<th class="ss-member-th" style="border:1px solid #ccc;">${m}</th>`).join('');
  }

  // スコアセルの表示：投擲で取った点数（1〜12）または横棒
  function throwScoreDisplay(th,r,multi){
    if(!th) return'';
    if(th.miss) return`<span style="color:#888;">—</span>`;
    // 取得点数（rawPtsがあればそれ、なければptsを使う）
    const scored=th.raw!==undefined?th.raw:th.pts;
    if(r==='circle'&&multi) return`<span style="display:inline-flex;align-items:center;justify-content:center;border:1.5px solid var(--color-text-primary);border-radius:2px;min-width:20px;height:20px;padding:0 2px;font-size:12px;font-weight:500;">${scored}</span>`;
    if(r==='circle') return`<span style="display:inline-flex;align-items:center;justify-content:center;border:1.5px solid var(--color-text-primary);border-radius:50%;width:22px;height:22px;font-size:12px;font-weight:500;">${scored}</span>`;
    return`<span style="font-weight:500;">${scored}</span>`;
  }

  // 計列：常に累計点を表示（ミス後も前回と同じ累計を表示）
  function totalDisplay(th,prevCumul){
    if(!th) return'';
    if(th.miss) return`<span style="color:#666;">${prevCumul}</span>`;
    if(th.over) return`<span style="color:#BA7517;">${th.cumul}</span>`;
    return`<span style="font-weight:500;">${th.cumul}</span>`;
  }

  function buildRows(){
    const rows=[];
    // 各チームの直前累計（ミス時に前の値を参照するため）
    const prevCumul=[0,0];

    for(let t=0;t<maxT;t++){
      const thF=cset.teams[firstTi].throws[t];
      const thS=cset.teams[secondTi].throws[t];
      const mIdxF=thF?t%nM[firstTi]:-1;
      const mIdxS=thS?t%nM[secondTi]:-1;

      // 先攻チームのセル
      const cellsF=members[firstTi].map((_,mi)=>{
        if(mi!==mIdxF||!thF) return`<td class="ss-cell" style="border:1px solid #ccc;"></td>`;
        return`<td class="ss-cell" style="border:1px solid #ccc;">${throwScoreDisplay(thF,thF.result,thF.multi)}</td>`;
      }).join('');
      const totalFHtml=totalDisplay(thF,prevCumul[firstTi]);
      if(thF&&!thF.miss) prevCumul[firstTi]=thF.cumul;

      // 後攻チームのセル
      const cellsS=members[secondTi].map((_,mi)=>{
        if(mi!==mIdxS||!thS) return`<td class="ss-cell" style="border:1px solid #ccc;"></td>`;
        return`<td class="ss-cell" style="border:1px solid #ccc;">${throwScoreDisplay(thS,thS.result,thS.multi)}</td>`;
      }).join('');
      const totalSHtml=totalDisplay(thS,prevCumul[secondTi]);
      if(thS&&!thS.miss) prevCumul[secondTi]=thS.cumul;

      rows.push(`<tr>
        <td class="ss-turn-col" style="border:1px solid #ccc;font-size:12px;color:#888;text-align:center;">${t+1}</td>
        ${cellsF}
        <td class="ss-total-cell" style="border:1px solid #ccc;border-right:2px solid #aaa;">${totalFHtml}</td>
        ${cellsS}
        <td class="ss-total-cell" style="border:1px solid #ccc;">${totalSHtml}</td>
      </tr>`);
    }

    // 3ミス失格行：失格チームがいる場合、最終行に0/50を追記
    const elimF=cset.teams[firstTi].eliminated;
    const elimS=cset.teams[secondTi].eliminated;
    if(elimF||elimS){
      const tNum=maxT+1;
      const fFinalTotal=elimF?`<span style="color:#E24B4A;font-weight:500;">0</span>`:`<span style="color:#1D9E75;font-weight:500;">50</span>`;
      const sFinalTotal=elimS?`<span style="color:#E24B4A;font-weight:500;">0</span>`:`<span style="color:#1D9E75;font-weight:500;">50</span>`;
      const emptyF=members[firstTi].map(()=>`<td class="ss-cell" style="border:1px solid #ccc;background:#FFF8F8;"></td>`).join('');
      const emptyS=members[secondTi].map(()=>`<td class="ss-cell" style="border:1px solid #ccc;background:#FFF8F8;"></td>`).join('');
      rows.push(`<tr style="background:#FFF8F8;">
        <td class="ss-turn-col" style="border:1px solid #ccc;font-size:11px;color:#E24B4A;text-align:center;">失</td>
        ${emptyF}
        <td class="ss-total-cell" style="border:1px solid #ccc;border-right:2px solid #aaa;background:#FFF8F8;">${fFinalTotal}</td>
        ${emptyS}
        <td class="ss-total-cell" style="border:1px solid #ccc;background:#FFF8F8;">${sFinalTotal}</td>
      </tr>`);
    }

    if(!rows.length){
      rows.push(`<tr><td colspan="${1+colspanFirst+colspanSecond}" style="border:1px solid #ccc;padding:10px;font-size:12px;color:#aaa;text-align:center;">まだ投てきなし</td></tr>`);
    }
    return rows.join('');
  }

  return`<div class="ss-wrap">
    <table class="ss-table">
      <thead>
        <tr>
          <th class="ss-turn-col" style="border:1px solid #ccc;"></th>
          <th colspan="${colspanFirst}" class="ss-team-header" style="border:1px solid #ccc;border-right:2px solid #aaa;background:${LIGHT_BG[firstTi]};color:${LIGHT_TEXT[firstTi]};">
            ${S.teams[firstTi].name}（先攻）${cset.teams[firstTi].eliminated?' 失格':''}
          </th>
          <th colspan="${colspanSecond}" class="ss-team-header" style="border:1px solid #ccc;background:${LIGHT_BG[secondTi]};color:${LIGHT_TEXT[secondTi]};">
            ${S.teams[secondTi].name}（後攻）${cset.teams[secondTi].eliminated?' 失格':''}
          </th>
        </tr>
        <tr>
          <th class="ss-turn-col" style="border:1px solid #ccc;"></th>
          ${memberHeaders(firstTi)}
          <th class="ss-total-th" style="border:1px solid #ccc;border-right:2px solid #aaa;">計</th>
          ${memberHeaders(secondTi)}
          <th class="ss-total-th" style="border:1px solid #ccc;">計</th>
        </tr>
      </thead>
      <tbody>${buildRows()}</tbody>
    </table>
  </div>
  <div style="display:flex;gap:16px;margin-top:10px;flex-wrap:wrap;">
    ${[firstTi,secondTi].map(ti=>`<div style="display:flex;align-items:center;gap:6px;">
      <div style="width:10px;height:10px;border-radius:50%;background:${COLORS[ti]};"></div>
      <span style="font-size:13px;color:var(--color-text-primary);">${S.teams[ti].name}</span>
      <span style="font-size:12px;color:var(--color-text-secondary);">連続ミス</span>
      <div style="display:flex;gap:3px;">${dots(cset.teams[ti].misses)}</div>
    </div>`).join('')}
  </div>`;
}

function updatePreview(){
  const pv=document.getElementById('preview');if(!pv)return;
  if(!S.inputPts){pv.textContent='';return;}
  if(S.inputPts==='miss'){pv.textContent='ミス（0点）記録';return;}
  const pts=parseInt(S.inputPts),multi=S.inputMulti==='multi',res=S.inputAimed;
  const cset=cs(),ct=cset.currentTeamId,td=cset.teams[ct],ns=td.score+pts;
  const sym=res==='circle'?(multi?' ［□囲み］':' ［○囲み］'):' ［×］';
  if(ns>50)pv.textContent=`${td.score}+${pts}=${ns} → 25点にリセット${sym}`;
  else if(ns===50)pv.textContent=`${td.score}+${pts}=50点！セット勝利${sym}`;
  else pv.textContent=`${td.score}+${pts}=${ns}点${sym}`;
}

function bindDrag(){
  [0,1].forEach(ti=>{
    const list=document.getElementById(`order-list-${ti}`);if(!list)return;
    let dragSrc=null;
    list.querySelectorAll('.drag-item').forEach(item=>{
      item.setAttribute('draggable','true');
      item.addEventListener('dragstart',e=>{dragSrc=item;item.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
      item.addEventListener('dragend',()=>{item.classList.remove('dragging');list.querySelectorAll('.drag-item').forEach(i=>i.classList.remove('over'));dragSrc=null;});
      item.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='move';list.querySelectorAll('.drag-item').forEach(i=>i.classList.remove('over'));item.classList.add('over');});
      item.addEventListener('dragleave',()=>item.classList.remove('over'));
      item.addEventListener('drop',e=>{
        e.preventDefault();item.classList.remove('over');if(!dragSrc||dragSrc===item)return;
        const all=Array.from(list.querySelectorAll('.drag-item'));
        const from=all.indexOf(dragSrc),to=all.indexOf(item);if(from<0||to<0)return;
        const base=S.pOrders[ti].length>0?[...S.pOrders[ti]]:S.teams[ti].members.slice();
        base.splice(to,0,base.splice(from,1)[0]);S.pOrders[ti]=base;dragSrc=null;render();
      });
    });
  });
}

  const app=document.getElementById('app');
  app.querySelectorAll('input[name="fmt"]').forEach(el=>{el.addEventListener('change',e=>{S.format=e.target.value;render();});});

    if(!S.inputPts){alert('得点を選択してください');return;}
    const cset=cs(),ct=cset.currentTeamId,td=cset.teams[ct];
    cset.hist.push({teams:JSON.parse(JSON.stringify(cset.teams)),currentTeamId:cset.currentTeamId,winnerId:cset.winnerId});
    const isMiss=S.inputPts==='miss';let pts=0,raw=0,over=false;
    const multi=S.inputMulti==='multi',result=isMiss?'cross':S.inputAimed;
    if(!isMiss){pts=parseInt(S.inputPts);raw=pts;const ns=td.score+pts;if(ns>50){over=true;td.score=RESET;}else td.score=ns;}
    const mn=getMbr(td,ct);td.mi++;
    td.throws.push({miss:isMiss,pts,raw,over,multi,result,member:mn,cumul:td.score});
    if(isMiss)td.misses++;else td.misses=0;if(td.misses>=MAXM)td.eliminated=true;
    S.inputPts='';S.inputMulti='single';S.inputAimed='cross';
    const active=cset.teams.filter(t=>!t.eliminated);
    if(!over&&!isMiss&&td.score===MAX){cset.winnerId=ct;S.phase='setOver';render();return;}
    if(active.length===1){active[0].score=MAX;cset.winnerId=active[0].id;S.phase='setOver';render();return;}
    if(active.length===0){cset.winnerId=null;S.phase='setOver';render();return;}
    let next=1-ct;if(cset.teams[next].eliminated)next=ct;cset.currentTeamId=next;render();
  };
  const bns=document.getElementById('btn-next-set');if(bns)bns.onclick=()=>{goNextSet(parseInt(bns.dataset.next));};
  const bmo=document.getElementById('btn-match-over');if(bmo)bmo.onclick=()=>{S.phase='matchOver';render();};
}
render();
</script>
